body:
  text: 東牟集卷三宋王洋撰五言律晚宿村居早趂林鴉泊荒籬四面同田夫留古意野水識和風倦僕欺豫逺疲輿念汝功爾嫌冬日促吾興在寒空自欣村被酒歸失方竹杖我貧難致逺得此有夤緣弟為兄身老書來意巳傳扶衰惟獻直入手不隨圓偶向醉中别如何不黯然夜聞賽神鼓坎坎豐年鼓鱗鱗賽社人神寬陟降禮情取笑言真掩豆豚肩薄分餘福斝頻靈壇本宜夜考鼓已疏津重九日至雲號梯山七千丈接迹上清虛鐘雜鈞天奏僧參梵帝居攝衣鵬展背灑墨鴈添書今日登髙眼平生總不如一云平日登髙計今朝獨不踈嵗晏書事打打鳴窗雨昏昏帶岫雲酒寒難作熱爐冷不成熏梅頰夢中笑鴈聲愁處聞傷懷目前事細數費云云樂飲何意親杯杓初期樂性真若教狂勝德多被酒忘身談笑交情密氤氲酒力醇勸酬如錯雜莫過兩三巡安眠隨處便隨眠昏昏息萬緣魂如雙翅蝶身在四禪天素飾羅為幌芳茵錦作筵心如懷寵辱未必得安然觀擊食結習慕金仙西方省問禪時分四季社報積後生緣念戀期無問辛勤已有年會緣如有約此理自誰傳五老峰案詩二首其一見七言絶句已作人間瑞飛空老尚豪勢分方嶽重名列緯星髙月夜霜添髮花晨露染袍此翁無奈事占詠亦徒勞遊吕庵偶題結屋得勝處羣山簇畫屛春城花覆白回顧繞城皆李花盛開野路麥鋪青趂暖鳩呼婦先時栁化萍年年寒食近心自歎飄零無盡齋詩案集中有無盡齋記為清江韋子作此詩三首其一見七律造物本無盡貪求乃不公此能隨量取彼亦一無窮水底家家月窗前處處風要知真宰意不在有無中潢潦集須臾朝盈夕已除沛然隨飽滿廓爾是清虛金榖輸倉篋錙銖較簿書不知方寸地無計脫苞苴題楊道人庵庵基舊縣邑有廢井存空室寄空山柴門不用關虛心觀夢幻塵世獨清間舊井前村古新泉一勺慳蕭條齏粥外身世有無間寄題韓勉夫枝巢萬物各有性逍遙即自安均鳩得巢易躁蟹寄身難莫羡髙頭樹須防靜處丸如今洛陽第誰到子孫看逍遙惟所適小大浪殊觀溟渤鯤鵬近藩籬燕雀寬宅髙非逺害藏密定成安不似南山樹枝間有彈丸適時非履險足分不憂貧須信人間世宜思物外身榮柯堪歎蟻飽露可憐螓更謝東方朔能安一老臣望山間西際寺聞説林間寺攀蘿一徑斜有僧眠雪月無客賞風花丈室虛名在方袍嵗事賖空王無係著破屋便傳家三峽橋萬馬戰空山聲馳宇宙間窺髙增健大照勇怯孱顔洗石無千古招僧過一關不知平去易何似倒流艱此日湖源回展叔頴書頗及往嵗經行暨諸同志賞梅花之一笑急景相催又復幾年感而有作因寄叔頴并呈子楚憶昨越溪曲官梅正發時追隨連日飲酬唱幾篇詩淡佇看人意清香許自知慿誰將恨寄為説鬢成絲寄彥文張子蕭條後空山十五年瓶無粟遮眼門有客求錢折補經綸手拘留褊短緣尋詩有情否旋送兩三篇寄夏孝叔夏子賦分淺凄涼不喜看星星脫兵火嵗嵗獨飢寒世若均如子人應不羡官如何閏月底怨淚亦闌干以前所聞事末章及之寄周表卿不見祕書久經時失寄書交情猶繾綣遣訊問何如郡籍藏崑府班行近玉除自憐無藉在不敢夢華胥簿領正塵埃天邉驛使來姓名傳寶琰朋舊集蘭臺始望豈及此故人安在哉曽陪丞相幕撫事勿驚猜首尾裁十年故舊雖有顯仕而亦多淪謝念之愴然也寄永新元老元書云已辭廣孝復歸禾山白雲矣已尚清髙久須教去住艱強分雲出岫終放鶴歸山煙帶重嵐潤衣侵霧雨斑輕身如有藥猶恐費躋攀寄熊叔雅天上郎官宿人間又幾年莫思華轂貴好種錦溪田山色青盈眼梅花雪滿川儻因魚鴈信時寄兩三篇寄陳元載太丘傳祖道作邑興何如著意招風月隨緣遣簿書吏參名例外詩託笑談餘偏憶當樽酒論文意不踈送谹父守光州沉戟卧江臯詩人擁節旄便期犀結帶安事馬騰槽地入淮源重霜隨鴈信髙命書催入覲應及薦香醪送小劉解元赴試南宫衰年稅蕭寺偶與鳳巢鄰萬里刷鮮羽一鳴驚衆人寒催征騎急春接賜袍新折取如丹桂歸榮鶴髮親寄伯氏同占溪名邑還從佛借居懶便書眼暗靜愛酒杯踈山路間供課僧房步當車地爐貪軟火未得賦歸歟贈龜峰書記本是三山侣間為七澤遊放寬千里目散遣一身愁詩韻松來往經窗竹獻酬蒙頭一衲外萬事看浮漚贈恭侍者學有千門路恭為百行初謙和人愛重放傲腹空虛樹大求斤斧皮柔易卷舒請君觀巨海萬水豈能如寄題鄧成之粟庵鄧吉州永新人七案詩二首其一首見言古一粟本非慳縱橫透入關要知千種解不離一塵間透徹通真境拘留即妄攀須彌聊比喻未是最髙山崇夀印師以詩見惠次韻答之客問王居士如何是半僧祛緣都未盡學道又無能身世隨忙業妻兒飽嵗登時逢方外士陪奉説心燈贈辨侍者莫恨常無辨須防辨有魔易生人我見恐為記持多弄巧它生怨藏鋒性自和辨心休辨口方信是婁羅郊行曽問征夫路名山兩日程能銷幾兩屐况值一川晴詩欲謀於夜雲多不近城暮年塵事有逐處得心清次韻曽吉父清明暄晴猶苦促那更遇春霖花色存餘態春臺得重臨主觴方意展客意已愁侵是底書生事時為洛下吟吉父賦南池詩次韻吉父詩雖云紅蕖在眼而獨與白鷺關情蓮上人何望輒戲呈水府朝元路牙分女隊行神仙天外事風月世間情步有凌波勢廊無響屧聲何妨沉醉後珠履小縱橫和曽谹父春半書懷節物各自好春風獨太華裝添山衣錦零落地鋪花趂課蜂招侣幽吟鶴自嗟放開平望眼翠幕不須遮敲火開香焙書齋思漸清田翁新社長巢燕舊門生學僻詩無味心開語見情不愁無樂事正與物俱榮今日前溪好晴空事事明草長顔色重鳬暖去來輕遊女矜髙髻書生厭短檠懸簞雖過午碧澗煮芹羮和曽谹父雨中詩案體無尊骨畦丁有賤蔬鳬鷖憑岸泛雲海占空虛婦老能論舊兒癡尚帶吳旁人如見問老子即遷居往年茅屋水痕過一由旬人論方宜夏心驚已畏春花光如勸酒山色獨談真補拙供吟課聊開一笑頻和谹父連雨快晴十日雨易滿一鳩嗚更多開眉初對月生耳不憂禾兔走無留迹輪空不受它乘風若歸去九虎莫誰何官無三不遇身負四宜休無意花迷眼唯因月上樓役車懸白地社鼓祭黃收何事關心切逢人説有秋和春雨韻客路元來促春情本自長送愁誰納欵遣癖又無方失性陪飄雪凋顔自染霜吟君春雨句縈拂為牽腸榮辱一時夢浮生百種心愚因難化穩懶為不治深分退何須卜貪髙每自斟須君説情話澤畔欲行吟和曽谹父中秋前六日二詩怪底暑風淺明珠照座寒鋪張平地錦峻激急流灘吟諷千篇過更移一字難少留明艷句拂拭菊花間誰將兔消長用卜月隂晴三穴由來暗中天本自明金盆如未滿玉斚為誰傾處處隨人去長空不送迎和曽谹父促叢珍之集布穀但催耕鳴鳩不喚晴風添前夜急花負去年盟老去歡娛少茶多懷抱清論文一樽酒何日向人傾和谹父留别細雨關山路梅花識舊鄰擁旄紅額騎抹杖白頭民故國悲王粲年光送李頻遙瞻解鞍馬正是小陽春卧鼓開亭障斯人久晏然宣王思采芑羊祜保新邉妙手傳干葉鰲頭控六連使君雙眼闊塞草不供憐和谹父問訊吉父北園依梵庋東郭據梧桐鶴並千年骨詩傳一祖風有愁添鬢白無藥駐顔紅臺上秋期句思君類渴虹困臂知三折攻頑費七旬不聞覆杯水能救一輿薪俗傲軒轅聖巫誇越女神百年勾漏術觸處白頭新和鄭丈戲贈谹父生踈僮僕賤顔色病妻同定有明人眼真煩夀乃翁仙曺歌法曲詞伯綴秋風不是人間譜霓裳墮月中和谹父答鄭丈鄭圃潛仙客陳留繼阮生掄才俱道用昌譽得詩鳴未解侯三接先歌玉六成篇篇多瘦骼疑似帶銅聲和鄭二卿别賦病逐秋風至年隨塞草衰家如百年夢身入四愁詩北焙聨圭璧南薰潤嶽池齋房多勝事可但滑琉璃又和新字清秋移象緯皎月一更新巖桂陪賔席黃花似故人詩參工部正道入醉鄉醇遙指靈山下長衫賽社神和伯氏示兒姪屋僻唯宜靜櫳踈巧受寒衾光宵獻白爐火晝無丹潦倒投僧梵依稀似宰官一錢不停蓄却喜布囊寬和方簽判詩乞芭蕉於教官緗帙文書展青襟懷抱空花前添翠幕句後捲詩筒雲重能鄣暑身輕不礙風相期三伏日借此作寒叢和酬鄭共老萬事易瓦裂故人情未休殷勤一詩語辛苦百端求書託峰頭雁人隨海上鷗終期斷湖尾卜築共良謀江如晦以詩送蕙一本以詩謝之幽芳不弄姸人意自推先比德人間願同心事外賢香因天力與名自楚詞傳桃李多顔色相逢不敢鮮謝筠守趙從周寄黃蘖中洲茶道院文書靜傳籖報兩衙籠山踈藥圃祖寺摘春茶珍品少為貴佳名逺更誇要知清白德盞面看浮花李丞相挽章名紀三朝重身居百辟師華夷占用否進退繫安危見夢英靈在成功命數竒出師身巳老埀淚憶當時風雲扶日月堯舜正衣裳壯烈周方叔從容漢子房鼎彛酬巨業典禮賁幽光悵望它山逺千年緑野堂王侍郎挽章案此詩二首其一見七律位列仙官籍名隨海賈船前旌衝瘴雨拱木兆新阡玉骨埋黃土金聲麗藻編兩行懷舊淚灑向菊花天曽侍郎挽章道盛當堯日名髙嗣聖初人推金鼎望帝念玉樓居舊典尊王迹傳家教孝書崇文華夏事淡泊寄情踈未下蒲輪詔先驚柏府寒九州方鎮節萬里使華冠嵗晚一菴密風流百世寬永懷函丈訓泣涕自汍瀾吕尚書挽章古逺儒冠拙時忙壯士尊百年難保命萬里未歸魂身後塞翁馬生前廷尉門悲笳咽遺恨行矣不須論載纘世基日羣公扈聖年伏蒲鳳岡上持節鴈峰邉外閫風猷逺中臺出處全履聲傷易盡不得輔中天四海詘伸勢安危俯仰殊犬戎蟠洛邑晉鄙握兵符楊李生同烈髙秦死異區誰如雙劔化義烈一門俱挽向倅案詩二首其一見七律襟量塵埃外功名慷慨中人懷不滿望身有未全功逸氣猶驚眼馳光息轉蓬蕭條古原上松柏自號風挽程伯禹盛德師千古髙名滿四方位登三品貴身任百夫防公在衣冠重公歸逺近傷哀榮終始事褒典在徽章待問盈朝日羣生解褐初太常方奏第儒館下除書出入勞忠藎襟懷自卷舒如何奪公早不得待懸車挽焦適道寺丞學有千箱富言無一字欺脊令慈孝地兄弟急難詩頌美觀名士傳家付令兒平日磨玷缺此理上天知前兵戈時骨肉散失後與元昆相得於三衢慈孝坊人以為誠意有感又兩郡多令政時賢亦為賦詩今為兩集亹亹談多緒諄諄意恐傷行孤違衆好誠盡是君長生死人間異經營地上忙靜中如有趣遺譽自芬芳挽喬民瞻案詩二首其一見七律世德書青史榮名在本朝如何元士葬不得大夫招惆悵空蕭瑟秋風正泬寥遙看古原上松柏暮蕭蕭臧夫人挽詩二首奕世流芳逺傳家慶有餘簮荆蘋薦潔曳練寶粧踈載德光門閥成名振里閭如何裁半日一旐向輀車義有臧侯者寥寥幾百年豈唯君子貴亦有女郎賢寧捨家藏富先歸宿貸錢自然難到處風烈是家傳哭嘉彥釋蹻淮西土平生質勝文形模笑婦女術業富丘墳客路酒歡喜官曺名放紛銀章猶斷壠餘事付青雲哭李清卿侍郎薄壘氊車咽危臺斥候移孤忠萬夫望獨許寸心知義動乾坤正生殘日月虧南山竹有限難盡泣君辭金石雖云久精誠諒不移但期忠可仗誰謂敵難知籲極天應泣難諶信有虧報君如不盡禍福定虛辭皇澤淹時久人懷孝可移不應當後患端恨未前知國破言猶壯身亡義不虧青編照千古昭代有芳辭眼見盟城築俄聞鐘鼎移憶君還抆淚胡爾大無知名擅千鈞重功無一簣虧殺身因主辱獨為實前辭賦紅梅為怯清宵短然膏約憑欄頰疑西子醉花誤北人看點露燕支破啼粧風雨殘莫嫌翠袖薄猶得護春寒初螢腐草漸時澤翩然變化功分光衣作炫乘暗力排空自表因存照雖多不暖風偶緣膏火盡得到兀窗中病眼案詩二首其一見七言古飛花無復數遇物輒成雙書畫踈幽閣屏幃戀北窗懶開辭俗客寫望憶秋江椒菊供朝餌猶須發酒缸五言長律和陳長卿五人同集韻受廛均宅畝寸矩漸經營湖泛輕舟遁峰排老岫嶸牧之推上第吏部絶心兵列爵分全服和聲奏大庭暫辭侯馬貴聊撫帝絃清黍在穀為重雞緣德勝鯖無功須滿斗仲雅計全升顧我窮難送如公福正榮惠施書巳富陵也句初鳴徑醉相逢樂亡聊一洗平省題泰帝鼓瑟雅樂聞琴瑟相因泰昊前朱絲疑雜奏素女減哀絃破竹符終合分魚目不全所餘裁五五再續未綿綿損益時皆有虧成理或然茫茫千古意漢帝自誰傳
