body:
  text: 東牟集卷十宋王洋撰策問策問問廊廟之材非一木帝王之功非一士然功無不可成之時時無不可用之士顧所使如何耳兵法曰使智使勇使貪使愚姑即是四者言之智可與共圖功也然有餘於智者反難獨任勇所以濟難也然勇冠三軍者或一戰可擒萬里征伐不録其過使貪之術則善矣然將吏侵牟物故者衆幾何其不喪師也謂守臣取材以防他盜使愚之術則善矣然擅掠財用奪禦遏兵幾何不同惡相濟也主上練核羣材共圖中興任賢使能固自有道至若開閣延賢當進退之任齋壇受鉞專假授之權為將相者亦宜茂明斯術也夫使人人已得其術則善矣如其未能而有問於生生將何以語之問恭惟我宋克肖天德天以所覆全畀於我聖神相承垂二百年地大物庶孽牙其間邊陲版圖不充職方之籍者七年於此矣主上勵精庶務宵旰靡遑恢復之業視前世倍稱然而算計見效未得四五豈夫服叛去來自有數邪抑消長之運其來必有漸邪將施設措注之方尚有可論也今姑取一二言之潢池赤子盜弄干戈招徠所以安吾民也然撫御失宜而覆出為惡者衆選將命師分制要路期以固吾圉也然勢橫侵侮而望風奔潰者多轅下之夫授以耕戰保民之道宜不過是其如私憤一起則鋤耰可以相殘有餘則豫不足則取古今通道皆出於此至或取之再三則民力困於輸斂日者詔書條下謀盡羣議因有在庭之對奈何但謹奉承蔑聞著見豈不辜盛意哉夫時異事變迹勢不同然訪古驗今趣舍則一敢問今日之遏強敵如李牧之守邊與光弼之電擊誰優今之弭盜賊如虞詡之治朝歌與龔遂之安渤海孰合兵民可以寬轉餉而使井閭無紛爭之憂厥要何從藉民力以裕邦財而使養生無不足之歎其術安在舉措之方宜有良策諸君學優入仕固宜兼明世務以補執事之不聞幸備言其説以著於篇毋略問孔子之後善學孔子者曰孟軻氏而止耳今觀其書有若不同者孔子刪詩書定禮樂作春秋至於易彖象而繫之尤為著明而孟子十四篇之書未嘗有一言及易孔子之教進則與之雖互鄉童子有不棄也至性與天道自子貢有不可得而聞者孟子則不然論形色天性雖萬章告子之徒皆與之往復問難不少隱焉夫以易為性命道德之書不可以言傳歟而言性何其易也以性為人所同稟可以廣言之歟則性豈不近於易而夫子又不以誘人何也言至於是不容無疑試辨明之問物之不齊物之情也自古有貨幣之法以權百工之低昂其來非一日也然而錢幣物價常相輕重彼輕則此重彼重則此輕一有偏勝不容無弊故管夷吾有開闔斂散之法施之當年傳之後世襲而行之非無成效而法出姦生令下詐起如誅稂莠不可盡除豈自然之情比而同之終有不可者歟老子有言曰治大國若烹小鮮如是則在民者固當順其自然非可以法度加之也老氏之説可施於政歟夷吾之法可推而行之歟試明辨之問滕文公過宋而見孟子孟子道性善言必稱堯舜他日告諸弟子之言亦曰人之性善若其不善非才之罪也自孟子之言出天下無異辭而人皆知性命之説美矣至荀卿氏則曰人之性惡其善者偽也妻子具而孝衰於親爵祿盈而忠衰於君嗜欲得而信衰於友人之性惡又何問焉故孟子之後荀卿氏有異同之論而學者不容無疑焉西漢之衰揚雄氏作其論性則又有不同者其言曰人之性善惡混習其善則為善人習其惡則為惡人夫孟子荀揚皆聖人之徒也使其同出於聖人之道抑何相背之戾邪且性者夫子之所不言而三子訟言之無少隱然荀卿又稱問答之語以為堯舜有是言也使堯舜果為是言而孟子不知是不學也知而背之惡在其必稱堯舜乎試辨明之問春秋之時去先王之世未遠列國之卿大夫材之相逮者至衆也大之為晉楚小之為鄭衛當朝覲聘問之際其文辭著於傳者蓋不減先王之盛世焉然而比權量力莫能相尚而功烈如彼其卑何也豈其流風餘澤止如是而已乎豈有其人而無其時乎不然其人才無以相尚莫能相一也試論其才之高下而究其所以然問冠圓冠者知天時履矩履者知地形此儒之所貴乎通三才之道者也請言十有二次合於分野者如何其備著之毋略問僖公固魯之賢君也今考之於詩頌僖公復周公之宇推本薑嫄后稷至於太王文武之功然後及魯侯之德其鋪張之美則言公車千乘公徒三萬膺戎狄懲荆舒至於海邦淮夷南夷蠻貊莫不率從如是則魯侯之功雖周公不過也使有是功則宜大書於春秋今考之經傳殆無是焉豈詩人之賦文勝之過乎孟子曰説詩者不以文害辭不以辭害義以意逆志是謂得之夫辭志可以意得也今所稱述皆聖經之有迹者果可以意逆而遂信乎戎狄是膺荆舒是懲孟子嘗以是為周公之功如是則泮水果僖公之詩乎夫詩三百篇皆經孔子之手學者安得而議然春秋亦聖人作也不然傳誦者誤矣盍試稽諸麟經按僖公之事而決其疑焉問春秋隱公十一年滕侯薛侯來朝至桓公二年滕子來朝先儒但言時王所黜而不明其事及後之説者曰以滕服屬於楚故降稱子夷狄之也如是則夫子黜之矣先王之制子男之地方五十里而孟子謂滕文公曰今滕絶長補短將五十里如是則滕為子男明矣春秋之時列國僭等自侯自伯固不足據而夫子所書必正其爵未嘗假也使滕果侯爵乎安得方五十里以為國使其為子男乎安得與薛並稱侯爵以假之先儒但言時王黜之而不言其事信乎若曰服屬於楚而黜之則陳鄭宋衛之君從楚者衆矣何不黜也觀滕文公問孟子之言曰滕小國也間於二大國之間事齊乎事楚乎如是則滕之服從於楚至孟子時尚未定也謂貶黜於二年之間其事安在試夷考而詳言之問孔子曰人而不為周南召南其猶正牆面而立也與學者之於二南如是其急也為二南者可不通其説乎今考之詩其説殆有不同者焉關雎后妃之德也説者以為太姒舊矣而或以為太任夫太任一國之妃耳以一國之妃為天子之后不近於誣歟若以后妃指太姒即鵲巢之夫人又為何人耶騶虞鵲巢之應也而漢儒以騶虞為文王之囿則所謂關雎之應果安在乎使騶虞非關雎之應則麟趾之詩為鵲巢之應又何所取正哉夫詩之為經不可不學者也二南之於詩又其急也而説者不同如此將安所取正乎試明言之問孔子百世之師也後之學者著書立言捨孔氏奚自哉今考其書則有不同焉魯論載孔子雅言之敘其首篇言學次即為政蓋謂從政不可以無學而學者固將以為從政之具也至荀况揚雄則不然皆始言學而以修身次之夫學即所以修身而修身者學之謂也詎可裂為二乎修身矣而不施於政豈將獨善其身而已邪二子者學聖人而達者也其立言如此必有微意試明言之問孔子曰禮與其奢也寧儉儉非聖人之所貴也若賢於奢則遠矣春秋傳曰儉德之共老氏之書曰儉故能廣而夫子於麻冕純儉則從衆儉者豈非無悖於道而聖賢之所同貴者與及考詩人之刺乃有不同者焉僖公儉不中禮不能及時以禮自娛樂昭公有財不能用有鐘鼓不能以自樂皆斥其失而刺之為君者而不能修道以正其國至於政荒民散刺之宜也有財不能用有鐘鼓不能以自樂儉者之事而已遽可刺乎又若朝廷不能灑掃獨閽人役𨽻之事不修也亦可以刺其君乎且蟋蟀之序曰本其風俗憂深思逺儉而用禮乃有堯之遺風夫使一國之人儉而用禮而其君又能儉以率之國之富實可待也果可以為刺乎或曰序詩者未必得詩人之意也序詩而不得詩人之意則聖人之意詎可見乎以此言之序詩有可疑者矣問記曰疏通知遠書教也既習其書宜知其説盍條陳之以觀所得問唐季至於五代文教不優武烈不斷所謂教養作成之法皆已掃地宜其人材衰落無可稱者及宋受命聖聖相授於今百年其教養作成之法固已大備其人材宜百倍曩時而拗指計數才三數人耳豈衰亂之極思自奮以投功名之會而承平之世無所施設乃自晦於懦弱之域邪將人材或不在於教養抑教養有所未至邪祖宗擐甲胄掃僭竊則前後左右指顧馳騁皆英偉磊落不世之士大者運籌帷幄決勝千里而小者猶能提戈斬級各以智力自效嗚呼盛哉近古未有也先皇帝患之始闢武學試以射御而策之以孫武之書然所得士尚皆齷齪亡古名將風雖至治之世毋恃此屬然北有對峙之敵西有未誅之羌思患預防不可忽也今欲得將帥之士皆如祖宗時其取之之法馭之之術可得聞與武舉之制貢試之科亦有缺而未至與所謂教養而作成之將別有説與幸併以見告問七十子之徒學於夫子其得聖人之道各以其分量之所及而夫子告之亦因其材而篤焉故有見而謂之仁者有見而謂之智者有得一體者有具體而微者固無得而皆同也若夫至德要道獨曾子聞之故曾子之學一傳而為子思也有書作焉再傳而為孟氏宗王之論興焉是曾子之學其於聖人不可謂不得其傳者也然而從於陳蔡者自顔閔以至求由並在四科之目而曾子不與焉使其發為文章豈遽不及於遊夏率於德行寧知不逮於冉閔而不得與於十子者並烏得無其説哉試考訂而言之問萬物莫不有之者道也聖人管道之樞要六通四闢無所不極故言而世為天下道行而世為天下法後之學者惟折衷而已耳心服而已耳豈復有開其喙者哉逮至諸子百家得聖人道之一偏而不全不粹故互相排擊莫能統一要其所宗皆出於聖人之道亦何相為矛盾之甚歟昔者荀卿著書非十二子自惠施鄧析至於子思孟軻皆不能免使十二子皆逆理而傷道則可使其有合於聖人之道而荀卿非之當乎自孔聖而下善學夫子者莫如孟子而孟子猶且不免則荀卿之論謂之不當可也揚雄之言曰吾於荀卿歟見同門而異户也如是即荀卿於道固為同門夫同門之士而相非若此其説安在諸君試辨明之策遏敵之策臣聞中國之於外夷未易以力勝也能使外夷之人自相攻討則敵寇可遏矣西漢之屬國都護東京之南單于與唐回鶻之師皆此道也金人用兵以來七年於兹而四夷之兵未聞效順敵兵以是日熾中國以是日陵禦遏之術未見其善必能合羣夷之情捍強梁之勢然後外寇可殄中國可安或曰中國之使外夷外夷之事中國各有常勢胡可強議今中國之勢既陵外夷之勢方盛安能間激使相戰爭臣曰不然今者中國之財貨子女奇技珍巧金人奄取而盡有之固諸國之所欲也使諸夷取之之謀利則中國啖之之術行况今四夷諸國一介未通在此者既不示以撫安之情在彼者安知其無向化之意臣謂宜常遣單使屢持尺書使知中國之勢尚可振起若諸國有能助順則金人行可破之何必輶軒旌旗然後增光逺之華箱篚厚恩乃可明遣使之禮申包胥之救楚但哭秦庭燭之武之使秦不聞厚幣此所謂不可不為者不可以不為而廢功也事有不可為者固難以必為而冒進亦有不可不為者安得以不為而廢功弭盜之術臣竊謂弭盜之術有二小盜宜求所以安之勿思所以勝之大盜宜求所以勝之勿思所以安之何者小盜鼠竊千百為羣或因規利貨財或緣不忍小忿順而撫之宜有悛革若官軍不知出此必欲窮誅勝之不足增威不勝反成窺侮是以龔遂之臨渤海安赤子以稱良虞詡之在朝歌殺降者而生恨臣故曰盜之小者宜求所以安之勿思所以勝之也若乃大盜株連踰州跨邑嘯聚不逞攻劫善良此四夷之所視以卜我興衰寇賊之所慿以相為脣齒若不講明軍律選練羣鋒斷之以必取之謀示之以不赦之意使彼羣醜必底滅亡則將大盜不除小寇是效州州相煽轉發禍梯安能風示逺方擴清宇內成中興之漸覬奠枕之安乎臣故曰盜之大者必思所以勝之勿思所以安之也今者羣盜之中江州為最昔憲宗已平淮蔡河朔遂朝然方師未有功羣言屢至賴憲宗明斷以有蔡功臣恐江州之寇稍成遷延官軍淹時或有小衄則必有言其外順之勢謂可懷柔者臣願朝廷斷而行之勿恤羣言必殄此賊以為四方之戒也書上趙元鎮書某自夏中東走行在見大臣三人某素知二人焉一曰丞相范公舊嘗遇於學宫一曰參政張公官烏府時因緣張公親舊得望履舄獨於樞侯未嘗一接欵曲惟於律學博士何泳直舍一覘風采退而問曰此天府官趙侯也邂逅既退不知短長故於樞侯最為無故然自獲進見也蒙樞侯向人稱道不絶口夫進見大臣以所業為摯此常禮爾樞侯獨取觀之再三稱賞刪定官魏矼曰朝廷添置敕局官以代道山當先以王某為首此樞侯言也某自念樞侯方一再進見所論天下事未甚深切而樞侯賞之是豈欲招置同類助為腹心使士譽益彰爵位益固而可長保者哉其意必欲兼收並用庶幾其有益於國也樞侯所期於某者如此則某之期於樞侯當如何哉然某竊觀今日之事大有可急者意樞侯思慮所及不在人後何久而弗言樞侯為大臣進見主上必有密勿之論而某敢謂樞侯不言者大臣不言即已言之則當從之從之則當行之如其不從而止是與不言類耳方今之急日甚一日急於救焚急於拯溺急於救經而趣解急於倒垂摶艾然頂而營免敵馬盤礴近在長江候騎持一赤白囊南鄉則行在震驚上下騷動官吏先治舟楫幸其得免踰冬減死轉至春夏則褒衣峩冠復求進用嗚呼今之進見丞相坐語立退者幾人不為其身謀而以宗社安危生靈休戚為念者哉使賈誼復生不暇痛哭自絶於世矣某今不量度輒欲以兩言因樞侯以獻於上其一曰立根本以固宗社其二曰履危事以決安危此兩言者愚意有言於大臣者矣而大臣弗聽無益也必有觀事勢露風旨而達主上者矣主上弗從無益也昔王彥章見事迫切自內一刀見梁帝欲先自剄而梁帝聽之夫朱梁之臣其行事甚可羞愧然欲闢羣小進至言非感激垂涕以死自明則不能入今日之事迫矣大臣奈何不聞以死自明者乎嗚呼此天下所望於大臣者也且某之言非但欲批逆鱗犯忌諱邀一時名幸而進官以為身榮不然身死而名彰亦為一時之望也某之所陳蓋亦有取焉樞侯其試聽之夫仁祖之朝中外驚急不知何如仁祖聖嗣未立自大臣庶寮日夜為憂必至聖心改悟建立根本至今蒙福真祖時契丹至澶淵其勢不減耶律德光而當時大臣必強車駕渡河以張士氣二祖之朝與今日事大不同而當時大臣必力爭廷議期當而後已豈不可為後世法哉某願主上選宗臣謹厚好學無過者使主管鑰主上提兵而出召大臣諸將歃血而盟若曰嗣位以來所遭艱棘自古未有安得復不奮怒以為生民請命若天命果在乎當一戰戡敵復我祖宗疆土如其不然大臣將士宣力輔弼俾無墜我祖宗之基相斯言也感激指天以誓某意如此則天地必為震動將士必為感泣日月必為順行星辰必為循軌風雨必為時若譬如提綱先振大者自餘條目其順從者不可勝言矣嗚呼某自宣和之末官於京師敵人初至城下竊聞主上毅然請行都人之戴主上也慈父愛母何足比稱方敵人之欲解而主上未回也某嘗於都人衆中聞有一人言曰有能迎康邸歸者官至大將賞錫巨萬衆口雜然和之又有一人言曰有能得張邦昌如何有應者曰送府杖而遣之衆人亦大稱快某以是知人心天命牢定如此後至建炎秋夏邦昌在位都人望翠華之來引頸瀝血以為生死決在朝夕其後敵人日盛朝廷日弱主上走馬遠避然天下之心皆知君父實不得已故至夷滅州縣而人心不怨君父誠知其無奈何然而如是行之今四年矣敵人去歲涉重江逐行在荼毒之虐自盤古以來未之聞也某意上天至是亦震怒矣所以敵人所至則粟貴如珠人民艱苦州郡尚存者五穀豐熟將士飽食此天助順之明效也天心助順而惡逆今既怒矣人子不繼之怒以行天威其奈何哉其奈何哉嗚呼主上之心太仁與敵人用兵相反敵人之兵進則有生退則必死我國家之兵進則必死退則必生故纍年以來敵人之兵日強而中國之兵日弱然而以善氣敵殺氣以仁心對禍心則福常在我禍常在彼生常在我殺常在彼論諸人事雖彼強而我弱觀諸天意恐我忠厚而彼殘賊也天道三年小變今踰三年矣盍小變之以振兵威乎所謂小變以振兵威者非欲勸人君以多殺也主上既怒則大臣怒大臣既怒則將士怒將士既怒則智者竭謀能者出力並鼓以前富者敢愛財乎貧者敢愛力乎今日之弱怯可化而為盛強也某嘗論靖康中京城所以敗者皆緣愛死以得死時敵人疊壕其功過半淵聖一幸城隅聞大將有縋城擊賊者使當時大臣力勸淵聖張黃蓋設御幄上南薰門粟帛官爵並列在前日募果敢陷堅却敵某知城必不陷奈何為宦官宫女者以姑息愛天子必曰不可臨城如天子臨城安用臣下為左右給事者愛大臣必曰不可臨城如大臣臨城安用將吏故方是時天子仰大臣大臣仰將吏將吏仰士卒堂堂中國所恃以却敵者女牆數夫與策應將卒百十為羣者耳孫傳東州朴儒也粗知義命有不愛死之氣所餘僚屬某知其人焉其稱賢者曰宋齊愈齊愈之居適與某鄰常與夜語一日告客曰孫公今日自城上遷城下矣某實勸之以謂大臣當清心治事城上哤雜豈能治事也以某度之齊愈亦以姑息愛其主人耳嗚呼城門之遙與沙漠孰逺臨戎之苦與竁帳孰危百官有司絡繹奉養與酪漿羶肉孰豐不知大略者徒知以姑息愛人主初欲逺禍而得禍如此姑息之流果可與論大利害乎事之往者既已若此其未來者可循習前日之弊而襲之哉且某以謂履危事者非敢強大臣勸主上當枹鼓之急而以賊遺君父也金陵自古龍盤虎踞之所保江南者能守金陵則事濟不能保金陵則江表非其有也故未嘗不與北兵對壘且孫氏與曹氏孰強曹氏臨江者屢矣孫氏欲遷武昌而不可劉備勸孫權都秣陵權從之而孫氏以安南唐與中土孰強李氏保金陵則安中徙南昌國勢遂不復振又吳會者闔閭定霸之所雖夫差不修國政姦諛用事句踐謀二十二年而後敢動後因吳大用兵乃乘其敝耳此二地利保江表者必爭之所去歲杜充強愎好殺將士離心周望怯懦庸繆望風先遁所以敗事若六飛臨按張將士氣飛三吳之粟增上流之備四方聞之謂天子變弱為強化怯為勇必有瞋目攘袂切齒扼腕思自奮者天時人事恐可一戰而定也又浙西太湖之險四絶平陸青龍華亭皆岸海道若果堅敵未摧軍勢不振方徐圖之天下孰不益知君父為不得已者雖連城跨邑肝腦塗地某知天下必無怨上之心如其不然日事退衄即恐人心真解體耳且某所謂立根本誠可勿疑者淵聖皇帝朝主上初請使敵營後領兵河北可謂大有勳勞矣然使淵聖太子尚留中國某以為謳歌訟獄必有所在蓋名分既定人不輕變今主上自臨御以來人心愛戴知君父之艱難雖無知之民罔不垂涕激發思奮勵者使姦諛雖有他意安得動搖獨患朝廷不能自立輕為進退民心漸離萬一包藏蛇豕心如苗傅者猝發懷袖則非某所敢言且某竊料金人用兵踰二十年詭計百出連年以來或來或否或春來或冬至皆謀出我不意以某度之今歲未必由江北來也以江北之兵疑我君臣陳船欲度或潛突浙西却以奇兵由他道來襲我不備我若提兵浙西保吳會太湖之險命信臣守行在銓部以下百官有司一切留之是亦所以伐謀也嗚呼樞侯其念某言若樞侯迅勇自奮出萬死一生以徇國家一時之急某願屏棄妻子執鞭弭以身為衛與樞侯同死生無悔天地神明聽之臨之不敢有妄答袁秀才書比承車馬枉顧且惠之教感德不忘某於道無所聞見而公下問之試誦其所聞以告某嘗謂人之學者既積於中則必思行於外思行於外則必求合於人求合於人學者之大病也然有不得已者以干嗜利祿志在於得其勢必求合於人而在我者惑矣足下所論二氏學者之弊無以為也彼更萬世而無弊者孔子一人而已自曾子之學傳而為子思子思傳而為孟軻子夏之學傳而為段干木段干木之學傳而為莊周足下試取中庸孟子之言與莊周之書讀之其相去蓋不啻千萬也彼數子者皆出於聖人其去聖人為未遠而不同若此而又將以責學者之末流可乎雖然聖人之道所惡者勿傳而已西漢之士各守師説其相攻者幾何然至今詩書不亡者皆學士大夫誦説之力故不背仁義之塗不失孔孟之意同是堯而非桀者皆有功於道者也何以其異同為哉某忝與尊公遊而足下才志過人甚遠若優遊得失之間而無汲汲以求合於人修其在已者以俟天命則異同之弊殆可吻合彼朝程而暮王者足下自知其解也謝諸葛秀才書某辱書為賜甚厚某衰老學殖疏落未嘗得此於人也足下屈而臨之以下問為事誠賜厚矣然觀足下之意不過以某嘗習周官之書以取進士第幸中足下方事於此故辱問塗譬如有病他術未效試即老醫問之冀其有瘳而不知已陳之方或未適用也雖然既有問矣安得不告夫周官之書治世之具也後世倣為六典惟唐最詳疏密有條小大有列井井乎無紊其序則其有用於世可見某方遊學校時世非王氏不道先進者以此取士後進者以此干祿則安得不學顧其説亦未易略某於正經之外嘗講字學以明之如六典立經常之道八則裁利制之宜法以有去為文職以俯聽為義井人所掌有公私之別韗人所治非德教之先為鍾者以鳧名染羽者以鍾紀旄愛其仁鞮履其義韎達其禮推類而言其義不一亦皆先儒所未言可訓以自效者也二十年來文律復古視王氏之説分析破碎無古人之大體故雜用諸書而士守全經不必以字形曲意求之之為勝也某於此亦有一説夫鑒形者必以他物燭之則昭然可見太公之書曰視爾前顧爾後欲鞭其後獨視其前可乎今足下之習是書請讀易書以鞭之蓋形名度數至理所寓不可以迹求也以迹求迹止於迹而已烏知其所以迹哉足下試觀夫運盎者亦出盎施其力乎抑坐盎中挨㧙攩揇而求其轉乎周官之書盎也足下運盎者也易書出盎法也足下試取易書稍絶人事閉户沈省晝讀夜思旦暮之遇釋然有得而反照度數之書則足下之學自此遠矣况有司之程乎讀書之暇儻復見臨請俟他日答柴德廣秀才書某前辱惠訪見教甚厚繼又以長箋與書偕來美意稠疊何以得之思一走謝久矣以嘗沐面誨居第荒逺又多寓他舍僕亦多病彌月以是闕焉久不伸敘悵然可知足下所引古今之摯輕重之説是矣文章言語固不足以知人然其賢於執一雉以相見明矣足下之文非獨詞采過人其稱道取豫條理暢達私竊慕之至用古人姓名小異此家貧無書任記誦之過耳自前輩巨公不能無是失亦何愧也而足下再三念之自恨其疵僕以為足下之文自是無復病矣僕曩有瞀疾惙惙焉懼之謀於醫而脈焉醫之言曰君之疾則有之可勿藥而愈也僕初訝其言不倫詰之醫曰凡人之病患在不病則有不可治者病者病之救過不給病其有不治者耶君病是病而怖之必以怖免雖有良醫不是過也僕佩是言以底於今不惟前病之愈其他搔癢疴痛枝節之苦以怖去者十有七八今君詞章氣焰如此將之以溫然之容輔之以不競之德思其失而補之豈惟文哉吾將見子圭璋之美與日俱新粹乎其不可及也昔子張學干祿夫子告之以寡悔寡尤近世顔平原著小學為干祿帖乃在於筆畫點綴之間彼一聖一賢者豈無至言妙道以告哉以為邀爵之道勿求於他故在此而不在彼也足下其勉之僕敢誦前醫之説以告答陳謇叔主簿書辱書為貺甚厚然所期待有不敢當者某初見顔色即有願交之心相距隔絶不敢自必今者幸會遂得所圖私心慰滿方且慕向而遽沐期待之過其敢當乎某聞善惡之積至於不可掩解者類皆有以相之以成其自信之心故有非人之所能為者則不知其然而然者是也所謂相之者何邪即其所至之物是矣今人為善初如萌蘖之生焉非敢自意於茂大也及其雨露之所潤晝夜之所息至於潔之百圍而未已豈不猶為善而不可掩者邪彼為惡者亦然其始犯義也寧無畏懼怵迫之心及其已熟旁誘曲譽日聞於耳然後至於惡積而不可解此大學所謂格物而後知至斷章取義則為善惡之訓一也某聞謇叔之居於鄉也有里胥持縣符相督以勞辱事者彼不知為善者遇之不過諂笑以媚強袖賂以規免伐羔肫具酒炙以幸其去爾謇叔於此時獨慨然發憤攻求古書以敵俗吏之鋒此狄梁公之志也故能好學不倦至於今日又求其所未至嗟乎如子者豈易得哉僕之畏友今得人矣所期於子者願子自信以增其光大而已唐有崔羣者韓子之所畏也然其贈羣之書則曰崔君無怠云蓋懼飢渴困躓之來有以害之也子能屬崔君之志保韓子之言無為飢渴困躓之所敗則百圍之材子當之矣如僕者其願庇焉盛暑憒憒不能辨悉其他俟相見代人上吕相書嘗謂仁人君子立身行已自有法度故方其宿道嚮方檢迹飭度則其所美者在身及其揚名立身就養有方則其所奉者在親服官針嚴立訓則其所修者在職業至於得志而澤加於民忠施於君不出廟堂指顧之間而愛利施於四海則其所憂者在天下此四者仁人君子立身行已之方所不可易也某北方之人也方自總角則知大丞相之名侍坐長者數一時之士則服大丞相之德襲箕裘之業陳力就任則被大丞相之恩前在河北兄弟四人皆𨽻麾下及淮寧兵火喪家之後親弟子忞首蒙陶鑄則某於門下又不為無分然自大丞相之當國某躊躇瞻望不敢為自售之説者其意豈固取疏於門下哉以為君子之道方其憂在天下雖身有不暇顧也雖親有弗暇事也規模宏逺以天下為量非特曩者當一任按一部察求屬𨽻之類也故某持前四説而不敢輕以進焉今日輒造廡下求望大君子之威容則前所謂受恩之説豈復有可以言者哉故請略去前説而以公道論之庶幾其可言焉某賴先祖之遺澤同父兄弟十三人皆在士列比年以來遭罹困苦零落殆盡以褒名者死於朔部以韶名者死於宛邱其餘名位不顯默默以死者非諸兄即諸弟今所存者三人而已念子忞守白沙子率從辟淮南軍中與某而為三三人所同事者一母思得便親就養之地皆未可得故某輒願乞不肖之身得一江浙便安之地奉老母以終餘年則某自今日以往盡未死之年皆大丞相之賜也或曰斯言也私若之何某以為不然某竊謂方今用人之要大略有三一曰察勤惰二曰公賞罰三曰均勞佚此三者天下所望於朝廷亦方今所宜急者也何謂察勤惰方朝廷遣吏有受命即往者有聞命覬望者覬望者為惰則即往者為勤矣何謂公賞罰盜賊所陷之地有能奉心向國不被汚染在所宜賞則首鼠兩端治狀不著者在所宜罰矣何謂均勞佚取其勤者可賞者更之佚地取其惰者在所罰者督使任勞則勞佚均而百吏勸矣某在靖康之初朝廷選人往太原未有行者某時為樞密幹辦官以四月被命即行金人以二月十一日解嚴而某之往太原以二月七日斯固未足以為勤抑不敢自謂惰也去年春攝領楚之淮隂趨辦縣事不敢不力至正月解官二月中金人至淮南入楚州某以無職事退伏村落金人既去盜賊繼犯城邑楚州郡守以某粗知陳力辟為本州推官凡四月盜賊攻城者無虛日且守且戰州城卒全至七月終本路漕臣辟充幹辦官應辦王􅊅軍儲始自楚解官赴漕屬當殘破處改官者以半年為率某遂竊應是格此雖不足以邀賞抑示之罰則知避焉今日非敢以卑鄙庸賤之迹自列於大丞相幕下苐欲取所謂於勤不敢不勉者於賞粗可論者求便安之地以更前日之勞焉此豈非前所謂略去受恩之説而以公道論之者哉昔信陵君之救趙也令於軍中曰父子俱在軍中者父歸兄弟俱在軍中者兄歸得選士八萬人與之偕行於是率全趙而却秦師蓋古之君子使人之道雖在急難未嘗不盡其情而使無不滿之意此人所以出死力而不敢不勉者也某今兄弟三人二弟官淮南矣使某得一官居江浙以升斗之祿就養老母是猶母子俱在軍中而兄歸也大丞相使人之道某意其或在是焉且某自入仕以來凡領邑者四佐漕計者再為州郡吏者逾十年而又嘗官於河東窮邊之所其山川險易之形人情向背之理與當今政事之所宜財用之所出某粗能言之如大丞相使令有乏置之幕下以給趨走未必不如車上御史有以裨助聰明之萬一進之退之惟今日命之
