body:
  text: 東牟集卷二宋王洋撰七言古詩路居士山水歌人年八十百慮昏丈人耳目方聰明他人到此筋力疲丈人勝如年少時老中強健間中忙經卷丹爐肘後方金書千軸造理窟赤城七篇談坐忘我年三十始相識丈人年已幾六十往來出處三十年體無作用神安然靜窺了不見根底我謂君心秪如此那知能事有别腸筆下風光窮妙理龜溪道人古衲師心辭聲利常無為晨鐘粥鉢半爐火午日茶甌一局棊一朝共語小窗前袖出小卷含風煙為言老路手作此畫出王郎訪戴船明朝見我微笑語漏泄丹青奈緇侣别有一假壺中天果若知音定分付輕輕一軸數尺長竒峯突兀煙茫茫其間細屑千萬狀領略試為哦新章初畫寒林宿鳥驚山蹊漸曉人漸行四僧趂飯分先後人立渡頭沙岸口一舟間泊石岸中一舟半渡凌雲空兩舟一釣一垂網上有鴈落蘆花風兩橋近山轉清絶客携笻杖半卼臲定是當年鶴氅翁神氣飄飄犯寒雪山腰佛寺樓閣明下有茅店臨沙汀剎竿挺立照山影風幡髣佛聞談僧紛然萬象爭竒怪縮地便移他境界才薄其如此畫何強寫嬌容捧心態昔聞大令馳筆鋒天門未借西南風衆工索錢陽好語吳起果被公叔沮翩然拂袖返田廬將軍妙手今為幾乃知胸中千頃碧來自傳家萬金直丈人丈人有餘墨莫惜逢場時戲劇明妃曲漢宫沈沈凝紫煙妾身一入知幾年樓髙秋月照清夜亭暖春花熏醉眠憶初送我辭親戚便擬光華列旌戟君門安得似人間咫尺千山萬山隔花月朝朝空暮暮長戀朱顔不如故內家車子散金錢安得此身霑雨露忽聞花宫選羅綺單于來朝漢天子但言妾欲嫁單于萬一君王賞桃李大明宫內宴呼韓出水芙蓉鑑裏看徘徊顧影花顔靚綽約豐容廣殿寒當日君王喜且驚欲留失信去關情若教不殺毛延壽方信蛾眉畫不成茫茫漢塞連沙漠栁色陽關斷腸處故鄉阡陌想依然馬上琵琶向誰語命薄身存有重輕天山從此靜埃塵山西健將如君否此日安危託婦人人生景物疾如馳翻覆由來萬事非莫笑巫山女粗醜朝尋楚宫暮柴扉男兒莫厭欵假馬女兒莫羡金縷衣君不見巫山歌舞賽神罷野老至今懷秭歸乙酉閏八月二十一日出南城逰峴山壁間讀東坡詩感而有作水晶宫名凡幾區此州絶景天下無寒溪十里出明鏡峭壁千仞涵清虛平生邱壑胸次間長情自恨無時間干戈逐我出鄉曲散浪却不拘塵寰往時足健輕追逐吳會山川看未足行來恰值積雨餘萬疊峯巒發新緑溪山長好人長間不信此州翻地軸流落須論塞上翁髙唱慚無郢中曲千年陵谷多遷變髙名長在唯稱賢峴山上下碑在否見説父老猶澘然襄陽但記羊叔子霅上風流亦如此壁間誰記萬瓦詩歎息前賢淚如洗鄰僧以木龕養蜂一日墜地僧見蜜積燎煙薰蜂蜂大駭散因割取幾盡適覩此事感而有作採花供課能滿庾不自營巢庇風雨壘土削板非愛君君自歸之若安堵一聲衙集律令嚴兩股挾持筋力苦棟宇不牢偶墮地盡見室家窺積聚王緣積久頗厚實招冦慢藏誰自取山僧平日恐物傷忍向么微施數罟豈嫌嚼蠟味太薄一割未厭猶再鼓初猶忍戀縱追螫俄困薰灼難力拒驚飛浪走觸藩籬往往散墮折肱股害身即是養身人愛本為仇慈是虎嘗聞釋氏戒奪食此道胡為今不數刀頭得蜜吾何有出力為君傍作主勸僧切勿苦有情盍用慈悲銘肺腑且留餘食供歲事庶得春風容慢舞丁寧更喻衆蜂王自此亦可寬祖簿讀中興頌碑峩峩蜀道艱難路萬里行人走征戍招搖夜發川谷驚回首長安滿煙霧朔方日已催天明朱輝散射朝霞升旌旗指顧豺虎靜風雨汛掃煙雲清臣能姦君子詐父身有妖雛不知顧江中鹿死始悲嗟帳下豬驚猶躁怒萬年枝上春風回明明九廟無風埃扶鞋綴組命書重崇邑大縣華封開如何李父干天路禍未單誅已交惡子儀不保墳土乾淮陽豈為幽燕懼太宗功業三代前煌煌建立今古傳兩宫哀笳十五曲至今談者猶澘然吳興苦雨黃流渾渾彌川瀆此邦不求長自足人家蠶治怕桑寒階下決明隨意緑朝來橫急如少止忙亂車溝畎秧水還君膏澤莫貪功放出扶桑照千里病眼謹案其一首見五律寄身雖間念未除敵念賴有前賢書如何昏花接旬月古史散落經耘鋤我知稟賦分量淺費出稍泰尋空虛衣服飲食悉若此耳目形體應相如此如用多隨困闕不似緩莭安虛徐解衾卧穩省開目細瑣悉悉分蟲魚異時意氣尚掀舉欲取功烈規名譽從天且乞一雙眼此外不敢求贏餘憫旱天心愛民非不勤民心有恨天必聞為嫌流水入城郭指撝山澤收浮雲浮雲未肯便承命往來空中無定性平時風伯讒口多忍看雲師自奔橫願得天公張網羅要令滅迹須嚴科雷公傳聲澤靈死嗚呼奈爾風伯何近冬至祭肉未給因敘其事去年至日猶從俗今年至日曽無肉食無臠炙情勿傷祭不毛血貧太酷起與婦謀宜早計我典春衫君剪髻但得豚肩略掩豆敢事三牲共日祭婦將捩髮猶忸怩請君憑几聽致詞所聞奉祀貴誠潔誠果不立豐何為自為君婦今有年君家儉德相流傳以其所養昔固爾稱所豐儉今宜然况聞隆殺古有制禮貴視時成愷悌順成八蠟乃得通聖治功成方饗帝方今大禮曽未充倉廩不與昔日同無財無田不可祭子有籩豆那能豐且求遠去酌行潦在野不應嫌薄少待得故鄉兵馬空共買羔羊薦清醥外屛不固婢有思逸者小兒作髙柵限之一從為客今五年囊中羞澀無一錢雖逢惡客如櫟社匠石不顧斤斧全自矜尚可詫妻子不用戒謹長安眠性慵外户縱不閉竊類陳平佐刺船昨者小兒治藩落堅不可拔髙踰肩心疑過意使輟作瓦棺自免一壞穿答云竈下不安室慵倦未終頻計日飢鷹在臂常掣韝病鶴傷心懷舊匹有自而然爾莫慚無以聚人吾自黜又思厨清固無餘以我養爾何怨疾忍飢只合且困眠何為目眺思悠然爾今腸空尚圖逸藉飽安得同周旋人生有命甘淡泊安貧聽我歌薰弦古來飢渴苐可忍醉飽以德方稱賢方春時羣兔食麥先生置罝焉終無所獲今者原頭草枯無所隱遁乃得以投湯餅是兔得所嗜以死而先生之憤亦快也既感斯語因繼前韻按題云繼前韻今集中七古無之吳山積雪不潤麥客子思鄉疑卜宅先生好客如聚書豈料向來遭五厄㕙㕙自是安無虞爾身那計歸庖厨遐方自此欲同軌書文正合求長鬚當時咀食應矜狡湯餅于今得稱巧幸因所嗜同一烹吾鼎饒伊送肝腦臘八日書齋早起南鄰方智善送粥方雪寒欣然盡之因成小詩臘月八日梁宋俗家家相傳侑僧粥栗桃棗柿雜甘香蓤椇芝栭俱不録金仙託言成道時不認叨饞借稱目誰謂毗耶清淨身何有塵埃更須浴今晨雪屋梳白頭南鄰與饋如素求未須怊悵思往昔坐變徑峭同春柔鋪排短韻一作戲為君姑續歲時記仙上人舉進士過三十不第作詩曰男兒三十未有立人世百年徒自勞徑拂衣削髮為比丘今二十年矣精力甚健及將遊天台既羡師行復自悔訟因其將行作詩紀之春風只解吹春花靈根古木無生芽玲瓏拳石出萬樣碧峰千仞藏煙霞世間百事總如此偶然感慨還興嗟上人本是龍門客少小辭家來射䇿可憐竒物未化神却與凡鱗同點額當時三十未為老急電抽身能覺早一投空迹二十年留得詩腸至今好我始與君同業書明瓊偶紀張雙魚強將野鶴落樊圃不與間雲同卷舒君將風袖隨煙霞我獨塵緣著冠屨試問堂中老衲師定見兩人優劣處天台風路埋雲根寒巖夜嘯鼪鼯羣脫身也自不費力未疑此心長羡君他年邂逅雲門路不止分君一片雲賀生孫詩紛紛郁郁煙結扉傳道老何孫子歸褓中不作嬰兒泣芝蘭共見生庭闈于公決獄德莫比今日何公亦如此掌中送此麒麟兒不是如來須孔子長兒本自長沙得驥子生孫定竒特未論玉骨秋水神聞説已傳湯餅色尤生説字正名百物與神謀禍福無門亦自求君獨何心分象數筆端無復見全牛探心取意陳前修一字或可談封侯逆知喜怒容點頭攻君乃是操君矛謡書失腳似可笑雜今雜古近同調乃知人事亦天然吾心或者司化權昨日往候伯源承軒蓋未還苐見兩夫守舍面目嚴冷有羽林貔貅勢一僕候門遇故客乃加禮振聲折腰應對響答若騁駿足而未果者因問主翁何在日晏何尚未歸僕從如汝輩凡幾人三人者齊聲答曰主人旦暮出入結駟榮盛奔走執事畢具間枉車騎過客它舍羣騶之外尚餘三人我輩是也見其庭户森然黃簾緑幕朱户扄固此三人者特外𨽻耳而勢已如此使僕誤入帷帳深處又當何如僕時病起與羸夫為三既不得見因招籃舁將還三人者自後指而笑之意誚客太無堪態主人真可誇也俯首興嗟不能自巳因成小詩且于卒章自見其志併發一笑洞中仙子丹藥成鬼神妬嫉喘且驚龍門虎踞工守視始知異類窺仙靈先生本是玉京客藍橋邂逅邀雲英是宜收藏此丹鼎貔貅呵禁門長扄亦如猛虎守厲禁千山不許一鳥鳴主人日食大尉府都騎自合連輜軿只嫌底事苦未足要有蘭玉羅階庭行人過者莫回面牆東鞦韆不可見我有丹砂不似君待與葛洪評貴賤寶覺師畫少陵像用筆甚簡伯氏稱賞之因戲為長言寫之破帽麻鞋肩傴僂回頭意若呼宗武行歌又似出關時飯顆山前日當午公如氷玉天賦成玉為溫潤氷為清廟中朱絃堂上曲一唱三嘆知遺聲平生但飽主人飯身後空傳世上名蕭條冷炙殘杯氣寂寞千秋萬古情吳僧筆端龍幻化幻出前賢世無價可憐見畫未見詩更合愛詩方愛畫曽谹父招客盛夏轉涼火雲烈烈燒塵土八月炎風正三鼓使君傳教招近局雨打紅塵風起舞人言神物戲慳人長為微情愛三暑晴時得雨靜招風若飲清涼汗如雨了知人意通三界達士揮金天不怪今朝賓客雜鄒枚想有筆端風雨快季文作真率會遇大雪寒甚主人之居狹不容散步為嫌作數語為解一風一雨天醖雪溪上行人手吹裂主人掃巷作光華滿注金罍喚賓客酒酣耳熱膽量寬容我口開非逼仄天寒促膝政相宜共道興來連舉白人心好客天亦知平時思雪不可期寒消內熱沃肺渴瑶花滿眼真瑰竒一尺呈豐有成驗三白譴厲徴前為不辭秉燭達曙光别思共醉今何辭此身對酒願長健明年花發春遲遲鄭吏部設川饌招客戲成長言呈諸丈茫茫四海天宇髙九州列貢分地毛江黃之區橘柚國細腰宫衣無吳庖不得供刀匕不得供刀匕句原脫二字况走川珍自岷水鄭翁幻戲不作難縮地分甘五千里老人種蔬薑滿畦買薑留錢人不知丁寧使者市蜀錦恍惚異味來如期乃知此事古亦有鄭老此戲誠瑰竒搗珍䐑臠投巨鼎繚肝末肺分全犧南方搖落青未已梅蘂垂垂照青泚雪消氷盡飽陽和更待春風轉沙尾穠華只説錦官城匝地燒燈夜初起從翁已幸不齎糧期向城都看藥市題徐明叔海舟橫笛圖莫愛一掬水海闊觀狂瀾莫愛手中月空明海上山人生適意貴如此前度徐郎在千里噴雲裂石天宇髙夜寒水冷魚龍起世間俗客貪昏睡波濤不識神靈意更令疊奏數曲終鯨山會作玻璃翠畫工妙手今無幾可惜徐卿今老矣醉中睡起百憂寬與君一笑西風裏石澗案此詩從上饒志抄出原本云寓屋故吏部侍郎徽猷閣直學士東徐鄭望之顧道上饒之所居龍溪汪內翰為記所居又有石澗東牟王右史嘗和其詩帝令銀漢推餘澤不與人間較刀尺剪綃為練課天孫濺溜成文照東壁我疑蒲城鬼神入腳踏飛車翻霹靂怒當十倍縳王離瓦震三軍開許歷仙翁題詩詩有史畫史紛紛俱屈膝至今盛事隨山中往往摩挲到金石歸來滿口説江湖不學平生論感激乃知卷舒在虛懷誰道今人不如昔有時坐我天姥下但覺清風生羽翼長令淨洗五兵間回看萬事皆塵迹寄題永新鄧成之粟庵案詩二首其一見五言律學詩學禮子已文種花種竹居不貧門閭正可務廣大如何一粟容君身結庵名粟亦何寄口不盡言知有意鵾鵬羽翼自垂天蜩鷽飛鳴有餘地短長小大爭長雄舒卷不離方寸中小如一粟大江海萬形宇內寧非同君如推此充寥廓回集塵端亦棲託放言切勿誚蒙莊伯夷永名仲尼博更須談理勿談空此道根原由守約凝雲堂浮雲蹤迹真何處會若無心是同住此間我若解忘情應與間雲共來去靣山結屋開虛明屈伸與我同太清紅塵洗淡一翻手悠然適見雲平凝回看詩客時滿堂雕刻品彚俱奔忙亦知泉石成膏肓與人裝取錦繡腸寥廓萬里同翺翔唯有白雲來帝鄉庚午歲伯氏生朝作樂府一章為壽木公金母傳瑶爵九虎開門動魚鑰瑶池曼倩别煙霞海上安期降喬嶽東牟先生德彌大靜課虛無明寂寞背連海嶠三雙鼇手取西山一丸藥推先當户培芳蘭斗牛寶氣搖光寒光華章綬表竒格照耀廣陌馳花鞍春風物色論長久栁拂腰支梅勸酒百篇聊復付西江盛事會須傳不朽天上老驥禾充腸一秣萬里瀆空蒼年年歲歲身長健歲歲年年春草長同劉仲忱舍人先生鄭武子餞伯氏賦兩篇得聖歡二韻案聖字韻見五古南州本非行路難年來行客多悲酸黃花白酒且今夕驚風晚日催雙翰一杯交歡意方屬四座相顧顔不歡如今守邉戍不遠政合勉力勸加餐送周仲固運使之官湖北梅花滿野春欲蘇漢家使者臨重湖使君作意不求異解使愁歎成歡娛往年奉法佐廷尉縱遣狐兔誅封嵎平生獄吏弄爪觜民不畏吏從君初即今持節下澤國要令比屋歌唐虞父兄便飽倉有粟童子莫恨衣無𥜗溫溫和氣遍封服坐運豈必勞傳呼桃花之源誠有無吾恐誕幻成荒誣不如使君三聖書總括萬彚包堪輿一編韋帶在掌握藏之懷抱時卷舒古今事物不外取但用指訣開迷途斯民識路從變化履泰去否攣中孚使君早訖外郎課歸奉天子陳王圖他年訪我當踟蹰欲餉白飯陳青芻偶得上饒芡實頗佳分薦同邑以詩送明珠寶簿藏貝宫姮娥取置空明中神仙法施仗祕呪一粒變化傳無窮水府仙人通妙訣擘破寒泉弄明月左庚右甲養素胎珠勝醍醐色如雪錬丹水底含太陽世人錯比煎硫磺丹成不合戀凡殼雄雞冠碎鴻頭傷紫苞裂處呈芳髓火候溫溫暗香起青荷猶著舊衣裳玉質可憐供軟美我家舊住長淮湄花開十丈芙蓉旗年年割鮮喚同社徑醉忘却還家時何人縮地有幻巧容我短棹追馮夷借笠澤叢書于陳長卿以詩還之親見子雲貌不揚遲以歲月名自彰松江笠澤幾多地古今三作勝士場鴟夷已去乘海航季鷹撫事驚秋霜五百年間天隨子汀洲杜若齊芬芳筆牀茶竈湖光裏欸乃聲中弄清泚有厨無煙釡㸑空過午懸簞藜莧美詩窮文怪兩竒絶造化别分間日月一峯下嶺晚當門四頰寒鱸夜飛雪甘同世上伏臘勤肯作人間觴豆客辟書不為救口忙銜命終辭一官熱借書當借物外書洗除塵坌觀浮虛異時曽此一過眼故人相遇誠歡娛翩然好去追黃鵠酒無兩瓻歌一曲聞何為孫作內集以長言戲之門前春田澍膏雨門內春風動歌舞瑑為璋玉男子祥起作繡鞋女兒舞阿翁吹簫兒獻旅粉靣嬌孫侍家主一門歡笑足戲樂盛事流傳百年語村歌社曲莫插手定本風流教坊譜一家有喜百家同况是相逢淪落中犀錢玉果大開説巳愧湯餅霑無功周秀實書云裴竒卿好茶得病鍾熙仲酣醉任真西林老逢場作戲同倚花下一時信筆作詩為戲間來得病緋衣客著酒當茶桑苧翁誰知十室有二士復得周叟同從容叟今行年餘七十七歲詩成鬼神泣即今吻合主盟壇籍湜驚奔汗流急兩君置陳亦嚴整未許行人私越境有時爭利逐輜車掉鞅安行發機穽戰者方酣見者真走書取證石壁人石壁老人方睡起巖前一笑桃花春遲君待我同徙倚共催短棹東風裏方何二公回自郡所得不同作詩戲之南鄰博士只破幃春來數日分春衣東風陌上催蒙茀不許看花緩緩歸那知此理未可訴破費書厨走長路靜思我咎安致然杳杳人情無問處歸來粉黛包亦結安得衾禱更羅列嬌兒冬暖不須啼正恐當寒更無襪命數從來有竒耦北里士師真好手一時歡笑父子同篋載縑緗船載酒歸遺欣欣樂可期婦運金刀時哺飴先憂後喜尊吉卜釃酒烹魚消百罹世間得失類如此解使空腸作悲喜紅白紛紛一種花試向東風問桃李戲鄭曽二老兩編千片白雪繭六百二斗青銅錢不辭破費十日産要向几上追前賢前賢已死不可慕世上流傳只佳句不尋斷簡賞心符定自前賢無覓處鄭翁知我用意誠云有甲乙分餘明盧同書到孟郊富李老被酒張翁醒當時儲館典讎校今日取送傳芳馨分多析少每如此翁甑百金杯千羮北鄰老子苦好客懸簞過午須賔食昨朝喚客啖鵝炙十字浮光湯餅滑須臾碾畔百塵飛語是奴童破圭璧此翁香串數百枚一一啖客當千回啜香飽炙勘詩譜但度流年無所苦以校正字學還方智善作詩贈之惟古於文藏妙理自然之音見微旨唇舌齒喉母生子清濁重輕毛髮比古者八歲方毁齒小學師承方肄此時及春秋循一軌臺輿亦知窺閫壘齊人謀莒本祕詭登樓密語不敢指兩脣含合不哆侈見者能知豈徒爾後人學疏忽源委傳會流俗兼下里庚辰吳入記前史郢永遂令齊亥豕少知長老習步跬紅緑誰能辨朱紫縱有是師無是士聞者一笑或掩耳我年六十老書几倣佛聲形多取似目前趨過或但已翻覆討論徒纍纍方侯大梁舊冠履結髮儒衣長槐市發憤編摩貪寸晷索摘真能窮骨髓持以告人遭詆毁方侯持心直如矢尊吾所聞寧轉徙若不我從知已矣我留龜溪同𣑽庋羶蕕偶幸親蘭芷時論古意自鞭箠不覺此心思奮起乃知古學惟審是晚乃紛紜聽華綺考永聲律究終始縱不有疑心固喜要好誰云不傳紙革誤鉏疑云粳粃欲障東流歸海水識路直須行不已靖節琴中有宫徵聽琴贈遠師世人傾耳聽繁音太音古淡難為聽有如廣庭題旌夏或者驚遁疑有神當時舜牀調五絃薰風煽物無窮人若言造化不愛玩安得感君回陽春遺音相繼嗣者誰窮山緇侣黃冠師非干此意樂窮靜世路自與相參差我今試聽清風操野鶴孤猿對殘照琅琊山下醉翁吟分明撥向琴中調時聽二曲人言大絃如玉溫小絃亷折亮以清春秋自是隔寒暑天地不得令偕行豈如七絃轉十指徑節諧音同到耳乃知造化在指端豈但髙山與流水道人不肯長懷珍亦曽挾藝遊車塵髙門八字驚未見脫贈往往捐千純如今飄泊困長路更覺世味難將迎應將感愴赴琴曲一聽萬慮羅心兵道人勿苦生冰炭古道須信非人情哀音果要洗俗耳更去嬌絃三兩聲陳道士年十三骨氣有異奕碁得妙處鮮能對者推此藝以他學何所不可因成短篇贈之一枰局上無多歧世人到此懷自疑方圓動靜曽未識生死眼前那得知長頭道士年十三眼如巖電光爛爛已將雙腳落城市猶自面目藏煙嵐局中應答每間暇揮霍紛紜窮變化回頭却笑世人踈不認盈虛成取捨我聞此藝在専攻莫起妄念思冥鴻冥鴻不至局巳敗弓繳漫自存胸中我欲將君比奕秋専持此藝從君遊但期白黑得歸處一枰勝負吾無求又聞奕棊多仙侣常向局中送寒暑世間利害疾轉頭妙手如今向誰語昔時陶令曽鼓琴為嫌絃上多繁音七絃除去五音斷却於此處知琴心我知此藝亦如此不似推枰休刻齒請君長大具芒鞋共向鹿門尋石髓贈向揚州耐官丞相千載人傳家愛國不愛身兒孫當使風流在已許絶代誇殊倫其間淮上禮樂帥氣象直出追芳塵未論十世數眷屬况是雲幕椒房親揚州自昔鎮平野東控七澤南甌閩肩摩轂擊接晝夜賓從雜沓朝天津尊前芍藥照金翠堂下楊栁眠芳茵上中下地貢賦錯二十四橋風月新百年人事有更變冥冥原隰桑麻春中興天子撫方夏選用世德分憂勤劬勞鴻鴈事安集藍縷篳路張羅閩閩字韻重或疑作闉即今施設如有神突兀壯勢何逡巡髙城樓觀插空碧畫橋舟艤浮奫淪黃童白叟息愁嘆自言重見風俗淳野人本住蓬萊側寄籍淮甸老阡陌飄流自分不重來重來翻欲謀安宅昨宵晚渡長江來扁舟欲泊長河側送徒勉我但安行此地何人名惡客元戎號令皆有時令行禁止須臾期請君委槖付大尹野宿山行良勿疑行行古埭弔謝公平堤一笑逢老翁語多雜亂唯説尹但道還樂今年豐吳娘踏歌兒起舞不須社日長聞鼓若令未即棄塵埃會見黃金價如土野人詩句來林泉具書目見非妄傳請君雲路驅長鞭黃霸龔遂皆世賢贈鄒德年短檠三尺照座隅眵昏兩目頭不梳丈夫功業務廣大安用事此牛尾書多求舊聞助器識欲駕萬里須舟輿要堅志節在専苦積螢照夜真前車道鄉先生好門户髯季晚出充門閭昻昻雞羣見野鶴炯炯虎視嗟黔驢如何天公不著眼棄此異寶猶紛拿我知造物自有意將騁健駿先虛徐金須百錬作鐘鼎玉試三火真璠璵來年明光再射䇿聊取髙第酬三餘古今人事自差别見晚用速皆乘除他年雲路著鞭穩無忘過我中田廬贈大猷棲遲下國傷蹉跎更生父子交琢磨雀羅門外賔客省三鱣堂中經史多災川起奉太常䇿風雅先入光祿科人間盛事有如此東平江夏今如何一㕓聊寄吳山曲白柄長鑱斸黃獨飲從野老自有餘飯在先生長不足人言功名難力取我意功名要勤苦分明經訓是災畬誰道今人不如古山陽隱士家傳飢長身季子今流離聞君酬唱得此客牧兒販婦哦新詩我將六十筋骨羸形骸行赴溝壑期如君名遂尚可見幅巾他日期追隨古詩贈沈約之蘇端薛復同黃土海內文章誰接武即今七字續長言沈子揮豪照今古朝為百賦更賈勇暮作千詩猶奮怒補天綵筆不費工捲地奔風隨插羽窮途得所喜入眼口誦新篇身起舞已知奔逸逐驊騮况復逡巡蹈規矩薦書指日登姓名藝圃方期富倉庾閻公色動瞻斗牛處士當筵賦鸚鵡跨海鯨魚要力求翡翠蘭苕不須數不嫌投迹老龜溪看子聲名滿寰宇贈丁執中計子産餘身可足有子有妻難免俗平生食案好擇餘今日虛倉不贏粟忍飢自是學道功萬事由來同轉燭天生異寶世須求説是君𠂻自懷玉懷范子以詩贈之開正占晴符古語便謂春風遍花塢那知天意不可謀才告休期便風雨急追令節已難尋卧向空齋思勝侣可憐十步五步寬似隔千山萬山阻今朝馮夷巧作便翦刻天花散飛舞峭寒燠沐兩不同况是南箕正三鼓若求此花勝彼花少霽威嚴無用武桑錢未出土未興緩給豐膏亦無苦半分僧室依環堵滿目愁來不堪數需公排日作好詩細破春愁看幾許聞丁永安屋下疊山甚有佳趣恨未之見作詩寄之買山幾人真愛山束薪煮石凋朱顔老丁謀作久長洗寒疊翠房櫳間簾通菴扉即洞户人映山色多煙鬟住山住菴似丁老脫棄妻子真愚頑周秀實以近多讀書少對棊有詩及之因以寄識情變易須臾期躁動未得安無為幽思傷神靜生苦遊藝且復招僧棊棊中趣味亦何有勝負紛紛翻覆手分排事外雜窺圖得失坐中分好醜要須忘年在書史不出空齋見千里昏塵積習要揩磨晚學未應談至理終當謝遣惠子琴不挂一絃存五音日損其半思慮盡此道孰知無古今因與伯氏同一僧話武夷事作詩追寄之直峯峭壁天半青髙簷張燈疑挂星山川勢力有如此擇地信可棲仙靈我前解官古樵戍志願本欲探珠庭時當恢台積氛霧一日三雨時三停載舟撑石逆噴浪自謂力可登青冥篙工榜岸遭急灑回宿荒宇依祠廳二三道士謬告語云此潤澤來雲軿比聞輿人誦舊説仙官下矚如明熒逰占晴爽惡昏滯官去此法當伶俜果還近甸阻天路一官泛迹隨飄萍退之昔日徙南服祝融騰擲開仙扄近時蘇翁失定武太行毛髮無餘形一晴一雨告休咎晴者人樂隂天刑我意神官與人異宜以行事分羶􅧍人如厄棄神亦厭世間利達真芳馨窮通兼忘扶正直人知戒勸思常經有如神意本不爾人意忘卜欺愚聽黃鐘大吕絶世韻扣擊距躍嗟短莛心知得路適遠意願結茅廬當寒汀真遊適遠未可必遙寄此語通丁寧答裴寄卿書因寄長篇裴郎短身衣弊服衣長過身幾半幅髙裙大袖領占肩要是精神大於腹古書古字談古人洗盆滌盎供慈親慈親居貧不道苦裴郎醉中頻起舞里中驚怪無此人往往爭看立環堵妻兒醉時亦同醉未免醒時生竊議裴郎裴郎切勿論錢錢有菜裴郎裴郎下十一字有脫誤我家伯氏亦翛然得官去官俱醉眠裴郎有意縱短棹雪夜待君明月邉喜雨寄上饒守東村叢祠聞伐鼓西村巫家女兒舞滿城半笑半悲啼唯有使君心獨苦使君日日拜土龍尊彞淨潔籩豆豐公厨彌月不御肉七十行老筋力充明明上天採民譽先使千嶂雲朣朧知公不肯愛珠玉非玉非珠只雨粟如今萬室動歌弦穩保千箱滿穜稑不須衮衮談政理但持此事獻天子從來上瑞是豐年會有徴書封玉璽有如不掩造物功盡付妙手歸長空長空冥冥不可名請公便作喜雨亭寄曹嘉父廣陵隋家天子都背負巨海襟江湖江分青山湖獻白梁宋千里傳膏腴朱坊瓊園玩月夜谷林九曲秋陽徂竒辭巧語不可極盛事往往開天衢我家太傅官三載文物方值開元初四并堂前木芍藥小金山下紋車璖沸天哀笳律新婉照水粉靣衣襜褕少年意盛不自屈直欲赤手擒於莬翁云學等不可躐俾著逄掖勤詩書泮宫得就弟子列親見士子衣諸于子時燕頷出頭角衆中轉目窺陳吳吳字韻重有誤孤羆自爾事拱默嫫姆未免爭妍姝夤緣傍石見光彩驚破塵匣開明珠同袍傳諷梅花句知子名字須氊毺分携兩家止隔歲果見貢篚先鄉書巍巍廣殿厭長䇿曄曄盛譽嗤諸儒蓬萊海徼通外服坐戢巨浪張威弧超騰意子便得路亦復坎壈遊窮途我年二十始冠辨一門嬰禍奔淮隅辛勤往來幾萬里壯志滅沒忘前圖再逰黨孰事商較齒髮已壯頭須梳十年低徊不附奏閭閻婦子欣揶榆年將四十偶占第朱顔已變無膚腴一官從此浪隨牒十生九死羣鼪鼯祠官香火即係外考祥視履傷疲駑舊聞子官向西蜀萍迹飄泊來東吳相望敻逺思會合安得插羽先陽烏偶然婦家有近黨一官宰社依南都報言歸妹得異士乃知子食江南魚我時方冬寓窮屋喜氣不覺排寒區那知老乃並姻婭自此日覬參雙鳬人生會合信難料短書先寄三年餘今朝得子歲前記指數舊事談災畬論情感恨共歲月談經造理分賢愚孔師已沒道堙塞遙遙千載想盤盂百家搜唱互詭怪決意剪剔隨榛蕪有如出門問長道敗溺壓覆無須臾子今識路又鼓勇直到定處無紛如蓬萊季父已荒謝揚州舊士多淪胥即今我年五十六四易寒暑君前驅兒雖已婚女未嫁氣何與子相乘除寒窗何日共樽酒一取耳熱同歌呼寄何宣仲同年進士同壇僧暫聨戢戢如浮萍一從仕版秪事役往往牢落如明星假能作意篤恩好言語不過時芳馨死生貴賤兩乖角黃鐘可扣非柔莛吾見何子取路别秋霜皎日看鴻冥一言意合即定分咄嗟洞見無留停慈親八十髮黃素稚子三歲眸青熒此翁貧苦不敢嘆意欲歡笑娛親庭往年我官南武郡士有林子家伶俜一兒得官走上國投銓中品書安寧忽去病死不得返我亦憤泣傷飄零徐言中表有賢丈已收旅骨依林坰是年我歸再通訊冬日已照堯階蓂書中報我方急擾我意官下非常經鄱陽胡子遽客死此翁立為營輜軿我時方卧生歎息不覺灑淚霑牀屛恩宜先施士固有德不期報人誰聽貧猶務德幸今見死不背義聞前銘又思此翁乃常履盛譽未足滋芳名有如此翁空試用慕附始見真羶腥一官未用念鄉里九鼎自合尊朝廷行看謦咳立事業下邦震動如雷霆淮田野人分屛置雙鬢不復當年青乾愁道路阻會靣恨酒不醉嗟長醒短書一紙説情狀安得模寫無餘形何如未決待清暑尚期一醉同壺瓶寄周秀實天目之水停山椒滙為雙溪霅與苕先生苕上結鄰好遠得徑山中洞霄浮圖道人支若永赤城黃冠陸修靜前山後山松柏幃七盤九盤龍虎鼎山前籃舁過者誰不是長鬚謝靈運此逰已恨失春期更待清和間晝景寄亷宣仲繞淮邑屋綿千區畫簷綺棟吹笙竽冶金合範結樞紐氷銷水釋無須臾盜前乞死火中走幾人脫迹逃江湖靜思朋舊若滿目不取神禍遭囚俘其間善類豈不有安得變化歸同符平生宣子富心事先奉白髮携童孥吳山越山好處所飯炊香稻歌吳歈我家盜焚先子業每仗餘德寬天誅悲傷扶病别鄰里﨑嶇僅得來東吳稻梁在世竟何物與子各隔天一隅近聞詩章不減舊昔日健筆爭華敷鵷鸞羽翼困州縣况事糟酒分錙銖隔江遙想思會合安得兩腳生雙鳬溪邉樵風趂短棹杖頭明月兼酒壺十漿饋我五漿少萬事一醉真良圖寄何子楚江如淨練山如幕人道老何得真樂寒溫語後再拜前每得書來話寂寞米鹽細碎百慮寬自昔仁賢學道難詩書可樂卷胸臆啼號不救如飢寒去年嘉興租不足今年山田米炊玉稍須酒肉療枯腸雪老凌霜不從欲丈夫功名無後先請翁拭眼看前賢西湖處士竦吟骨飢乞僧飯紓長年香山居士箕尾客東坡老子金鑾仙生前千騎不招買身後一盞同寒泉我意何翁亦如此髙人不飲無錢水忍飢徹老守清臞它年配食赤松子寄亷仲載吾州阿載志尚古瓦豆鉶羮列尊爼存心淡泊自有餘過眼浮華俱不與但知古人力可到不管今人棄如土白頭老子舉嘆嗟黃口小兒方靳侮淮田平衍真樂所地遠溪山老清苦天教置子一壑中句曲海東疏藥圃道中小吏三四家邑前傍海饒桑麻初疑一飯不可飽那知歲久今為家别君十年勞肺腑遣問寒溫訪兒女一書還我報何如志老益堅無軟語喜君書語談古人身雖隔遠心相親扁舟何日載樽酒共泛清江千尺綸和秀實寄詩去年河南歸故地今年朔方兵又起血牲面埋曽幾時無乃姦盟神不喜嗟爾萬人來遠荒豈無戰士傷金瘡封疆萬里尚越境金帛露積猶多藏國家彌文今尚武已碎銅山鑄銅虎勿矜突騎飲長河肅愼燕陲吾北土且知成功俱自天天心可卜因豐年但令三錢博斗米任爾自枕干戈眠和鄭侍郎贈朝倅昭德文公百孫子存者風流今尚幾封胡羯末定可人往往髙吟笑侯喜自期不解世俗書肯學持竿釣溫水江國蕭條一郡丞萬事得君無不理窗間五老亦多情點綴青天一張紙庾樓明月清宵起夜夜柴桑空故里黃壚日日曲江頭曲聲日日關山裏使君勿厭簿書煩解有哀猿醒俗耳詩中能事了幾人智有三公力任鄙鄭翁老自愛詩情餘事紛紛不挂齒一篇長韻十四詞付與鵾絃作桃李我於此事亦何有盛事與翁傳不朽遙瞻小隊到柴桑采采黃花薦清酒和張文潛輸麥行寄滁守魏彥成琅琊山青讓泉白上計使君封瑞麥田家煮麥燒秸忙一笑相煎何太迫醉翁亭上緑縹囊亭前庾積蟠蛇岡家家輸送不掃場謂取我廩金斗量賸錢沽酒追良伴使君莫數星霜換願君容我借三年他日萬錢供一飯山頭飛雉鳴朝日哺我老翁張射畢誰言田舍漫蹉跎輕裘年少每相過和謝齊解元見惠楚東六邑多秀民其間達者海內聞恨我眼暗不識真客舍道傍初見君徴君當以文章顯照眼青錢充萬選胡為過我誤淮揚山徑蹊荒費鉏剪龍鍾野老安用哉偶隨江上浮鷗來簿書魚鳥少間暇賦斂户口煩徴催君今蹉跎壯非少隴首棲遲雜長嘯上書自薦莫崢嶸直氣如虹亦竒峭詩書滿腹燈火勤勿言此道非由人雪霜不厭松骨老桃李自與春風新短書御袖懷珍具文字天成絶斤斧一鳴行即駕雷車萬卷它年勞電母北窗紋簟清如水青蠅側翅如畏刑側身甘旨寢疾愈負我此腹何由靈身世浮雲不留處書生白首談堯禹書窗行几幸虛間過我蕭蕭聽夜雨和監丞去歲賦巖桂南方火老不告疲秋物過半新涼時姮娥剪花趂時節新月借色天風吹平生仰望婆娑影一日坐對連蜷枝異時寒梅憶老伴過眼春物真羣兒人間著名終自疑但取質幹稱文犀天清夜寂兩相對萬里不寄長相思次韻周秀實見寄長篇當年識君恨不早麗句清髙人縹眇有如商律變初秋慢緑夭紅俱一掃自親蘭社襲餘芳歸爇寒爐陋昏棗乃知形骨縱龍鍾勝處精神不衰老我辭官下曽幾時囊甑雖貧未空倒女兒索嫁金無餘録過知難坐丘嫂人言貴賤在天公飢飽更須關富媪是事姑置無相聞瓜蓏分區竹有孫暑風長養遠林密雨腳并合前溪渾傷心事慮漸消省胡不俯仰隨欣欣有時放意枕書卧亦復倚杖看荷翻殷勤不如偶相遇過我思同明月尊世間明月向人好丞不負余余負君陳長卿以詩見别依韻朱弦之琴三人嘆此曲宜傳廣陵散要知太上乃忘情山上嬰兒是雷電情鍾我輩才力中路傍野草年年豐原頭火燒去不盡天外春意來無窮西方真人言可恃愛斷有情如愛子暮年收足欲依僧一鉢一瓶聊止止西臺仙客傳風流細説間情寬我愁此身已分松窗下衲被無人自􅜵頭次韻酬江如晦命數竒窮誰與伍陋巷甘同一命僂怕寒長苦地多風厭滯每遭星好雨命在天公難自由若知安命當無憂三斟長得供卯醉米鹽不辨俱悠悠去年約子招佳客貧不關心真達伯共貪靜適且過從追恨窮途昔暌隔二月黃鸝初好音槐隂栁幄青羅襟杖頭挂錢只買酒與子作意時登臨此鄉秀野多水石莫道雲逰不如昔松柏相望泉下人試數幾人能滿百生前一飽復一眠得失塵緣俱偶然長年無事頻相見此自前賢今古傳冬雨不止鄭丈作詩次韻海門山外天池雨來趂沱江打鼉鼓望夫臺上濕愁紅玉斧壇邉沒沙渚貂裘公子思寒侣佩玉鳴鸞不成舞殷勤舉爵祝雲師壯士端須氣相許果然晴日照魚梁鴻鴈髙飛肅霜羽西清丈人詩眼髙師友淵雲僕徐庾興來弄筆起春風暖日桃花靜初吐且題紅藥寄長沙不用短衣從猛虎曽谹父再賦鼓字韻詩再賦一篇頭如青山手如雨十日瓦溝鳴羯鼓南城病客偏作愁魚逰淺釡蛙同渚去年曽困夏畦乾巫祝陳牲女師舞淮南米賤隔關河漫道歸期久已許誰同著力破愁城願備前行插飛羽那知物理自乘除原思五秉公西庾暑雨祁寒人莫嗟潔籩滌豆神其吐茅簷生意滿晴川方信虀腸能抵虎谹父又賦鼓字一篇復次韻魯人小信亷纎雨大國雷車起三鼓堂堂千里藝無前安用渠彌設三渚使君賔客多英侣碧玉傾香細腰舞浮花浪蘃爭取憐醉乞一言終不許有時斗酒詩百篇猛將腰間掣金羽公家丞相在當年寒解衣裘飢發庾風流世德今固存一沐三乾飯三吐生男何用金滿籯傳家願學文中虎陳長卿侍郎以玉友末利見餉并示長言已酬再示一篇再此次韻少常仙伯詞翰光天鵝綬帶連天香崆洞之人瞻北斗假靣不敢呈西涼浮名於我亦何有不愛熱官能炙手詩參祖律品度髙飲遇故人情分久夢中不踏肥馬塵覺來驚看瓊樹新只愁三疊詩更好有如恩愛成煩惱劉行簡以自題所畫墨竹詩見示依韻酬之買花無謀謀買竹少陵未必甘同谷索酒瓶空方索茶陶水終慙錦茵宿我生絶意鶴背錢犯分猶貪竹間肉穠華穩付桃李春寂寞頗疑松柏獨自逢劉叟用意好錢不看囊不羞忸誤身冠在竹皮寬比酒葉宜衫色緑如翁須著第一流藝能飽勝三千秋少名數輩列青士語放干雲封素侯詩成自寫真三絶筆下琅玕手中鐡若須推轂極清髙有待朝天寒栗烈又題琳師房劉行簡給事墨竹黃門給事二千粟日割三牲亦應足劉翁食爼厭羶􅧍千畝渭川期滿腹吳人束簡如束芻百錢可了三日厨劉翁平生幾兩屐可能千畝無贏餘獨嫌納腹未可盡更為揮毫寫清峻庭空月落千丈長老柏喬松未髙徑錦綳稚子置腹中鐡靣老人凌遠風此君族類俱得所多事索此霜髯翁腹飢眼飽徒倥偬只説叨饞疑作俑何以先生日照盤更看嬋娟勢飛動琳師從此唯善看時時更為通平安酬政老見贈君於取豫無乃亷筆端自許能摧堅摧堅不是老僧事賈用不售將誰還却收神觀反初視先種熟耨終有年早知遊息造溟漠不為耳目辭嚻喧新詩投我苦褒拂豈但一讀頭風痊方今冠履尚錯總不到巨浸非長川姦窮否極會一返快掃醜類論億千乾清坤夷龍妥帖與師訪遠同留連子楚以二酒合而為一且效洞庭春色以詩敘其事因奉酬世間百味俱有正偶失酸醎俱一病須知論酒如論才軟美悅人嚴太徑韓青居士貴調和田竇醉時籍福勝寂然二物俱有光物外洞庭容借香共談已造名理窟一鞭亟入亡何鄉了知此處有真趣再聽牖下鳴糟牀又謝丁執中寄黃龍菜吳山草長春暖時吳人髻中金卷箷家家饋薦作寒食貧富豐儉要適宜富兼庶品助取醉貧得勝具兼哦詩金瓶玉筯固華麗雕章繢句真瑰竒西溪友生居占野不務結屋留園葵歲時供給不外索野花滿院蔬本肥今朝懷我寄餘劑色照匕箸光陸離我慚此腹負此物但用當肉無它辭舊聞書生飯不足朝暮虀鹽只充腹勸餐齒頰雜宫商若比哥舒薦梁肉我歌短章持報辱恐子詩成費追逐好音佳惠不敢虛寄以離騷三十六謝章季萬寄新篘面山堂上迎秋色使君舉酒當月白冰磁雪腕方取憐看破妖嬈念羇客溪邉從騎何奔忙溪童疊厭爭窺牆為公一洗窮愁腸與公草木同輝光謝淮南徐巨源寄酒淮南有酒誰人得分餉東吳無酒客應憐蔀屋寒氣多倍費行厨春色力人道使君宜在朝我視使君宜逍遙已聞財計免催索况是閭閻安教條增秩賜金古亦有且留使君與淮叟玉隆香火幸留人年年要飲淮南酒子楚持小甑中實以物餉豫啖之如芋而味勝曰此黃獨也野人得之故以分遺因感少陵詩率然有作君不見野人謀食搜山谷不似輸錢買金粟䕷薇細瑣俱見情豈有靈根不收録少陵飢走遍九州命寄長鑱生事足早知雪盛又無苖擬欲誅求已皸瘃先生蔬食亦易飢意感鄰夫荷斤斸僅同冠芋又隱藏逺勝鳬茈適踈縟癡兒且食驚未見便欲負鋤自捃挶人生留滯誠可憐坐使百憂寬濕束煩君轉寄與殷勤晚食何時飽顔蠋謝人寄茶建溪圭璧能圓方萬錢一啜難輕償奔騰千里羞貢篚天應不數金錢綱侯家錢如大國楚陵肉澠漿推大户早知煩滯厭膏粱貴此新香兩三數一朝百室困干戈在十于今或去五老工既死無典刑髣佛兒孫追故步誰令遠寄山澤仙來洗沈疴太華巔攻頑治癬恨無術且共山頭玉井蓮殷勤更語抱琴客不用君歸人未眠嘗新茶僧催坐夏麥留寒吳人未御絺綌單溪雲谷雨作昏翳思假快飲消沈煩商人遠處抱圭璧千里來從建溪側報云蟄户起驚雷鞭走龍蛇鬼神力色新茗嫩取相宜留得一年春雪白先修天貢奉珍團次向人間散春色僧窗虛白無埃塵碾寬羅細杯勺勻寒泉一種已清絶况此靈品天香新人間富貴有除折靜中此味真殊絶誰言僧飯獨蕭條勝處誰容較優劣梅花林甲子正月陪智善刪定叔逺寺丞約子濟别乘共步溪濱扣院落委曲入梅花林連日晴暖花已盛開地無落粉因成長言記事橫橫直直迷人路誰知恰是藏春處減春一片亦何傷切莫輕狂作飛絮開正盡數一至七無雨無風保休吉此逰不記後難尋聊寫長言記時日王亞之元夕招客庭下紅梅兩株相對盛開君家不種通神錢只種春色留庭前庭前春色誰最妍二女解珮來江邉沉沉華屋清夜起火樹銀花月如水自然顔色變韶稚况乃新粧露初洗春初艷粉秋初蓮綘綃廣袂羅羣仙華清池畔嬌無力赤鳯樓中困未眠後來更許誰相擬海棠欲睡薰穠李亦知等級且追陪格外風流不相似一枝乞得歸茅屋窗裏銅瓶窗外竹不禁清絶意蕭然大似佳人依草木閬苑花無世上緣收香還入四禪天明朝風雨催歸去花月重圓又一年神情邃美膚粗惡涇渭由來兩清濁要求繪筆盡芳妍更問尊前老文學詠蠟梅江梅已勝猶非似此外餘芳更堪數信知風格忌太髙至此從前難著語世間初無字可誇且隨顔色稱蠟花醉人香味解禪定捩眼靜佇辭紛華徐熙畫花只畫神黃筌細瑣皆逼真要須别花如别畫只恐此心難付人席上和鄭顧道燭下海棠日長花困眠初熟故向花前張去聲燈燭要教未敢脫羅裳玉頰長紅黛長緑生憐杏火發中林無奈桃腮倚修竹爭如錦帳照佳人一笑嫣然春意足獨疑工部不題詩端為風流欠芬馥題范子濟雙頭芍藥煙粘草露珠結窠淮上人疑春未多揚州東部紛芍藥巳與天地分中和雙苞一色生同蒂不是花妖是和氣恩霑雨露力偏饒來向人間自應貴欄邉鼓徹無奈何欲留白日誰揮戈練緗聊記舊容質猶得勝士長吟哦八姨不列真妃上大姨穩作昭儀樣無雙顔貌却成雙背立無言似惆悵淮南通守别花眼曽向花前傾玉盞左看右看俱可人欲選嬌娘倩誰柬戲咏酴醿示邑宰芳洲繞郭溪如練中有風光共流轉方今得尹日添長化作河陽一花縣獨龍注雨澆桑麻芳菲總不爭紛華陽州地遠牡丹少酴醿晚作留春花君家朱樓映池沼髙架瓊瑶覆花島欲求此花同一巵試勸春歸無草草題長興陳朝檜蒼髯石根皴皵膚夭矯枝幹中半枯有如老人自離立亭亭不用兒孫扶六朝兵戈日相逼晚向陳隋生道側不知何計脫鋒鋩三十六中居上䇿臨春結綺迷仙處晉王只用陳船渡車書從此稍通津無乃培根偶堅固百年巳長復百年邑人説自曽髙傳即此兒孫作父祖只應相對猶依然桃葉桃根即零落獨保長年應淡泊老人果解復嬰兒分我一丸童子藥聞鶯階前芳草一尺齊黃鸝始向林間啼一聞傳聲人失喜駑馬並立逢駃騠我思此鳥固妍好人喜亦緣來不早若令春到便輕遷厭聽誰憐迹如掃正恐貪歸有近期三月麗景方舒遲園林上下弄晴晝羡汝語默真知時秃鳩黑鳥有何惡每到天隂自酬酢婦翁詛罵兒彈射恨不身隨羽翰落戒汝一物莫嘆嗟金衣公子春為家汝無禍福咎亦淺况異子鵩當日斜人間美惡有如許且放黃鸝作嬌語鵲巢今年結巢不近地門户人言解知歲了知積纍功力勞投伴鳲鳩無此智閭里爭如惡少年不持彈射操空拳探巢取子盡居室旁觀禁止無由緣父翔母噪力不加小雛在手鳴楂楂羣兒不逞至若此增巢不得安生涯漢家春夏禁採捕詔書非止行三輔可憐科罪挂墻壁國家禁絶非不預鶉居熙熙太古民就令窺巢不用嗔同逰飲啄不相害海上鷗飛不避人大笑鳥夜聞慨咳如老翁若悲若嘯空山中老妻幼子疑問我此名何物來何從我知此物不常有豈解招祥宜報咎狐鳴梟噪殆所傳惟祝停聲聲轉久明朝問人此何鳥僧言此鳥名大笑幸災樂禍撼主人僥幸前知非善告我聞此語益悽然我從坎壈今有年若徒報禍未報死子之告我何遷延異時白骨滿城郭此時子笑何人前昔年長沙賈太傅鵩鳥飛鳴告其故滔滔宇宙鵩安知應怪達人任來去窗前靈鵲人樂聞谷鶯上下長和鳴汝曽不效乃效此汝性險遠知難更汝其更笑我自娛取酒與爾同歌呼
