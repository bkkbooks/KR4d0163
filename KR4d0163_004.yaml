body:
  text: 東牟集卷四宋王洋撰七言律詩新隱四首案上饒志王東牟遷居上饒有新隱詩即此詩也四注飛簷略勢寬江湖城郭得同看縱饒縮地神仙術長要移人視聽難仙子月多呈顧兔女兒牀晚欲棲鸞使君飲散攢燈火長怕浮空水面寒古亭題輿記榻得髙賢寄意真同物象先收拾蕪萊成院落􅰙量邉幅占風煙登臨斗覺今知要雲水從斯入畫傳斫竹洞門無鎖鑰時携客枕一慵眠新亭香分淨社色專城冠蓋如雲照乘眀曉露一粧秋艷曳涼風吹月夜經營戲荷魚小波紋近戞玉船低笑響輕聞説笠乾燒供夜無邉華燭競歡迎荷池郭外溪流溪外山山峯長在白雲間開懷幸對百年友屈指何憂一日顔煩燠尚寬秋占野林巒欲暮鳥知還夜歸猶隔溪橋水不記重門欲上關南峯上元二首火樹銀花起夜煙驂驔朱幰競駢闐一千户外開金鎖十二里中然玉蓮何日行宫祠太一誰從摩詰問諸天歌臺且喜宜正月栁岸今年勝去年誰將膏粥飯蠶師輕薄兒童覔綵衣遊騎但知誇艷麗祠門直莫歎寒微東城南陌春迷眼逐馬隨車醉未歸莫怪老翁間坐久鬅鬙燈火照柴扉和尹少稷上元年少輕衫競彩霄老翁心地寄參寥照人燈火成何事示我威儀貴不恌間却剪刀尋斷夢任隨錦轂縱華鑣固知行樂承恩澤亦喜豐年樂一瓢故人飄泊少相逢喜向雲間得士龍少日功名鵬萬里長年風月酒千鍾已知吟思才難敵自嘆簮皤髮已童聞説玉池蓮十丈相期摘實上髙峯三月三十日寂寞餘紅點翠衣曉風捲盡絮花飛避人黃鳥逺山去背我青春此日歸倦舞栁條猶作意侵階芳草不知非老無年少尋芳恨一榻清風展翠帷喜雨去年秋日百神求嵗度春風尚未優補貼稀迹三日澤栽培飽滿一年秋已乾桑柘蠶多飽待濟舟航水接流雲雨算來多少力夕陽處處聽漁謳苦寒平侵爐火易成灰穩閉齋扉不用開浩蕩晚風隨伴起遲回前雪待朋來他無雜念專思酒縱有交情敢憶梅靜坐不聞簫鼓急土牛莫是送春回和苦寒韻秋容落落轉頭空誰與元冥競長雄侵剝老條無硬對栽培玉樹是家風漫誇鶴骨飛饒健強説龜腸語轉工對此只宜常袖手眀年春物共君同一夕大風偶成呈諸兄簡士修思逺狂飈一夜撼天關徹曉陽烏勢未還早恨餘寒誇老健重憐新物損朱顔強留殘火如相別已典春衣不可攀料得雲端風背上融和那肯似人間雪晴牆角寒梅未試鹽熬波何事被凝嚴解教爐火添餘燼似妬陽烏到短簷幽谷但期回暖律交光何用映迹簾朝來一掃窮陰處先照羣峰最上尖冬節日疾作不能親祀事但具禮不拜戲作示內他鄉易感嵗時侵病入衰骸苦不禁卧聽兒孫羞栗脯倦依爐火只愁吟房無肥腯牲三爼幕有馨香酒數斟苦與黔婁分等級尚為吾婦莫傷心嵗除前一日病中作客寄他年又一鄉椒花隨興飲杯長病疑寒健銷陰脈愁怯花寬笑酒觴去住自知身老大經過長恨嵗窮忙眼前兒女陪歡悅年少從教各自強病痰有感氣堙風貫血行遲運用工夫了不知待盡生涯蠶作繭就衰榜樣髮繅絲稍因對酒頭先眩未是多行力早疲更若尋思年少戲如何不送老頭皮琴枕琢石髹池省練絃寂塵不動五音全應嫌雜奏妨人樂正可常擕對客眠投倦乍如傾耳聽起醒惟欠籟聲傳舞雲家範升堂席寂寞依稀萬古賢闢方丈地供香火全家共寄一庵中庖滌因連奧胙通穴不容身銜窶籔芥分餘地結齋宫幾甌粥借鄰僧飯一瓣香尋祖佛風十笏比邱居有限􅊶羅眷屬要無窮從鄰庵求浴口多屋褊分張窄堂室齋庖約略分春服乍成宜穩貼浴盂無處集蘭薰供分清淨如霑露氣郁芬芳過食芹自引一杯歸路穩從教歌詠不成文間中即事蟲有鋋矛獸有戈江中飛燕避淘河點紅翡翠飛傳錦展翅鸕鷀卧晒蓑絶境芳菲時喚客隔林機杼夜催梭平生約略間忙境到底間中得較多即事官間久愧叨祠廩身幸真堪學種瓜月給郡倉三斛米日尋山路一川花盤空婢去催燒笋爐暖妻來趂焙茶閲盡鄰僧間况味官供粥飯勝僧家和邵堯夫韻示兒侄言貴安徐行貴常與人平淡勿相傷莫貪順路行時快到了回思見去長克已定知天降福害人只是自貽殃長教言行樞機密此外虛心不用防觀僧作藏會推崇社首勸來人嵗結春緣轉寶輪誅及米鹽知産罄事干生死見誠真歸持福夀憑懷劵時及暄和謂有神安得勸農官考古春秋禮射莫辭頻從伯氏携稚孺遊保慶即事提携未便即歸山暫扣僧園且暫間嵗晚東君顔色近霜晴寒意有無間前溪雨後渾通路荒戍人歸不上關笻竹一枝天正暖却嫌飛鳥倦思還壬戌立冬十月十一日陪路文周朋携禔祖同訪後山道人庵道人出就庵烹茶庵外採菊拾橡實以歸偶成即事倦緣間景散間情人未歸庵戶不扄試撥柴煙尋宿火旋添泉水洗茶瓶黃花采采盈衣袖橡實離離傍短萍何日一邱藏曲折與君同伴劚青冥養生無欠亦無餘種竹圈籬草結廬鑿地覔甘分乳脈鉏田得實飽新蔬壁間數本空王像架上都無養性書我自病來能晚食從今緩步當安輿已已三月十二日陪凌季文遊水南陳氏園次壁間徐眀叔韻不慚衰白照溪光清晝穿梁訪野堂物外風煙多喜客人間草木亦宗王浮花競作爭新艷近侍全收殿後香秉燭便須期醉賞勝饒吳榜起漁榔同吳周朋髙虞卿尋泉憩積暑下庵繚繞尋泉逺步遲倦逢籬外敞庵扉門前竹長雲垂舞巖下泉甘雪未飛景物偏幽緣舍小茶香看客為僧稀相公房舍添人否擬灌春園住翠微陪方何諸人後庵謝客紀事後山客館報聘禮野寺僧甌當酒茶雲未散屯知候雨溪唯貪漲不容沙草間翁仲今塵迹雪後江梅是故花一掃窮愁無不足方知謀醉是生涯同張德和遊沈道士庵上春甲子送窮日早破煙扉令節求指點葆光仙侣洞招期南極老人遊龜前香火木稱士堂後交蟠石作牛我恐上真無礙意使君息慮是清修沈自言上真授葆光無礙號興作甚盛題僧邀遊梅和庵地接山腰舍繞泉豐堂巍殿勢蟬聨非禪非律三百輩有圃有場千畝田中坐獨尊司獄佛几前雜事地行仙若無生死驚愚俗正恐齋厨亦悄然中冬下浣一日陪方丈訪客因過向氏園亭有感前疏水竹界桑麻桃李畦分小徑斜山數青黃人住久路排藜藿客行賖雲寒煙合入長暝梅懶春催未放花聞道蒼頭長兒女主人遊宦不還家去秋過吳江臞翁園亭追作水接舟航陸接鞍忙中光景靜中看無窮宇宙規模逺出格池臺制度寬一水斯須分靜僻四橋繚繞照波瀾擬分風月知何日且趂鱸魚整釣竿聞沈氏小亭欲往主人辭出先聞趙丞相嘗逰籬橫地狹曲相裁倦掃殘花長緑苔連榭似聞兼靜雅間情暫欲洗塵埃料將春色供家用那有芳尊為客開怪見門前少車馬多因只要相公來至法海寺天有陰晴地有艱一山如隔萬重山偶逢冬少三餘雨况置身無百慮關嵗熟役車容借客間來崖寺可開顔懸危既免逢飢虎又得休公半偈還又題祤禪客龜峯圖案洋有遊龜峯七絶一首故此稱又題蓋即遊龜峯時所作也不用丹青染素翰迹煙分染碧雲端一千里地境中鎮三十六峯天半寒巢露葉中呈物象濾羅帶畔疊林巒人間此是清涼藥時向塵中為展看留題翠峯陶朱山下金仙宅云是當年故相家去國豈知傳貌象扁舟端自訪煙霞平吳霸越功何在弔古傷今事可嗟早是登臨饒客淚幾行征雁落寒沙歸雁亭次東坡韻平時何憚不成歸猶向亭前送雁飛弱羽可堪繒繳密寒沙那得稻粱稀燕吳真恐音書絶城郭猶疑今古非若為哀鳴相原野依隨豈惜共卑微煮泉亭昔人來去本無情世自貪賢為結亭身在雲間天繚繞夢無塵事性疏靈撑腸大欠五千卷拄眼今看萬疊青景物却因間處見前賢詩已説丁寧題鄰僧房壁南窗日暖北窗涼時節頻移意自長半坐蒲團七家飯兩函經卷一爐香身辭塵雜元無纍人見朝昏却自忙雪屋夜寒燈火暗蕭條氣味合鄰墻題齊政壁栁經沈雨舞腰慵鶯入新陽曲未終照徑自藏塵外境憎花不愛世間紅橋分知為前溪改寺逺因尋別路通更待薰風日清永長歌呼就滿蒲風題懷玉上方蟠踞峯巒面勢多天分雄望鎮關河足開煙霧鵬垂翼手摘星辰月轉波問法舊聞裴相國傳經今見李維摩禪徒到此棲塵迹方信青雲路可過無盡齋謹案此詩三首其二首見五律矯首層霄俯翠巒虛空不住骨毛寒古今等是無窮境風月何嫌取意看巢寄一枝惟自足風摶九萬豈知難與君同入逍遙境方信乾坤宇宙寬題龍溪橋放出清泉疊舊蹊行人但渡不沾泥與君暫濯紅塵足留我長澆白玉畦千古蜿蜒潛窟冗他年頭角上雲梯信知法海津梁別認作東林是虎溪思徑山汲引凡軀駕海鰲恢張竒壯自仙曹九龍獻宅金園貴四衆添花寶範髙身住四禪觀夢境眼收萬象比秋毫經行會遇登臨處勉策筋骸莫歎勞僧自臨安歸説逺信幻形變滅困須臾晚景尤驚嵗易徂滿目交遊多故物傷心風雨對今吾逝波昨日方追霅覆簣今朝又過衢旋打青梅新薦酒且須耳熱聽歌呼與鄭侍郎還却天官尺一書清時有味保懸車公年尚壯去何蚤古道誰言今不如南部方開新榜麗西清人説舊遊迹半簮白髮無拘束不用黃精自掃除還龜溪成拙句呈給事劉兄正月下旬如山三月初還上春日暮暮春頭翠淺芳濃草色柔五十日天和暖候一帆風地往來舟棊神得雋驚逢敵酒病尋醫尚入流只有風流動文采較量沈謝亦推劉發龜溪道中欲窮幽勝逺紛華頻向晴空漾釣槎霞雜鳬羣歸趂浦雪飛鷺陳宿投沙山連空秀嫌花雜樹逺多圖怕霧遮莫怪故園歸未得為貪入手好煙霞餘干見遊存誠世家兄弟久隨流少不同嬉老宦遊身似舟空長信浪官如萍轉偶同州論文共酌三斟酒決勝公圍一局楸三百里溪眀月夜得心情處便相求二月九日訪仰之聞德茂與壻鄧叔厚蚤作逍遙溪濵歎而成詩貪間心不受囂塵六十年餘自在身愛水愛山三益友如冰如玉兩間人言無拘畏詩多健酒借豪華力有神聞説山中丞相語與君心事最相親德茂以兩小篇報聘再成一章不著冠纓不洗塵不將忙事擾間身舍前自舊存三徑林下如今見一人八節灘聲泉喚客數枝墨戲竹傳神前生定是張公子一見相從意自親昭武舊同僚見過半生辛苦路漫漫八月樵川類破酸官事到時初覺易人情別後始知難苦無私惠違情重儉用官錢得謗寬聞説東園墻下栁有時顰蹙念前官祝舜俞拉希言見訪富春赤亭山居巖腹紆盤一徑通故勞都騎載郫筒先生舊負連城價校尉今煩一箭工著雪老山清刻骨添梅官路巧迎風此身終解渾無事共樂郊原浩蕩中因同年見過有感青似春袍色發榮變移朱紫漸催成琴因聲急絃難續流為池平水不鳴神耗恐因驚寵辱心間請為減經營貧門二十年中夢貴賤存亡歎友生喜仰之至江東幕客江西吏各是年過五十時一去塵中勞夢約重來物外有心期煙中艇子花前酒竹裏碁聲月下詩景物不妨俱是舊只添須髮白如絲喜二曽一鄭歸木葉黃時拂兩輪馬前同看蚤梅春舊遊踏遍千山月新嵗迎歸三老人梳洗樓前酬鵲語琴書案上掃蛛塵只愁鳯詔聨翩下又指天邉問去津雪中赴季文集會因率集轉殷勤掃徑寬迎陌上春恩解訊書紅粉戀寒消酒力玉花新盤堆青菜春回律甌泛瓊珠月借神浮白自憐偏戶小醉歸全是夢中人慈相寄居同院何子感寒僕已似安何尚未出似聞亦以冬至人事動搖疾困未解亦成小詩分僧半坐小僧圓世故猶尋未了緣小大不同俱示病窮通有命只聽天愁看藥裹推難去願見香醪騁不前比若扶頭却因酒甘言苦口定誰賢乞桃竹於令尹小結幽棲事靜便為無花竹不成村在君百里鳴絃地成我一方濯錦園按鼓威名知破膽乞花詩句是招魂桃溪竹徑如成趣栁岸梅洲却未論還許推詩軸許前永州東安令汪彥章姻家好在東安解戍瓜歸懷珠璧慰生涯翰林詞伯夢中草粉署仙郎筆下花已間簫韶還政俗未持旌節自光華邦人故眼應回首詩律傳芳又一家德茂晨起折花花葉中眼上橫衝痛楚因詩戲之幽事相關略未衰蚤乘芳露折鮮枝如何引惹傷殘處莫是喜歡攀折時人見花容如苦愛花隨人意亦相欺須知恩愛成煩惱將命拚花欲怨誰近聞直學馮子容以家産中丘乘之賦作詩戲之千古茫茫不可攀仲尼日月照儒關生前冷竈七日火身後遺基十萬間寧許富兒通市籍只求賢士共歡顔那知等級輸邦計亦許顔原見一班萬席仰之許酒以詩戲之花色芳菲酒力醲坐中上客索千鍾朱陳繾綣論前契伎人姓陳子壻牽聨本一宗二何兄弟皆萬壻同席獨為棊髙能假借衆同酒伴不阿容歸來醉倒終無怨此會心知不易逢中春二十四日集仰止書室德茂仰止何彥亨彥發鄧叔度與僕凡六人至夜格夫自外歸就邀同飲仰之是日對棊屢敗德茂任直時出罵坐語叔厚謂子可以詩紀事否翌日戲成長句朱何王鄧偶婆娑晚喚寒甥共笑歌煩惱少因知事少謂德茂吃拳多為打人多竹間豪逸多酣暢斗下文章競拂摩好是花時省風雨勸人沈醉是天和飲葉氏園亭不覺大醉欹側詩呈德茂仰之并簡二何步入青冥路渺賖嵐光四面照流霞相公未許歸旄節旅客還來看物華不獨衰腸難勝酒自緣飢眼乍看花醒來知免汙茵席端為勤勞不駕車葉雲仰之謂豫有隨軒人作無真詩誚仰之用前韻方外參軍語太賖文茵萋斐錦成霞齊王國印封韓信古戰場文識李華不醉而狂烏變白以無為有舌生花嚇燕書自何人計只問軍中李左車詩去得仰之報云旦夕必有風雨可速相過走筆以詩報之幕下郎君發醉吟多如年少惜花心預排尊爼當長日不遣韶華負寸陰種竹澗邉排坐石讀書窗下聽鳴禽草堂更要添顔色剩借鄰花酒淺斟仰之宗族皆有侍女不肯借用每令長鬚行酒仍勸客醉而後止葉伯宇和霞字韻詩再作一篇全似襄陽隱士家只添靈照減丹霞晚山寒後猶疑逺古木春來亦好華酒似竹光仍鬭緑人如錦面更添花了知衰病輕成醉不但流涎向麴車慶吉父七十作詩敘事里有仁賢慶夀祺不辭沽酒典春衣年髙且作尋常看身健須誇七十稀頰火欲燒雙鬢白心間時笑昔年非誰誇八座天人貴丞相星垣動紫薇帥相生日二首季管吹灰木落洲天邉初獻鷫鸘裘邦家襲慶因前續嶽瀆儲精自幾秋秦晉君臣三晝接安危將相百年求休論辟榖功成後只恐功名卒未休整頓乾坤不作難指間造化自多端恩回春色華風暖氣接秋天絶塞寒勛爵已增彛鼎重功名長入畫圖看錫公難老無他驗但覺斯民欲再安贈吉父得女孫兩兩星階協泰符為嘉瑞雪勝維旟果如靈照翁何恨若比倉公數有餘慰眼臘娘能剪綵他年楊惲競傳書斷無豪客窺籬落為自從前免破除賀張帥日邉春早帝王州花滿黃堂夀醑浮世有忠嘉扶社稷天教勳業紹箕裘稀鳴枹鼓無偷市屢敞圜扉罷慮囚已佩荷囊簉鴛鷺徑將名姓覆金甌門弧瑞靄曉氤氲天錫熙朝社稷臣京兆赭裾多譽久甘泉紫槖眷恩新一城和氣仁風晝萬口歡聲夀語春端有泮宫蓮幕士願隨緑水泛通津喜楊致平登第寄隱湖頭知幾年聊城一箭自家傳便須結組隨鴛鷺暫捨銜杯樂聖賢鶴到九霄方展翅驥行萬里可加鞭隔江阻預金錢會夢到君家社甕邉得周朋詩云方為祕府書石渠二字作詩美之斡地排天力有餘倚空金榜稱華胥快兼長史三杯酒優重中郎六體書字向雲門增瑞彩思從天陛聽傳臚集賢學士相驚顧應道揮毫古不如李叔飛以僕遷官逺貺長箋而僕在江亭無以報謝因寄小詩知君才氣本無雙拭目曽看古戰場華蕚風流今不墜文章光焰自應長詩從古錦傳家法身原缺一字花磚是故鄉它日萬錢供日費更期粟賤致時康舊聞邵叟名今識面目於詩句字畫中輒取二詩賡之他日會面亦舊相識也平生髙士苦交踈今見音容向一書輸子一籌吟未足加人數等盍分餘供陪應覺山勞費捃拾不教春自如詩社便宜張客館莫教遊士嘆無魚曽參古佛問忘情可笑初孩尚未名自刻肺肝誠定誓時牽耳目又寒盟苦無藉在書窗冷賴有知憐風竹聲好是鼻端消息在夜堂流水夢初成送猶子之官武昌旅情傷別意何如霜打枯茄雪未除門戶難成攻事業殷勤暇日讀詩書須憐白髮親今晚莫恃朱顔氣有餘要使仇香非醉尉定知不負武昌魚孫叔誠宰南峯過信道諸暨舊事往往能記拙詩因以送之身是前身念已非相逢喜誦昔年詩心情似舊知無日兒女成行能幾時政事便須書竹帛功名何必問蓍龜旴江風月時分寄免隔關河費夢思送蔣推官歸宜興陽羡溪頭蟹正肥三年客盡拂征衣一川秋色背人去泝流而行故云背人滿路黃花迎子歸未用解裝榮故里少須通籍扣天扉紅粧莫作離凰怨自有鵷雛接翅飛推官道中期有得子之慶故末章及之庸齋薛微之里居時與僕為莫逆交亂後寓洛西時來關中每相見必詫郝壻之為人嵗辛未秋紹先沿檄至長安始得因杯酒接殷勤觀其氣概知庸齋之不豫欺也今因其歸詩以餞之玉潤冰清久著名長安一見眼增眀笑談已了關中事慷慨還成灞上行桑落酒邉還適意渭城歌裏莫傷情寄身琴鶴堂中相早為皇家致太平送錢顯道赴臨安學宫紛紛獄市如棼絲與子共事西江湄地連逺近多雜俗事出衆口無同辭文章幸子老益壯蒲栁怪我秋前衰從今斫額望天路十年莫放攻多遲送章眀章善解官奉親還吳中了知天意貴生全南嶽夫人奉化權當日論功門戶重至今傳澤子孫賢聊書鬲上三年課最愛杯中一百篇君寵母恩如已報暮雲春樹約他年病卧江城五見秋惟君向我用青眸廩人白粟長相續官簿青錢不用求向日傾心今得意犯嚴薦口昔徒羞期君通籍金閨後喚我松江共釣舟送魏滁州惠政從來到處寬民心歡喜吏心寒醉翁亭畔霜初肅釀酒泉邉菊未乾紫綬繡衣催傳送黃童白叟挽車看今君已是滁陽守父老猶稱魏長官寄朱德茂生涯非富亦非貧恰好容君放曠身種竹種松須傍水有花有酒不求人功名夢幻吾無與豁達襟懷德有鄰半醉捋須天地窄玲瓏峯頂看紅塵寄丁求安鬱密林巒十丈餘包羅萬象遍方隅吳王劔沼連巴峽廬阜飛泉貫具區賈老華夷分寸尺輞川花栁較錙銖別來不恨江湖逺只在君家聚米圖寄朱仰之年齊甲子性同宜相見論文更不疑小約同行先具酒且推獨步放君棊庭前雁鷺能堪否堂下龜魚暫付誰好向藍田報消息多栽松竹待哦詩寄劉行簡西來有客解歸裝先説東臺白首郎顔貌宛如周柱史鬚眉皆是漢馮唐百年未覺強弓滿新厯還添漏箭長欲寄平安恐煩報桃花川裏漾舟忙寄丁執中米鹽煎蹙意何如盡日逍遙不費書債作拘留身莫贖詩成困痼力難除事錢不謹兄移愛與世留心客有餘幸各身間好同伴相思如許却相迹寄糜公範塵滿簮纓緇滿衣幾人真解棄如泥水方流急收驚楫籓自無心看觸羝陶令縱教貪漉酒謝公寧不念蒸黎也知雅意人難會笑對西山是指迷寄李元叔北臺御史共推貧飢走三吳幾閲春繻袴逺聞歌政績江山應復助詩神鄉尊耆舊多遺事地有神山得近鄰料得新篇滿中篋好分風月寄間人寄何子楚冬餘春晚未收書一棹相過兩日餘久擬從容來語舊豈期盟約未尋初風隨雙􅎷樵中隱人似三閭澤畔居櫻筍厨煙茶焙火從來心事不相迹寄鄭公老一投魚目得雙珠恍覺光寒照坐隅郡政已知先嵗課高文何不副時須法官屬籍忠勞久弔死傷孤里俗蘇已分漂流寄江海甘從父老啖蒸壺寄徐稚山曽攬軺軒一整冠江西吏膽至今寒疲民仰德方為貴野老言公不似官身必靜休猶是病心無揀擇始知安髙情未得真消息試仗詩筒一問看寄張文彥掃葉林間一夢回別來秋物已驚催書通意外殷勤語詩寄間中氣味來花木成陰如結幄庭除自轉不蠲埃俱生北地俱流落誰得楊枝送一杯寄李叔飛見振叔云叔飛嘗見訪不遇難逢易別景如梭戀戀思君可奈何煩捨朱黃曲尋訪偶穿城市直經過簮朋恨阻陪吟嘯文會知難聽琢磨何處恰如長對面遇心無事便髙歌寄李叔飛襟懷犖犖久沈淪念子令人白髮新蘇季揣摩雖未試陳平容貌不長貧要須業履能追古不信儒冠解誤身早達才名未為貴王楊盧駱愧前人贈曽谹父雪中歸趂得君侯解珮時平臯千里散瑶巵來時馬上寒休問歸日蘭房夢已知不獨吳娘誇舊事重教江上聽新詩鳯書恐逐春風到催起車輪不放遲谹父望日欲載酒過南池且云已得潘風酒鄭顧道亦作詩再敘南池風物以酬曽使君吟賞之意盡意粧成出曉窗燕脂頰淺緑雲長水仙鹵簿三千女瓦影龜魚一味涼雞舌舊傳仙客句芬陀長帶梵天香使君玩物無留物為爾臨流欲泛觴贈鄭吏部春草牽吟費夢思一杯相屬重熙怡誰知道路添新厯只覺精神勝舊時鳯子即今車接翼議曹他日政無私春風吹轂還催起從此愁添五路棊雨中贈尹少稷滯雨昏風漲野田旅亭猶幸竊髙眠閉門不為辭賔客開卷端如揖聖賢夢裏莊周花裏蝶醉中徐邈酒中仙老來此興非吾事靜識東君意自傳和伯氏韻贈王元眀元眀舊親豫叔行也今死於賊矣十分佳處限長淮人在空眀靜原闕一字猜水北結茅真好去袖中漫刺為誰來因嗟翳日塵凝榭更弔沈槍臥緑苔多少平岡繞淮路分眀逐處是池臺野樹霏煙不傍城還知髙士欲逃名倦投芒屩春隨處笑起孤帆潮又生曽宿客來門不掩無心人住鳥忘情郊原盛事知多少出郭當朝共眼眀贈鄭季洪季洪屢以詩文見示近無鄰曲雜塵氛逺有聲名海內聞白雪兩眉誰顧我青銅三百擬邀君波濤入筆潮千尺鄭以潮賦見示竒甚義勇橫胸士六軍早辦林間茅一把與君分坐看晴雲贈何著作淨名梵行宰官身迹似空花意自真豈為世間呈伎倆正緣物外長精神窗橫午榻籧篨靜日上朝盤苜蓿新誰與塵寰説消息不爭好惡莫疑人送法榮師歸吳興榮自清江退院而歸又作三年一夢回浮雲何地是根栽身隨東土因緣去袖帶西江風月來碧眼已傳胡相具白頭誰問故人猜與君別後同參處雪裏梅花次第開贈聞老給孤園下化叢林堂上雷音振海音十六師兄同本願三千法界一慈心有時去作人間雨無事不聞齋後禽悵望四年留五日自知清濁易分襟留贈道場老慧苦眼疾雲中白鶴塔千尋為衆同南古到今五百年來一聲錫四禪天外百花林長眉白黑歸宗眼苦口因緣黃蘖心方見道場多勝境盡情呈現付知音遊純房見李叔頴郎中詩因思叔頴聊繼其韻贈淳化禪師衲衣處處逐浮雲法乳何妨長子孫室有巾瓶留祖意門無車馬露苔痕名髙楚澤多新侣夢入苕溪有舊言誰與隱峯居士説曽參一句是同門遊天聖邂逅正師知藏作詩贈之乘流自謂不得死生意逢師聊具論無心已盡世間義舉足不隨天上尊本源了了眀月觀餘事衮衮洪瀾翻我生流落勢未巳期師盡老依僧園贈開先悟老悟老述情三頌自持淡泊不事化緣夜坐舉枯木話二首放懷淡泊省拘持應物無方自不疑我國晏然君莫問他心通處我為誰靜無淮浦他年夢老與廬山宿命期到了百年俱任運世間屈曲自推移身如枯木了生涯那更迎春競物華金粟病中猶示衆如來到處不須誇毗盧法藏無心供兜率陀天自散花比似出門千萬事何如豐儉且隨家天池贈回老平地相逢已二年重尋勝處少留連千峯拱足煙霞表飛鳥銜花几席前白雪擁窗齋竈冷春風吹谷野芳妍四時坐斷間消息古佛心燈萬古傳贈後庵顯裕僧壞色寒惟破面藤寄情顯裕一孤僧花天捧日朝分供山鬼呼風夜撲燈何日庵居同兀兀羡君身外只騰騰是非不到爭多少前寺經山只一層元日倦卧書齋聞僧食未敢歌鼓聲作繼以清唱感而戲作蚤鶯聲轉雜危弦驚散書窗午枕眠大法鼓聲胡部曲摩登伽戲野狐禪眼中顛倒迷情事世上縱橫使鬼錢爛煮瓠壺鍾鼎食山堂誰道獨翛然伯氏自儀真招寶覺師住持以詩促行白沙太守性多能儒業箕裘祖佛燈酒減三分留待客草髙一丈逺招僧見成齋飯非長計創立叢林是大乘好住溈山十年後牯牛爛櫕不須繩送寶覺禪師夏淺春餘宇宙清溪山千里送君行今宵栁岸半輪月何處花村飛錫聲衣挽嶺雲猶帶濕鶴隨杯渡不須驚江頭一線輕帆急穩壓鯨波氣自平過慈感知古闍黎為童行落髮留飯偶已食不果留曉衝輕浪逺煙迷聞道方為訓導師緑髮小童辭俗日白頭老子泛舟時自緣旅客蔬盤早不是闍黎鐘飯遲欲別殷勤更留客逢君知是舊相知和伯氏別元老贈行相見還如相別時杖頭眀月舊相隨五亭溪下西風靜六合沙邉夏日曦洗鉢又辭香積飯傳衣仍是雪山兒要須桑下無三宿不為淮南塞草衰留贈太平劉道士早嵗希夷合道真八年靜默已全神收還赤子無為境留得丹霄自在身獨與老莊談妙理不分儒釋是殊倫有時醉露真消息流水桃花不誤人和贈鄭法師仙翁八十保純精自解真符不送迎信是虛間能却老從教草木不知名交鄰有興開三徑只用無求度一生聞説嵌巖雲石路翁能行處我能行和贈知宫洞門九鎖是天關出世那知在世間行客衝煙排洞戶主人失足到人寰飽餐蔬筍充朝暮便與孤雲結往還因為羣仙作家主却應我到勝君間元夕夜與戎琳殊三老僧對棊琳請作詩賦之白布衫韝時節新嬌鬟豐口綺羅春滿城菡萏官同樂午夜簫歌社降神繼晝尋棊三淨侣聞燈堅坐一間身不須強學行春客兒女多應不要人與長老夜話出故人俞宋護書豫至山之日俞書適至書中又相問訊感而賦詩二篇俞郊居婺源草堂蔬圃教子讀書鄉人重之聞近苦目疾殊可念三十年餘病作魔相思長恨隔關河僧窗開讀君書至丈室分龕我暫過憶爾音容如會合感懷蹤迹念蹉跎兩篇價有千金重若比千金更不磨法海空門老伏波婺源槐市病維摩道無同異要當爾命有窮通可奈何兩目再清張籍在一經傳子鳯毛多飽聞行業書鄉社得失功名付浩歌得小兒書寄二陳學顔字有楷法前代風流顔太師英風烈烈動朝儀危身已著當時節正筆猶開百世疑兒作此書真識路翁因憶汝念臨岐殷勤莫改平原腳慶及門閭會有時
