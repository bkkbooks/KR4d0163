body:
  text: 東牟集巻四宋王洋撰七言律詩新隠四首案上饒志王東牟遷居上饒有新隱詩即此詩也四注飛簷略勢寛江湖城郭得同㸔縱饒縮地神僊術長要移人視聽難僊子月多呈顧兎女兒牀晚欲棲鸞使君飲散攅燈火長怕浮空水面寒古亭題輿記榻得髙賢寄意真同物象先收拾蕪莱成院落􅰙量邉幅占風煙登臨斗覺今知要雲水從斯入畫傳斫竹洞門無鎻鑰時携客枕一慵眠新亭香分净社色專城冠盖如雲照乗眀曉露一粧秋艶曳凉風吹月夜經營戲荷魚小波紋近戞玉船低笑響輕聞說笠乾燒供夜無邉華燭競歡迎荷池郭外溪流溪外山山峯長在白雲間開懷幸對百年友屈指何憂一日顔煩燠尚寛秋占野林巒欲暮鳥知還夜歸猶隔溪橋水不記重門欲上闗南峯上元二首火樹銀花起夜煙驂驔朱幰競駢闐一千户外開金鎖十二里中然玉蓮何日行宫祠太一誰從摩詰問諸天歌臺且喜宜正月栁岸今年勝去年誰將膏粥飯蠶師輕薄兒童覔綵衣遊騎但知誇艷麗祠門直莫歎寒㣲東城南陌春迷眼逐馬隨車醉未歸莫怪老翁閒坐久鬅鬙燈火照柴扉和尹少稷上元年少輕衫競彩霄老翁心地寄參寥照人燈火成何事示我威儀貴不恌閒却剪刀尋斷夢任隨錦轂縱華鑣固知行樂承恩澤亦喜豐年樂一瓢故人飄泊少相逢喜向雲間得士龍少日功名鵬萬里長年風月酒千鍾已知吟思才難敵自嘆簮皤髪已童聞說玉池蓮十丈相期摘實上髙峯三月三十日寂寞餘紅㸃翠衣曉風捲盡絮花飛避人黄鳥逺山去背我青春此日歸倦舞栁條猶作意侵階芳草不知非老無年少尋芳恨一榻清風展翠帷喜雨去年秋日百神求嵗度春風尚未優補貼稀䟱三日澤栽培飽滿一年秋已乾桑柘蠶多飽待濟舟航水接流雲雨筭来多少力夕陽處處聽漁謳苦寒平侵爐火易成灰穏閉齋扉不用開浩蕩晚風隨伴起遲回前雪待朋来他無雜念專思酒縱有交情敢憶梅静坐不聞簫鼓急土牛莫是送春回和苦寒韻秋容落落轉頭空誰與元㝠競長雄侵剝老條無硬對栽培玉樹是家風漫誇鶴骨飛饒徤彊説龜膓語轉工對此只宜常袖手眀年春物共君同一夕大風偶成呈諸兄簡士修思逺狂飈一夜撼天闗徹曉陽烏勢未還早恨餘寒誇老徤重憐新物損朱顔强留殘火如相別已典春衣不可攀料得雲端風背上融和那肯似人間雪晴牆角寒梅未試鹽熬波何事被凝嚴解教爐火添餘燼似妬陽烏到短簷幽谷但期回暖律交光何用映䟱簾朝来一掃窮陰處先照羣峰最上尖冬節日疾作不能親祀事但具禮不拜戲作示内他鄉易感嵗時侵病入衰骸苦不禁卧聽兒孫羞栗脯倦依爐火只愁吟房無肥腯牲三爼幙有馨香酒數斟苦與黔婁分等級尚為吾婦莫傷心嵗除前一日病中作客寄他年又一鄉椒花隨興飲杯長病疑寒徤銷陰脉愁怯花寛笑酒觴去住自知身老大經過長恨嵗窮忙眼前兒女陪懽悦年少從教各自彊病痰有感氣堙風貫血行遲運用工夫了不知待盡生涯蠶作繭就衰榜様髪繰絲稍因對酒頭先眩未是多行力早疲更若尋思年少戲如何不送老頭皮琴枕琢石髹池省練絃寂塵不動五音全應嫌雜奏妨人樂正可常擕對客眠投倦乍如傾耳聽起醒惟欠籟聲傳舞雲家範升堂席寂寞依稀萬古賢闢方丈地供香火全家共寄一庵中庖滌因連奥胙通穴不容身銜窶籔芥分餘地結齋宫幾甌粥借鄰僧飯一瓣香尋祖佛風十笏比邱居有限􅊶羅眷屬要無窮從鄰庵求浴口多屋褊分張窄堂室齋庖約畧分春服乍成宜穏貼浴盂無處集蘭薫供分清净如霑露氣郁芬芳過食芹自引一杯歸路穏從教歌詠不成文閒中即事蟲有鋋矛獸有戈江中飛燕避淘河㸃紅翡翠飛傳錦展翅鸕鷀卧晒蓑絶境芳菲時喚客隔林機杼夜催梭平生約略閒忙境到底閑中得較多即事官閒久媿叨祠廩身幸真堪學種瓜月給郡倉三斛米日尋山路一川花盤空婢去催燒笋爐暖妻来趂焙茶閲盡鄰僧閒况味官供粥飯勝僧家和邵堯夫韻示兒侄言貴安徐行貴常與人平淡勿相傷莫貪順路行時快到了回思見去長克已定知天降福害人只是自貽殃長教言行樞機宻此外虚心不用防觀僧作藏㑹推崇社首勸来人嵗結春縁轉寶輪誅及米鹽知産罄事干生死見誠真歸持福夀憑懐劵時及暄和謂有神安得勸農官考古春秋禮射莫辭頻從伯氏携稚孺游保慶即事提携未便即歸山暫扣僧園且暫閒嵗晚東君顔色近霜晴寒意有無間前溪雨後渾通路荒戍人歸不上闗笻竹一枝天正暖却嫌飛鳥倦思還壬戌立冬十月十一日陪路文周朋携禔祖同訪後山道人庵道人出就庵烹茶庵外採菊拾橡實以歸偶成即事倦縁閒景散閒情人未歸庵戸不扄試撥柴煙尋宿火旋添泉水洗茶瓶黄花采采盈衣袖橡實離離傍短萍何日一邱藏曲折與君同伴劚青冥養生無欠亦無餘種竹圈籬草結廬鑿地覔甘分乳脉鉏田得實飽新蔬壁間數本空王像架上都無養性書我自病来能晚食從今緩步當安輿已已三月十二日陪凌季文游水南陳氏園次壁間徐眀叔韻不慚衰白照溪光清晝穿梁訪野堂物外風煙多喜客人間草木亦宗王浮花競作争新艷近侍全收殿後香秉燭便須期醉賞勝饒吳榜起漁榔同呉周朋髙虞卿尋泉憩積暑下庵繚繞尋泉逺歩遲倦逢籬外敞庵扉門前竹長雲垂舞巖下泉甘雪未飛景物偏幽縁舍小茶香看客為僧稀相公房舍添人否擬灌春園住翠㣲陪方何諸人後庵謝客紀事後山客館報聘禮野寺僧甌當酒茶雲未散屯知候雨溪唯貪漲不容沙草間翁仲今塵跡雪後江梅是故花一掃窮愁無不足方知謀醉是生涯同張徳和遊沈道士庵上春甲子送窮日早破煙扉令節求指㸃葆光僊侣洞招期南極老人遊龜前香火木稱士堂後交蟠石作牛我恐上真無碍意使君息慮是清修沈自言上真授葆光無碍號興作甚盛題僧邀遊梅和庵地接山腰舍遶泉豐堂巍殿勢蟬聨非禪非律三百輩有圃有場千畝田中坐獨尊司獄佛几前雜事地行仙若無生死驚愚俗正恐齋厨亦悄然中冬下澣一日陪方丈訪客因過向氏園亭有感前䟽水竹界桑麻桃李畦分小徑斜山數青黄人住久路排藜藿客行賖雲寒煙合入長暝梅懶春催未放花聞道蒼頭長兒女主人遊宦不還家去秋過呉江臞翁園亭追作水接舟航陸接鞍忙中光景静中㸔無窮宇宙規模逺出格池臺制度寛一水斯須分静僻四橋繚繞照波瀾擬分風月知何日且趂鱸魚整釣竿聞沈氏小亭欲徃主人辭出先聞趙丞相嘗逰籬横地狭曲相裁倦掃殘花長緑苔連榭似聞兼静雅閒情暫欲洗塵埃料將春色供家用那有芳尊為客開怪見門前少車馬多因只要相公来至法海寺天有陰晴地有艱一山如隔萬重山偶逢冬少三餘雨况置身無百慮闗嵗熟役車容借客閒来崖寺可開顔懸危既免逢饑虎又得休公半偈還又題祤禪客龜峯圖案洋有遊龜峯七絶一首故此稱又題盖即遊龜峯時所作也不用丹青染素翰䟱煙分染碧雲端一千里地境中鎮三十六峯天半寒巢露葉中呈物象濾羅帶畔疊林巒人間此是清凉藥時向塵中為展㸔留題翠峯陶朱山下金僊宅云是當年故相家去國豈知傳貎象扁舟端自訪煙霞平呉霸越功何在弔古傷今事可嗟早是登臨饒客淚幾行征雁落寒沙歸雁亭次東坡韻平時何憚不成歸猶向亭前送雁飛弱羽可堪繒繳宻寒沙那得稻粱稀燕呉真恐音書絶城郭猶疑今古非若為哀鳴相原野依隨豈惜共卑㣲煮泉亭昔人来去本無情世自貪賢為結亭身在雲間天繚繞夢無塵事性䟽靈撑腸大欠五千巻拄眼今㸔萬疊青景物却因閒處見前賢詩已説丁寧題鄰僧房壁南窻日暖北窻凉時節頻移意自長半坐蒲團七家飯兩函經巻一爐香身辭塵雜元無累人見朝昏却自忙雪屋夜寒燈火暗蕭條氣味合鄰墻題齊政壁栁經沈雨舞腰慵鸎入新陽曲未終照徑自藏塵外境憎花不愛世間紅橋分知為前溪改寺逺因尋別路通更待薫風日清永長歌呼就滿蒲風題懐玉上方蟠踞峯巒面勢多天分雄望鎮闗河足開煙霧鵬垂翼手摘星辰月轉波問法舊聞裴相國傳經今見李維摩禪徒到此棲塵跡方信青雲路可過無盡齋謹案此詩三首其二首見五律矯首層霄俯翠巒虚空不住骨毛寒古今等是無窮境風月何嫌取意看巢寄一枝惟自足風摶九萬豈知難與君同入逍遥境方信乾坤宇宙寛題龍溪橋放出清泉疊舊蹊行人但渡不沾泥與君暫濯紅塵足留我長澆白玉畦千古蜿蜒潜窟宂他年頭角上雲梯信知法海津梁別認作東林是虎溪思徑山汲引凡軀駕海鰲恢張竒壮自僊曹九龍獻宅金園貴四衆添花寶範髙身住四禪觀夢境眼收萬象比秋毫經行㑹遇登臨處勉策筋骸莫歎勞僧自臨安歸説逺信幻形變滅困湏㬰晚景尤驚嵗易徂滿目交遊多故物傷心風雨對今吾逝波昨日方追霅覆簣今朝又過衢旋打青梅新薦酒且須耳熱聽歌呼與鄭侍郎還却天官尺一書清時有味保懸車公年尚壮去何蚤古道誰言今不如南部方開新榜麗西清人説舊遊䟱半簮白髪無拘束不用黄精自掃除還龜溪成拙句呈給事劉兄正月下旬如山三月初還上春日暮暮春頭翠淺芳濃草色柔五十日天和暖候一帆風地往来舟棊神得雋驚逢敵酒病尋醫尚入流只有風流動文采較量沈謝亦推劉發龜溪道中欲窮幽勝逺紛華頻向晴空漾釣槎霞雜鳬羣歸趂浦雪飛鷺陣宿投沙山連空秀嫌花雜樹逺多圖怕霧遮莫怪故園歸未得為貪入手好煙霞餘干見游存誠世家兄弟久隨流少不同嬉老宦游身似舟空長信浪官如萍轉偶同州論文共酌三斟酒决勝公圍一局楸三百里溪眀月夜得心情處便相求二月九日訪仰之聞徳茂與壻鄧叔厚蚤作逍遥溪濵歎而成詩貪閒心不受囂塵六十年餘自在身愛水愛山三益友如冰如玉兩閒人言無拘畏詩多徤酒借豪華力有神聞説山中丞相語與君心事最相親徳茂以兩小篇報聘再成一章不著冠纓不洗塵不将忙事擾閒身舍前自舊存三徑林下如今見一人八節灘聲泉喚客數枝墨戲竹傳神前生定是張公子一見相從意自親昭武舊同僚見過半生辛苦路漫漫八月樵川類破酸官事到時初覺易人情別後始知難苦無私恵違情重儉用官錢得謗寛聞說東園墻下栁有時顰蹙念前官祝舜俞拉希言見訪富春赤亭山居巖腹紆盤一徑通故勞都騎載郫筒先生舊負連城價校尉今煩一箭工著雪老山清刻骨添梅官路巧迎風此身終觧渾無事共樂郊原浩蕩中因同年見過有感青似春袍色發榮變移朱紫漸催成琴因聲急絃難續流為池平水不鳴神耗恐因驚寵辱心閒請為減經營貧門二十年中夢貴賤存亡歎友生喜仰之至江東幕客江西吏各是年過五十時一去塵中勞夢約重来物外有心期煙中艇子花前酒竹裏碁聲月下詩景物不妨俱是舊只添須髪白如絲喜二曽一鄭歸木葉黄時拂兩輪馬前同㸔蚤梅春舊游踏徧千山月新嵗迎歸三老人梳洗樓前酬鵲語琴書案上掃蛛塵只愁鳯詔聨翩下又指天邉問去津雪中赴季文集㑹因率集轉慇懃掃徑寛迎陌上春恩解訊書紅粉戀寒消酒力玉花新盤堆青菜春回律甌泛瓊珠月借神浮白自憐偏戸小醉歸全是夢中人慈相寄居同院何子感寒僕已似安何尚未出似聞亦以冬至人事動揺疾困未觧亦成小詩分僧半坐小僧圓世故猶尋未了縁小大不同俱示病窮通有命只聽天愁㸔藥裹推難去願見香醪騁不前比若扶頭却因酒甘言苦口定誰賢乞桃竹於令尹小結幽棲事静便為無花竹不成村在君百里鳴絃地成我一方濯錦園按鼓威名知破膽乞花詩句是招魂桃溪竹徑如成趣栁岸梅洲却未論還許推詩軸許前永州東安令汪彦章姻家好在東安解戍瓜歸懐珠璧慰生涯翰林詞伯夢中草粉署仙郎筆下花已間簫韶還政俗未持旌節自光華邦人故眼應回首詩律傳芳又一家徳茂晨起折花花葉中眼上横衝痛楚因詩戲之幽事相闗畧未衰蚤乗芳露折鮮枝如何引惹傷殘處莫是喜歡攀折時人見花容如苦愛花隨人意亦相欺須知恩愛成煩惱將命拚花欲怨誰近聞直學馮子容以家産中丘乗之賦作詩戲之千古茫茫不可攀仲尼日月照儒闗生前冷竈七日火身後遺基十萬間寧許富兒通市籍只求賢士共歡顔那知等級輸邦計亦許顔原見一班萬席仰之許酒以詩戲之花色芳菲酒力醲坐中上客索千鍾朱陳繾綣論前契伎人姓陳子壻牽聨本一宗二何兄弟皆萬壻同席獨為棊髙能假借衆同酒伴不阿容歸来醉倒終無怨此㑹心知不易逢中春二十四日集仰止書室徳茂仰止何彦亨彦發鄧叔度與僕凡六人至夜格夫自外歸就邀同飲仰之是日對棊屢敗徳茂任直時出罵坐語叔厚謂子可以詩紀事否翌日戲成長句朱何王鄧偶婆娑晚喚寒甥共笑歌煩惱少因知事少謂德茂吃拳多為打人多竹間豪逸多酣暢斗下文章競拂摩好是花時省風雨勸人沈醉是天和飲葉氏園亭不覺大醉欹側詩呈徳茂仰之并簡二何步入青冥路𣺌賖嵐光四面照流霞相公未許歸旄節旅客還来㸔物華不獨衰腸難勝酒自縁饑眼乍㸔花醒来知免汙茵席端為勤勞不駕車葉雲仰之謂予有隨軒人作無真詩誚仰之用前韻方外參軍語太賖文茵萋斐錦成霞齊王國印封韓信古戰塲文識李華不醉而狂烏變白以無為有舌生花嚇燕書自何人計只問軍中李左車詩去得仰之報云旦夕必有風雨可速相過走筆以詩報之幕下郎君發醉吟多如年少惜花心預排尊爼當長日不遣韶華負寸陰種竹澗邉排坐石讀書窻下聽鳴禽草堂更要添顔色剰借隣花酒淺斟仰之宗族皆有侍女不肯借用毎令長鬚行酒仍勸客醉而後止葉伯宇和霞字韻詩再作一篇全似襄陽隠士家只添靈照减丹霞晚山寒後猶疑逺古木春来亦好華酒似竹光仍鬭緑人如錦面更添花了知衰病輕成醉不但流涎向麴車慶吉父七十作詩叙事里有仁賢慶夀祺不辭沽酒典春衣年髙且作尋常㸔身健湏誇七十稀頰火欲燒雙鬢白心閒時笑昔年非誰誇八座天人貴丞相星垣動紫薇帥相生日二首季管吹灰木落洲天邉初獻鷫鸘裘邦家襲慶因前續嶽瀆儲精自幾秋秦晉君臣三晝接安危將相百年求休論辟榖功成後只恐功名卒未休整頓乾坤不作難指間造化自多端恩回春色華風暖氣接秋天絶塞寒勛爵已増彛鼎重功名長入畵圖㸔錫公難老無他騐但覺斯民欲再安贈吉父得女孫兩兩星階協泰符為嘉瑞雪勝維旟果如靈照翁何恨若比倉公數有餘慰眼臘娘能剪綵他年楊惲競傳書斷無豪客窺籬落為自從前免破除賀張帥日邉春早帝王州花滿黄堂夀醑浮世有忠嘉扶社稷天教勲業紹箕裘稀鳴枹鼓無偷市屢敞圜扉罷慮囚已佩荷囊簉鴛鷺徑将名姓覆金甌門弧瑞靄曉氤氲天錫熈朝社稷臣京兆赭裾多譽久甘泉紫槖眷恩新一城和氣仁風晝萬口歡聲夀語春端有泮宫蓮幕士願隨緑水泛通津喜楊致平登第寄隠湖頭知幾年聊城一箭自家傳便須結組隨鴛鷺暫捨銜杯樂聖賢鶴到九霄方展翅驥行萬里可加鞭隔江阻預金錢㑹夢到君家社甕邉得周朋詩云方為祕府書石渠二字作詩羙之斡地排天力有餘倚空金榜稱華胥快兼長史三杯酒優重中郎六體書字向雲門増瑞彩思從天陛聽傳臚集賢學士相驚顧應道揮毫古不如李叔飛以僕遷官逺貺長牋而僕在江亭無以報謝因寄小詩知君才氣本無雙拭目曽㸔古戰塲華蕚風流今不墜文章光焰自應長詩從古錦傳家法身原缺一字花塼是故鄉它日萬錢供日費更期粟賤致時康舊聞邵叟名今識面目於詩句字畫中輙取二詩賡之他日㑹面亦舊相識也平生髙士苦交踈今見音容向一書輸子一籌吟未足加人數等盍分餘供陪應覺山勞費捃拾不教春自如詩社便宜張客館莫教㳺士嘆無魚曽參古佛問忘情可笑初孩尚未名自刻肺肝誠定誓時牽耳目又寒盟苦無藉在書牕冷頼有知憐風竹聲好是鼻端消息在夜堂流水夢初成送猶子之官武昌旅情傷別意何如霜打枯茄雪未除門戸難成攻事業慇懃暇日讀詩書湏憐白髪親今晚莫恃朱顔氣有餘要使仇香非醉尉定知不負武昌魚孫叔誠宰南峯過信道諸暨舊事往往能記拙詩因以送之身是前身念已非相逢喜誦昔年詩心情似舊知無日兒女成行能幾時政事便須書竹帛功名何必問蓍龜旴江風月時分寄免隔闗河費夢思送蒋推官歸宜興陽羡溪頭蟹正肥三年客盡拂征衣一川秋色背人去泝流而行故云背人滿路黄花迎子歸未用解裝榮故里少須通籍扣天扉紅粧莫作離凰怨自有鵷鶵接翅飛推官道中期有得子之慶故末章及之庸齋薛㣲之里居時與僕為莫逆交亂後寓洛西時来闗中毎相見必詫郝壻之為人嵗辛未秋紹先沿檄至長安始得因杯酒接殷勤觀其氣概知庸齋之不予欺也今因其歸詩以餞之玉潤冰清久著名長安一見眼増眀笑談已了闗中事慷慨還成㶚上行桑落酒邉還適意渭城歌裏莫傷情寄身琴鶴堂中相早為皇家致太平送錢顯道赴臨安學宫紛紛獄市如棼絲與子共事西江湄地連逺近多雜俗事出衆口無同辭文章幸子老益壮蒲栁怪我秋前衰從今斫額望天路十年莫放攻多遲送章眀章善觧官奉親還吴中了知天意貴生全南嶽夫人奉化權當日論功門戸重至今傳澤子孫賢聊書鬲上三年課最愛杯中一百篇君寵母恩如已報暮雲春樹約他年病卧江城五見秋惟君向我用青眸廩人白粟長相續官簿青錢不用求向日傾心今得意犯嚴薦口昔徒羞期君通籍金閨後喚我松江共釣舟送魏滁州恵政從来到處寛民心歡喜吏心寒醉翁亭畔霜初肅釀酒泉邉菊未乾紫綬繡衣催傳送黄童白叟挽車㸔今君已是滁陽守父老猶稱魏長官寄朱徳茂生涯非富亦非貧恰好容君放曠身種竹種松湏傍水有花有酒不求人功名夢幻吾無與豁達襟懐徳有鄰半醉捋須天地窄玲瓏峯頂㸔紅塵寄丁求安鬱宻林巒十丈餘包羅萬象徧方隅呉王劔沼連巴峡廬阜飛泉貫具區賈老華夷分寸尺輞川花栁較錙銖別来不恨江湖逺只在君家聚米圖寄朱仰之年齊甲子性同宜相見論文更不疑小約同行先具酒且推獨步放君棊庭前雁鷺能堪否堂下龜魚暫付誰好向藍田報消息多栽松竹待哦詩寄劉行簡西来有客解歸装先說東臺白首郎顔貎宛如周柱史鬚眉皆是漢馮唐百年未覺强弓滿新厯還添漏箭長欲寄平安恐煩報桃花川裏漾舟忙寄丁執中米鹽煎蹙意何如盡日逍遥不費書債作拘留身莫贖詩成困痼力難除事錢不謹兄移愛與世留心客有餘幸各身閒好同伴相思如許却相䟱寄糜公範塵滿簮纓緇滿衣幾人真解棄如泥水方流急收驚檝籓自無心㸔觸羝陶令縱教貪漉酒謝公寧不念烝黎也知雅意人難㑹笑對西山是指迷寄李元叔北臺御史共推貧饑走三吴幾閲春繻袴逺聞歌政績江山應復助詩神鄉尊耆舊多遺事地有神山得近鄰料得新篇滿中箧好分風月寄閒人寄何子楚冬餘春晚未收書一棹相過兩日餘久擬從容来語舊豈期盟約未尋初風隨雙􅎷樵中隠人似三閭澤畔居櫻筍厨煙茶焙火從来心事不相䟱寄鄭公老一投魚目得雙珠恍覺光寒照坐隅郡政已知先嵗課高文何不副時湏法官屬籍忠勞久弔死傷孤里俗蘇已分漂流寄江海甘從父老啖蒸壺寄徐稚山曽攬軺軒一整冠江西吏膽至今寒疲民仰徳方為貴野老言公不似官身必静休猶是病心無揀擇始知安髙情未得真消息試仗詩筒一問㸔寄張文彦掃葉林間一夢回別来秋物已驚催書通意外慇懃語詩寄閒中氣味来花木成陰如結幄庭除自轉不蠲埃俱生北地俱流落誰得楊枝送一杯寄李叔飛見振叔云叔飛嘗見訪不遇難逢易別景如梭戀戀思君可奈何煩捨朱黄曲尋訪偶穿城市直經過簮朋恨阻陪吟嘯文㑹知難聽琢磨何處恰如長對面遇心無事便髙歌寄李叔飛襟懐犖犖久沈淪念子令人白髪新蘇季揣摩雖未試陳平容貎不長貧要須業履能追古不信儒冠解誤身早達才名未為貴王楊盧駱愧前人贈曽谹父雪中歸趂得君侯解珮時平臯千里散瑶巵来時馬上寒休問歸日蘭房夢已知不獨吴娘誇舊事重教江上聽新詩鳯書恐逐春風到催起車輪不放遲谹父望日欲載酒過南池且云已得潘風酒鄭顧道亦作詩再叙南池風物以酬曽使君吟賞之意盡意粧成出曉窻燕脂頰淺緑雲長水僊鹵簿三千女瓦影龜魚一味凉雞舌舊傳僊客句芬陀長帶梵天香使君玩物無留物為爾臨流欲泛觴贈鄭吏部春草牽吟費夢思一杯相屬重熈怡誰知道路添新厯只覺精神勝舊時鳯子即今車接翼議曹他日政無私春風吹轂還催起從此愁添五路棊雨中贈尹少稷滯雨昏風漲野田旅亭猶幸竊髙眠閉門不為辭賔客開巻端如揖聖賢夢裏荘周花裏蝶醉中徐邈酒中僊老来此興非吾事静識東君意自傳和伯氏韻贈王元眀元眀舊親予叔行也今死於賊矣十分佳處限長淮人在空眀静原闕一字猜水北結茅真好去袖中漫刺為誰来因嗟翳日塵凝榭更弔沈槍臥緑苔多少平崗遶淮路分眀逐處是池臺野樹霏煙不傍城還知髙士欲逃名倦投芒屩春隨處笑起孤㠶潮又生曽宿客来門不掩無心人住鳥忘情郊原盛事知多少出郭當朝共眼眀贈鄭季洪季洪屢以詩文見示近無鄰曲雜塵氛逺有聲名海内聞白雪兩眉誰顧我青銅三百擬邀君波濤入筆潮千尺鄭以潮賦見示竒甚義勇横胷士六軍早辦林間茅一把與君分坐㸔晴雲贈何著作净名梵行宰官身跡似空花意自真豈為世間呈伎倆正縁物外長精神牎横午榻籧篨静日上朝盤苜蓿新誰與塵寰説消息不争好惡莫疑人送法榮師歸吴興榮自清江退院而歸又作三年一夢回浮雲何地是根栽身隨東土因縁去袖帶西江風月来碧眼已傳胡相具白頭誰問故人猜與君別後同參處雪裏梅花次第開贈聞老給孤園下化叢林堂上雷音振海音十六師兄同本願三千法界一慈心有時去作人間雨無事不聞齋後禽悵望四年留五日自知清濁易分襟留贈道場老慧苦眼疾雲中白鶴塔千㝷為衆同南古到今五百年来一聲錫四禪天外百花林長眉白黒歸宗眼苦口因緣黄蘖心方見道場多勝境盡情呈現付知音游純房見李叔頴郎中詩因思叔頴聊繼其韻贈淳化禪師衲衣處處逐浮雲法乳何妨長子孫室有巾缾留祖意門無車馬露苔痕名髙楚澤多新侣夢入苕溪有舊言誰與隠峯居士說曽參一句是同門遊天聖邂逅正師知藏作詩贈之乗流自謂不得死生意逢師聊具論無心已盡世間義舉足不隨天上尊本源了了眀月觀餘事衮衮洪瀾飜我生流落勢未巳期師盡老依僧園贈開先悟老悟老述情三頌自持淡泊不事化縁夜坐舉枯木話二首放懐澹泊省拘持應物無方自不疑我國晏然君莫問他心通處我為誰静無淮浦他年夢老與廬山宿命期到了百年俱任運世間屈曲自推移身如枯木了生涯那更迎春競物華金粟病中猶示衆如来到處不湏誇毗盧法藏無心供兠率陀天自散花比似出門千萬事何如豐儉且隨家天池贈回老平地相逢已二年重尋勝處少留連千峯拱足煙霞表飛鳥啣花几席前白雪擁牕齋竈冷春風吹谷野芳妍四時坐斷閒消息古佛心燈萬古傳贈後庵顯裕僧壞色寒惟破面藤寄情顯裕一孤僧花天捧日朝分供山鬼呼風夜撲燈何日庵居同兀兀羡君身外只騰騰是非不到争多少前寺經山只一層元日倦卧書齋聞僧食未敢歌鼓聲作繼以清唱感而戲作蚤鸎聲轉雜危弦驚散書牕午枕眠大法鼔聲胡部曲摩登伽戲野狐禪眼中顛倒迷情事世上縱横使鬼錢爛煮瓠壺鍾鼎食山堂誰道獨翛然伯氏自儀真招寶覺師住持以詩促行白沙太守性多能儒業箕裘祖佛燈酒减三分留待客草髙一丈逺招僧見成齋飯非長計創立叢林是大乗好住溈山十年後牯牛爛櫕不湏繩送寶覺禪師夏淺春餘宇宙清溪山千里送君行今宵栁岸半輪月何處花村飛錫聲衣挽嶺雲猶帶濕鶴隨杯渡不須驚江頭一線輕帆急穏壓鯨波氣自平過慈感知古闍黎為童行落髪留飯偶已食不果留曉衝輕浪逺煙迷聞道方為訓導師綠髪小童辭俗日白頭老子泛舟時自緣旅客蔬盤早不是闍黎鐘飯遲欲別慇懃更留客逢君知是舊相知和伯氏別元老贈行相見還如相別時杖頭眀月舊相隨五亭溪下西風静六合沙邉夏日曦洗鉢又辭香積飯傳衣仍是雪山兒要湏桑下無三宿不為淮南塞草衰留贈太平劉道士早嵗希夷合道真八年静黙已全神收還赤子無為境留得丹霄自在身獨與老荘談妙理不分儒釋是殊倫有時醉露真消息流水桃花不誤人和贈鄭法師僊翁八十保純精自解真符不送迎信是虚閒能却老從教草木不知名交鄰有興開三徑只用無求度一生聞說嵌巖雲石路翁能行處我能行和贈知宫洞門九鎻是天闗出世那知在世間行客衝煙排洞戸主人失足到人寰飽餐蔬筍充朝暮便與孤雲結往還因為羣仙作家主却應我到勝君閒元夕夜與戎琳殊三老僧對棊琳請作詩賦之白布衫韝時節新嬌鬟豐口綺羅春滿城菡萏官同樂午夜簫歌社降神繼晝尋棊三净侣聞燈堅坐一閒身不湏强學行春客兒女多應不要人與長老夜話出故人俞宋䕶書予至山之日俞書適至書中又相問訊感而賦詩二篇俞郊居婺源草堂蔬圃教子讀書鄉人重之聞近苦目疾殊可念三十年餘病作魔相思長恨隔闗河僧窻開讀君書至丈室分龕我暫過憶爾音容如㑹合感懐踪跡念蹉跎兩篇價有千金重若比千金更不磨法海空門老伏波婺源槐市病維摩道無同異要當爾命有窮通可奈何兩目再清張籍在一經傳子鳯毛多飽聞行業書鄉社得失功名付浩歌得小兒書寄二陳學顔字有楷法前代風流顔太師英風烈烈動朝儀危身已著當時節正筆猶開百世疑兒作此書真識路翁因憶汝念臨岐慇懃莫改平原脚慶及門閭㑹有時
