body:
  text: 東牟集巻十二宋王洋撰啟代人求宫祠啟用之則行竊佩古人之訓不能者止敢忘今日之規欲陳徇己之情宜叩受恩之地伏念某少無一藝長乃多竒延襲簮纓祗奉七條之戒因縁門户妄希五栁之風不圖草芥之㣲幸遇明良之㑹屢更歳籥連領州符夙效一官每積凌兢之懼晚當劇郡寧逃曠敗之誅諒非造化之生成安得保全於終始自顧桑榆之晩難貪章綬之榮政已三年請代葵丘之戍身踰七十願從黄石之遊某官以道事君量才授任不遺疏逺曲逮寒㣲故今焦㸑之餘尚中宫商之節顧筋骸之已莫在進取以何能齒豁頭童難跂金閨之諸彦人㣲位下或堪廟内之老人代徐漕賀李漕啟帝心簡在圖任舊人士論恊同願觀新政某官仁心恕物直道由中華蕚傳芳久冠北州之望旌麾繼世實繄南國之光既自結于主知乃曲從于人欲眷全吳之樂土實四海之上腴委粟腐於倉中已觀前效見錢流於地上載邁逺圖顧兹孱瑣之愚遂獲依隨之幸夀王在事置都尉以奚爲馬援居前何舊交之敢屈自惟欣慕實倍等倫代人謝漕使舉改官啟去來亡補初自類於鳬飛得失若驚乃遽叨於鶚薦寵踰望外愧與幸并竊以刺史之官本於徃古輶軒之任尤重本朝攬轡澄清實仰膺耳目之寄駐車决事豈徒司金穀之繁兼一方進退之權總列城刺舉之任民惟知於載徳士乃願於承顔賢智効功盖有因而進者姦回歛衽亦望風而避焉非得充實通敏之才曷膺聰明特逹之舉如某者東州冷族下國陳人少思力於寸長壯無取於片善佩父兄之餘訓敢不周旋稽聖賢之格言粗加黽勉一從州縣屢閱歳時雖簿書獄訟之間謂稍通於利病而朝野艱難之際曽何濟於事功撫長劔以悲歌自傷壯志伏短轅而却顧誰諒㣲衷豈圖滂沛之恩下逮根荄之細吹嘘一氣生寒谷之春風升斗餘波激鮒轍之江水退惟僥倖乃有夤縁某官宅心至公待物以恕與人不求其備故愚智在所兼收任事必惟其能故孤寒得以自進古所重也今實見之以曲士進而成人恩固踰於鮑叔由下土升於上國名不媿於周昌某敢不更勵所長益鞭其後涓塵已細難酬廣大之恩皮骨若存當盡糜捐之報代韓侍郎謝胡待制啟光膺綸綍榮進班聯侍從得賢搢紳交慶某官學知要道義不茍從温温君子之儒蹇蹇王臣之節懐鉛抱槧久養望於書林簮筆持荷嘗代言於西掖帝念甘盤之舊美豈專商民懷子翼之恩心惟借冦是用特加異數就寵分符願推魯俗之餘少借吳山之重某聞風惟舊承見尚遲未修竿牘之勤遽辱緘幐之賜既懷頌願復積兢惶賀凌季文監丞啟廣庭賜對已屈輿言崇陛傳臚果髙衆俊國有得人之實士多慕徳之誠况在末交豈不先慶某官學本為己譽久在人條陳時事之宜既㑹文而中理指切古人之意知異世而同功豈惟育才之光是謂得人之盛賀張子韶狀元啟宗伯書名最先淡墨太常奏第首被濃恩光動宸樞慶傳寰宇某官言無枝葉學有本根羣心推徳行之尊獨步擅文章之美時方艱棘道在扶持讀劉蕡誦言之辭但知歎息覩公孫曲木之喻將見事功豈惟育材之光是謂得人之盛某株愚鮮儷流落無堪嘗借辯於墨卿獲縱觀於筆陣欲修竿牘慚冗憊而莫先過辱緘縢苐兢惶而罔措爲昌祖定婚啟詩正人倫雅著得時之美禮諧民俗每彰合姓之文偶幸結於齊盟敢自同於晉匹某姪孫初縁世賞獲齒仕流慚無閥閱之傳粗習箕裘之緒伏承小娘子夙親姆訓早正婦容素帛傳書已稟千金之諾白茅致幣爰羞五兩之儀賀程元籲生日啟期三百六旬旬日遂周於堯厯凢四十九表表儀有類於宣尼屬熊羆占夢之期沸龜鶴齊年之祝恭以某官昴星孕秀嵩嶽儲神祥呈天上之麒麟譽掩人中之屈軼擢科而巍登虎牓早擅雄名簮筆而儼立螭坳亟躋要路鳯閣更代言之任露門膺勸講之崇雖為儒士之極榮抑亦富貴之所自五百年出名一世捨其誰歟十八歳當作三公今爲可矣某謬忝摳衣之列屬逢射矢之辰稱觴有阻於鳬趨引領但深於燕賀如位列三槐九棘可繼觀賢業之猷爲雖亥有二首六身未足計華年之甲子其為祝頌曷具敷宣答趙都監求解經序啟華牋命介榮拜芳辭寳訓長編光先蔀屋窺老成之述作得問學之淵源感殆無窮喜惟創見竊以建用同姓本裕陵宏逺之良規恢廣學宫盖徽宗紹述之美政月書季考兼寒士進選之科事舉言揚副清朝公正之選王室有磐石之固公子歌麟趾之詩凡九族之重光皆百世之盛典恭惟節使郡公宗室元老文章鉅公繼世象賢畢公紹前人之美爲善最樂東平爲列國之師都監團練不替前修存心古道上下經六十四卦三篋之書偶亡道徳經八十一章什襲之珍固在欲明舊學行蕆新刋何求士於論餘俾題名於篇首蠅飛數步或附驥而絶羣鶴唳九臯喜其子之相和答陳倅啟夙仰聲猷重依喜契阻交承於履舄失修好於緘幐敢謂謙恭下收㣲賤某官被服儒雅操履靖共鏘鏘環珮之容挺挺松筠之節若昔先帝推恩外家知傅喜之後凋宜膺茂賞得野王之治行實冠明庭當臚命之初傳見羣工之動色謂宜奮翼遂展摶風何黄巻之誤身致青𡨕之垂翅雖夀王居都尉爲任重要沮授留治中爲淹才行聞尺一之除元副萬夫之望其如欣頌曷罄敷宣答齊察院致政啟竊以無適時之用舎偶佩魚符觀古人之典刑尚詢黄髪矧襄陽之耆舊本大厦之棟梁念依徳之非遙恨造門之尚阻敢慿素牘用寫丹心某官清世名賢中華瑞氣造道徳之閫奥視仁義爲蘧廬正色霜臺更十年而不調游心物外見晩歳之後凋某奏記云稽仰風惟舊偶叨郡吏近瞻夫子之門墻繆玷儒鄉具見國人之矜式顧鴻飛之何慕幸燕賀之有依矧拜瓊瑤錦繡之牋教以撫循蘇息之術結王生之襪雖有意於周旋虚盖公之堂諒未容於造次敢不心承名誨力先窮民庶不墜於前規或免罪於巨室過此以徃未知所裁答江留臺致政啟效官螺浦善狀蔑聞易地樵川濫聲彌著自滿小人之腹偶觀君子之鄉推求何來夤縁有自某官中朝重望南國宗工黽勉徒勞慚素書之未展推揚過實驚綵筆之先頒穡人告功清霜在候敢祈茵鼎益重保調見鄭監啟斡山而排商賈久欽偃草之風行部而見生徒遂有披雲之幸獲依輝潤深識楷模恭以某官廟璉凝珍天球毓粹奕奕搢紳之表堂堂人物之英閥閱髙華富貴所自有也聲名烜赫將相豈無種哉儒門不獨於韋平世徳固歸於欒范首騰雋望亟踐華塗當平戎禦狄之時懷足國裕民之術析秋毫而善心計志陋𢎞羊操贏資而佐軍興識髙劉晏如見錢流於地上豈令龜毁於櫝中足食足兵知取知予雖山海天地之藏固號利源然智慮朝廷之淵必資仁術佇賜召環於中禁諒無煖席於外臺某也樗櫟散材邱樊幽介宸庭賜命聯科雖獲於沾恩頖水効官待次未諧於試事浮沉里衎汨没歳時昨還自於錢塘因道由於宛水迫親闈之甘㫖從幕府之攝員經月未幾以病告去方僅出城闉之外業已言旋遽驚傳旌斾之來不遑伏謁未拜潭潭之府久懷鞅鞅之心豈謂繡衣俯臨巖邑恭而安温而厲既獲覘於威儀晦斯光窒斯通輒仰希於開發深期㸃礫敢憚掃門况居桑梓之邦宜在鈞鎔之列龍鱗鳯翼儻諧攀附之心馬勃牛溲願預收藏之數問候孫尚書啟武林較藝實承命以摳衣象郡驅車靡趨風而執靮雖灑掃進退久闕事師之禮而文章性命彌勤望道之心某官文冠一時道追千古殘膏賸馥散在人閒被髪騎麟宜歸天上伏念某棲遲末路漂泊餘生昨自道山旋更銓部曽未老於鶻突偶進直於螭坳西掖之缺員未除四旬暫攝南容之玷言易録三復奚追既縁香火之相依復見簡編之可愛穿花度栁妄希徒步之拾遺問舎求田未省謀身之一得惟此一麾而出守實同屢薦而得官盖吳中名士或軫其饑寒而當軸上公有識其面目幸預分符之列猥當授筆之風白粲連檣尚索積年之紅腐赬衣縁路厭看十載之旌旗課最難攀曠􅟂可必尚覬朝廷舊徳載取青氊門下諸生加憐白首何敢望長枝之棲鳥便欲希恩亦非同惡水之病鴟遽忘報徳謝宫使黎尚書啟效官螺浦曽善狀之蔑聞易守樵川宜濫聲之先播逡廵自揣俯仰興慚竊以近民之官莫先守令分土而守宜在賢能豈繄庸瑣之才誤玷使令之數眷七閩之奥壤爲八郡之名邦溪山滿前輔弼間出内自惟於僥倖豈無待於夤縁某官清以納汚粹而容雜事君以道固巳著於大閑爲國求人每不忘於片善重念列曹之舊嘗幸趨風敢期綰綬而來廼容染化其如懇款曷罄敷陳與孫仲益尚書啟捧入户之扄久違三沐衽在山之褐復把一麾事出幸中榮居意外竊以張官置吏本以爲民宣化承流斯惟報國厯考循良之效每先撫字之勤盖六七十之封疆必期足食故二千石之能否或繫中興豈圖共理之求乃及孤庸之陋才負江山之助坐媿賢規質非杞梓之良終當匠斵某官道兼庶品力卸衆流堂堂柱石之材浩浩古今之學不遺疎逺每賜甄收用則行而舎則藏敢望夫子粟賦鍾而薪賦束猶恨支離某敢不勉勵疲駑庶幾希驥少奉平生之誨感收旦暮之功匪圖赫赫之名庶逃下下之考與饒州外邑程尚書啟祠庭代戍幸居無競之貟社木分疆復冒有民之寄揣踈庸而自媿希光範以知歸將期履幕之承倍益襟懷之善某官徳為行本道實世師如蒼生何獨飽家山之樂惟吉士用方虚鼎席之求某百死餘生一時長物側手但圖於障日書名非列於屏風儻非咳唾之餘曷借筋骸之力遙瞻徳宇但切心依張尚書啟勁氣衝斗直道從天當喉舌之司已著一朝之盛美賤掌握之物永光三蜀之雄姱迓林守侍郎啟輟從禁闥分鎮侯邦履四序之開先爲一方之和氣里閈胥慶父老聳觀某官直道持身正容悟物名魁多士學貫九流禮儀追虞夏之文詞采擅常楊之譽暫勞外服行觀五月之政成促上天階豈謂朞年之化逺某棲遲晩景流落餘生坎止流行偶受一㕓之地鼎新革故方觀夏屋之成喜幸之情敷宣奚既李侍郎啟知髙流俗行配古人可與樂成憫斯民之未覺有如得志洗萬馬以俱空答貴溪毛尉啟分職江邦初覩三年之政扁舟吳㑹偶渝一臂之交惠記温然揣情祗若某官學窺古道行秀士林世本公清實尚書之舊望人言仙去攬梅福之餘風履此亨辰益熙純嘏即膺異選以副旁求祝頌之私敷宣罔既答縣尉權務啟聖神在御當圖共理之良駑怯何堪乃冒分符之寵方懷章而失措固修牘之未遑敢期仁厚之私逺致緘幐之貺青黄未試溝塍之斷奚觀粉飾過優糞土之墻有望其如欣喜曷既敷宣與信州章郎中啟百里溪濵每嘆三秋之别一麾江上偶同十國之連將觀大國之風願展小侯之禮某官胸蟠萬巻未付六丁過目十行暗書三篋位保八傅之苗裔家承三相之風流尚屈方州未諧輿論某漂沉末緒連蹇餘生雖頑鈍之亡堪幸班聨之有素其如欣幸曷罄敷宣答李宣教謝改官啟光奉宸恩榮陞京秩凡在交游之末舉懷欣抃之私某官中世名家南州望士材猷敏劭每遇事於有爲心術精明殆無施而不可眷此䇿勲之始實為展業之規敢期益輔於中和行奮冲霄之羽翮答滁倅章朝散啟望吳中之甲族邈若山河思君子之徳音其人金玉得珠函於望外奉寳唾以盈牋感懼交懷姓名恐誤竊以題輿之寵示獨尊崇别駕之權實兼刺舉故國有善佐則齊侯拜加一級之榮守難其人則夀王兼四千石之重某官江山秀氣造化偉人發䇿决科蚤繼大門之業崇論閎議素推烈士之風當大道之方行在外庸爲巳晚矧一臺獨集於二妙而千金俱重於連城太守歸而賔客從斯其時矣諸縣豐而公事少何樂如之惟政務清於從容談笑之餘故舊章舉於廢置委靡之後壯千里之形勢得九服之藩符崇墉嵯峨多士鼓舞念表豫章之功業金石可磨當如杜牧之文章事辭乃稱傳之衆口必謂咸宜某精力銷亡學殖衰落敢期過聴逺辱旁求不識顔平原方知世有無妄近舎皇甫湜遙知縮手就閒感仰之情敷陳奚既答徐將仕啟綸書初下榮繼髙華藍綬載紆光生里閈某官學從家得性盖天然文章居聖學之科杞梓乃匠石之用某偶官仙里獲奉俊逰行觀騰翥於青霄以副披雲之素望答李新恩啟龍墀賜對色動冕旒龜里拜親光増門閥新恩先輩擷芳書圃擢秀士林積學貫乎九流美才兼於數器根蟠仙李攬敷錫之淵源譽振人寰擅芬芳於華蕚某衰遲晚景流落餘生仰飛鵬九萬之程徒増三歎借駑馬一顧之價何啻千金答饒州諸邑啟已試無功尚叨任使載膺共理良懼曠瘝念非垂徳之依曷副䝉成之願雷音在邇方霑普潤之恩電騎載馳遽辱餘光之賜其如愧感曷既敷宣回王教授啟題名雁塔讌想曲江授業鱣堂風移均浦念金蘭之投分愧竿牘之積修恭惟教授學士年兄學海揚清儒林擢秀文章典雅議論髙明芹頖衣冠雖幸承於矜式芸臺籖帙行有待於校讎仰徳鴞林重勤記問春華苒苒願精列鼎之調召節駸駸佇快景星之覩回謝王參議啟千里近畿莫課將輸之最三山藏室誤陞論譔之華恩則過優受而増愧况復星輝東壁下臨圖籍之繁夜照青藜來賞校讎之美廼以外臺之冗計進兼秘宇之清聯度職不侔揆才非據兹盖某官提衡有素延譽實多薛滕先長於宗盟孔懷甚力葑菲不遺於下體求備寧聞尚稽尺牘之馳先拜朶雲之賜雖温造入河陽之幕名播端朝想曹參趣舎人之裝日觀召節尚期來覿躬致謝誠答王教授啟蓬飄易逺久疎奉於音容栢義後凋獨靡忘於繾綣華緘敦好蔀屋増輝某官學苑名流清時望士辱久蟠於泥跡亨合㑹於雲衢折成均俊造之鋒莫余毒也掇春官科第之品自我得之郡博士固未免於左官儒先生宜遂升乎右治某粗親規範莫究淵源觀相如成賦之時恨驚珠玉拜齊侯投𤓰之賜報匪瓊琚答江教授啟夙分邑社慚已試之無功祗奉賢游庶將來之可及驅澤車而厯路望峻舘以搖旌某官學有宗師行依坊表招諸生於館下已聞誨誘之方簉鵷鷺於天邊行見摶扶之勢某棲遲末緒連􅏝餘生避燥濕寒暑之憂當賴帡幪之賜執禮樂射御之數行觀賢哲之風脩訥牘以未遑辱華文而先貺其如媿佩曷罄敷宣與黄倅直閣啟綸恩疏制芸閣登賢論非曲取之私才本疇庸之選惟吉人之得位乃直道之見容凡預聞知孰不欣快某官世騰聞望夙著英聲秉一徳以在躬自落姦諛之膽亘萬世而不顧實興頑懦之風忠誠方抗於皂囊名姓遽形於丹牒三君八俊初無意於求名四海九州殆不容於措跡盖道大者自難於貶故才髙者見嫉於庸仁人一窒志士屢嘆孰謂賢愚素定緇白莫渝昔日是而今日非小人之情可見用則行而舎則止君子之道宜然豈徒收一旦之功遂可變百年之俗某向風惟舊覿徳尚遲喜善類之適時物無異議慶斯人之有望名不虚行盍因衆正之求益為吾道之主一書不寄虛煩詹事之詩萬户難期願識荆州之面輙陳蕪頌少叙愉情答許與權經略啟無二千石之才敢圖共治得五十里之地孰曰非邦幸仁賢之具依庶曠瘝之可逭某官忠孤許國性直侔天推蔽遮江淮之功本神靈山嶽之裔威讋一方之虎旅文當八面之鯨師是謂時流之老成方見賢人之徳業未應異數尚屈殊庭豈輿論之攸宜想公言之固在某飄零末緒連蹇餘生辭五斗而強顔希三年之報政行陪賔目良副客心答樂平宰啟効官亡狀尚脱刑書思免曠瘝宜求良友戒車徒而即路望衡涉以馳心某官聖道同音儒林擢秀屈青松而在底人謂伊何奮六翮而居前公言固在某偶分符節獲奉規橅未遑竿牘之脩遽辱緘幐之貺其如欣頌曷究敷宣答貴溪玉宰啟拜命天墀分符侯社儉於百里雖曰附庸報政三年行觀課最某官中朝望族南國英游昆也玉而友也金久擅塤箎之譽父則慈而子則孝稔聞詩禮之風尚屈試於牛刀乃未諧於驥足某棲遲客路連蹇餘生願受一㕓雖無與鳴絃之地不知肉味亦喜聞韶樂之音迎髙宰啟被命中宸分臨近境搢紳賛美閭井交歡某官清世名儒東州望族才兼數器學貫九流將命有光爭歎元昆之忠藎承流著效行觀賢季之風猷節義萃於一門譽望隆於率土人如此者士固貴之某流落餘生衰穨晚景已自甘於屏跡何偶幸於親仁喜抃之情敷宣罔既迓秦守殿撰啟陞華祕殿分鎮侯邦朝廷進賢士夫相慶某官志通今古行絶品倫温然三接之容卓爾萬夫之望念徒勞於棘枳詎乆困於藩籬賜千里之魚符此其漸耳騰九臯之鶴唳行且見之某流落餘生棲遲晚景不謂孟生之客路獲依蘇季之餘光欣幸之情敷宣罔既與衢州張舎人啟坐糜廩禄冒出守之一麾行拜威容敵封侯之萬户省愚才而知媿涉治境而得師某官量大容愚道隆覆物詩律得江山之助典書追訓誥之文暫屈方州未諧輿論某偶分小壘道出大邦洗十年之學場釋三秋於葛圃其如欣幸難罄敷陳與李舎人啟盛時領袖清廟珪璋天外鳯凰風雅得詩人之髓壁中科斗典謨追作者之風與奉使啟學自家傳性由天賦徳既具矣盖有爲而必成天實相之諒無施而不可與著作啟學有宗師行依坊表懷鈆東觀儼墨客之丈人賣劔南州化潢池之赤子與路分啟學苑名流清朝望族暫持剡節鈐一路之兵符已促翰音飛十行之丹詔與樂平丞啟某官學有淵源行無瑕玷賢科射䇿見林内之孤羆場圃留賢歎棘中之棲鳯招安福士人王丞民瞻啟名髙物表固遐想於清規識照幾先宜洞明於世務借馬預觀於慣馭陳羔敢愧於非儀某官聖世逸才南州望士安貧守節懷昔賢樂道之心勇退養恬躬幽人嘉遯之操某濫分支郡適處名邦虚齊相之堂敢希蹤於前哲結王生之韈覬少遂於初心謝禮物接見啟肅將使節逺㑹方朝偶修候館之儀獲奉華軒之寵更勤幣好益賁笥光謝土物啟車書共道已喜暢於皇猷金蘭同心復幸承於仁契三陳貺施訖荷雅懷謝鄭監惠龍團茶啟魚腹得書光動五雲之體龍芽出焙香浮十襲之緘拜賜知榮撫躬増感竊以草魁稱瑞山谷呈祥方東君尚困於寒威肇將迎氣而北苑已偷於春色助發喊山英糵地靈範模天巧蟾背候清芬之裂鳯圑誇鬭品之髙故黄芽紫笋之嘉名竸標物産而赤印白泥之健足已走京塵若其玳席綸闈瑣牎棐几猊炷篆沉煙之碧虬簷暾朝日之紅揮玉麈而唾落珠璣灑錦牋而文摛組綉是宜鏗鍧碾月颼䬃煎風石鼎煮蚯蚓方鳴磁甌焙鷓鴣㣲暖漚花泛滿雲脚横斜研玉川七椀之清味顧渚兩旗之號代酒聖者固非美事謂酪奴者尤非知音念睿賜下頒唯富蓄於戚里侯家之第然餘波所及乃下沾於蓽門圭竇之人某也才謝好䝉性非顛陸尚昧候湯於魚目豈能品水於虎跑枕石眠雲未清神觀和鈆䑛筆多滯𡨕捜今也啟篋分香揮輪碎璧瀹竒芬而破悶潄浮浡以生春顧一榻清風不復昏迷於蝶夢雖三盃軟飽未妨捜攪於蔬腸賜重兼金光生蔀屋兹盖伏遇提舉殿撰功名餘事閥閱冠時韋平繼相種之芳王謝振家聲之盛便蕃天錫久藏閩貢之珍璀璨徳輝轉及吳儂之賤蕞然瑣質泳乃深恩某遂得澡瀹精神篆雕心府遺之孫子後世豈無傳焉味在齒牙流風猶有存者其爲感愧曷易敷殫回入館土物啟飭徒蕆事偶玷司存汛館納車遽寛仰止少代陳羔之荐用伸還贄之儀再回入館土物啟嚴車向闕方幸覿於清標整棹觀瀾已夙聞於戎御將恐一辭而退姑成三問之勤髙麗入館人事啟車徒即館方遲三積之靡充主獻未羞再辱旅酬之下貺惠已逾於縞帶報尚乏於瓊琚
