body:
  text: 東牟集巻八宋王洋著制誥下皇叔右監門衛大將軍秀州防禦使士街磨勘轉正任防禦使制勅考績之法謹於有司近自同姓至于疏逺之臣小大共之非可私也具官某久官環衛祗事有勞宗司計年法應遷秩鎮防之任禄厚官尊惟忠惟勤乃稱厥服夫兵戈未定勇夫宣力其有積功累勞以死勤事而僅獲爵一級者則官至於此亦可貴矣勉思謹戒以為宗屬之勸可潘浹叙右武大夫濟州防禦使制勅國家崇宥過之仁憲網開自新之路既施霈澤以賚多方其於庶工豈忘甄叙具官某沈審善斷果毅有謀自服官箴累更任使而乃逡巡詔命遂坐鐫官已屢休於新恩宜悉還於舊物往祗懋渥更務恭勤可邊順復萊州防禦使制勅國家崇宥過之仁憲網開自新之路恩施浹洽下逮幽㣲眷惟先後之臣可緩甄收之典具官邊順周旋軍旅練習艱難出入禁庭小心無過在省方所底之地有居民延燒之災曾畚􅇲之弗修致鬰攸之煽害嘗鎸舊秩既沐新恩用復正於官聨其益祗于乃事可趙公悦責官制官吏之置本欲為民租税之輸適滋其擾聊鎸一級以示薄懲往思厥愆尚體寛典江少虞責官制漢宣帝勤恤民隠故重二千石之選朕念赤子付之牧守庶幾其安而爾領郡寄租税之輸冝檢弊奸乃庸吏言惟務貲貨何以副朕之望哉聊鎸一階用懲失職王淑責官制三尺垂文百鍰示罰葢因疑赦詎可擅行況有應言之科聊從鎸秩之貶往祗寛典毋怠省愆儲秉直責官制士有常心莫先廉慎人無逺慮必堕悔尤爾於職事之間每有擅私之累聊從鎸秩毋怠省愆可趙不曲責官制黥𨽻之人罪籍所繫失於閑檢遂致逋逃鎸秩兩階用懲弛職王中正种諤降官制朕大興士衆屬爾等以伐羌固將舉其巢穴非徒卻虜收並塞之地而巳兵西出則近而爾等東繇綏徳回逺之路以疲士馬費畜粟致功用不集中正議既不審又約有分地當攻其左而不能奮擊以殱除醜類夫軍賞吾必信而罰亦安得巳哉是用按爾之罪降秩有差其體寛恩尚思報稱可連環責官制設官分職上下相維令而不從何以為治其鐫一級以示薄懲郭照責官制弧矢之用唯在轅門忿厲而傷則麗憲網雖經肆宥尚鐫一階往體寛恩毋忘有咎苗靖責官制具官某古者大夫有家臣欲盡心於所事爾典其計而私其用可乎鐫秩一階尚為寛典薛弼責官制周官之於鄉刑重造言之罪漢制之於郡守先勤學之方況朝命之冝遵而士風之欲振乎以爾職為師帥令失稟承謂布韋有狂率之人俾庠序歸蔵修之地而乃教之不素閑之失嚴致其越禁以自如復爾遂非而弗頋爾訓下若此導民謂何聊鐫一階尚服寛典林充等責官制士夫修身俾從訓誨國有明命貴在稟承爾等視令故違頽風不振致其輕率復爾自如各鐫一階用懲弛職辛永宗劉綱責官制朕念干戈衛社之重故垂賞以待功辨名器假人之非斯明刑而當罪具官某等相濟同惡自營背公頃出命以勸戰多姑從權而付軍帥既均休而已事宜列上以聞朝迺因請託之間畧無頋忌之意擅以王爵收為私恩冝從鐫秩之科以示為臣之戒往祗寛典毋怠自懲王俊民責官制士有常心莫先廉慎人無逺慮必堕悔尤爾於持巳之間每涉徇私之累法稽吏議爵貶文階尚服寛恩毋忘懲艾田安衡責官制萃除戎器以戒不虞爾職搃弓人愆于成式聊從貶秩用儆瘝官尚為寛恩毋怠省咎徐大任責官制尉職逐盜本欲安民濫及無辜適滋其擾聊從末減用貶一階往體寛恩毋忘循省孫彦責官制朝廷搃機務郡縣分等級固有次第不可踰也爾不循常制越序陳詞令甲昭垂鐫官一秩往祗寛典以聴攸同陳大猷責官制鞫勘圜扉必期當罪故失出入律所不容爾議獄縱辜法當鐫秩聊從寛典往省厥愆陳淵責官制㑹計當則為委吏出納吝則為有司爾為筦庫之官不知簿書之謹既戾三尺用鐫一階往祗寛恩毋怠深省何休降官制具官某足兵先於足食所患違期守道貴於守官寧容擅去爾給軍儲而失職假赦宥以脱身徇國伊何原情莫恕聊鐫一級尚體寛恩李隊降官制具官某爾涖官行政規利暱私三尺垂文一官鐫秩往祗寛典毋怠省愆姚伸降官制具官某爾檢身不謹至麗刑章明罰有常用鐫官秩往祗寛典毋怠省愆趙立之降官制具官某䇿名仕版冝慎檢身投足賄場致輕犯憲吏議三尺秩鐫一階往體寛恩毋忘省咎戚寳等降官制具官某朕兼愛南北之民俾還桑梓之地而爾懈於䕶送致有過愆用貶一階以懲不職侯璋降官制具官某爾綱紀貢金來輸左帑恣為貸用因作販商邦有常刑鐫官一級聊從末減往省厥愆董季舒降兩官制具官某士有常心在於廉職有常守在於謹否則辟也爾居官而私其用聚劵而妄其給縱下而盜其帑罪將何逭以經肆宥聊示薄懲鎸秩兩階益思循省鄭知剛降官制具官某朕於方郡設教官欲其以德行表士子而厲風俗爾乃移書請託詭卒給廩是以盗訓也其鎸一級往服寛恩毋忘循省趙子儼降官制具官某禄以致養冝修廉隅爾職兼税官既為賈售之事又匿其征可無懲乎聊鐫一階尚服寛典武安寧走失罪人降兩官制具官某爾職在巡警被檄追逃縱下受賕獲而復縦獄成來上鐫秩兩階尚為寛恩毋忘循省王褒降官制具官某禮辨等威律嚴誣告爾飾詞以偽越訴于朝鐫秩兩階以懲誕率其歸營壘益務省懲王國光降官制具官某時啟閉以嚴公帑謹出納以檢吏奸此涖官行政之所先也而爾馭下無威盗金失察將誰執咎聊禠一階往體寛恩毋忘懲艾葛善降官制具官某尉以討賊為職㑹以合謀為名而爾怯懦違期顧望逸冦以經肆𤯝聊禠一官尚為寛恩往冝循省張皋押馬降官制具官某君子以窒欲則無私喜以懲忿則無私怒可損之善莫大于此爾容軍婦以出入于家而捶死其夫鎸秩兩階尚為寛恩往省厥愆毋重悔尤田瓘降官制具官某律設大法明過與故所以原其情也爾初虞劵歴之失而失之乃過爾既失而因以誣人豈不為故乎用鐫一階尚服寛典莫仲效降官制具官某以爾居官為下交之瀆涖事信誣告之事鐫秩一階用懲不恪尚為末減其懋省循張通降官制具官某愚為臧獲寧免過愆爾既不能恢雅量以含容又不能付攸司而裁决至於毆死則有常刑用鐫一階尚服寛典吳億降官制具官某爾長治百里師帥斯民不能檢身自麗刑辟雖經肆宥尚鐫兩階兹乃原情毋忘省咎可孫慶降官制具官某朕兼愛南北之民俾還桑梓之地而爾護送不謹詐弊滋生用貶厥階以懲失職汪召嗣余應求降官制具官某等唐劉晏搃轉輸號一時能吏觀其所任雖在千里外奉教令若目前爾等專領漕計委使之際不能擇人鐫秩一階用懲失舉尚服寛典毋忘省愆孫處厚降官制具官某朕憫死事之孤而官其嗣子葢旌其忠也有欲冒賞者爾乃以身保之罪將奚逃鐫秩一階尚為寛典往冝循省可尤人乎秦琪降官制具官某爾䇿名仕版效命戎行不能檢身至麗刑辟聊從鐫秩勉自省愆鍾志大降官制具官某競逐市利固失於亷隅假貸官金又從而隠諱吏議三尺秩鐫兩階往服寛恩毋忘省愆劉真降官制具官某策名以仕檢巳為先而爾被酒私遊尚氣不逞聊鐫一級以示薄懲往體寛恩毋忘循省柴瑾降官制具官某簿領貴於勾稽閭閻戒於煩擾爾居官縱吏督賦撓民聊鐫一階尚服寛典胡寅轉一官致仕制逹進退之分者可以律浮競之徒篤終始之恩者所以優老成之禮眷從臣之謝事舉彛典以疏恩具官某經術淹該識度凝逺君子之仕行其義早服禁途公家之利無不為備宣忠力出紆郡紱亟佚祠庭遽因疾以引年重憫勞而徇請爰増厥秩用寵其歸顧疎廣祖行雖不及都門之盛方祁奚告老尚無忘嗣職之賢往專精神益介夀考䇿名就列早聨持槖之班引疾抗封力起掛冠之請重違雅尚爰舉彛章具官某經術淹該風猷凝逺入趨清署鬰為侍從之臣出殿大邦綽有蕃宣之譽方即真祠之奉遽陳美疢之嬰篤意遺榮憫勞以事疏恩增秩用寵其歸往祗邦渙之優益遂家居之樂案此首失題附此劉錫致仕制宣勞效命久殫衛社之忠引疾抗章遽起掛冠之請莫回雅尚爰舉恩章具官某結髪從戎指心報國出賈軍禆之勇入提禁旅之嚴家世韜鈐裔本山西之種弟昆勲績名皆國外之聞越躋留務之班亟就真祠之佚比觀請謝惻用閔勞仍兹階秩之華遂爾林泉之樂其慎調於方藥以益介於夀祺王舜臣致仕制委質宣猷方專分閫露章引疾遽欲掛冠顧雅尚之莫回冝恩章之具舉具官某持心謙毖稟質粹温樂名檢以自閑逺驕華之末習視三孤之秩位峻於亞師張六纛之儀任隆於謀帥方奉真祠之佚俄陳美疢之嬰懇請欲歸憫勞以事用率循於彛典仍寵畀於故官遂爾晏私祗予渙渥任鑄致仕制具官某侍宫闈而勤事允為親信之臣歸選部以引年爰篤始終之禮以爾性資恪謹材諝疏通既久奉於宸扄乃願歸於銓品偶因嬰疾力欲辭榮冝仍階秩之華俾遂家居之樂張思正致仕制執戈衛社者知忠義之大閑引年謝事者逹進退之髙致可無渙渥用賁歸休具官某奮身戎行迺心王室識竒正循環之理有撫存挾纊之恩自封爵於廉車丐奉祠於真館遽陳嬰疢力請辭榮冝因寵於故官葢率遵於彛典其專安養以對休光起復徽猷閣直學士朝議大夫利州路經畧安撫使知興元府王庶轉行兩官制勅由闗陜之地通於巴蜀有梁州之區焉德宗迫朱泚之亂葢由奉天進狩于梁而戡難之勲自其地始其風聲氣習之尚冝可概見有能為朕拊循其民申明尺籍以振山西之氣則前人之功斯無媿矣具官某好謀而能斷任難而有成率邊郡之良家興於義勇抗數州之賊氣全我隩區朕方期樞臣成閫外之功汝能為國家建方面之畧雖土門之師未集而陜右之勢巳張冝錫美官用作爾祉念方圖河内之守莫若寇恂成異時淮蔡之功或歸李愬兹益隆於任寄宜自奮於功名可中亮大夫喬仲福階官上轉一官制勅國家有疆埸之憂未能外禦而郡縣有蟊賊之患復肆内陵念非義勇之臣曷勝披猖之勢冝申優賞以勸異能具官某沈鷙以有謀恭和而善斷前者敵人之計欲破江隂汝與將士共遏其勢彼乃敗散一方保全同時立功皆巳論賞汝之勞效不減衆人獨拘常法曾未遷改豈信賞之道哉加進一官是為異數往服恩命益圖後功可楊存中除少傅制朕法黄帝之衛兵任重殿巖之帥稽周官之洪化位髙孤棘之班攷閲嵗以酬勞誕告廷而增秩具官某稟資沈鷙許國精忠援枹皷則忘其身深懐義概挫虓虎而奪之氣屢著戰功總萬營以扈禁宸張六纛而分外閫歴時滋久盡瘁靡他載嘉十稔之勤叙進貳公之次騂旄導節仍齊鉞於雄藩繡斧在裳正朝儀於亞傅陪敦邑采申衍户租以示褒崇以光環拱於戯有功見知則説朕既昭積累之懃執事順成為臧爾益謹凝嚴之護往祗明訓思副異恩韓材起復制素冠三年之制是謂禮經墨絰一時之宜葢當戎事願從權而制義可移孝以為忠具官某鷙勇多謀魚麗著績遽動倚廬之戚諒深陟岵之悲與其處苫塊以居憂慕親何及曷若執干戈而在列徇國為先勉服訓言趣還官守陸謹范勝起復制具官某倚廬枕塊雖懐至性之悲腰絰從戎亦有奪情之禮葢資父事君之道一也爾其起從王事悉乃心力揚名顯親則忠孝兼得矣王􅊛父亨贈太師制勅朕屬時艱虞率巡侯社惟兹大饗之禮敢忘九獻之勤禮既偹於克禋慶宜均於厚下具官某父某忠能事上勇足帥人少服戎行擅勇冠三軍之譽晚持使節有功成三箭之歌燕及後人保兹餘慶爰升品秩之數遂極師保之榮靈如弗忘宜克知享可武畧大夫王俊贈五官勅夫死難之臣雖非有勞亦宜第賞況功狀巳著而身榮弗及則褒揚之典其可後乎具官某昔者狂寇引兵攻䧟城邑殺掠吏民江淮之間為盜淵藪至併師合擊乃始敗却爾居其中處死弗顧亦既忠矣大將計功以狀來上進官五等遥領郡章靈如有知尚克歆享可羅汝楫封父制朕秩三神而拜貺冒四海以均釐矧惟法從之華冝錫顯親之慶具官某積德之厚天假髙年教忠之勤賢稱嗣子兹頒郊渥用陟階封祗予命數之崇為爾家庭之耀義方獲報夀履永綏張思正贈父制朕貴誠質而因天事天嚴陟配而以孝教孝均爾將臣之貺為其禰廟之光具官故父某實浮於名材裕于用少著嚴闉之績慶鍾嗣子之賢肆頒神休以率國典爰陟亷車之峻載昭飾禭之榮尚期爽靈歆此嘉寵康諝封贈故父制供奉宸闈畨休分兼職之掌典司帝輦滿秩有疏恩之常推以及親詎當吝賞具官某故父某早稱勤毖服在禁嚴生陟廉車之榮殁受帥節之寵厥有嗣子能紹家聲酬其尚輿之勞申兹飾壤之禮儀物俾同於三事光華增賁於九原未泯英魂來歆異數贈故母制具官某故母某氏淑惠根性柔恭律身叢然隤祥茂於嗣葉能勤事役克紹家聲酬其尚輿之勞申玆飾壤之禮既正小君之號改荒大國之封邈焉九原歆此異數贈妻制供奉宸闈之宻典司章輦之嚴既滿秩以賞勞用疏恩於厥室具官妻某氏温恭植性淑謹禔身嚴盥饋之威儀謹閨門之法度粤從夫爵載陟階封躐命婦四級之華為端朝一時之寵祗承渙渥益勵柔嘉康執權封贈故父制朕緹室迎陽觚壇展寀既嚴昭配以盡己之孝又均蕃釐以及人之親具官某故父某風矩潔修宇量沖固雖抱藝以不試非榮其身然積德而克昌乃大厥後繄有承家之嗣通予延閣之班越熙禋祠興感禰廟極榮二品之秩用賁九泉之幽尚期爽靈來頋恩寵贈故母制朕率三嵗之舊章崇二儀之合祀貺施荷神靈之賜福釐同臣子之均爰頒慶條用慰孝慕具官某故母某氏柔明賦德法度冝家實生嗣子之賢服在禁塗之列嚮因郊渥巳侈郡封越告成於明禋用載裂於腴壤尚期遺懿式克欽承汪藻贈父制朕貴誠質而因天事天嚴陟配而以孝教孝頋在從臣之舊冝疏禰廟之榮既歴再郊併昭疊寵具官某故父某材韜不試德厚流光大嗣子之承家有懿文之華國屬當精享習卜二嵗之祥爰累慶章飾贈一品之秩尚存靈爽來賁渥恩贈故母制朕貴誠質而因天事天嚴陟配而以孝教孝顧在從臣之舊豈無念母之思既歴再郊併昭叠寵具官某故母某氏早騰淑譽來範髙閎大嗣子之承家有懿文之華國屬當精享不專嚮於蕃釐爰累慶章用改荒於名壤尚存靈爽來賁渥恩梁份郊恩封贈故父制朕緹室迎陽觚壇展宷既均神釐之貺亦愴親養之遺宜敷我恩以錫爾類具官某材裕於用慶叢於家大嗣業之繼承聨棣華而通顯既上儀之丕就宜渥典之申頒進陟亞傅之崇用為幽隧之賁英魂不泯休命其承贈故母制故母某氏惠淑根性柔恭律家叢厥隤祥茂於再葉兹頒郊貺用率國常改荒大國之封追飾小君之號尚期英爽嘉此寵榮王􅊛故母馬氏贈慶國夫人制勅具官某故母某氏儀于中壼早著令猷惠及小星葢由淑德實生令子為予虎臣雖弗逮于身榮豈遽㤀于追報易名大國用侈餘休靈如弗忘尚克知享可王􅊛繼母向氏封秦國太夫人制具官某繼母某氏柔儀可則令譽有聞生於世家作配君子惟内黄湯沐之奉巳啟舊封嘉秦川陸海之饒載開新邑益膺褒寵永綏夀康可王􅊛故妻令人趙氏贈碩人制勅具官某故妻某氏夢蘭協吉載翟有光以鳲鳩之德而居鵲巢以采蘋之誠而荐行潦爰嘉有禮乃命疏封益修中饋之儀助成分閫之畧永祗命服勿替訓詞可王舜臣贈妻制朕測景迎長竣祠拜貺既孚渙號以為爾姻戚之寵又沛湛恩以閔其室家之亡具官某故妻某氏法度柔嘉言容靚慎發自華緒儀于名門早銜恤于鼔盆屢疏榮而飾壤屬頒郊渥更侈郡封邈其九原歆此異數師敏轉遥郡刺史誥勅具官某七閩之區素稱無事比年以來盜賊數起至遣將輔撫戎乃稍底定夫戰克之難如此則凡斬將搴旗之士可謂均有勞矣爾前者躬率師徒冒涉山險不顧必死遂擒渠魁上功自言備見成效進官一等遥領郡章益圖後勲朕不忘汝可端明殿學士左中大夫提舉亳州明道宫顔岐復資政殿學士誥勅具官某才華夙著德厚有聞清以善容剛而不犯譽既髙於奕世學自名於一家昨從艱難累更事任揔北州之師律士聽無譁從南國之征行人心胥悦㑹敵師之侵擾致淮土之繹騷先事而圖曾靡聞於奠國見幾而作何獨善於謀身俾辭機政之勞姑就祠宫之佚念巳更於積嵗盍稍正於崇階一沐新恩遂還舊物惟始終之厚遇豈替朕懷若左右之具宜其享汝德可端明殿學士左中大夫提舉臨安府洞霄宫李邴復資政學士誥勅具官某從容而能斷剛毅而用和自奮材名屢更華貫旋司政柄備罄忠勤惜未濟於艱難遽請從於優佚嘗因旁累遂坐鐫除念君臣通宥過之仁而兄弟無相及之義固知王導初不與大將軍之謀何待祁奚乃能免羊舌氏之難已陞華於祕殿復進叙於崇階葢朕之待臣初匪有疑則臣之報君亦宜自盡往肅祈於明命其益勵於嘉猷惟予藎臣勿煩多訓可邵溥復秘閣脩撰誥勅朕遇災而懼廣求其端爰疏渙恩大賚羣品冀迎善氣以享天心而況勤勞之臣尚嬰譴戾載加申叙其可後乎爾文學之富為時老成政事之優見於巳試自登禁從名重本朝屬時艱虞未究施設嘗下鋒車之召益勤仄席之思即將邁於逺猷盍稍還於舊物升華芸閣寄佚真祠雖在逺而弗忘宜體恩而圖報可李弼孺復直徽猷閣誥勅具官某爾世濟之美為時名家臨政之優所至稱治既屢更於煩使或稍致於謗書對仗自言何乃果於用辨投章而去是亦近於弗思念既歴於嵗時亦屢更於霈澤巳起真祠之秩仍歸延閣之班勵汝忠嘉服我休寵可罷吏部侍郎落職提舉宫觀誥侍從之臣義當徇國謀身既切理必背公肆癉朋比之徒用振公方之氣具官某頃有舊譽擢置諫垣察其陳説之詞謂絶附枝之援當羣情之交煽委正道而弗行汝宜為朕闢大公之塗朕亦恃汝為衆正之望猥自同于新進諒有愧于初心隂交臺臣為嚅囁相親之態致身從列忘逡巡自好之風姑褫銓曹之聨往即祠庭之奉是惟茂渥其務改圖可李光落職提舉台州崇道觀誥勅王道不明士以私義自髙其於君臣師友之分不知權輕重而行之用失其叙者多矣夫吕祿之死劉氏之所以安也而酈寄負賣友之謗使寄納忠於祿則吕氏之禍豈易去邪朕方欲息邪説詎詖行放淫辭以正人心有失厥叙可不援而正諸具官某頃者大姦在位持權日久學士大夫始皆惡而逃之及其中也不能無疑又其終也乃反變而從焉此由道術不明而私義得以勝也爾自服官箴即思自奮其視州縣力抗回邪可謂義形於色矣至大姦久而弗去亦復變而從之何也靖康之初條具宿惡明示天下汝當言路自同寒蟬豈亦君臣師友之分不知權輕重而行之者歟嗟乎范氏勢盛商邱聴移董卓云亡伯喈興歎此學者之大戒也其鐫要職往食真祠求汝宅心服我明訓可廖剛先次落職誥勅朕臨朝思治仄席求賢士有一善未嘗不悦而進之惟恐其不及也在廷之臣亦宜精白克承朕意庶幾共濟以底丕平其或詭行敗德務規進身豈朕用人之意哉具官某始以操守見推鄉閭中嘗宣勞以綏盜賊使者獻狀朕意嘉焉故自造朝曾無幾時而循致禁從朕之期汝亦云厚矣而乃柔佞回邪喜為附會朕既失望汝亦奚顔其鐫美官稍正其罪尚體寛渥毋忘改圖
