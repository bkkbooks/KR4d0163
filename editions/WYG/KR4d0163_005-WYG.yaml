body:
  text: 東牟集巻五宋王洋撰七言律詩酒熟未酌鄕人次第固未及伯氏伯氏因失酒以詩謫之謹繼韻解嘲滿盎濃薫靄緑雲可憐珍韻不長存病妻功罷初嘗液壯士酣餘更破樽千日留春傳古昔一宵遺愛有缾盆明朝試榜揚雄宅恐有壺車忽到門謙仲好古擕酒見過伯氏以詩謝之次韻我生南北本殊津邂逅相逢若聚蘋故納破愁成一笑應憐對影只三人居嫌共邑猶分袂醉覺同心只異身送客溪邉一惆悵新歡過眼又前塵次蘋字韻即事飄零何處是通津陸有飛蓬水有蘋賦禀但隨升斗禄姓名常後百千人趨炎未肯施先足耐冷何須便曲身祗有鳴塤恐難繼此心端欲避芳塵伯氏再以前韻即事復繼韻問宅無成復問津青衫長是照青蘋生涯異日知何地性命如今正屬人螻蟻命輕難報國蟲魚買絶拙謀身五年湖海成何事只得冠纓不染塵伯氏以詩投郭謙仲叙未相過之意次韻相過何日買輕舠十里思君奈鬱陶莫謂逺煙迷野樹且看飛絮舞江臯難追競病傳清晝且合亡何引濁醪除却醉鄕岐路穩人間無處不風濤髙民瞻以前韻作詩因酬釣叟生涯止一舠興來猶復醉陶陶知君自欲營新築繼世那聞有舊臯野性素來便野趣春山唯恐欠春醪果能過我論文字且擬張帆看怒濤民瞻再作詩復以前韻酬之報我新詩疾轉舠論文始信頼薫陶追風定見驥千里鳴野今聞鶴九臯看劒為君傾薄酒張弓何日畏春醪不煩更問珊瑚樹舊繡年來拆海濤和伯氏徳清道中解組歸㝷梵釋宫帆風舟轉疾飛蓬棠隂留付長江外山色収來數筆中聞說笑談供燕席有時魚鳥襍籖筒豈唯政譽歌􅃭袴文字由來繼古風伯氏臨江使君寄薌林次韻力盪橫空萬斛舟一函酬唱紀川逰篇篇秀潤東南竹落落珠璣小大鄒人物百年同富壽客懐千里夢逡遒主人合作鯨川楫無奈髙情寄一邱君王勸駕一輕舟賜履西江飽勝逰井邑詩書今化魯春秋盟㑹不書鄒詩中侯印知無分筆下尊拳勿太遒快讀新章與神㑹蠧闗門掩夢經邱和伯氏松竹窻邉拂簡書芙蓉水伴戱龜魚鴈行千里時一徃蜂得一房聊共居千二百年形骨健三十六計米鹽䟱齒牙缺落無衰病慚愧當年謝㓜輿又眼見羣兒倦走書明瓊忽報漲雙魚造端萬緒自成室迷路多岐要卜居談氏龜兒門相在微之道保曉星踈願翁壽考貽孫子文有千箱德有輿次曽吉父韻憔悴非同十載前旅酬那復似初筵蜜房羽客非無課木局枯棊亦任縁得酒且思陪笑語著詩終欲共林泉北壇居士新登拜租得茶山又一年曽吉父出示和鄭固道病中詩次韻行藥蕭晨放歩遲嘯臺秋色飽秋時樂天何意病為伴樊素不収春自隨舊雨故人頻問疾茅君使者净窺棊拂衣身徤丹楓路積壓風光剰費詩吉父用晁恭道韻作詩謝同㑹次韻蒲栁先衰祗自驚静思前事似前生力侔元氣推先覺醉打愁城堪一行求援援暌縁富厚鼓宫宫動亦虧成㑹當載酒論竒字日暮江天得細傾曽吉父以詩招客次韻醉吟居士桃李曲忠孝相家鸚鵡杯情隨蘭畹碧香注詩送茶山煙雨來溪邉官栁意欲盡枝上海棠紅半開不應物色相擕手驚喚南池春夢回和吉父賦隨字韻此生休戚已前期命薄天公不可移一飲且同今日醉數篇曽見古人詩青山招我成長計白髪欺人亦太癡莫與老翁疑甲子當年猶記㑹沙隨和吉父示送别七言景物隨人也解愁年來諼草不忘憂微官自縳敢辭冷倦鳥縱歸何處投一歲又聞禾黍熟百年惟喜甲兵休人生佳莭眞難遇莫惜重陽菊滿頭和吉父還谹父詩病折丹心一寸灰猶憐花月照雲罍碧腴既許投交分黃菊從教却放開上客醉時花婀娜綺筵歌罷月遲徊集韻徊通作回白頭賀監頻三請好客從前招不來和吉父贈谹父詩瘧有黎邱競出竒操矛不報主人知問渠去處終無定與我周旋便有期貧似淵明猶愛酒瘦如工部只縁詩但教酒入無功社何用詩稱國士為和曽谹父簡吉父伯南坡栁徑桃蹊草色新一年春半又侵㝷無情燕子疑巢冷多怒鳴蛙互目禁滿眼為花留色艷轉頭遺我是清隂莫愁艇子芙蓉檝且聽拏音作好音和谹父小雨秋凉時豐報祀拂黃収共說金穰更㡬秋來歲方在金樹染烟濃山着色月臨天逈水明樓盈囷黍答三時力七字詩銷萬斛愁飽飯哦詩醉山月不妨歸老一扁舟和谹父擕家南坡期以招客日日㝷春春未休髙情可是愜風流詩如濯錦江波色身在浣花流水頭行想袿裳分襞積晚因魚鳥得遲留草堂費盡無人寄悵望前溪獨自愁答秀實見招此身初不敢圖安老去偏憂行路難欲調舟車難用法偕行僕從只宜寛已持食節多虞病嫌重装囊少慮寒且替疲兵充守宅詩成莫惜寄來看秀實監丞復寄二篇譏商彦不至亦微見及因次韻案此詩二首其一見七絶折除官職是聲稱利達文章不易并聨句毎容分短韻五言今始見長城將軍莊畔傷沉甲處士廬邉笑盗名我欲抱鋤歸問婦揶揄未許餉春耕和嘉仲秀實九日詩幸分微禄飬閒身杖策登髙擬令辰貧愧减員招酒伴閒多債數得詩人不辭眼見黃花舊却恐花驚白髪新人道二䟽賢父子我疑文采是天倫次二兄韻短莛投迹類蓬麻何似差吟得當檛藏跡豈期今脫死迎軍㡬處早分髽池塘帯雪猶涵溟林谷先春已豁谺莫謂寒荄更無分春來也解露雙芽僕近還舍以一篇餉秀實䝉以兩篇見酢謹用前韻再酬一篇春行日日度芳林僧夢囬看午轉隂閒喜林塘多静態忙輸蜂蝶見花心三杯酒後逢人醉㡬首詩多取意吟慚愧孟郊三百首何人收拾薦薫琴和周秀實用前韻老知白髪媿花林望絶華筵繼晝隂病與物䟱鎖火性貧知分薄更灰心春收紅紫如辭客風入松篁得伴吟莫恨蔬盤欠何肉文園病渇只因琴和周仲嘉再示三篇舊日衣冠說武林風流曽不减山隂百年人物千山秀萬里功名天下心族姓人人誇盛事溪山處處稱髙吟後生欲聽清商曲莫學無絃只撫琴花有芳叢竹有林春來各競趂光隂妍媸等是目前事冷淡方知異日心十二里山長隔面一帆風地每傳吟髙山流水人知否緑綺牕間自曉琴長篇大軸勢如林慰我窮愁正結隂數首娯憂兼寓物㡬人對面便知心多求筆吏供濡墨剰買筠筒給浩吟閒靜心情如此少能聽賀若是知琴秀實再用前韻惠詩再答身似鷦鷯寄遠林仍將病骨卜晴隂有情縁墮有情法無處雲知無處心棊對僧牕時自縱詩傳人口不堪吟感君裁鑒多清賞收拾焦桐㸑下琴右答見贈聲馳南國秀千林逸氣終疑困華隂病任燒空不燒火詩唯傳句不傳心當年宗魯江西夢異日睎顔洛下吟直把風流付邱壑真如封鎻匣中琴右答自述和知字韻二篇春來秋去鎻煙扉此境人間不易知强遣憂愁湏藉酒巧傳消息却因詩生縁有累難除藥性本無為不用醫苦樂從來略相對乗車湏記飯牛時右答解嘲全無客到掩庵扉冷煖心腸袛自知貧欠飯租難乞米午虧睡課且裁詩已傷刄自驚逢敵多病人難更說醫强半工夫付詩軸獨慚騎吏立門時右答寄贈和秀實扉字韻柴車朝出莫柴扉麋鹿情通麋鹿知寓目每因思舊約破顔時幸讀新詩妻兒債負真寃境祖佛因縁即妙醫救火抱薪還止火只嫌虛幻沒休時奉酬秀實報章外以前韻示謔且聞灼艾次韻早衝料峭别巖扉惜别音容意自知道上每因同客笑篋中常恨少君詩飽参靜定推先覺苦炙虛空得下醫菽韭盤空春睡起伯仁還遇火攻時和仲嘉示秀實去秋九日失歸期今度花前又過時喚客便宜傾鑿落與誰同伴挿酴醿新甘未厭松江鱠敏㨗先酬季父詩莫道野翁無食品葵羮爛煑亦偏宜和秀實答仲嘉未春先以約春期載酒如何却負時遥想醉狂哦舴艋也知歸客趂􅙐醿阿瞞氣懾周瑜陣樊素心貪白傳詩橫槊賦詩俱占却據鞍矍鑠正相宜和秀實十風九雨一春除散緑留紅證夏初心事自應隨念遠年華未省向人疎欲開胷次猶湏酒泛若因縁却為書飽滿盤天乆無望良規真恐在汚渠和秀實寄尹商老見訪二千里外命車輪慰我言詞字字新自向江西逢隱吏方知物外有髙人頻將篇什收風月怠整形儀作搢紳相對茅簷終日語從教人道是沉淪再和答秀實紅剥芳菲緑作叢遥知惆悵兩心同結交舊燕多情語消病殘花無用紅獻計欲居塵境外投名且向酒壺中新來但覺多新様不道襟懐盡古風老境看來亦悄然方知世味有無邉忙中受用非闗我静裏風光總是禪易原缺常叅饑後眼酬有案酬有二字疑誤只有飽時眠周翁百事多恬退詩律從來不受憐和秀實别寄二篇世德聨綿自漢朝元功當日說蕭曹營分細栁威名重笑指飛煙量度髙文挾素勲誰與敵詩推餘事尚稱豪了知三阮逃名乆恐被名牽未可逃香火社閒棊度日溪山伴靜酒為年碧霄鶴唳詩情逺湖院僧知茶夢圓謂二閒叟常喜春鉏行佚老每嫌棊路尚爭先平湖草岸經行好後夜延縁刺釣船秀實惠簡問閒居消息有滴水滴凍之語以詩報之氣血扶輿夢幻身用多補少不調匀如今滴水滴凍客便是貪花貪酒人髪白容衰爭早晚官榮家富費精神空花若解揩摩盡方識人間一笑春晨鐘齋鼓住僧園縱不陪堂已一般恐為因縁略相似若無消息自難安樂為苦本宜先戒病是良醫要好看為問爐香經巻外有無塵妄更相干得丁執中書和前韻依用韻一首履堅抱節有誰如本為書窮更買書命欲問天何厚薄貧多聞道是乗除倉箱粟帛常虧課庭户芝蘭獨獻餘氣味如君略相似只論詩律媿空踈趙筠州惠書賀冬道予得宫觀訝乆無書且勸滿泛壽杯及問老妻安否筠陽太守舊知聞筆力清新思不羣泰道自當隨紀厯蹇塗何用慶書雲杯中㫖酒衰難盡牀上愁妻病未分故向琳宫同寂寞一爐香火伴清芬杜倅再示前韻繼之慚愧詩筒數徃回自嫌局促困駑材塵蹤已挂舊官壁妙語猶隨新雨來好客共謀良夜醉養花長得四時開知君客裏猶行樂端為襟懐不染埃不惜分餘為借光情同結客少年場誰知親拜六篇語全勝遥聞十里香自嘆滿頭頻獻白敢言三爼欲懐黄一缾一鉢煙波裏徑入苕溪向水央再酬杜倅兩詩用前韻報道春風莫便囬少陵凖擬作詩材公然背我堂堂去略不隨人得得來花占三春官已滿河専一壑幕初開已知風物長流轉得舉朱絃且拂埃昨朝珠玉已爭光再轉旌旗再擅場景物歲時俱婉娩徳人言語亦馨香歌風燕子初爭語藏栁鵶兒學畫黄牽率賡酬無健句鸞聲只合聽央央楊先寄安仁因簡熊叔雅趙令并次前韻三年築冶困塵迷且拂塵埃下錦溪客子雲山無定宅令君桃李已成蹊閒情聊賦籬邉菊快意湏分物外題粉署仙郎卧江渚相逢莫惜醉如泥葛祕校和予闗字韻詩兩篇再以一篇奉酬數州形勝共鄉闗江浦淮堧一望間長恨﨑嶇千里隔那知邂逅兩身閒稻粱要足㡬時足閭井欲還何日還猶勝拘牽名利客心無一事看春山沈大虛以丁求安韻寄兩篇次韻案題稱兩篇詩止一首或沈所寄者兩篇同韻故止和一篇也長淮千里擁雙旌攬轡曽聞志已清槐市早年先走譽橋門多士羡蜚聲山長靜黙溪長緑人有豪華物有英早趂官閒剰㝷賞它年車騎不單行子楚寄吏報章復用前韻再寄一篇長湏晨送一函書語不周遮意有餘雨滿一犂知過望草開三逕喜如初黄魚白酒江頭市緑竹青蒲隱士居病後世縁多懶惰相逢詩酒未全踈和趙倅兼善觀徐園詩雨闇長亭去驛賖褰帷那免歎年華應縁問俗頒温詔却得名園看好花晴入郊圻初浩蕩春隨杖屨得津涯仙郎不解收珠玉别乗歸時載滿車再次前韻堆案文書不用嗟新詩字字說芳華題輿事省時眠草綸閣文髙合判花莫待春歸空悵望湏知醉裏有生涯如何為向邦侯說整頓清明載酒車厚載王君求僕賦寄閒齋詩又欲僕作晚實此君二詩皆未果惠然枉佳篇甚厚非老鈍所及聊次韻奉酬布鼓何堪付阿香平生癡絶亦長康曲成下里安知宋䟽就中郎不姓常厚載詩及僕近奏封事然孤逺無援助非有常何為之先容也未許芳馨依杜若遥窺光怪識干將秋風一水空相望留滯何時貢玉堂和徐思遠韻㡬葉文章開一花布裘中句已名家無心於世苦亡頼生子如郎定可誇行矣齋房思賈傳莫將髙論詆王嘉㝠鴻一去自千里寂寞沙村只望涯和滕宰與徐思遠徐莭孝先生之子故國愁來有所思那堪更讀四愁詩令君術業輝千古處士才名冠一時醉後嘯歌爭氣燄閒來履屐共追隨詩豪酒俠方推重野客何知但朶頥和徐思遠歲除節物催人莫自悲開顔且喜㸔君詩飯抛宿歲因輕棄酒為迎年故重違照鏡不收寒鷺影藏鈎新與少年期何湏直待東風醉紅燭花前且滿枝徐思遠出示月夜登樓詩句法甚髙不類平生語幸少卑之在我軰中自不失為社頭且使時見一斑也㡬處澄輝㡬處秋好閒時上水明樓誰憐老子風前興為遣中郎醉上舟一帯橫空長漠漠時看飛棟影悠悠今宵踏月歸時節莫罵徐郎只暗遊李尹叔知丞借華嚴于仙山子楚以詩道其事李有和詩因以次韻與君淮浦接鄉闗聞道忙中也自閒身似浮花真客宅心歸實地是家山牕明篤耨朝烟細榻靜籧篨午夢殘更問前生李居士南行今到㡬人間和張中大天作長綃玉作圖恍然身世在氷壺歲期共飽如頒粟瑞要均行勝得珠未辦五湖揚短艇且謀雙鯉喚長鬚清朝不要培芝菌正好稱觴頌正符憶昔開元夜宴圖錦為方丈玉為壺但誇北里樓吹笛誰問長安米勝珠事去牽連難雪耻愁來陪奉長霜鬚兎園巖穴皆時彦一斗青精過刻符楊仲承祕書蹉跎三年今得榮州文學冬日貽書以詩答之昔年曽嘆小差池官帯榮名自有時二火並光君有漸一茅覆屋兩相宜心田自樂縁知足世路無求亦少思好是一丘藏曲折也無鄰里共追隨節日同兒女小集倅有詩見戱答之白首相看一病妻也能舉桉與眉齊誨兒共織龎翁竹飬氣多慚紀渻雞作惡不湏嗟室罄驚魂長幸脱征鼙團欒欲說無生話試借先生刮眼鎞和江如晦蕭寺姑分一日光人生同調穩相當空齋夜語規前哲帯酒論文恐老狂三獻三休真琬琰一前一却笑螳蜋君家江左才名舊㑹向長塗一振驤婦未生兒先製名人生適意但隨情有無何預它人事輪奐當期異日成收拾功名湏義勇較量得失是心兵鄙文不用量輕重乆已無心羡世榮和黄朝請謀身學業愧淵雲急退還慚谷口真可是有生同冗長真成無補費精神抽簮早覺宏圖遠側席時聞妙語新共道徵君似顔子升堂今日見詩人極目關山不斷雲嶺梅開處若為真沈迷簿領政無術展拓詩章筆有神夜市鬻茶如訪舊曉粧吹頰自爭新長溪西畔煙霞遠聞有風光屬主人和方丞觀棊詩兼戱戎琳二僧㑹得頭頭理趣微此如未㑹即傾欹試看一路爭先着何異三乗占上機但使無心湏百勝多因弄巧䧟重圍條條白黒分明路苦被旁觀指是非和吕令見寄莫話艱難徧九區門前咄咄尚堪沽眼中寒暑頻傷鴈閒裏心情要憶鱸政似釣璜歸大老詩能引士愧非夫暄風暖日明年事共樂烘春造化爐和平甫八節灘頭老醉吟年來愁也不勝禁湏知到處難忘酒有意來時且抱琴欲與君游忘世慮若非吾事莫闗心相期早晚塵縁外共訪毗耶聽梵音和謝方智善瀟湘十畆弄柔猗獨染啼斑事已竒但愛波聲鳴犖确不湏蠅翅避琉璃莫疑山路﨑嶇險解脱繩橋性命危慚愧平生竹上座得相隨處毎相持和聖求桃花人靣共春風人去桃花自笑紅撩亂絮飛春物後依稀雲散夢䰟中鶯遷是處皆良友蝶化知誰是主翁莫訝求仙杳無信賣花人過小橋東和叔頴楮衾自顧生來骨相屯不容强覓綵衣輕榮華地位無多子寂寞因縁已半生我擁素衾方自喜君貽組句遂兼榮書牕對榻仍揺腹誰道挑燈夢不成酬凌季文過楊仲誠慢緑遲紅靜不爭小梯斜倚上空明日篩竹影花奴睡人度禾場吠犬驚散帙未甘書效晚携笻獨喜病骸輕排芳穿宻多幽處後日相期子細行和朱祕校惠詩了了臞儒說舊章三鍾初試楚金良當年尚老君方壯此道催人意已㤀懶逐肥塵規冷炙甘同貧女借餘光誰家春草能終惠惆悵還同病乗黄短檠燈火㡬經秋古遠人踈道不侔可惜詩書架三萬不如奴婢橘千頭顔回賦禄唯簞食林類當春亦破裘見說老人懐舊事夢中吹笛更能不和呉朝議邵武小說風烟已自佳前峯矗矗為盤牙千重巖壑名卿宅本郡名公多居山谷一簇樓臺刺史家自媿虛涼無物望難將術業向人誇所聞政績刋金石刻畫無鹽學篆沙自是天公亦厭艱十年戰士好休閒胡兒弓射燕陲月漢將心馳海上山慶事頻聞輸帝府好音傳落到人間丈人自是朝廷舊早趂鵷鸞入近班謝運屬秘書惠詩雪撲征鞍岸漲沙不辭天闕去程賖江梅笑處人為客仙桂香時鴈到家秦地少年應辦酒江南詞客好酬花錦衣綵仗還鄉路欲訪萍蹤問釣槎謝邵武危秀才惠長牋湏知秋日勝春朝一鶴凌空振羽毛滿軸文章慰衰病十年燈火困英豪良醫先為肱三折合負終看釣六鼇鄭老襟期幸同調新詩時與寄亭臯以越箋與三四弟有詩次韻無復花生拙筆頭一生長負剡藤羞過門多是陳驚坐得句誰憐趙倚樓社友書來頻寄語山翁鬢已不禁秋老干仙去吾宗冷有繼華星一字不謝吕令子卿雪中遣人惠酒初令人置酒于祝舜俞吕令以酒為惠云也知謀醉勝謀閒户小都忘滿腹慳晚得麴生投老伴長邀玉友訪空山初貪雪裏香宜倍忽報缾中酒自還全勝朱提雙飲盞親教從事送酡顔王提幹送雲安春色以詩還酒尊萬里闗河未說長亡何鄉是醉中鄉客居江館當炎熱春日雲安逸色香沽水童奴思給酒乞錢司業更傳觴藍橋不用鴛鴦語只合壺中貯玉漿陳長卿凌季文自弋陽寄酒麴以詩謝之六十行年兩鬢蒼興來猶愛引杯長黄翁壚下山河遠酒母車來驛傳香碧落侍郎燒鼎訣粉闈仙客駐顔方三斟夘飲心無事一枕亡何是故鄉曽法師嘗寄蒲萄追作一篇自分蔬腸甘苜蓿􅄼煩遠騎送蒲萄青條自有悠揚勢甘液多因灌溉勞坐見滿盤堆馬乳全勝千里惠鵞毛病來苦不勝杯杓今日思君飲濁醪曽谹父惠黄龍菜朝日團團上碧峰蔬盤牢饌四時同園供小摘添幽事雨打寒菘帶晚濃可但拈香參玉版直湏進歩禮黄龍溪堂炊甑容千客不打闍黎飯後鐘挽向伯恭十里林花帶月蘿壠頭車馬斷經過可憐人物今如此試問天公事若何籬下淵明惟酒菊舟中范子任煙波璇題金榜垂霄漢千古榮名定不磨絶代風流世所希如公真是命難推三辭令尹髙前哲兩挂儒冠當盛時丞相耐官天語貴左師習禮楚人知試看流慶當何似滚滚長江不盡期挽徐次翁仁義功髙澤子孫衣冠由是古王門位升五品鵷鸞貴政在三州民社尊一旐豈期江漢遠千年惟有徳風存了知大末淵源在功業臯䕫付後昆自想溫容耳誨詞他鄉已恨重分違送人作守乘軒去結草為靈象俑歸㑹合只如風過燭花隂何異月澄輝相門子壻諸侯服除却清名百事非挽喬民瞻案此詩二首其一見五律楚鄉槐市憶當年錦繡文章六藝先朱紱哀憐應有在白頭故舊各淒然修文地下埋英骨遺愛江城付綵編造化於公意良厚不教丹旐渉長川挽向倅案詩二首其一見五律耐官丞相山河業靖國簾帷社稷勲四姓風流傳學問三朝潤澤慶來雲重車折軸人何力積閥傳家子有文史筆它時汗青簡左師家譜紹清芬王侍郎挽章案詩二首其一見五律當年幕府拜英逰十載烏絲換白頭城郭俱非前日夢闗山如舊一天愁詩人已作潭移影徃事休論江自流物色佳城閉何許西山凝望不勝秋挽玉山詹教授鶴髪雙親歲月殘既霑三釜即心歡廣文未脱一官冷范叔寧忘昔日寒文中八科名益重魂歸千里命尤難後生它日思風範只向傳銘石上看哭周秀實餘英初約轉舡蓬二載廬陵郡課同官簿縱居時俊後詩名舊列昔賢中三斟屢酌前溪月一瞬曽帆下渚風千里音容從此絶夢隨江水逺朝東翁來謂有世間情翁棄人寰一葉輕白玉樓成金闕峻歩虛章就紫霄清笑談烈燄懐飛壁寂寞空潮自打城大筆如椽石似玉何人為與説平生哭宋文淵清懐凛凛古人風尚憶當年語意同開口劔鋒初論事歸林弱羽已傷弓累朝因革襟懐内四海悲歡指顧中寂寞門䦨感恩客曽將頑質謝磨礱藹藹聲華動帝宸一時車馬走芳塵文如屈宋才仍富心似皋䕫道已醇身後功名因報主生前勛業為憂民知公本意安劉氏不許身危更累親哭沈行彦宫教氣逈神清形骨立藍綬紆腰垂四十年侵運櫛髪蒙絲日晩煮黎羮不粒教司胄子禄方來日薄西山風已急平生失意固多端忽向幽泉猶飲泣挽黄夫人向奉使姻家陳長卿姑黄簿妻官棲枳棘莫消魂身託絲蘿在徳門三后姻聫門户重貳卿閲閥徳名尊傷心結蟻靈轜逺保室鳴鳩道化存為問如何慰㝠漠飽聞中外有蘭孫挽楊承事并夫人詩二首除却家傳教子經世間百事不營營自應藝學推前輩故得風流勸後生疏傅揮金終足食徐卿有子自成名後来若不流餘慶真享千鍾亦未榮夢協幽蘭故可誇來從君子更宜家疏恩自合開新邑比徳還應副六珈解使威儀同詁訓聊隨輕薄事鈆華自從瑶瑟初扄後檻外春風懶放花哭孀嫂徐仲貴先生女文章夫子才難盡孝弟人言報自賖四事先生俱擅世一塗後裔不傳家嵗當豐暖偏寒餒朝正歡娛獨歎嗟報施若教長似此㡬人守道不回邪雙眼失明二十載一身病卧四週年俱生孤女眼前死諸御四兒姑幸全徧厯人間真苦惱畧無身後好因縁靜思四十六年事一夢三生業夢圓目疾天公嗔我眼長白故著昏埃阿堵中不怪參軍談瞎馬但妨中散送飛鴻著籬令惡誰能對損讀方竒定有功九惱從來是佛種㑹如那律證圓通和李商隱賦紅梅公主簷間睡起時勻紅行繞大安池北人未識春迷眼妃子偏憐酒入肌更若施朱疑太赤不須生女白如脂由來風骨都相似豈為丹青别賦詩梅蕋年年破臘時玉花飛舞集鸞池獨将艷色添真色任爾冰肌映雪肌帶恨不妨紅作淚洗粧終見白凝脂可憐渠有風流句只作歌詞不作詩和方智善兩色梅春到冬餘去住間玉樓無處不輕寒鮮鮮魏女履下履粲粲真妃冠上冠眼亂互揺歌扇羽心驚添著粉闈幱東君厚薄非無意一種馨香兩眼看書忩梅花數枝病起再見缾中盛開因作書堂籬落冷如灰十日相忘亦自猜初訝凍枝無艷脈那知寒室自花開銅缾結實元非種蔀屋迎春似有媒方信陽和滿天地不須人力費根栽貴溪尉㕔黄梅盛開濃香豐艷非凡品可及尉坐此速招客因成小詩戯之歌酬花意醉酬春笑口相逢可厭頻不飲正疑花怨客典衣莫聴婦傷貧天生尤物非為福蚌有明珠亦累身墻裏佳人墻外笑冶容招悔豈無因觀瑞香杏花二首陌上春風已半酣薫籠院靜怯輕寒織成花錦傳香密養就嬌羞對客難山路不知清夢逺宫衣猶惜舊花殘若将品第分髙下湏向芝蘭格外看瑞香絳萼紅顋帶露肥燒林長近禁烟期且容北郭通鄰徑若比南枝較發遲曲水岸邉尋舊事賣花擔上揀繁枝香韉一色垂楊路何似吳王宫裏時杏花和陳長卿賦芭蕉落落虚懐好自珍一畨舒展一畨新揺風捲起窗鋪月滴雨驚囬夢愴神荔子丹時陪獻豆丁香結處共愁塵本無顔色爭韶艷野老由來不怨春一幅青天世外珍詩人得句共清新書生几上側理紙巫女廟中巴峽神長恐天寒慿日暮不将翠袖染緇塵世間荷葉并蕉葉不與紅芳競占春賦洞庭柑兩潮船上别蘇台嵗厯侵人鶴化胎霜實可憐今入眼佳人何日問重來黄金丸逐驚飛肉白露團凝别恨腮重待扁舟落吾手為君先報栁郎回谹父得洞庭柑分送往往難遇賞者因成小詩緑玉波心聳絳台丹霞道士日傳胎仙人不惜黄金貴海蜃遥驚驛使來玉食光輝天著力主家春色雪融顋手中三日香猶在不是吳姬乞打回谹父出示趙倅木犀詩次韻黄姑斸月種文犀落向三秋月滿時巖邑疏封兄弟國銅缾分派子孫枝漢宫明艷塗嬌額仙鼎珍丹散漉籬好趂燈花同報喜黄間金粟正相宜趙倅兼善再用前韻賦木犀物外家風本自竒人間獨步九秋時誰登月姊青霄露折得郄詵丹桂枝韞玉巖扉通户牖蕋珠花殿徹藩籬淵明不共真香醉只與黄花作便宜茶荈蠧闗草掩日蕭疎自汲寒缾煮澗蔬早愧空腸添雪乳何須雜珮列瓊琚往陪雪繭千重貴顧試鈆刀一割如風露滿樓人未散小窗應為賦歸歟龍涎香搴露紉荷楚澤舷未參南海素馨仙大門當得桂花酒小様時分寳月圓詩挾少陵看妙手犀通神物為垂涎使君少住幽蘭曲時傍顰山照鬢邉
