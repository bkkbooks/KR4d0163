body:
  text: 東牟集巻六宋王洋撰五言絶句得丁求安書云叠石境于溪心嵲然如江上之磯作二詩戯之心重吳山老天教閒許長事多因醉遣心半為山忙立石標溪界䟽荷限水香此翁三十載㸔了㡬人忙梅隔濶已經嵗相逢不置辭情如淡交乆處士合吟詩勝韻難齊俗清流不受渾豈應踐期約獨自愛黄昏六言絶句和固道韻問谹父小疾木落亭皋逺思踈簾清簟棊聲閉門十日知否風月愁人敗盟舊傳傳箭聊城海内羣工舊名况有文章老伴朱顔碧落仙卿惆悵休尋舊事酣歌且數前山待君蒼蘚重拂相逐寧論興䦨七言絶句幽園即事屋頭積雨漲春雪舍北夭桃堆暮霞細雨斜風妨病起牕間把玩數枝花籬邊楊栁似羅敷裊裊娉娉十五餘無頼風光相料理忽㸔柯葉可藏烏殘梅依草遣愁盡細草縁堦滿意生莫道中年春思少每逢佳處眼偏明曉牕晴哢丁寧語晚樹幽花委曲香散策尋春不知逺片雲作雨度回塘遣興老如認老應無病貧要安貧可免憂貧病欺人須服弱嗔拳笑靣却應休遷學闕里荆榛一掃除文明猶是舊規模要令多士充庭賦能識邦君此意無聞詔下示兒姪一封丹詔聘儒林裋褐書生競拂衿發憤正須先賈勇莫教空望狀元心焚黄誥伶俜族緒不堪論兄弟相持老僅存方信有生同造化君恩猶得賁丘園徐氏幼婦以花獻几筵婦髙甥也前徐愛孝世相傳日薦珍嘗不計年便合一生成婦順旅酬今始見初筵近陋室以斗升釀家婦謂予未飲不以見告昨夜偷兒入室挈二壺去自此室中又復索寞今後酒熟便呼近隣痛飲遇夜守視庻大家着力也呈諸兄兼簡士修思逺斗米蒸炊入小罌未應消息到比隣靜思懐璧真成罪恐是糟牀夜滴聲寂寞茅齋晝掩扉著書還原本缺易招譏固知不解論竒字惡客何須抱酒歸吏部真堪上罰觥甕邉都不問公榮平明挈榼出門去應笑童奴鼻息聲再繼士修三絶直造門來誠有意不持金去似全名端疑解習叔孫禮竟酒曾無讙訟聲一身何適非真盜淺識常虞世俗譏我欲似君専盜酒常謀卜夜不謀歸主獻賔酬卒舉觥禮成賔主不遺榮自慚館客殊無禮終又不聞食器聲兩小人相凌負擔相随語笑同不分强弱便相攻若無三尺齊民律曠野何人是長雄問訊東霞李師烘林日動雲霞雜繞坐香通蘭蕙分一局仙棊春院閉不教聲利世間聞四月二十九日迓伯氏時乆渴得雨田父交賀而行客病之戯成二絶本是黄梅雨漲時沙痕褪落不成泥龍公不費絲毫力收起鳴車水滿畦盡是行人劵内愁鈎輈猿呌雜鵂鶹四時各有宜人處只怕蕭蕭風雨秋投宿震澤僧難之翌日戯成以解老將病骨犯煙波厭聽蓬牕雨作魔一枕僧房得安夢受恩真是不須多王亞之見訪知谹父郎中得女戯作春風翦綵花開臉秋水為神玉作肌解使門䦨添喜色宜來何必是男兒紅斾欲隨巖桂發丹書應與菊花期功名信是前庭事浴了珠娘也未遲前詩似不盡意别成二小詩案前詩題云徳茂晨起折花花枝中眼上横衝痛楚因詩戯之詩見七律得意中人嫌太雅眼胞上捧為多般從今邂逅逢花處要似茱萸子細㸔已分都將命乞花恩多成怨莫傷嗟玉容紅淚猶堪憶纎手拳頭儘好誇五老峯謹按詩二首其一首見五言律小年那得此風流老子登臨興未休恨石尚分三敵國仙翁合列五諸侯遊龜峯下徹靈根上太虚斑分碧落照塵區要知一覽龜峯境不用重㸔鴈蕩圖建炎八月乘家舟往來龜山張侯無居寄岸上志和有意學浮家我今乘舟任來去便應随處為生涯予寓家龜溪賦廪郡故事郡將始至及其將行皆一奉謁予非異人也不敢異衆故自壬戌三月至癸亥暮春計裁一年往來三宿何山寺退而自笑復自憐也質明將發縱觀殿蔵奥曲覩慧樞二士經營成立之跡私有感焉因賦二絶官供粥飯是官身一嵗三逢陌上春應有得閒人笑我苦因何事去來頻房湢齋庖間翠鋪環山環水緑雲扶不知㡬許中人産支慧居前後阿樞四面山田中獨出二並峯正如假山黛色因依四面同田間獨並碧玲瓏兩家茅舍依山住不在詩中在畫中金山突兀波心倚翠空他年金碧照魚龍火燒水轉休惆悵且㸔中流樹䕃濃登巖頂謁靖應祠獨尋空翠到仙家夾路香傳數里花欲快平生無礙眼煙霞頂上㸔煙霞弋陽道中題丫頭巖昭君村裏千年恨神女峯前一夢成不謂此州無美艷只嫌名字太麤生吳楚之人謂婢子為丫頭鄭吏部開山路成二巖對棊於上因成二詩向來本為買山田饒得青松不費錢更向青冥斸峰頂放教南斗照臞仙夀松巖棊局隨空破碧雰上方剥啄下方聞方圓變化知多少笑殺先生洞裏雲白雲洞正月九日携兒姪逰寳慶寺花川同色及春時不報人知也自知此日不須題嵗月一回來作一篇詩過龍居寺偶題寺有新取華嚴方結閣貯之取意竹依牕宻促自開花照眼鮮明老僧踏遍諸方路花竹相㸔世外情千株松逐巖腰轉四面山如扇掌開不厭客成真實否華嚴閣就約重來九月二十日逰桃源寺東溪繚繞黄花國西崦縱横白酒家誰道桃源解迷路與君平步到煙霞香爐寺道邊遶廟占䟱凉郊逺山連草樹荒果有祖師傳印在為予試爇一爐香題源師小房源善畫吾心閒欲省塵縁選得閒雲起處眼筆下自多寛宇宙眼前猶樂少林泉謁龍潭路不傾欹即易開若添人跡便塵埃神龍豈為含幽阻只要紅塵不到來煮泉石頑石連巻裹緑苔人傳桑苧手親開誰言天地無情物却解慇懃喚客來題山庵桃花櫻花紅雨零桑錢榆錢草色青昌條脈脈煖烟路膏壤輝輝寒食汀題宓庵壁九月十日凌季文約孔老人同㳺西風吹徹菊花黄喚我東籬泛一觴白髪揷花休笑我年年汝亦負重陽宿臨江院鄱水僧猶敬故侯為予解榻小淹留病餘尚覺山川健興在煙霞故未休楚王廟提封猶是古方隅廟食何慚百世餘醴酒不陳賔客去至今遺俗重詩書題趙侯廟途窮道盡勢倉皇猶守孤城結戰塲遺廟丹青照今古不慚張許在睢陽紫極二仙翁祠徐神翁張打魚方内人過方外游兩翁身世等浮漚何如添作三髙士為有平生一水丘廣孝寺前朝締結梵王宫祕呪長因乞嵗豐隆報自惟追廣孝修除真可效臣忠題演法觀國雖褊小亦封除䟽奉仙靈意氣餘猶有黄冠說前日開元曾是下天書逰梅竹汗肩擔上碧參差陽脈初興趂嫩移山路莫辭行力逺清風随步不相離圓通至樂亭見月戯留潑黛長空月正濃與師山路少從容莫貪豪侈牛心炙來㸔孤圓馬耳峰題㑹蠡亭舊說范子曽經此山下故以名亭禦兒南望越王城相國勤勞幹國情料得功成身去後扁舟猶憶此經行昔人寄賞事何如逺借髙名信有無試使當時未身遇不知誰解别賢愚趙康州徐節孝祠康州義烈光千載徐老勤劬盡一身及到成名畧相等須知忠孝是同倫治㕔邦君臨治意何如所重川流政化敷堂上諸侯貴如許髙明他日見雄圖題沈氏小橋能去塵埃㡬里遥随香步步透蘭橈主人可是饒風月分與㳺人倚小橋再題棲賢橋萬仭蒼崖走玉蚪急催詩句已難酬禪心不肯随波浪猶道橋流水不流問花塢一年春又轉頭空前信花催後信風花塢老人詩力健好留春住莫匆匆故市頻陽田宅就荒墟十室居人九室虚驃騎將軍無甲第書名竹帛又何如樵牧無人記故侯﨑﨑林壑水經邱道傍若問王承福應歎人間萬事休樂平道中朱門當道詩二首門外車輪日往還忙中塵土靜中閒不栽松竹分遮帳應要開門便見山疇昔操戈列戰塲人間無處避披攘門横官道長安堵端為無心害虎狼尋趙安道舊居趙與予為昭武隔政交承窓前種竹尚存壁間有題字丁寜主僧愛竹因以有感曽憶山城政在前人傳遺事總依然重逢蘭若棲遲處只有窓前竹似賢周家卜政㡬專城曽見長身掩重名但願常教劉向在不應異姓敢爭盟催老泉鑿井案題中稱老泉詩曰全師二字必有一誤全師何日鑿新泉澆滌塵埃是勝縁恐為師無均濟力長招官索欠租錢何叔逺置酒約逰後山值雨偶因斗煖重寒候得見籠煙帶霧花却恨經春長閉户等閒風雨不離家屋初立木過安仁見之約再過不果聊寄二詩以見意小築青冥不厭勞松拖紫翠竹牽梢仙郎不憶青綾被辛苦江頭一把茅浪泊空成兩鬢華要須收拾老生涯近聞洗足祇園社菴外無人管落花送龔清太尉上虞射䇿楓庭正妙年一官聊作地行仙雷門鳴處無枹皷勤勸春鉏種象田陳粹中再約重陽之集既不果赴以詩寄之酒熟招期勝士開錦溪詞伯是仙才衰顔野老無酬對若有新詩却寄來九月南州菊未黄年年長待飽經霜使君著意勤招客催促籬間日夜忙以詩問谹父病舍南舍北逢秋雨十日相望不出門聞自新凉罷湯熨秖今含哺㺯兒孫病為世上真良藥佛是人間大道師十八師兄齊飽後却言無病可醫治閒門嵗滿常驅廹事外那容免剥膚為問赤城香火客不知還欠藥錢無滿目溪山醉復醒虚懐長羨少經營相如病起忘消渴一任沱江過錦城不與紅塵費夢思白雲流水有心期吟君細與鷗盟句病起全勝未病時郎中近詩云淺沙細與鷗盟冄賦前韻魯公世取龜蒙地宜有田文出相門恰似夷吾起江左封胡羯末盡蘭孫子美才髙不自期却言蘇李是吾師若人欲逞蘭苕句試掣鯨魚與對治衛玠神清玉不如非同杜乂鬬肌膚十篇冰玉傅青史便是神清得似無髙卧江濵百慮清獨於詩思尚營營不勞刻楮三年力攻破劉郎五字城粉闈詞客伯牙子碧落老人鍾子期幸有園林窮勝事不妨鐘鼓樂清時晁升道將還旴江先以二詩見意濟世儒先道不貧白袍古制搭烏巾塵埃陌上無閒地信是山林好著身口說歸期為底忙春風九奏奉花王芳菲莫管前驅盡末後慇懃最乆長偶同季文刑部訪仲成祕校因韻獨自開門自㸔山旋添花草滿柴關不須竹院尋僧話只訪先生亦自閒問訊吉父南北相望恨日踈經時不見意何如喜聞髙閣扶衰杖竹院秋光漸破除身世兼忘了幻因飽聞塵網不闗身病根未解依誰住試向毘耶問主人偃仆跳梁太自粗從渠窮技逞揶揄㑹須聞見都忘盡㸔打虚空得住無晚雨蕭蕭只傍簷此身無病亦凄然若人心在悲歡外却是清涼八月天費盡工夫意未親團欒說處是天真不堪兒女來㸔病生怕龎翁不度人前言在耳不應忘秋向南坡歴上方九日籬邊花未透中秋雨霽月新涼聞秀實歸自臨安有新作戯以小詩寄之永豐西角緑絲垂盡日無人可得知聞道棃園採新曲長安十様畫宫眉宫粧十様向眉頭傳道人間不解愁說與眉端向人意元和才子舊風流才子風流是當家曾傳舊語到天涯文章爛漫鋪紅錦合向天邊㺯彩霞天邊五色彩霞新筆下應無筆外塵一曲奏時天一笑光揺栁宿萬枝春和寄錢稷臣稷臣自謂遇呂公澹泊因縁亦破除風情心緒尚貪書越山不作功名債硬忍飢寒計不踈白酒東家一飯餘仙翁題字石榴書知君招飲先歌曲莫道神仙世味踈寄徐明叔郎中雪釀寒漿凍結醅獨謡興懶自持杯聊慿書詰徐居士許折梅花不寄來上谹父郎中堂前雙石瞻金印砌下孤峯記好詩春入甕醅誇麴糵雪浮盞靣壓槍旗湘江又見承明客青嶂誰刋嶽麓詩雙斾到時鴻鴈少洞庭春水照旌旗大明老僧年七十五日誦法華一部自憐雙目眯塵沙老欲依僧半在家世上何人銷永日如君七軸妙蓮華閒閒公為上清宫道士冩經并以所養鵝羣付之諸公有詩某亦同作㑹稽筆法老無塵今代閒閒是後身只有愛鵝縁已盡舉羣還付向來人憶送雙鵝懐玉作長生鵝不費黄庭一巻經經年門外戯波輕慇懃送上孤峰頂去伴天鵝雲外行别雙鵝緑水波浮雪羽光只今便住白雲鄉爭前故眼如相戀莫是空髙少稻梁贈筆工周宣靜聞孤卓漏聲遲午轉花隂晝景移能事莫憂身不足人間不用石榴皮吳使君玉皇案吏去紛紛舟到三山有㡬人西掖文章推獨步早歸丹陛演經綸化僧求詩往宣城草鞋踏破世間塵乞飯因縁不為身一路春風好消息不知此事付何人僧求詩徃平江一瓶一鉢逺山寒野路梅花已向殘自古吳門十萬户莫疑開口告人難送鄉僧證縁歸山陽千家名滿百家村細說淮南欲斷䰟師到鄉關勤問訊古人今有㡬人存贈廨院主僧平生老信愛顛狂覺子而今繼道塲坐斷前溪去來路為誰辛苦為誰忙下雲居至瑶田戯贈圓老山在雲中人在山人居山與白雲閒也須認得瑤田路方見青雲一望間戯伸監院伸宣力甚勤圓老有傳衣之意安樂窩前安樂僧一輪明月一枯藤與他整頓山林了更上孤峯第一層贈宣上人二首四明昌國人海上孤峯一劒鋩從來匣裏自韜光如今直靣相呈處懐玉山頭春草長袖被騰騰粥飯師無人曽見下山時相逢只道無能解肯作紅樓應制詩贈棲賢僧二首錦心繡口絶鉛華白㲲銅缾古梵家宴坐無人問消息有時敲板喚𤣥沙暖風吹律百花新何處芳菲不動人到底雄丹有家法風流不是一般春老僧年八十五誦經度僧今五十八年一室翛然日誦法華數過因題壁間事随過眼塵常靜愁不關心夣更清八十五年香火社殘經七巻席平生酬伯氏冄用前韻按題云再用前䪨今集中七絶無之自方國小難回袖不畏秦彊欲奏盆遙想調琴堂上日仁風曾使滿千門和賦秋聲初傳巖谷聲猶靜乍轉松篁韻更清莫遣幽人破幽夢夢中榮辱一般輕次韻曽吉父食酥色分姑射冰肌外味在金僊露掌中乞與佳人潤粧臉兩家春色一般風聞道金城煮􅀈䤙貢包長伴雨兒梨即今萬里風流在浙水東頭又浙西和曽吉父以詩謝鄭顧道送酒文人運化得天然九醖香醪自日邊分與詩人澆舌本不妨石澗一杯泉南浦紅蕖色欲然北山僧枕夣無邊醉郷境界無南北不用移封向酒泉和曽􅁻父求梅于谹父二章沙觜冰消水上波春風初不奈梅何雪中猶恐迷真色殘雪如今得似麽春入茶山夢未回閒情獨愛一枝梅團圞要共鄰僧借不怕銅缾帶月來和吉父韻謝谹父煮菜雲海堂前飯鼓忙頭陀巖下客船香長因筍蕨甜如蜜引得逰山潘孟陽手把長鑱斸白雲無苗黄獨不勝珍賜香堂上春風在謝爾浮山識故人次曽谹父韻白玉堂中晝漏遲小姑新學竹枝詞中郎筆力髙千丈不稱詩情不作詩鳳尾花牋白鳳新元和才子賦陽春茶山居士貪禪寂悞却江頭解佩人和曽谹父庚伏書懐垣衣侵砌竹穿牆日日蕭條氣運凉急雨滿池鳴兩部幽竒不獨水雲鄉吳興水郭芰荷隄别後扁舟去岸迷莫訝道人新活計亦㸔粉靣照清溪緑漪平漲小橋頭紅蓼花鮮杜若洲便喚畫師來貌取不須雲夢澤南州仙翁服食乆遺年且作童兒戯眼前井上轆轤休軋軋簷間風露自濺濺皇家休符徹象緯河上五老飛人間即今三老不住世賴有兩峯髙玉山申郎句法祖師意取玉鑿山開混茫踈簾清簟半雲雨卧聽天籟生虚涼和谹父樓字共醉元龍百尺樓方知塵世已髙秋舉頭把酒問明月許我乘風歸去不和曽谹父約八月十六日㸔月海上羣仙錦旋襴舞餘擲出紫金盤人心自愛休分别未必全輸昨夜㸔以酒餉谹父䝉以絶句為謝因次韻并叙送行之意時欲往吳中旋坼金泥不滿杯明知不自酒泉來後房綵女弓鞋窄持得金蓮案上開詩滿花牋酒滿杯吳中應喜使君來馬蹄歸踏青霜滑早趂江梅次第開和谹父分洞庭柑林屋仙丹色外妍清泉香霧總堪憐不知自落人間後三寸黄金直㡬錢秀實監丞復寄二篇譏商彦不至亦微見及因次韻酬謝案此詩二首其一見七律東岡凖擬太丘來竹洗塵根石拂苔好客風廊俱有分只愁髙唱不容陪秀實寄兩絶來招嘉彦嘉彦未回輙次韻舊喜三周貪好客爭如一叟促歸程長亭日晚相望處一片平湖泠浸星長道相思苦不開故從百里泛舟來如何不見稽山老却道心因興盡回和張直可投詩老覺浮雲念不萌君才豈合後諸生從教罪我春秋法不受詩人月旦評聲猶在耳鳥關關過眼庭隂作午班香篆靜中便細㸔緑蘿新處得髙攀冨平學滿書三篋輔嗣功成易六爻聞說短檠書細字不須燈火入涼郊㕓音解作障耳霧佳客能開病眼明一軸收蔵比珍貺不妨擲地亦金聲牛衣泣卧傷君子華衮髙名亦丈夫但使如雲雙翼在它年九萬是鵬圖小試成均書一封女媧五采不言功青雲事業期它日觴豆規模是小忠潤入圖書麥向辰如今此腹又孤人餘風更與留春在時照紅英作醉裀誤身人道是儒冠穏稱圓冠我媿難顔歜起居皆冨貴恵施文字獨芝蘭楚楚才名六尺身此間襟度有殊珍缾無餘粟難論冨篋有風光不似貧老去獨憐南澗竹閒來不費北山移年顔攻我真無賴冨貴尋君好自持戯和虞卿君有輕舠恰稱身我家亦有嶺頭雲君雲容易能分我亦有吾雲可寄君和張平甫韻寒谷由來不識春可憐金殿解宫軒哀王孫有秋來月㡬處愁人不掩門和卓季萬寄示五絶宋徳操為唱一百五十節欲近二十四畨風老時莫因舊雨與新雨閒却十枝并五枝靜無餘事可關情快讀新詩醉魄醒太守文章真衮衮參軍衫鬢兩青青失計長松習用剛一官纔得鬢毛蒼酒醪不入缾空腹始信䲭夷智慮長此篇戯宋紏南國餘寒有素期年年隆臘只浮澌還人春色九十日紅紫從它少後時紅斾朝天綵色新主人心在五湖春君王不鑄良金象莫愛扁舟共載人和子楚黄粱未熟任推移堪笑年年一局棊說與山中老居士從今櫻筍嵗相期我知黄巻能遮眼豈識紅襦解對棊且要此心無黑白憐渠勝負自相期和張文彦所寄二絶家有千章敎子經言無一字不堪行有人志業堅如此那不流傳世上名一枝一枝復一枝造物捷敏功不遲驥子熊兒誰得似它年㸔誦少陵詩和曽吉父酬鄭顧道韻古澗乆無軒冕夢茶山參遍古今詩江湖風月閒天地不愛牙旗愛酒旗和王仲髙遺丁求安二詩光禄文章寄小詩愛閒不是傲當時扁舟時過西溪曲端為平居有所思未扣𤣥關隠士居曽尋舊繡理天吳自從拭目來冰鑑悔為兒啼拆海圖裴子再寄詩酬之裴郎四海一輕舠身寄浮家小動揺蝴蝶不來閒處舞知随春夢到雲霄次鄭丈韻又一小詩代簡籬間殘菊舊令尹霜後古栢嚴諸侯梅花若不報春信誰表東風第一流溪山堂上有約束要待春日同暄妍小梅恃愛犯顔色獨洗粉靣當老拳徐思逺招客盍簮何啻得明龜醉裏呼曹自啟扉我保刳腸正藏六到將無處得同歸徐思逺趙大猷寄梅以詩謝之次韻芳菲本自競年華人老空將命乞花分比鴈行長作客盡饒蜂煖似還家和思逺蒲團紙帳老生涯只㸔新詩勝㸔花遙解知君得詩處竹籬茅舍兩三家和大猷以假鱟豆豉送鄭顧道黄巖貢篚魚爼赤浮玉僧盤豆醬寒走送似呈花下客㸔花容易别花難以豆豉送谹父吳楚家山一水分金山僧飯飽知聞蓴絲煮菜無消息鹽豉聊供舊使君以紙衾寄叔飛代簡我有江南素繭衣中宵造化解潜移隆冬必可獨不死分向苕溪雪闇時苦寒得酒因雪成寒勢未收及時一醉比封侯陽功亭毒無人見已有春光亦信不鯤鵬蜩鷃子知不小大形殊各有儔取醉盡情師李白放言極力問莊周雨中以一壺酒送汪養真秀才南枝未肯試瑶英客枕愁聞屋瓦鳴路斷往來泥滑滑相思聊寄一壺情以芋易酒于應求㟭田到死無饑苦軟飽三杯醒又饑我忍空腸謀換酒為嫌惶恨沒休時以麵換祖孝酒雪壓寒根麥未黄春催社甕麴初香若論本是同根物好遣桄榔喚索郎并寄季文以酒案此題上似有脱句溪漲蒲萄新撥醅興添野水入金杯華嚴居士貪幽定一線春絲喚起來再用前韻酬明叔寄梅并酒絳蠟融春扇欲開恐君池閣獨傳杯故將曼語招新句望外春風作伴來梅凍思嚼蘂嗅寒芳隔月春非道路長作意開籬通野岸等閒尋步到池塘自縣圃得梅花因成五絶天工施春不愛惜樂與枯槎借顔色嵗寒日晚律候嚴已遣南枝報消息嵗嵗新花即舊花生縁感舊自興嗟先春莫憚傳消息催促東君早轉車春風欲轉非容易選取一枝作先使試㸔欲發未發時似與東君說心事我家阿大才名乆老筆能旋萬斛舟竹外試題清淺句莫教何遜獨風流元酒初傳習駿奔鹽梅異用合先論須留鐵靣攀墀力莫為花開空斷魂以前韻再繼五絶夜發前村君莫惜曉與天花比真色爭先不是壓羣芳秖恐羣芳心自息老眼非慳不愛花慣逢開謝不須嗟君㸔桃李成隂後也自能迴長者車風流比擬談何易未省爾曹堪作吏曽聞一頌了劉伶湖上七篇傳盛事紅紫紛紛難共席芝蘭冉冉或同舟洛陽花譜今存否借問誰居第一流春風待㸔百花奔舊事知誰可共論顔色不曾追俗好從他蜂蝶自勞魂和向監廟紅梅向來冰艷敵寒空直待春來試淺紅大抵一般標格在兩般顔色不須同已為春風一醉來不知粧鏡為誰開虙妃只解如飄雪也費陳王八斗才南人誤種桃李欄北人疑作杏花㸔更須結子成佳實留到清和伴牡丹再賦紅梅比玉比冰俱未切恰是紅兒兼比雪東君主掌不堅牢也作堪憐也堪折鄭顧道恵臘梅一種佳名兩字猜蜜脾融液臘中開雪花不敢迷真色風格都縁不是梅長垂月帔别天堦翦作金鐘應律灰世上語言無入處好從天上覔詩來和賦千葉桃花騶玉團香移寳綃凌風浥露勢驚飄從教不結千年實且㸔尊前一味嬌一云若教解結千年實金屋何縁貯阿嬌纔喜尋春又惜春尋春眉展惜春顰莫將顰笑為花用處處平蕪是醉裀鄰僧送桃花性根本自白環宫分得天邊一種紅比似將花供金粟何如乞米送盧仝擕稚幼㸔桃花人靣㸔花花笑人春風吹絮絮催春韶華雖好多頭緒何似秋空不受塵賞瑞香催海棠鄭人蘭佩不須誇自别團香擅國華客枕莫疑無好夢年年同有瑞香花生無飛頷老蒿萊慚愧君侯客燕開靣帶凄凉無酒色誰人信道賞花來魯國諸儒走月題甘於聖學飽羮蔾不知荷篠人歸後誰似張侯為割雞刺繡牕前午夢驚驪駒堂上禮初成旁無粉黛燈籠錦頓解飢寒瓠子羮卜晝彌文卜夜遲前人明訓後人師海棠不守春秋法髙燭偏宜照睡時和吉父賦海棠畫手三川著色濃黄昏更在獨圍中佳期落日連雲合艷采垂絲帶縷紅我愧留髠花惱客君矜止廣尉貪公傳呼徑去孤風景幸好㸔時不暫同斫竹移松傍淺樊牡丹時節尚輕寒向家庭院花如錦獨為窮忙未得㸔題范子濟雙頭芍藥春風隨律入花房三月淮南春晝長聞道傳呼催近侍雙垂羅䄂引花王趙家姊妹在椒房宫漏春遲午夢長淡拂蛾眉減脂粉一般裝束奉君王紅蓮池塘雨漲暑風㣲㺯水紅粧出水遲五日便當分六月韶村道上見開時題前寺中洲茶中洲絶品舊聞名瀹以寒泉雪乳輕怪得道人長不睡一甌喚醒夣魂清隣園花成欲具旬㑹病未果二首嬌春意謂已堅牢次第千林散錦袍恐有天魔妬妍好遽連風雨作麄豪年從脹脈冷侵肌强欲尋春怯自疑衰病固知無可奈不須妨我㸔花時明日沈幹送花二枝續一章暖風吹得也輕狂連夜爭開有底忙困恨蘭宵留宿酒笑濡曉露試新粧問松嵗晚孤松輒自娛排行金朶映蒼鬚不知風雨摧殘後曾有心情管領無逢伯氏舊鶴代賦引啄苔池浴素翎野田人逺見精神羽翰未到青霄路料汝猶能憶故人
