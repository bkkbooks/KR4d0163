body:
  text: 東牟集巻一宋王洋撰賦擬進南郊大禮慶成賦并序某伏覩紹興某年某月某日赦書頒下郡縣冬至已行南郊禮成惟斯盛禮缺墜未講有年於兹矣某竊慕古人覩時盛事必有文章紀叙輙述實用注於當年禮文因革有所稽證此文之所以有助於治者也某不自量度輒因盛禮之舉為南郊慶成賦亦庶幾萬世之後思見今日禮儀制度之數典祀克舉之由逹於有司典章之外或有攷焉其辭曰皇帝踐阼十有七載遐邇既洽神人用和爰以中冬癸丑朔越七日庚申有事於圜丘始復古也皇帝若曰恭我祖考肇造區夏有衆一旅四征弗庭日不暇給然猶奠玉祀帝彛倫靡缺克禋克祀上帝盡歆以敷佑於萬邦是用寖明寖昌奄有方夏肆予沖人嗣位適我家之艱難匪籩豆梡嶡升降是肄而干戚旄羽斯習惟文惟武更為汚隆典缺弗備理亦固宜今者上天降休華夏以輯紹我洪烈斯惟其時重念魯人將有事於上帝必先有事於頖宫齊人將有事於泰山必有事於配林三代之禮小大由之有唐祀事亦先太清告於祖考配天以明固惟秩叙如階之升乃先期三日齋於原寢翌日享于太廟又翌日宿于郊宫大禮以秩縟典咸具於是羅千乘列萬騎被衮衣鳴玉佩和鸞旗常纚纚曳曳逹於清廟祗見祖考升降堂階奥肅靚深文母后妃實妾實嬪金石絲竹􅥭緉畢陳其鬯則栩椈香鬱芬芬葱葱琛爵璧角犧象禪勺山彛泰著疏畫縿羃其鼎俎之薦則牛脩豕麋鴽釀藙梅蒸鱮燒雛辟雞宛脾其籩豆之實則芝榴蔆椇棗栗柰柹昌歜乾䕩爵鷃蜩范九州之腴靡不殫獻爾乃循於江干登夫太壇豐隆吐曜霜妃接道批巖踰波潎洌滂濞䱎䲛鰅鰫魼鰨螭龍踴躍訇礚砰磅泌瀄爭馳競騖旁盪捷出於時勾陳載營羽衛悉備梢䕫魖抶獝狂飛䝉茸走陸梁柴虒駢羅照粲成章乗輿於是駟蒼螭六素虯軼倒景騰清浮凌髙衍轢紆譎乃次於圜丘齋心服形嚴恭寅畏道洽於漠神合於氣淡然無為若與神㑹嚴漏未既牽牛將中汾沴霍散瑞􅏞景從繽紛飄肅協於時豐於是禮修告於宗伯播鼓作於瞽矇灑離鼖應毊笙和沂巢剽棧筊􅀢􅩭徒吹歌咢修寋籈料塤箎六變具奏天神可禮天錫皇帝惟予男子雜遝豐穰挻煽晦晰燔燎斯升髙靈畢從煥爚婐􅛭嶫峨濛鴻條胂􅀢練馬車雲風熙事既成退即小次肅旄旗矗嚴隊鞞鼓奮猛士厲熊羆弭耳虎豹跳虚鰐鰝鯨鰴噤瘁睢盱周衛轇轕重數閒暇霜女江妃紛綸曉靄遐夷逺俗駢踏閜呵乃御端門乃赦天下寛縲舒棘龎恩厚錫韗胞翟閽各遂乃職盛禮將畢天子乃穆然而思若曰天造我家今三甲子兢兢守位何千萬禩惟兹蕆事符於草昧艱勤底今取泰於否上帝降休丕隲汝衆匪予敢思與爾共之於是輔弼元臣執爵而進曰皇天無親饗於克誠當去否之運崇再熙之明非至仁無以守位非至誠無以格神陛下攬衆美而弗有是以孜孜亹亹以底於今日之寧也屏宴遊絶田獵以藝文為圃囿以書禮為机橜孝悌逹於神明精誠熙乎日月相昔王之兢業以今視之或未齒於毫髮也且宫室至卑膳御至菲雖大禹之飯土塯啜土鉶不過是也時止則止時行則行雖文王之遵養時晦武王之久立于綴無以更也施蜺靡雲豕蹷兕絶侵淫鯈夐徘徊從節相如夸校獵之盛缺矣石闗封巒宣曲細栁鳷􅍎露寒宜春牛首漢武示别舘之富陋矣明四目以達視所欲見者民俗也矧櫟櫧枰櫨欃檀栟櫚之木足經於目乎達四聰以廣聴所欲聞者民情也矧侏儒揉雜哇淫繁促之聲足惑於聴乎味不求珍美不求異故皽酏粉溲熬母薌極之味不足貴也筦簟越席弋綈大練故雕文纂組方空罽綺之靡不足美也惟聖時造蹈艱履􅇖匪剛匪柔貴乎沉幾髙明沈潜執事之機用能益履而取剝即安而去危彼蠢蠢者安能知之帝乃却扇就輦朝於東堂載見文母鼓鐘煌煌大姒是似左右奉璋申錫純嘏萬夀無疆五言古詩春隂即事春風雖輕颺摧折猶有補適當穠華時明知不須雨浴蠶待桑錢插禾候陽土婦子三時勤亦欲少歌舞百草仰膏腴少俟亦無苦如何屯寒雲專翳扶桑吐事多不由人十可八九數不若姑置之吾非拾翠侣春苦風雨東君始造家積累亦不細一從潜陽興黄鍾本根蒂二十四信風以有此紅翠如何縱飄敗不作苞桑計風雨不令子豪猛但適意萬紫雜千紅用供一日費一日費尚可矜侈不少置豈惟困芳菲桑麻亦憔悴溝塍浮新秧蕩揺失生意無乃大傷和行敗乃翁事願言期少安百物思吐氣吾不若訟䜛唯圖保終嵗七月八日小雨萬彚就槁死一涼送生意問誰犯炎威用事得屏翳始自長夏來龍骨嘔四裔平原暴槁乾生火自焚燧藉令翻長河不給野老淚祝融固有逞軒軒抱餘恚商飈欲小展不費一矢遺人謀略殫窮乃作鬼事計此邦嚴百神奉事㒺失墜惡衣不掩脛致美盡一祭有嚴者貴神父老誦明記適當牛女期懸弧值嘉瑞不知誰相傳轟然動天地走書集房祀刻日共髙會俄然駕雲駢各以偉像至原野照旌旗閭閻便鼓吹鞠躬偵顔色大房薦籩胾恍惚動百靈相傳亦汪濊今朝響雲車風馬繼飄駛意挾大江神傾輸作霶霈日影弄亷纖簷馬鳴細碎涓涓乍伶俜赫赫復昌熾神乎享已豐何乃靳小施婦怒罵少年汝定事游戯汝牲汝自甘汝酒汝既醉我疑神吐之禍汝不少貰得免已可憐尚敢望嘉惠嗟我偶投身枵腹俟豐嵗感此意悽然中旦不成寐紀見成小詩豈謂非吾事十一月二十九夜大風明起書室皆敗葉木老性倔彊朔風怒明威初更即合戰已乃聲鼓鼙大塊信難測三鼓氣不衰我屋山僧居破陋久不治㑹當晴明日仰見河漢移㣲風鼓橐籥虚空同奔馳夜無芙蓉人慌惚疑褰帷平明滿書齋敗葉方紛披孰為呼吸者作此怒張為天寒不成雪恐坐彊風師撲塵整書架糞挶不可遲人非陳仲舉用舎亦有宜舟宿南尉岸下夜夕不寐思丁老小山戯成長韻積少自成多一元陶萬類破大可作小壺中有天地果謂真無窮百慮同一致若曰一毫芒萬里鵬垂翅變化無定形古今俱幻事老丁習真觀幻事亦不棄輸財買幻人放意窮幻智發屋仰偷天鑿泉下汲繸慌惚幻峰巒共疑無足至妻兒固俱賢未免慮憔悴拒諫設科條縱語終莫遂相顧色惨怛但未垂怨淚老丁恐敗事往往陽怒恚共知無奈何竒計亦多祕託言有鬼神疾病果作祟要盟質諸天庶得捐驚悸老丁如不聞嬉笑無畏忌起語家人言常數不可避吾老嗜奔湍且可幻吾戯戰敗豈吾過時有利不利子無徒面從背我乃竊議我意終不移畢命乃殊嗜吾聞利有幅盈舒如在噐老丁自治産費金亦其意得侯既自我失侯亦何媿萬事懐中寛目前同一醉更須稍進功有為俱有累一靜勝百為壯士屈伸臂陪徐狄二子出東郊即事與君同酸苦思得一散愁散愁何所適共作郭外遊是時窮冬節寒威未肯收茫茫一望間豐瑞彌阡疇老農挾雉子嬉戯尋朋儔問之向人語明年報有秋淮南塵土地髙原少車溝夏苗率畏旱冬雪苦不優若呈盈尺白卒嵗無所憂常聞爭戰後天意不自由人心結恨憤隂陽不旋流皇天佑邦家予賚徧九州將欲掃凶醜先為除凶蟊況此甸服内大駕方豫游賜之倉箱實始應政事修所以田野間老農獲歌謳愁中聞此語恱如去罝罦未諳鼎饋食亦宜保乾餱回頭顧二子不用自拘囚往來茅舎酒三酌更獻酬枯腸得滑潤一笑散孤幽放懐了無悶萬事皆悠悠晩歸足益健自喜筋力柔歸見城中人揣我將何求十月十七日雨霽復至仙隠秋雨閒十日緬懐秋山空煙霞固舊態敗葉鋪山紅平生五大夫投老一秃翁相看各蕭索事付不語中二輪固代謝四序彌初終義霜素慘烈温律復冲融相期保嵗寒木末回春風安成令以長橋圖來且示王民瞻記喜其有成因成短章楚人問晉勇答曰好以暇後人或疑之鍼也其說駕吾意政之餘觀此得用舎晉士儻不然安能一戰覇韓君令安成不待朞月化始如逆走丸卒若快啖蔗為政行辟人修梁插飛架異時常病涉舉邑僉矜詫王子吐琳瑯文章助光價綠波凝暮朝晧月迷清夜誰云困兵革不可事耕稼聊書以記之來者可憑藉寄題安福鳳林橋二年廬陵城不踏安成野但聞古侯封沃壤富書社剸煩或容容書考乃下下韓君令安成政事飾儒雅攷實見功多程勞用力寡邑南橫長溪春流夏湍㵼輿梁乆弗支冬涉猶病骻韓君一咄嗟民力競輸冩脩梁插晴空野色集平瓦問君胡能然一錢不入把因民乃利民胡往弗寛假十年旌旗中未得洗兵馬羽書固所先民簿乃付且誰知安成令從政識用舎目前縱奔馳心事日蕭灑薛宣好男兒正可上醇斚吾雖不預觀書以告來者真意堂案此詩從上饒志抄出原本云故刑部郎中徐兢明叔所居兢善書畫人物蕭灑乃後唐騎省都尉鉉之後有園在弋陽縣一室空掃愁三間良足用積錢寛買園此事不敢夢弋陽千萬家比屋接脩棟相期生在勤意象不少縱饑字參不致竟日自倥愡設有花木山僅作一身供徐翁初來時赤子不取重徐徐汲壑谷轆轤轉雙甕耡夷荆棘開改化溪山動千年五栁陶慕用常接踵徐翁但神㑹疎跡不勘縫七絃已可忘五栁不待種見山若舉頭孤鴈亦須送絃歌堂曹務日以渾令君心自清散彼愁歎氣化作懽愉聲懽愉何所寄寄此絃歌鳴歌如珠纍纍絃以桐鏗鏗顧此三尺匣中有萬古情大絃含春温赤甲隨勾萌小絃羽雖細一奏壯士驚次第徵角招向日葵心傾商以表節義皎皎秋霜明歛之五音全昭氏無虧成鼓之播萬物草木同敷榮令君保此噐常得心和平知君本抱道巖壑依雲耕缾粟朝不飽强起從簪纓素琴常在御朝陽鳴簫笙蕭然古槐下時乎一再行亭午百吏散永日垂簾旌舟車自衝㑹我道無將迎筆役眩朱墨愷悌消紛爭誅求絶敲榜升合均缾罌和風動千室暖律鳴嚶嚶坐令今上饒乃類古武城問君何能爾但守一字誠吾聞古良吏惠養先孤惸不聞棠隂中髙燈照長檠大雅有夷路小鮮無急烹令君實儒素不肯尊錢兄吾心如平田衎樂物自生勿言桐鄉陋子孫傳令名勿言百里狹列宿符郎星願君守此志終始不變更豈惟人道順可與神理并辱君示琬琰報徳匪瑶瓊他年挾薰風期君拂天棖畫列子圖和韻稻梁戒鳴啄饋粟辭子陽神明久不死宇宙一鳥翔若人據槁梧中自含宫商其游車泠風其息形坐忘豆山瀛泗等念往即褰裳葢云任去來豈謂符弛張老商顧之笑是事何輕揚雲風駕旬餘日月輈兩傍拊掌一戯笑何異侏儒場後人致引慕竹林焚馨香飄飄大人賦氣奪千丈强吾聞孔仲尼道盛涵化光雅言盡常理不見一日長放乎子列子君其樂彷徉謝葉秀才惠書自言能書大字來書作小字甚工大字韋將軍小字徐開府惠我數百言字字了今古江山得何助文采乃如許莫羞無稻粱鴻飛自髙舉紹興庚申解官廬陵留别歐陽隠士梅雨翳江浦我來初識君俯仰寒暑移幾親芝蘭羣芝蘭本何心悠然蕩清芬不妨識度髙解使靜躁分我從困飄泊朋從少知聞投足自失所造化本無垠妻兒憚逺寓豈復辨蕕薰顧惟鄙野性樂此川原尊時觀前古俗家傳付兒孫常疑百年餘下流名尚存慚非撥煩手未能解紛紜虗懐飽暖戀有媿民吏勤無乃同鄉夫或可覃後昆脫身亦由人孤翥隨騰鶱豈不快宿願誰能困籠樊他年方外士相期同策勲送章季萬戸部吳人不授館楚人不分田此身天地間泛若不繫船憶昨罷吏役白鷗同一川欲乘萬里風短翼無夤縁使君霤宇大下庇千萬賢鷄鳴度闗客亦到尊俎前賤子忝夙分今已三四傳嘗許策蹇步十駕困屢鞭公文如摛華公筆如修椽筆端色五采宻補造化權浮沉既異路㑹合真可憐我無三徑地直欲參四禪後㑹寛作程望舒圓復圓他年赤松子問訊玉堂仙同劉仲忱舎人先生鄭武子錢伯氏賦兩篇得聖歡二韻案歡字韻一首見七古客行仍别離此恨亦已更去語已莫留來愁不須聘七閩何貪賢四海方仰聖班驛是歸塗頻宜發新詠鄭丈灼灸戯成丈人國元龜千古祕清廟側聞扈聖初彤庭獻喜兆從此氛霧開屢錫休瑞報珪璋厭紛華江湖樂豐好一冠脫孟勞十年泛靈沼近聞出清江仗節觸烝罩漁者有豫且橫梁截隈奥如何抱神智失脚困泥淖倉皇見夢祈修門極悲呌櫝藏得𤣥夫光價逾納郜再拜爭乞靈灼鐡具爇燋火攻固下䇿奈此集衆譟低頭謝羣工脫身圖後效此戯亦太虐臍腹困然膏切勿再三瀆瀆亦不汝告舎爾觀朶頤從吾襲髙蹈聞劉行簡給事休致作詩寄之郡下一巻書云自郵籖來剥啄驚晝眠柴門手自開上有驪珠光照耀分塵埃讀之未盡行喜燄生寒灰黃門白首郎上疏稱乞骸帝曰大布衣錫汝陞文階天孫鈆錄祕論撰須儒魁榮名不汝遺汝往時欽哉夕即拜帝命雪涕何紛漼恩許歸舊廬徑卧南山齋此翁山澤仙不賦章綬材誤因文彩露遂落天網恢一游三十年所得非不諧文名動青𤨏筆力幽黃能左省豈不榮珠庭重徘徊巢父一掉頭百挽終不回吾意天地間清風有根栽人心感披拂達者分條枚二疏楊巨源同上百尺臺劉翁傳其風蒼舒次隤敳況復祖子孫此道同胚胎前劉脫功名養氣如嬰孩至今一箭詩諷詠及陪臺翁今亦何有曠達忘悲哀清風既不死缾大無恥罍嵗晩春物動吳山發寒梅願翁强賦之為花吐瓊瑰牀頭拂易傳牀下鳴新酷它時三徑邊為翁剪蒿萊我有一雙眼贈徐氏倣老徐體僕近與思逺賡和頗自言老有拒徐出游意恐以僕為真老也故有此作我有一雙眼光可照明燭我有一寸腸時復潄醽醁我有兩垂鬢與君相映綠我有一雙脚比君非不足眼能别妍醜腸不慮榮辱鬚鬢每自憐足力能相逐一一將比君未便遽慙恧胡為被君輕汙田對寒玉君如邀我遊我亦知所以朝出任意游暮歸同倒屣況此郊野間逺近在一視東抵東家田繞溪六七里北向闗外行五里見淮水我家園在西鳴泉到清耳南郊野叟村慇懃種桃李大抵浩蕩處瀟灑異城市春雲乍為錦餘霞忽成綺興來思暫息極目無涯涘兩眼極恣橫性情始歡喜歸來看君詩陳饋鋪八簋羅列水陸珍咀啖盡日美我亦强自吟合處粗相似醉時所經歴醉後詩在紙連粘動成巻持行不羞恥以此不畏君請君亮肝肺晴來擬出游喚我為君起還自伊山過金城宿覺慧寺贈始寧禪師家山三百里處處逐流水舟行鑒影中塵埃不須洗人言田間苦我言田舎好濁醪三兩杯沈憂積如掃昨與田父言别白皆有證丈夫幸聴之物物保性命歸來過山僧僧始見客喜試與語囏難不貪亦不止我徐覺言煩廼靜觀厥理僧言禍與福皆其自取爾吾師有明言報應有彼是所作既不同所遭亦如此君言君自憶我初不到耳及君受報時何用乏吾事去年梁宋災載屍滿城市今年江淮南囷窌有餘米善惡無兩岐末流見殊致君後起念時覺此而已矣再拜謝髙僧師言誠有味解榻借僧裯不覺已鼾鼻展轉未厭眠鷄鳴唤客起贈頴師昔有二大士比跡相差池一隠盧老堂一作貧舎兒任縁本無意音韻偶追隨髙唱既絶詣豹隠那得窺頴公實靜者妙賞心自知以此墨守慮逺繼白雪詞首叙同契語生死一推移未祛唱酬跡風月非所私中間任遊戯不假永篇題自此探骨髓杜蘭雜香蘼翻思前作者往往求其皮彼非不論量泛浪忽深思但取偶世語髙調終莫追頴公整襟量峭聳乘嶔危㝠捜尚論古快警耳目疑不從禪寂縳此道信權竒曾谹父約遊南巖短韻奉呈南豐不蔵善逢人說南巖南巖亦何好造物秘此緘煙雲態全異松竹色半酣去國十里贏守戍僧二三乞身滿一日幽事亦可探行客問征途居者縈轡䘖蕭條野店煙夐静彌勒龕念非塵外侣誰分禪味甘受傭作閒人自縳亦可慙于時日在房山色染靄藍一徑盤鬰青羣峯列空嵌吟泉計涓滴瀹鼎消塵凡端如常徳靜可警疾步貪揚鑣出雲門回首憐煙嵐公其吐妙語勝事須指南食鱠生長江湖中厭食水中珍從得脫死來頗見鄉味親毎食無不飽敢歎蔬茹貧老妻生過計為我鱠鮮鱗飣餖盤箸間玉縷鋪繽紛不知驚憂後腸胃久不伸瘧餘病尚在欲飫嫌羶腥所以縱對此凛如見嚴賓由知飲啄縁豐儉各有因所饗茍無分對靣難霑脣可歎賦分薄一炙亦艱辛在近猶參商其大應吳秦嵗事已轉轂園葵行獻新勿擬春蔬薄春蔬久向人曽谹父將赴浮光九日無酒賦二詩次韻經營戒奔忙髙士乃貴嬾不然繋匏瓜何異列樗散若人落閒社旁觀助煩惋况聞上方札天子恨見晩朝廷録故舊士女重嗟逺父母謝使君相看猶故眼中虛臥北牕嵗月驚兎脫側目一愁胡巳寒不須潑吾聞金鼎象次第有本末千里尚疏封五漿何用設它年激沱江大捄相如渴丈夫屬有念行行勿騷屑和曾吉父飲南坡四詩買山如買金去草如去惡開山一代師前者無是作向無邱壑心雖有亦不樂何須待髙秋風㡌已可落寒暑有至公物物無避處岧嶤半天中乃截雲雨路炎薫障南林清風來北戸幽事未可量如君美無度若無敗人意何適非好懐飛輪了無轍為作明鏡臺有酒不共飲定知何日開魚鳥亦知意門前日日來終年困塵土一日同宴嬉詩價重車渠酒色空琉璃月出散林莾攬之有餘輝山林信可樂所樂無四時況渠善窈窕與我昏為期㑹須挽凌波同載月明歸秀實行邑回寄示佳章次韻皇皇宇宙間快意本何限有如抱畦畛相對不見靣汝南箕頴士白首仕州縣偶來江西遊溪山副良願口誦陶令章手持古書巻老氣益健敏落筆増蒨絢尚願姑置之有人圖自獻秀實監丞時惠佳章逋債稍多今因休暇再報一章當時同遊已踰三月輙泛語以謝人生萍梗蹤端若邂逅期奈何人常言㑹合信有時鄙人初謁郡故事科童兒竹馬豈其情驩笑亦强隨豈縁特達賢惜此駑鈍姿乃信非偶然三葉親華枝此老軰行髙心事故崛竒逃禪昔蘓晉辭榮今介推十年守一官不樂亦不悲獨設詩中禪健勇了未衰談空不可攀且報今年詩秀實再以前韻寵惠佳篇謹再次元韻名利世所重燋爛以為期出處不自由語黙多因時陳侯有餘佞又以傳其兒蘓秦掉頰舌代厲俱詭隨此風幾百年尚作柔佞姿武子衒富豪擊碎珊瑚枝褒姒出巧譛歸放加伯竒茫茫天宇間窮達不可推不須謀快樂亦勿生愁悲但看憂樂人往往心神衰長年飽喫飯此事前賢詩次韵劉希顔李泰發龍井夀聖請獻辨才詩古人重好古今人徒賞今賞今拘近俗何以勞寸心昔者臞靣仙分符此來臨邦君舎華軒老人獨散襟從容塵領間消息禪慮深道人本絶俗猗蘭故相尋風流右將軍寂寞支道林泉石誠膏肓此病難與箴缾盂飽粥飯巾㲲替裳簮萬家辭近市寸碧依遥岑邇來四十年何人發孤吟亦有好事者杖藜訪層隂鵝溪喚畫像金薤鏘瑶林賞遇既落落風神見森森此道果有繼不憂風雨侵誰言殊緇俗二士鄴與欽次韻辛起李長篇十年爪牙官百世傳風流每思先賢範爛漫涕不收爭奪世界中蕭灑自十洲辛使東洲望翹材錯薪槱干戈一相尋賢愚自相仇六鰲失所負羣賢困道周人如辛使者往往官屢休用舎方坎􅇄身世同蜉蝣但聞公卿間飽誦才業優爵禄縱可辭嵗月那得媮向來成名時石室書盍紬奈何俯仰中窘路拘驊騮嘶鳴合亨塗飄泊仍海陬嗟予才每下粗能别薫蕕識靣苦不早論交亦何尤長裾曳非難騖棹驚莫留既懐難㑹戀那無輕去愁方今草冦猖健兒炊矛頭金盤集衛霍藜糝甘軻邱不知到死處真得飽煖不行當捫牽牛快願同桴浮次韻酬尹少稷尹子於為文跳弄同戱劇舉頭發天藏俛首取地蟄誰謂熱洛河可使當劉秩揮毫射虎豹引手唾決拾馭風千里空命的一箭疾吾意召雷霆已下六丁敕置之西崑山歌樂華胥國遂令長吟哦姓名注瑶籍置之風露場不飲亦不食鸞鶴迎玉簫雲漢配靈匹雄辭水翻瓴壯勢虎挾乙剪裁霜月明窺探化工宻少留千首詩聊示萬人敵不然薦清廟三歎奉寥閴未驚鄒海濤已過髠轂炙竊料充選㧞數塗當處一恐縁奉髙堂薪芼事朝夕且安顔氏瓢未縱參軍逸我意似子才終難守環壁次韻李叔飛溪山春蘭林桃李花槐市戯友二三生興來逺返趾墨客冠再彈蒼官仕三已矜豪栁索强引分梅知止緑芳草齊亞粉靣花襯綺慶煖具杯觴送寒操杖几態度畧不齊將妍俱可喜人心獨當然造物聊戱耳烏㡌以舊留青鞋請今始相逢浩蕩春切勿通爵里次韻政老夜坐有懐客行犯蕭條物態如寒氷借問松牕人久客將何營答言慕幽禪懐抱徹欲清當年困流俗鑚紙如癡蠅一朝脫塵網決若飛鳥驚齋盂趂後軰卧㲲陪老生從兹軰行間往往推先鳴此道本無學精粗不可評忽然辨疆域獨得分専城物外懐抱好醒來毛髮輕餘事不着意自然造純精憐君生卑㣲也縳利與名持身抱餘恨冩物多遁情以此遊世間心慮何由平再拜謝師言得閒頻寄聲觀講師有感一僧據几坐衆僧列其間紛紛士與女其外復相環娟娟誰家女粉靣垂煙鬟既為時俗粧復著道士冠一聞法師唱先衆低朱顔俯仰皆中度儀矩如素閑衆僧推舉首往往務旁觀云是良家子良人綴朝端二十哭其夫蕙幃守竒單誓保嵗寒節悼往時汍瀾鄰女聞好色願見無由縁孺枝無雜匹對鏡有孤鸞如此十餘載里巷不敢讙嵗久厭俗累幡然學僧禪朝朝事香火常念舎囂煩遂來佛寺中圓頂雜長髯未能問以此吁嗟涕以澘女子本柔靜閨房不肯安當初紅顔時何必同惸鰥所行雖失節尚可求芝蘭如今餘艶態却來叩幽闗進退兩無據此道何漫漫京城富貴家妍麗出塵寰不肯自愛重白日呈妖嫺亷恥節既喪萬里來夷蠻向來紅靣女十九逢時艱奈何兵戈中此風不為刪僧乎爾其能為我逃窮山和伯氏寄周秀實相親即嘘濡相忘即江湖事理去取間情分乃異區周侯瑚璉噐晩乃擲道途異書窺蔡叟潜論發王符夜諷恒至卯朝飯或逾晡置之轉徙流奈此臭味殊置之翰墨塲勇往無於莬雖乏三寸舌自保千金軀山巔富蔬菜渚牙長菰蒲屈曲一徑寛於焉寄其孥非藥亦非餌問君何歡娛所樂麋鹿游緇白初不渝我於聞道新齧肺方噬膚喜翁新經過已辦煮瓠壺我有甑中塵翁無竹裏厨相見期一笑良勝醉呌呼水花正充容小􅍻隨輕鳬和尹少稷經幹昔年初見君山頭日卓午但言奉親歡不道作詩苦稍稍窺藩籬清風滌袢暑論文及古人一笑乃相許早知没津涯矧肯起城府結交得若人渠彌有環渚風㠶笑沉著健足不留佇如何黃巻中尚對古人語田間把犂鉏筆端灑風雨我亦正宫懸非君更全堵往作九奏歌屈指為君數矧今獨壯年獻爵未酬旅古鼎太廟牲時花洛城女如君作文章兩壘竟安與再和故人客𤣥都結茅臨子午慈親哺童稚十口共甘苦門橫百琅玕永日不受暑浮名博煙霞掉臂終不許聽我讀新詩小侯趨大府揮毫散珠玉風㠶轉驚渚北郭鄭仙翁襟懐兩虚佇尹氏才振古仙翁筆端語矛戈角森橫畚鍤起雲雨應笑窮巷生蓬蒿半垣堵所喜樂豐登粒米不須數況從名士游真可釋羇旅願君分餘光下照及鄰女切勿閟好音文典實不與和鄭丈侍郎鴻濛棲神契脫落力自由諒此丈夫事寧為兒女憂丈人志宇宙纖芥無滯留靜觀四大室俛仰七十秋詩寛江海涯心無花月愁請言平生志曠度無隂謀浩瀁馳三峽涇渭分九流霜皮峻千尺回首走萬牛大歴竹馬遊即今誰在不被髮下大荒萬象散莫収一舉攝倒景百篇醒醉眸矧此無妄疾固可勿藥瘳時當天宇清皮人獻功裘願公强舉巵起慰瀟灑侯列星遥參光蟲鳥逃窮捜前山方刻窟粗可少獻酬不作紅粉涴那憂華髮羞洪崖與浮邱彩筆俱豐優和李希言仙山書事五年萍梗蹤所向隨波流請言初起時皇輿向吳頭觸目多變異論心鮮朋儔願借谷生筆慙非奕者秋憶昨元年中紫墟拜松楸搶攘逃賊庭歛退勇自收況知踳駮才豈副英俊求摧折縱俯仰旋澁難調柔放意山水間恐合成窮捜人事喜乖誤奔茫赴南州每縁身外交不愜心事幽有時塵壤際獨羡滄海舟平生欲往願夢想從之遊近者明詔寛汰核真良謀飛集任鳬鴈縱遣無半留乃得陪髙人一散百慮憂艱難健兒貴武爵輕公侯吾徒合何如甘分宜相投況彼四士者髙清懐逺邱雍容秦中吟激烈塞上謳得失有如此飄零晤良游酬鄧子我年數七十不過春五來素心嵗月盡白髪日夜催縱懐獨往願欲去心先回惟思百境空洗此一念埃喜逢鄧仲子妙語驚奔雷未登黃金臺要是白玉杯安能駕飛車與子相追陪姑借喝月術救我年齡穨子楚煮雪水㵸團茶乃舉陶翰林語以詩見戯不敢不酬平生何居士一壑清江濆達觀真大士獨往乃聲聞我亦策蹇步不甘子絶羣追逐到滅景回視嗟紛紜今朝玉府開羣仙剪瑶裙迷空散天花萬疊屯寒雲賞心㑹兩遂百憂銷一焚雙鳳已鳴似神椎抗孤軍更看隂沴盡髙簷挂晴曛謝吳提幹惠詩文排門雪三尺閉户饑腸鳴擁騎逺方來骨法秀以清袖出一巻書中有怖俗情上言井有徳為費四字銘下言酒傷道顛倒虞心兵中流障百川絶口無縱橫君子皆是術殄病人自驚子其欲修我匪以校我榮再拜採雜佩斯云得香蘅代徐思逺謝張季萬案此詩後半係五排疑當時俳諧之體淳風嘆遼逺友道傷澆漓交情比一線斷續同羈縻仁惇既難合義重亦不支寒谷少温律衡門自寒扉亦聞豪俠地風月滿臺池可憐伏雌客出往無所施淮鄉有病客波浪逐淪彌中流失舟檝宛在水中泜請叙先世徳繚遶窮方維始奉華隂組繼迹東南馳道有海内譽經為淮上師聞風事鑚仰極力忘憊疲求精析晉豕辨偽正褒漦大逐千里鵬小察一寸鰭旌善類騁駿誅姦如戮鯢魚蟲蛙蝦蛤𤨏𤨏俱不遺筆陣驥逸野詞鋒江斬螭導江𣲖海尾疏源河鑿岯立言經寓宇刋行結防隄禮樂尊中國春秋揮四夷書謡切頌帝詩化淑歌妃徳苑心潜逺文帷性自嬉謀心千古近張目萬人睢觀範推難習同肩歎莫追窮榮探沓黙測逺極奫而奚事千張錦真成一角犀聴言真靡靡觀行自披披里薦書頻上天恩澤屢垂翼沖宜遂奮羽困奈輕摧賤子承前緒遺蹤恨久違智髙思引望愚下顧難移前業皆紛放今懐孰怨咨志存宜自勵聰失僕安祈碌碌追香餌規規拾腐􅀈戴盆思倬漢屋蔀蔽朝曦流落真難似衣冠愧未宜敢思千里潤但覬一環溪自分無修翮何人整困泥及門初著足投分乃知歸衮衮窺儒海汪汪見量陂風流饒灑落矩度盡逶迤附尾蠅方借餘斑豹幸窺自從柸與共不覺嵗踰朞飲徳初難料䝉庥久尚疑篇章時繼續杖屦屢追隨乍履雲衢便俱亡客路危與錢寛剩酒裹飯接殘炊揣質恩奚自知公徳不漓煦濡三尺澤和暖一囊衣盛事真驚俗神髙解起痿老軀財脫病稚子孰言肥慰薦増今喜栽培任夙期此身如寄託畢願服耕耛悲此孤根弱愁先百草萎名卿宜逹理直道不容私飲徳寧辭醉餐和不恨饑頓忘前事迫復慮異時悲東閣雖開館淄川只下帷可能嘗燕樂獨肯念貧羸肉骨非無藥還生信有醫論情惟藉口此病敢言腓枯鮒長思水官蛙幸給糜承庥宜足矣去徳如何之道義終祈合形骸聴易睽借籌難獻策罄竹莫陳詞君子真雄觀幽人乏令姿甘貧寧守魯事大復貪齊已佩添年藥還吟起病詩命疎從我薄情解為君怡聊述蕪詞拙章成復自嗤和沈子美梅詩一氣如權衡俯仰在緹室鼓行橐籥間草木俱應律物物各有長軰行皆屈膝誰能長百花寒梅最先宻自此啟端兆次乃排等秩㣲者或易傷大者或不實剪除困陵暴糞掃如扑抶駢開類爭妍粉敗若老佚採擷既紛紛棄置復鬰鬰大抵爭春花柔弱忌寒冽方知嵗前梅義勇過箭疾有如比紅兒觀者亦呵叱有如當皺玉却欲數梨橘又如奏金石秋蟲並啁唧又如持豨苓便擬簉芝术又如白玉堂光耀映蓬蓽以此難著語老眼徒屢熨前賢有題韻靈還不容乞欲寫文君容相如口猶吃投章自清絶報聘我戰栗昨者得君詩冬景當暖日猝然遇彊敵不戰勢已屈堂堂既難當惴惴良自失花前嫫姆陋篆外青黃質魯肅思一鳴展禽恐三黜舊積已經年佳情諒難窒勉力駕疲鈍着鞭追俊逸我于掌武公蹤跡亦舊物差肩固百千及門或六七嘉謨傳四海吾君能細述餘事付丙丁詞華須甲乙始信直道功子孫定逢吉門户既未艾青史當屢筆我思薦一言君其試無忽藻身須英華造道在經術學博貴守約美質或矯拂古者亦有言愚慮千得一川流子方興絶潢我易畢晴昊插繁華從今好顔色梅心妙意難到理淺語易俗惟此公共美路坦行自跼彊勉思攀陪雖懇不見録料想何水曹平生一䕫足觀徐園金橘有感金丸不逐肉聚族居士園此園豈不佳百卉念已繁主人特愛重列圍限兒孫嵗晩甘液成饋薦籩豆存楚楚小籞欄彌戴覆護恩向來叢棘中豈不茂本根零落草木傍未得依蘭蓀一朝被華藻如奉貢篚尊輝輝黃金實採摘勤加餐乃知物貴賤得失同一原收用貴瑚璉棄置輕邱樊臨風一感歎相向無復言枯栢齋前兩栢樹其大皆十圍我初營屋時正與兩栢期其一傍北亭其一近南籬相去十步間當夏無炎曦我翁時來遊對此顔貌怡羣從來其間或飲或賦詩賓客來其間顧盻屢解頤桃李幾畨春不逐物態移霜雪苦侵刻曾不顔色衰亦知堅貞性凛凛不可期夫何今年秋予來自京師哭親苫塊間喘息絶自持忽見南籬栢索索但枯枝徘徊栢樹下終日懐嗟咨家人對我言栢死已經時今年春夏交老翁初見之悲傷復愛惜不忍加斧斯意謂糞壤間所處非所宜材已中棟梁安得死茅茨為此感慨久子豈盡得知我既聞此言不覺重紛洟豈為小圃内失此嵗寒姿葢念天與人響答良不疑方夏巨栢死致秋哲人萎豈不明告人象類來不遲所以翁對此泫然雙淚垂大厦將營度固非一木支奈何如此材終死不得施芃芃叢生者樸􅈪良已卑槐老未及仞露腹憂明離東邊一畦菊豈足充朝饑樹蘭徒九畹不能比蕪蘼蕭蕭數竿竹空腹將何為此外雜花木不復較雄雌譬如麟失藪駑馬從競馳鸞鳳要髙翔巢卵何用窺於懐久衡慮追數苦費詞枯栢復枯栢汝其亦長思八月道宫聞鶯宻林囀圓吭流韻入清杳當時太晩計花前來不早致使惜春人聞聲恨先老正縁幽谷春朋友在久要爭春快先鳴無乃失友道日塢集芳欄名園唱清曉得路共遷騰此事不草草即今秋色髙金衣尚鮮好歌舞興未闌秋空樂晴昊和谹父尋春之作穠華女兒紅芳草王孫綠小大各盡態低昻俱恱目久雨脫滯著振衣樂休沐晴空吟思開命簡句可屬起看花覆墻淨掃雲為屋幸㑹二三老風騷命奴僕欲說未說情三篇兩篇足玉人花暎靣眉黛添香醁杯酒戒失身無如飽捫腹
