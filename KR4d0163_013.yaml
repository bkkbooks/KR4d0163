body:
  text: 東牟集巻十三宋王洋撰序趙節度使進經解序先帝臨御敦叙九族思割其蔞以為宗社嘉薦於是箝以大義服以大訓表以大寵所以旌升褒拔罔不備盡竊原聖神之意若曰宗室王室之翳也翳不蔽者風或戾之故周之宗盟異姓為後漢封同姓以張犬牙是不保翳而懼戾乎且無鑒於漢氏姑監於有唐彼三百年中有能以文章先多士政術出治表鼓行人間以取相位者數以八九凡我同姓誰云不如而視彼為不可及也邪爰自中原以來淬厲頭角抗飾器度以致顯用者甚衆内則執筆札趨奉甘泉外則擁旌旄蕃輔京師以十數而未止也斯非聖神之妙化帝室之光華者哉先是温州刺史開國天水郡公宗室元老潜心古學不事浮競精微莊靖洞入神骨方建中之初元獻論語說上之先帝詔曰仲尼沒而㣲言絶惟諸弟子之所記雖齊魯諸儒窮之有不能盡汝居近屬處顯位而能討論撰輯著之章句甚矣好學之篤也公讀詔泣下益自激昻繼為易說獻之以為未足又解老子八十一章當天寧祝釐陳九九之數備報上之義嗟乎心術之妙如是其逺且奥也嵗往月來物異事改公之子子攸收公遺文於五厄之餘論語易說二書亡矣惟道徳經獨存子攸將寵彰其先人以詒後昆也某與子攸異時游宦江西有王事之契紹興戊辰子攸官旴江為戎帥遣人走上饒之弋陽屬某為之序某何幸挂名經端以同此不沒也竊嘗聞之和平之音淡泊懽愉之辭難工天水公生為帝族屬又稱尊乃能屏却嗜好不從流俗獨師其心而古之此非天性篤好與時俱昌者邪夫以雲漢之章褒踰華衮則錦繡之美朱黄之文有足以為公悅目之嫌者乎探闕里之遺思鈎羲經之奥旨則紛華盛麗驚愚駭俗有足以為公動心之具者乎師道徳淵源之宗懷慈儉不爭之寶則清房曲室金瑑玉璫有足以為公膚腠之安者乎舎彼取此其有識之者矣昔劉向父子漢公族之望也博極諸書剖判藝文固儒者之規範也若鴻寶苑祕書方士語爾得之枕中以為黄金可成此何等事業而忍為之邪然其惓惓之義著而不忘愛君之心老而彌篤雖自任若此亦史氏有以表著之也今天水公以古義脩身子攸尚克似之樂善不倦考之史法公之父子俱當得書矣某既讀公之書樂先帝訓肓之澤以至于今永觀厥成也序而記之庶幾班氏之用心焉養源齋序大梁李子王姬五世孫也少孤附外氏陪鼎以炊既長襟韻峻發不可禁制好為詩章掠取風月據為已用華則是矣實或疑焉閒掃一室横几案散緗帙寤寐其中求名於予予以養源目之且告之故曰子知源之為貴乎物之最鉅宜莫若海而三王之祭河實先之不以此源而彼委故耶夫五行者行而不留之謂也然金木之質一受其成有粲繁而朐有艷案艷字下原脫一字而枯不能自化人實化諸惟水之性與神為徒灝灝汗汗入有出無嘘呵薫蒸潗濬太虚崑崙之穴脉于天衢一派萬仞周行八區寰瀛雖大乃鍾其餘物之有源不既貴乎李子聞之曰水之源則聞命矣敢問學之源安在予推而辭之曰止子歸而求焉則吾與子同學方子曲肱齋序銀峯方子一日扣門而問予曰我之生也我先人嘉我初則取兖儒之受氏以命我名我自束髪念之求所以勝彼者未可得也今不幸先人棄養惸惸之孤恐無以終奉前訓今且于舊廬之西别為宴處時曲肱而枕之以求吾志因以名吾室庶幾其不墜是訓也有過而抵予者曰子之為道也固如是乎彼大賢者飢則具一簞之食渇則奉一瓢之飲其心殆未嘗飢渇為也飢渇者夫子之道耳今子少而文以文名長而仕以仕進日者乗使軒過閭巷坐車中自如嫂婦下機童稚奔走人自是賜子矣何敢望回也我聞是而病之未有以告也叟以為何如予徐謂之曰方子無以是為病也子之師古人將師其心乎師其態乎今有人曰吾聞塗之人可與為禹禹跳而吾趨非也躑吾足而跳之人孰謂不然則稚子皆知笑之矣子其厲先公所以授子之志從事于所謂四目視聴言動非禮弗克雖舎簞食而大烹却瓢飲而薦醴從其所得於外而内無損焉子之肱直可也曲可也其何異於用哉且是言也吾知子既踐之矣故敢因或人之辭以為告子其許之乎葉子發珠玉集序予少長江淮知儀真呉元常為勝士宣和甲辰嵗識元常於濠梁自是厯靖康至紹興中或離或合合必相勞苦慰勉以善行撫掌道舊故意無不同元常習禪學至欲稍問靜法即笑而不答睨予而呧之予自度學不能造道辨不能折理因黙不語置元常於方外而自處以懵昧退託之地然後乃愜後累年客有言曰呉元常今為光禪師屏居南嶽不通水火久之有貴人舊游招禪師欲叙契濶既造賔序典謁者不知為元常也狀貌短陋無須髯敗衣塵色疑其有求不為通謁腹飢餒又不忍去既見甚懽主人沃茶鼎泛語亹亹不絶日暮始歸疾索餅飯寺奴不時供元常怒叱之四體案四體上有闕文元常予畏人也始者欲外形骸不立一物而終以形骸為累是又何哉予嘗得柳子厚書其初徙江湖也意欲求山林之樂忘羇窮之憂寺之西軒盡得登覽之美已乃履鐵爐步游黄溪自西山入鈷鉧潭伐翳蔽取小邱入袁家橋渇以石渠石澗為飲可以忘憂矣又窮而西得小石潭至則竹樹環合寂寥無人以其境過清不可久居乃記之而去向使子厚自輔其氣不失中和姑取溪石竹箭之觀以洗塵滓而暢幽情不為既適矣乎必欲遂窮荒虚之境探巖谷之穴至凄神寒骨而後已吾意子厚既歸嘗引馬氏妓酌酒緩歌以自慰也則向之至清者又安在哉劎川葉子發相見于上饒其為人髙明辨達疎眉哆口宜大用於世者一日過予出書軸二曰吾不仕又絶婚聘近次第前人禪學為拈古珠玉集將鑱其說以行於世噫吾病夫塵勞之人不知洗削外慮同游於至樂之域吾之書為是作也君其為我叙之予受其書讀之茫然不知所自欲綴補傅㑹透徹挂名書端以自耀鬻又懼子發之呧予如元常也子發又謂予曰我於呉門得菴宅焉一丘曲折天地竒奥處也近與人境相接過者日十數而莫有顧者此天以遺我我將為巖居而終老焉予既髙子發之才惜其且老不見於世而獨得於至言妙道邈不可及而又懼其未止而更求或反其初而畔其始也故誦元常子厚之事以告焉予少聞幽禪之學以誠自解乃可發口其或不知而强悟習辨以取髙寄笑以藏術者謂之戯論罪在不貸予不敢自取不貸之罪故言止於此惟君幸寛之記無盡藏齋記清江韋子謂其友人王某曰吾老矣顧念少年庭前奏棃栗少長隨昆弟奏溫凊大昕之朝鼔篋授業奏聲利裹我荷服拲我手板趨走官長前奏簿書期㑹蓋吾心未嘗一日虚也日月往來風舁霧轡思慮變化自傷塵勞乃結茅清江之上葺先人居俯仰宇宙面埶空濶傲睨萬象有求於吾吾皆給之巖扉開闔烟雲冉衍如求吾詩吾以詩律之幽花研春秋月耀夜山長鳥還沙暖鷺戯如求吾文吾以句繪之愈感愈給初無留難不知在彼為無窮邪在我為無窮邪葢當是時省吾心未嘗一日實也有髙人皇甫君榜吾齋曰無盡藏吾之心有起焉子以為何如予徐答之曰韋子予與子昔宣和中同壇士也識子有年數矣嘗靜法格之子之貌濟矣今而果副予是望也當子之心事物實之其識所謂無盡者哉及中扃虚明内外蕩澈愈給愈全不知所以然而然既已知其天又烏證乎虛緣韋子一笑遂書以為齋記書鄭氏捨田記親既沒泛者亡之思者存之存之而靡有及也曰浮屠道人心無為之場屬念清凈惟是朝夕飲食之用或有以動其心則勝念弗崇有能具是供供之俾克專意於道萬物不干其志則彼以心香勝念薫導薦供施者當獲善報仁人孝子之心固知是言非若剖劑交别可以市質而券取也然猶為之豈有它哉以謂與其委吾親而無以為佛書有是而吾之力可以及之舎焉弗圖是真委吾親矣爰有割口分之業以奉其徒者久之浮屠人衣食其中藝治灌沃化瘠為腴闢菑為良日以贍給而施者之家支庶寖逺或不守先業視居作之產顧出其下則恚而矢之曰吾之先為是區區將燕及吾祖且大庇我後之人也今報享之狀冥不可詰而受施者顯䝉其利是舛也宜有以穀我不然盍返吾田之為得也有不吾與吾其訟取之於是僧俗相捽起而為讎吏持其競弄而蝕之經更嵗時不示決奪至兩蕩其業訟為閒田而後已其視初施之心豈不逺哉貴溪鄭氏為冢舎以守先塋俾僧宗元涖之又分田以為永業其大人有以文學取科目為郡大吏者思微圖逺懲是物也乃自言於邑一書於籍一驗於符與宗元盟而歸焉宗元亦詳審練達能副其意書邑符於石而刻之以示不可瀆者間為予道其事求書其後予聞而悲之於心有感焉噫若鄭氏之施宗元之受其果能相與崇其勝念而無交捽之患者哉泗洲院記常山縣北郭門之外延緣山麓僅五六里許跨溪以石為梁北下數步有浮圗氏之居邑人號曰石佛寺訪其所從來云後唐中有販牛客夜宿溪岸聞鐃鈸鐘鼔之音及旦訊諸父老此地得無佛僧庵寮處近邪皆曰無之次夕是客復寓舊止觀沙洲上中夜光熖騰起立表以識之率同輩穿土丈餘得石佛像如泗洲洗濯置路傍瞻禮而去後賈牛獲息倍稱旋過其地葺茅設飯供以報自後邑里禱病即痊乞男女輒應至晉天福七年夏大旱祈雨有感縣具狀聞州州上於朝符下許建祠宇額為泗洲院即山䂮石造堂殿請僧住持從爾顯化一方祈求響應矣邑士賢良王公介少日讀書寺中每旦詣石像前祈延母夀仍乞嗣息繼生四子兄弟皆以儒學為時聞人其叔季仍登巍科致身侍從賢良公官為祠部員外郎累贈少師得非盡誠香火靈應所佑邪進士徐清臣每念寺宇隘陋不能安衆與主僧維良議遷寛敞之所邑令徐君力賛成之然患無五百弓之基㑹三衢鄉璩君承奉之子進士國華云家有讜溪之北沙汀延袤兩溪圍繞地勢平正敢獻以建佛宇政和辛卯卜新遷祠維良復念石像重甚人力不勝舉夜夢石像告以坐石破作兩片去之可也次日視之其石果裂遂棄坐十夫不力而舉行矣宣和甲辰知縣事朝奉郎郭元祈雨乞嗣屢應施俸錢建殿繼而奉議郎方翺邀慧覺總持大師清秀住持修築精備植立功堅紹興甲子年洪水暴疾飄蕩一空特存大殿寄居貳卿魏公郎中靳公率衆布金凡講誦之堂偃息之室伊蒲之㸑啟閉之户東西夾廡煥然一新壯麗而髙明矣進士孫謙亨獨施財駕橋以通往來歲時士庶游行有請於石佛僧者為利不細昔唐朝大徹禪師飛錫至洞山明果寺遺錫溪下以石函貯之後有髙僧月道者於九峯翠巖捨身信士萬餘衆咸集道者自髙峯跳下神物䕶持略無所傷道者云大衆共證豈無異事募三百餘力發大石得函啟函獲錫杖授小師有端戒令祕藏勿輕付受諸方競求不可得端一日忽召前住持僧懷智遺之㑹郭宰建殿因為石像法具大徹師得非泗洲後身乎其符契如此院當饒歙往來支逕而為開化縣大道行旅衝衝不絶今住持清秀應接不倦得士庶之譽而戒律甚嚴逺近信嚮石佛之居異時當成方廣大刹矣余嘗過其居愛其潔雅一日造門以記為請因銓次之贊劉行簡墨竹贊瀏游浮翔君之長也純直靜黙君之徳也滌炎懐風君之功也山澤之臞儒非君其誰如也宣首座真贊宣屢不受請請它不去求它不與陌上春風鸎啼燕語黄龍南和尚真贊非南非北非語非黙虎嘯龍吟雷驚電掣木落歸根水清石出跋跋馮子容家藏章聖御書章聖皇帝大禮慶成詩一章有忠賢翼贊之言乃知賜近臣之與祀事者文懿公當國故受其目焉詩無符璽意者賡歌之臣皆有别本篆雲蘂簡其復歸西清與非小臣所得知也公之五世孫預襲而藏之百有餘年罔敢失墜使後世得以想望當時文物之盛所貴於故家遺俗者其在斯乎至於雲漢之章盈成之象臣不得而名言也跋杜仲微𨽻書出師表諸葛孔明與杜微終不盡其用吾意二人各有遺恨今杜仲微以所精隸法為諸葛公書出師表一通二杜相去千載姓名符合豈精神往來思報知遇固未泯乎雖事理冥符吾不得而知吾所知者姜維黄皓輩縱使子孫尚在不知出此矣跋徳清沈敏學先君銘祖逺矣仁人之心欲其不亡而九原之骨不可作也然則奈何盖不死其名而已不死其名有道乎曰求必傳之手黼黻其善行刻之金石内之壙中騰其文於四方如是宜不亡也今有人焉以為未足取其上世之銘旦旦誦之遇當世能言之士又乞言以申寵之以展侈其義執未聞之耳而告之曰銘皆實語與懐金錢輸米得佳傳者異子其觀於彼人之獲豐艾也聞者曰諾乃已此其為不死其祖不亦過甚矣哉王子以賢者過之無傷也其人謂誰龜溪沈良能字敏學一字子卿
