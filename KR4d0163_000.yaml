body:
  text: 提要東牟集十四巻别集類三宋臣等謹案東牟集十四巻宋王洋撰洋字元渤山陽人以省試第二名中宣和六年甲科紹興初累官起居舎人知制誥直徽猷閣歴典三郡其事蹟不見於宋史惟周必大所作集序畧紀其行履大槩嘉定山陽志中有洋小傳亦皆采必大序中語不能有所増益今考韓淲澗泉日記稱洋在信州城居有荷花水木之趣因號王南池闢宴坐一室號半僧寮清貧衣服窭甚善詩篇云云江西通志亦稱洋僑寓上饒與曾㡬相唱和以二書所載與集序㕘考之盖亦南渡之清流也集為其子昌祖所編宋史藝文志列其目為二十九巻而必大原序實作三十巻則宋史為誤自明以來世罕傳本選錄宋詩者多未之及獨永樂大典各韻中散見頗多謹採掇編訂得古今體詩七百首雜文三百五十餘首其詩極意􅍢刻徃徃兀奡自喜頗不為邉幅所拘文章以温雅見長所撰内外制詞尤有典則盖洋生當北宋之季猶及覩前軰典刑故其所作雖未能上追古人而蟬蜕於流俗之中則翛然逺矣洪邁容齋三筆載洋題餘干縣琵琶洲詩云塞外風烟能記否天涯淪落自心知眼中風物㕘差是只欠江州司馬詩當時稱為佳句而永樂大典内已佚不收又澗泉日記極賞洋為李彭元所作飬源齋記檢永樂大典亦無此篇則其他殘缺者當復不少今姑就其尚存者分類排纂析為十四巻以著其概其周必大序亦仍冠之於首云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周必大原序文章以學為車以氣為馭車不攻積中固敗矣氣不盛吾何以行之哉東牟王公之文吾能言之以六經為美材以子史為英華旁取騷人墨客之辭潤澤之猶以為未也挾之以剛大之氣行之乎忠信之塗仕可屈身不可屈食可餒道不可餒如是者積有年浩浩乎胸中滔滔乎筆端矣賦大禮則麗而法傳死節則贍而勁銘記則髙古粹美奏議則切直忠厚至於感今懐昔登髙望逺憂思愉佚摹寫戱笑一皆寓之於詩大篇短章充溢箱篋嗣子易祖懼夫散軼而無傳也釐為三十巻屬某為之序昔葉少藴嘗問公劉貢父精於史漢以其謂杜詩功曹非復漢蕭何為誤用事信乎公曰髙紀蕭何為主計吏孟康注功曹也王定國猶知之詩史豈誤哉少藴嘆服公之於學可謂不茍矣官太學時實代秦丞相而直道正辭亦擯弗用晚守鄱陽洪忠宣適獲罪於秦無敢過其居者公獨修舎葢故事坐是罷郡方勢利之門大開既不闖焉又從而偭之其氣何如哉故因論文章淵源而以二事實之庶幾來者有考焉公諱洋字元渤宣和未登甲科紹興初以右史贊善嘗命直徽猷閣歴典三郡所至有異等效云淳熙元年十月一日
