body:
  text: 東牟集卷七宋王洋撰制誥上二廟封夫人制神有功於民既受封爵而儷神作配者可不錫以美號共膺廟食乎具某神妻英靈之迹載于祀典凡邑祈禱影響感通既耦像以享乎一方宜疏恩以昭其異數秩以二字賁之小君尚期杳冥歆此嘉寵巫伋進講尚書制具官某講筵髙三侍之選藏壁出四代之書堯舜之治垂衣裳亶其稽古文武之政在方册可以驗今顧惟儒宗宜備晝訪以爾多見守約資深逢源憲臺持紏察之公諫省有彌縫之益入侍經幄詳聞起辭諒學術之該通尤典謨之淹貫於五十八篇之定舉大義以敷陳若十餘萬言之繁鑒空文之無補庶裨聖治日佇英猷余堯弼兼崇政殿説書進講左氏傳制具官某朕鑒古成憲求時多聞詳延鴻博之儒密輔緝熙之學疇咨在列慎簡其人以爾羣書淹該衆士宗仰著曲臺勾稽之譽肅副端彈紏之威望實具孚風采彌卲乃眷素臣之傳深明約史之經有五體之可推於三家而最備爾其發揮雅藴進陪帷幄之英辨析異端力救膏盲之誚期有禆於至治庶無事於空言成閔轉觀察使制閩山多阻粵嶠旁連盜㺯潢池之兵時煩羽林之遣靈旗一出蒲澤掃清具官某抵掌功名搴旗果毅受命問罪釋脅從而殱渠魁振旅凱還歸飲至以數軍實爰頒寵典用陟廉車往祗恩光益厲忠勇許世安除觀察使制屬櫜鞬而密侍時謂信臣稽嵗月以疇勞宜頒寵典具官某受資沈勇許國精忠安邊而立功名牧馬而在坰野入居左右久宣文陛之勤時既終更用陟廉車之秩往祗異數益勵壯圖除大理評事制大理刑獄之原卿二總其綱丞正聽其成而言議根本則始於廷評非通律令達民情者莫克在此爾等明習三尺法試于有司咸中科目肆用推擇往參棘寺之屬務悉厥心各揚乃職詹公薦湖北常平茶鹽制具官某操煮摘之利以佐經費擅斂散之權以稱低昻合兹二使之華付以一方之略委寄至重推擇尤艱以爾早議禮於奉常繼乘軺於右廣乃眷重湖之壯總于列郡之饒財用之餘不足得以周知官吏之賢不肖得以遍察往任外臺之責勉勤振職之思祗豫訓言用答光寵黃仁榮浙西提鹽秦昌時浙東提鹽劉伯英湖南提鹽並兼常平制山海天地之藏資用度以無窮開闔斂散之權欲低昻而適稱委以重寄慎於擇人爾等才力強明識度閎達咸有績用稔于朕聞顧兹二浙之間與夫重湖之右有鬻摘之利足以佐國有帑廪之積足以裕民各專使指之將往思職守之責務澄清於一道兼總核於兩司其懋美庸以副華遣余賔興太府寺主簿制具官某食貨出納各在外府簿書勾稽務於得人以爾才資甚髙事任彌著以字民則有豈弟之譽以守藏則有強明之稱肆疇乃勞往踐厥次宜精詳於凡目勉圖報於恩休史才國子監主簿制橋門師表之官簿領勾稽之任參決監事慎擇時髦命爾往居是為清選勉思厥職用答所蒙錢雲騤授官制朕廣闢道山博搜逸典而爾以家藏之富悉上送官爵秩之榮所宜錫寵往欽嘉奬益勵操修鄭僑年江東運判趙令詪福建運判范寅秩湖南轉運判官制具官某等大江之東重湖之右皆總賦租於九郡復専刺舉於列城如閩部之﨑嶇艱漕臣之飛挽擇兹數路之寄同以安民為先爾等試績可觀治稱咸著徹于聞聽付以將輸攬重任於外臺宜究心於一道劉晏之知取豫蘇章之明公私無俾前人得為專美往祗明訓各勵良圖史聿潼川府路轉運判官制具官某一萬里坤維之逺重委寄於外臺十五州梓路之饒擇將輸於漕計以爾材華自奮政術甚優安居臨卭之民皆資撫字南充金水之郡並茂藩宣眷惟劔川之東上直參宿之度去此端朝之邈統於所部之繁豈惟轉餉以足國裕民蓋當刺舉而揚清激濁不輕責任往勵猷為郎官制文昌之總衆務周官之分四司詳明莫重於議刑參贊尤難於厥屬以爾稟資勤慎臨事疏通繼丞正于理廷有平反之課績擢從棘路列置蘭闈顧天下奏讞之繁與律書重輕之意往佐而長參酌其宜毋或不欽思所責任蔡縡太常博士制具官某曲臺典司禮樂設屬參預討論自非通儒不副華選以爾志尚自立詞彩蔚贍起從玉律刋定之所往踐厥次汝能傳經質義折衷是否俾時典章侔古不盩乃揚汝職懋哉王瑀除閣門祗候免供職制具官某朕以中闈之戚屬綴上閣之班聫所以示恩也命爾而不責以職尤為異寵其思懋勉以稱所蒙裴良琮轉秉義郎除閣門祗候制具官某朕以東朝之戚屬綴上閣之班聫庸示眷恩俾嫻儀矩往當祗肅思副寵嘉大禮都虞候換給定本制具官某朕以大報禮成均釐海宇矧爾執戈之士可無進秩之榮其祗寵光益勵忠績士琯磨勘制具官某朕惇九族以廣恩免從吏責必十年而進秩用率國常爾宗姓之英材資之美屬司稽籍嵗考應遷其繇環衛之聫俾進遙團之任其思謙毖以副寵光畢良史直敷文閣再任制具官某朕睦鄰固圉擇守撫民惟已試之績可觀則疇勞之恩宜厚以爾職稱博洽材擅敏強自臨鎮於盱眙能緝綏於淮服教條素著聲望久孚與其求代於終更曷若責成於因任爰升華於內閣用增重於邊城勉為朕留益宣爾力鄭益換官制具官某朕不吝爵賞以旌戰多而爾效命行間列員虞事稽之彛式秩以美階往祗官榮益盡忠力韋欣換文官制具官某朕躬郊拜貺浹宇均休凡居官守之隆皆懋賞延之渥矧吾元舅亞秩公台顧其嗣子之賢冝易文階之品雖循彛典蓋出異恩益勵操修以圖報稱任元等換官制具官某朕賞恐踰時付便宜於帥閫功圖實效嚴考核於吏銓兹命為真益思報稱橫行換官制朕賞恐踰時付便宜於帥閫功圖實效嚴考核於吏銓事乃率常爵無濫與具官某臨戎果毅勵志精忠援枹鼓則忘身執干戈而衛社戰多纍著命秩從權兹稽選部之文用正遙團之秩往祗渥典益懋壯猷李吉等為有戰功換官制敕具官某吏士乘邊朕所優恤矧有功效法當序遷可姚舜明復一官制敕遇災而懼修德所以應天強恕而行推恩期乎及物既下再新之澤宜原一眚之辜眷豫近臣可忘褒敘具官某氣専以靜行正而和蹈履艱難久著輿人之誦講調師旅居多長者之言昔大敵之深侵本嬰城而固拒民知務戰方圖魏尚之功力已不支難罪常山之守既升榮於華貫復牽敘於崇階聊示徽章用增命數奪伯氏之駢邑在朕何心取甘茂之十官於汝無愧益祗明命嗣有寵光可林安上復直龍圖閣制敕具官某爾文學之富為時老成政事之優見於已試自陪從列譽重本朝屬時艱虞靡究施設嘗稍從於貶爵蓋自致於煩言屢沐殊休宜還舊服名已升於延閣祿尚寄於真祠勿替忠嘉嗣有褒寵可吕源復直龍圖閣制敕具官某爾濟世之美為時名家臨政之優所至稱治殆洊更於煩使何屢致於謗書蓋嘗統三千之師曾無發一矢之用稍從貶黜既易嵗時念將邁於逺猷盍稍還於舊物升華奎閣增賁星軺其上體於眷求益自期於報稱可葉煥復集英殿修撰制敕具官某推恩宥罪務通四海之心含垢匿瑕是謂大君之度矧守藩之良翰有持槖之舊臣原其一眚之辜豈宜終棄霈此再新之澤用錫鴻依庶均蕩於仁風冀共迎於善氣以爾蚤修文藝旋事試功出領州符鬱為共治之最入參法從卓然進説之優嘗偶致於煩言俾暫鐫於要職既淹嵗月宜有甄收升祕殿之崇名假宣垣之偉望昔周勃有重厚之器卒安邦家張敞被輕媠之名不至師傅汝惟謹擇何愧古人可胡舜陟復集英殿修撰制敕具官某朕惟遇災而懼修德所以應天強恕而行推恩期乎及物矧兹夀俊時惟舊臣原其一眚之辜豈冝終棄霈此再新之澤用錫鴻休庶均蕩於仁風冀共迎於善氣以爾早緣才譽寖更要途入二憲臺執剛果不回之操外分閫服有從容治辦之稱迹其蹈履於艱難知乃始終之勉勵殆未究其成績用稍致於人言既淹嵗時盍申優敘西清要職昔嘗褫於崇朝祕殿榮名今匪頒於三錫惟功罪之必正見豫奪之無心其體恩章益思奮用可李璆復集英殿修撰制敕具官某大君之度貴在匿瑕有國之恩莫如宥過思仰符於駿命肆大賚於多方眷豫舊臣可忘申敘爾質行素美術業甚優早以藝文遂登禁從往從貶黜遂歷嵗時其躋祕殿之聫仍即真祠之奉念人言之可畏汝勉自修承帝命而莫違豫惟好德勿煩多訓益邁逺猷可趙子嵩復集英殿修撰制敕具官某同上爾質行之美著乎夙聞術業之優見于已試自登要路益顯令猷河間大雅之風本由天性東平為善之樂蓋自安行往遭冦攘有失綏御一從貶黜遂歷嵗時其躋祕閣之榮仍即真祠之奉可衛仲逹祕閣修撰制敕具官某同上爾質行素美術業甚優早以藝文遂登禁從及事功之纍試在名位為已隆殆覩時危率先干紀念一從於貶黜既屢沐於恩休其升中祕之聫仍即真祠之奉可朝散郎直龍圖閣程昌禹復朝請郎制敕具官某兵興已來人懷自謀其有奮不顧身以徇國家之急者雖有小過固當宥之以勸能者爾前自淮蔡徙于荆湖皆履涉艱危以身犯難斯亦勤矣比因赦宥進敘舊階而有司謂爾尚在譴呵法未當得特從寬典用視疏恩夫極塗炭之民行勞徠之政因時施設固所敢為然能不尚威名毋急功利則謗書滿篋亦何畏哉其既乃心勿替朕訓可何志同復徽猷閣待制制敕具官某爾質行之美著於夙聞術業之優見於已試自登要路益顯令猷多雍容長者之風具禮樂成人之事念不見於三年之後常佇豫懷想致意於一篇之中可明汝志尚即真祠之奉言歸次對之班益保令名永綏後祉可季陵復徽猷閣待制制敕大君之度貴在匿瑕有國之恩莫如宥過思仰符於駿命肆大賚於多方眷兹近臣可忘申敘具官某恭和而能斷質厚而有文列服儒官見推多士致身法從名重本朝前膺舊德之求實謹佐時之選宜敷誠意用副虛懷乃遽致於煩言謂有同於誤國一從貶削屢易嵗時既均被於洪休盍稍還於舊物姑即祠庭之奉言歸次對之班益自奮於忠嘉其勿忘於協濟可鄭望之復徽猷閣待制制敕上同具官某柔以有力直而好謀臨難不回惟祗厥事所居見紀克世其家曩從散秩之卑進二銓曹之貴殆有同於特起蓋以表其異材覬竭嘉謀共康庶務及覩夫艱難而避事烏在乎顛沛以愛君俾即真祠仍鐫要職念屢更於嵗籥宜稍敘於官聫言升延閣之華益對茂時之寵其思論報勿替疏恩可趙子淔復徽猷閣待制制敕上同具官某詩傳古錦學富巾箱不羣之材出乎天性為善之樂見乎安行昔漢家規磐石之安大封同姓若周室重維城之寄亦以宗強豈曰異時弗圖前烈矧治功存乎已試而譽望得於舊聞雖尚寄於真祠宜遂躋於華貫益思奮勵嗣有寵光可張擴致仕復敷文閣待制制懇據禮經力抗辭榮之奏閔勞官職爰疏歸寵之恩眷顧舊臣申頒渥典具官某才資雅健德性粹溫頃擢自於郡麾亟躋榮於郎省演綸詞掖時稱潤色之工持橐從班日罄論思之益方即真祠之秩偶聞美疢之嬰勉徇情於奉身用升華於次對往祗邦渙增耀家居端明殿學士左通議大夫提舉萬壽觀許翰復資政殿學士制敕朕遇災而懼未明求衣推原其端罔燭厥理肆加霈澤大賚多方雖極幽微靡有遐棄而况二三大臣散在外服蓋朕所恃以為時望者也使或失職斯民何觀宜錫恩章悉加命數具官某識髙而器逺學博而聞多清以有容淡乎自守剛而不犯意在愛君譽已髙於一時志獨追於千古昔靖康之初政起宣和之舊臣首預優除旋登要路遂從憲府進陟樞庭士心徯望其謀猷天下想聞其風采宜重持以自愛何輕譽以假人功雖勒於燕然豈無慚德人既殊於有道寧免愧辭榮名因禠於殿廬賦祿乃從於祠宇屢更嵗月亦既甄收顧惟求舊之思可緩再新之澤殆將應於同德宜先正其崇階不替前恩用旌宿望其勿忘於奮用尚共濟於艱難可端明殿學士左大中大夫提舉成都府玉局觀馮澥復資政殿學士制敕同上具官某智窮閫域識造淵微凛然君子之容冨有昔人之學方議臣之進説挾邊將以開功萬口一辭不期而合獨抗在庭之論允惟特立之賢釁迹既彰名言具著知夙沙之塞隧蓋辱國師謂承璀之撫軍徒張賊勢凶德既從於顯戮吉人宜得以彚征遂冠樞庭實參政柄逮國家倉卒之際乃志士有為之時豈前智而後愚何始勤而終怠無惑乎人言之屢至當念乎已力之弗支念祖宗崇宥過之仁而憲典開自新之路豈於舊弼反緩疏恩位已敘於故聫名復升於祕殿鄉居既佚仍從玉局之逰國步方艱應有日邊之夢尚惟耆德勿替成言可端明殿學士左光祿大夫提舉鳳翔府上清太平宫宇文粹中復資政殿學士制敕同上具官某智窮奧域識造淵微溫然君子之容自得先王之學剛而不犯縱橫皆本於愛君清以有容造次不忘乎自守初從蜀土來至上都聲譽藹如固已先於多士文章卓爾寧復慕於古人旋賜對於大庭果升華於前列蘭臺詞掖歷踐要途畫省鑾坡幾更嵗籥比參機務之際適丁多故之時艱難可見於同心夷險不聞於異論嗟國忠懷自謀之計卒蹈危機惟見素存憂國之心終逃衆禍及出分於閫服恃作屏於要藩諒方憂於虎狼固不虞於蜂蠆再剖符而均逸屢膺霈以圖新稍易崇名初仍舊貫念四郊多壘之難莫若今朝成羣材並進之功豈無異日尚益堅于汝志用勿替于我家可左中大夫提舉西京崇福宫張徴復端明殿學士制敕朕遇災而懼未明求衣推原其端罔燭厥理肆加霈澤大賚多方雖極幽微靡有遐棄而况二三大臣散在外服蓋朕所恃以為時望者也使或失職斯民何觀宜錫恩章悉加命數具官某識髙器逺學博聞多言語足以竦動羣情政事足以緝熙庶務烏臺正色已稱疾惡之如仇螭陛記言自信直辭之寧辱自將使指進直詞垣偉抗節之堅剛嘉訓詞之溫厚會新田之方啓嗟舊弼之寡謀執法不回諒汝丹衷之志去姦務速具存白簡之辭固允協於師言亦大同於豫志爰超從列遂贊機衡出入纍年備著忠勤之效始終一節曾無險易之殊蓋惟本朝之光甚協當時之望逮一麾而出守據九江之要衝休戚固同中外奚間猥煩言之屢至謂舊眚之難逃遽解真符遂從貶爵俾下聫於中祕仍分務於留司既積嵗時纍更優敘兹下再新之澤豈忘求舊之思用還直於殿廬尚均休於祠宇永懷共濟期底丕平可趙岍復直祕閣制敕具官某爾世濟之美為時名家臨政之優所至稱治前帥烏合之衆會當蟻聚之師念久習於安平諒不虞於倉卒官投散秩職禠崇階已歷嵗時屢膺霈澤盍稍還於舊服俾尚寄於真祠其念寵光益思報稱可張士亷敘官制持軍臨陳罪莫大於遷延積嵗省愆恩亦昭於拂拭具官某頃繇勇略擢任戎行寇至失掎角之方敵奔無追躡之效辟從吏議名在刑書既閲日以滋多冝推仁而更始悉還舊秩益勵新謀往當終身思鑒前轍劉光輔敘官制具官某朕躬郊拜貺浹宇敷恩凡在譴呵悉皆甄敘以爾頃繇臧獲從坐悔尤辟難吏議之逃名遂刑書之絓屬當肆眚庸昭曠蕩之仁是用參稽稍還品秩之舊服兹至宥尚念自懲蔣璨敘官制具官某決獄以麟經之義明大夫遂事之辜補過稽羲易之文取君子宥罪之象爾頃任牧養弗思靖共以擅收庫息而免官以侵用廪粟而鐫級雖經肆眚尚貶一階既久閲於再期宜盡還於故秩往祗寬典益念自懲王贇敘官制具官某朕明罰以懲過舉疏恩以許自新爾頃麗刑章再更嵗籥用從甄典盡復故官往體寬條毋忘檢已向子忞敘官制具官某朕明罰而欲其當罪示法之公宥過而許其自新待人之恕爾頃從吏議遂絓刑書既閲嵗時之多宜還官秩之舊往祗渙渥毋怠省循吳懋敘一官制敕具官某朕念斯民離散之後當寧慨嘆檢身節用不忍以一毫取于民庶幾力行以致仁壽郡二千石固宜仰觀朕意布宣德澤以成厚下之政其或過計以謀足國豈朕意哉爾在四明綏養疲瘵愛利之實亦既行矣而言者謂爾藉府庫之餘供屝屨之乏財匪由於天降民不可以户曉則前日之譴固亦不可不行今者已更嵗時再膺恩霈而大農舉邦籍計之實縣官所藏汝初不敢私也進敘一官稍還舊物汝之疑罰行自著明益既乃心以俟褒選可王倫特轉朝奉大夫除右文殿修撰主管萬壽觀誥敕具官某朕惟古者交戰之國雖兵刃相接而攝飲獻禽之使往來其間故得以分曲直定強弱宣導怒氣化為和平此古人所以貴於使者也爾昔以氣節自信將命出疆去國五年斯亦勤矣今其來歸不失使指庶幾平國以靖吾民官爵利祿非所愛者昔西漢之世賞功太輕故蘇武還朝位止屬國後世議者固多惜之朕今待汝有加于前則汝之思報尚其勉之可石邦哲大理寺丞制具官某朕嘗取曹劌必情之言訓飭憲臣固期天下共體至意况大理刑獄之總凡命官屬必加審擇爾評讞廷中以詳慎聞肆庸敘遷往丞寺事其益既厥心思厥職毋或枉濫欽哉周埅除大理寺丞制唐虞之世畫衣冠而民不犯及觀書典君臣相戒以刑尚慎重如是朕鑒前代於理官尤嚴推擇以爾履歷之久事多練逹其往丞寺使明允之譽稱於廷中則爾職舉矣欽哉毋忽章燾大理寺正制具官某法令人之隄防刑罰治之藥石總在大理聽於卿師務其公平慎乃推擇以爾持心明允涖事審詳初直廷中曾無枉撓繼承寺事多所平反克宣再嵗之勞就陟三官之長惟寬仁而不至縱罪惟精密而不為深文兹謂適中往思汝守李宣收使功賞轉官制具官某國嚴銓選制定彛章儻無格法之拘則有甄升之寵以爾舊功素著餘賞尚存用進厥官往欽茂渥宋藻加官制具官某閩有海冦煩遣王師轉輸雖委於漕臣倚辦亦資於厥屬載疇爾力敘陟華階祗服恩光益思報稱任文薦加官制營卒結徒謀為不逞而爾密聞凶計開白守臣既鉏孽萌宜有嘉奬循階一秩往服異恩宋受等加官制閩冦干常王師致討既策勳而飲至宜錫爵以第功爰品戰多用頒賞典遞進武階之秩各欽寵命之承劉沖等加官制朕經帷講道記注前聞爾等庀職編摩積有嵗月進官一等用旌厥勤兹謂異恩勉思報稱周三畏加官制朕平賦蠲徭厚民生而講治因時制法酌古憲以垂文載覽成書宜頒寵典具官某材猷練達請讞精明棘寺平反揚歷十年之久秋卿詳決躋升八座之聫凡有科條預聞刋正方國備三登之蓄夫家無七尺之征參考舊章著為定令嘉奏篇之來上爰增秩以疏榮用賞積勤往欽茂渥韓順之加官制止戈蓋設而弗用除戎則戒于不虞而爾庀職宣勞器械精備用進美秩以旌厥勤杜欽雲郭鎮加官制具官某等屬者鼠竊為患海濵爾等或輸帥閫之謀或擒冦黨之孽有嘉顯績用進厥官祗服恩光勉思職守陳靖加官制具官某朕閲武便朝第材禁旅以爾列屬嚴闉之職參華上閣之班程其實能預有成績進升一秩庸示異恩孟愈孔奕蘇世能加官制具官某等朕閲武便朝第能禁旅爾等或有總稽簿書之號或有考案法律之勞咸進厥官益思自勉黎初加官制謹備除戎畢功第賞既稽勞之有式宜錫寵以示公用循文階勉思職業王永肩秦亮世熊誠並與遙郡上轉一官制具官某周以全失總在醫師唐於禁嚴入待君詔故有稽事制食之政用為褒功勸能之科以爾習知方書察見色脈供奉神扄之內備宣夙夜之勞疇功十全進官一列遙制戎團之任時為爵秩之榮祇服寵光益思懋勉潘溫卿加官制朕御便朝而閲士校實藝以疏恩載疇宿練之勤宜靡彛章之限具官某賢聞戚畹胄出慶閎司管鑰於嚴闉備宣忠績屬櫜鞬於文陛入綴清班考周環訓厲之功拘轉受賞延之制用踰常典峻陟華階進升留務之聫昭示外姻之寵往思刻志祗副眷懷劉堯佐加官制朕向以龍輴返國蜃炭修陵載疇卜兆之功宜錫進官之寵用增厥秩益謹爾猷陳章等轉官制具官某閲武練師程能第賞藝既精而異等寵宜厚以疏榮敘進武階以旌勇力向子固轉官職制具官某朕觀前漢循吏六人宣帝得其四而龔黃之政首事盜賊逮治稱流聞則璽書增秩以褒勉之爾守維揚兼分帥閫績譽休著既勝任矣屬者鼠竊為患海濵乃能方略掩捕洗清蒲澤用陟文階之品兼升延閣之真其祇茂渥益思拊循以無愧西京之治乃副朕懷薛璟轉官制具官某朕信賞待功豫心求當爾能權宜措事殱厥首禍之人爰升一階用旌爾伐益思自力以副殊恩三節官屬轉官制賀正旦生辰具官某朕率常遣使修好睦鄰凡從馳驅宜有甄奬敘遷厥秩式寵其行往祗恩光毋憚勞勩俊胙轉官制具官某以爾克輸忠順久捍邊陲載疇嵗月之勞參考典章之舊敘進厥秩用旌其能祗服恩光勉圖報稱許制轉官制具官某罪懼非辜故獲冦釋脅從之黨功疑惟重故旌忠示褒勸之方進爾一官特為異數往思自力以答所蒙鄭抃推垜子轉一官制係皇城使點檢文字具官某朕閲武便朝第能禁旅爾嚴闉庀職吏牘宣勞庸進厥官以昭勸奬邢元轉官制具官某爾仗節奮忠死於王事朕嘉其義故賁以階秩憫其孤故官及嗣子尚有英爽來歆榮之樊璉轉官制具官某朕崇東朝而備孝養品上藥以輔天和爾父供奉有勞寵光宜錫既引年而致事爰及嗣以頒恩用陟美階往祗異數蔡申轉三官制具官某頃者椒塗正位歸欵祖禰凡其戚屬悉霑恩渥時爾服職逺外非朕爾遺今以名聞進秩三等特為異寵母怠欽承張頥老轉官制王師殄冦軍不乏興財用足兵功為可録爰頒賞典循爾文階往服恩光益思砥礪王挺之押天申節馬轉官制具官某朕猗蘭慶旦職馬之臣以駿來貢而爾紀綱其行策肥而逹進爵一級庸示勸能賈讜致仕轉官制朕優賢尚齒尤貴老成之人覽奏引年又嘉止足之義遽開請謝爰用疏恩具官某策名於時施學於用早著將輸之效屢宣牧養之勞凡其居官俱有顯績持甘泉之槖方均佚仙真之祠挂神虎之冠乃列陳鐘漏之語用頒寵典進升峻階其安撫於精神以光華於鄉里家居自適只以觀厲俗之規世賞相承當勿替教忠之訓李朝正磨勘轉官制朕觀大舜以三考黜陟致庶績之熙有唐以一曰獻替為近侍之最顧階升非拘於法從而章程蓋率於邦彛具官某學稱儒宗材裕事幹入遊郎省茂著握蘭之聲擢二民曹亟參持槖之例比因課績之故法應敘年之稽循級而遷雖匪賢能而不次並行無廢庶幾爵祿之為差往服恩光益勤猷告升加五斗力更轉一官制徒營較藝膂力挽強載疇出類之能復進歷階之秩往祗疊寵益勵壯圖一石五斗弓各轉一官制因秋閲武被甲控弦爰嘉七札之能用進一階之秩往祗寵數以奮勇功葉份致仕轉官制朕敦風厲俗尚齒優賢觀以禮進退之人為識天盈虛之道宜疏光寵用賁休歸具官某早以材猷屢更事任文昌八座入聫紫橐之班竹使一麾出擁朱幡之寄暨分祠祿多閲嵗隂乃抗奏以據經欲引年而謝事重違雅志良惜華顛爰躋三品之榮益介六身之壽往祗渥命無怠教忠羅汝楫郊祀轉官加食邑制舜考三載以致庶績之熙唐分四善以參近侍之最朕於法從之舊固有眷恩之隆至稽敘年必率彛典具官某懷器凝逺操履剛方執法中司風采見柏臺之正總綱八座銓衡况金鑑之清出守輔藩丐遊真館嵗應選曹之格時均禋祀之休用升寄祿之階併衍爰田之賦往祗渥典無怠告猷張涓轉官制具官某狂夫不率詭衆造言既明棄市之誅宜示發謀之賞進官一級以旌厥忠往服寵章以圖報效張致逺致仕轉官制賢者於世分出處之二塗明君待臣唯始終之一道進必由禮退而示恩具官某仕逄其時學見於用入居瑣闥星郎髙侍從之班出擁朱幡竹使撫雕題之俗聫榮次對均佚真祠偶因嬰疾之微遂有引年之請重違雅尚爰舉彛章用增階品之榮聽遂林泉之適朝謙之磨勘轉官制有虞考三載明庶績之熙成周以六計弊羣吏之治乃眷法從之舊不廢敘年之稽蓋存大公用率彛典具官某克紹世閥鬱為時材入參持橐之聫羽儀禁路出守留司之任管鑰陪都課閲嵗於吏銓屬均休於郊燎歷階增益加地建侯式萃寵光用華藩翰不待次舉雖未稱於賢能以是為差庶可班於爵祿往欽異數勉迪令猷胡深轉官制具官某爾效命戎行執俘海冦用從賞格敘進武階往服寵光毋忘報稱雷進押駱駝轉官制具官某帥四川之臣貢一封之獸而爾紀綱其至視護無傷寵進品階用旌勞勩沈該磨勘轉官制考績於三載之間固先最課設官於六品之首乃有定員惟吾侍從之臣靡限拘攣之法具官某學術淹貫吏能優長擢從天府之浩繁進二春卿之清近自服禁塗之列就稽銓部之文庸陟美階詎縻彛式適被使華之遣會兹寵數之頒勉迪厥猷往欽豫命梁揚祖磨勘轉官制朕公爵祿以厲世慎名器之假人法舜之考三載以致庶績之熙稽唐之參四善以第近侍之最顧茲條列亦由次升具官某世閥髙華材猷強濟入奉禁塗之橐出分名郡之麾寶閣通班真祠均佚雖積日之效非所以責賢而序年之稽具應於陟典爰增美秩用率彛章往宜欽承毋怠歸報王瑋除四廂都指揮使知荆南府改永州防禦使朕眷今南郡實古郢中接雲夢而通巫巴為一都之會蔽潭衡而控襄漢分十國之連慎擇守臣兼資武略具官某材稱果毅志守精忠提偏師以衛留司固嘗著效總鋭衆以臨湖外亦既宣勞來承召環入對便殿詳觀敷奏宜任撫綏用更禦侮於零陵其往承流於荆土務逹弛張之理勉圖牧養之勳宜副異恩將觀報政王㬇致仕轉官制守堅正之居官力思盡瘁積憂勤而成疾固欲遺榮方勇退以奉身宜憫勞而疏寵具官某仕行其義知無不為專一心以徇公靡衆訾之遑恤亟膺眷禮擢置要途京兆赭裾著威聲於彈壓甘泉紫橐參法從以論思屢剖竹符丐遊琳館朕循名必責其實用人欲盡其材甫賜召環遽聞上綬嬰沉疴而引第難扶病以造朝爰舉恩章用增爵秩勉嗇精神之養往承渙渥之休俞俟磨勘轉官制朕更三載而考績大明黜陟之公操八柄以馭臣不輕爵祿之豫雖為法從亦率彛章具官某資稟疏通材猷膚敏薦更事任咸有聲稱入持橐於甘泉備罄論思之益稀鳴桴於京兆素髙彈壓之威屢抗需章丐遊真館方從銓選課年勞而升寄祿之階屬布郊恩進伯爵而衍爰田之賦特賜異渥榮增一時往祗渙命之優母怠嘉猷之告夏嗣忠轉官制具官某朕優內宰解職之恩錫給役減年之寵用升爾秩思副所蒙錢肅之轉官制具官某夔漕率職輸幣貢金而爾綱紀其行道塗修阻宜旌勞勩寵進厥官往服恩光益思報稱蘇楷許宦轉官制爾等奮忠宣力獲冦執渠既更秩以躐七階之拘復轉官以增三級之寵賞為至厚思稱所蒙刁雍轉官制具官某朕睦鄰遣使率屬在塗肆疇萬里之勞特懋三官之賞一更華秩兩進美階兹謂異恩勉思報效楊偰轉官制具官某朕以爾父有屬鞬之勞未頒於寵典善教輕滿籯之積能掇於賢科兹乃抗封欲其回授敘升華秩用表名門祇服恩光毋忘報稱梅興祖轉一官制具官某周官於醫以全失差次上下而稽事制食固不輕授以爾明習方藥服勤滋久甄升一階庸示勸奬益祗厥職以答茂恩李蹈循資制具官某除姦盜安良民令之職也爾能洗清蒲澤保全邑城寧惜一階之循因任百里之寄往祗寵渥益務撫綏張之德循資制朕於軍賞固不踰時爾在吏銓初未理選今既效官之久宜甄討賊之功用循文階勉思報稱可廖供循資制具官某詩至於頌盛德之事也朕不以位為樂而得奉東朝之養爾職儒官形容孝道燦然歸美用循華階以示嘉奬張適道循資制具官某朕於使命遣必疏恩爾在銓曹拘於理選今既任官之正宜循舊賞之資往服恩光勉圖報稱蒲榮循資制具官某巴蜀貢金嵗時率職而爾道途之逺紀綱其行用循文階以旌勞勩楊時發循資制具官某海冦竊發官軍討平而爾奮其精忠與有勞效用循厥秩思副所蒙董諒循資制具官某以爾職在字民功能禦冦保聚而境以固守給餉而軍不乏興肆疇乃勞用循厥秩益思奮勵以副褒嘉曹霽循資制具官某榷酤擅利佐國餉軍既以羡聞是為職舉用考賞格式循文階祗服寵光勉圖報稱方涇循資制具官某朕通好殊鄰聘問嵗遣凡庀職于其行者定為彛典以賞其勞循爾文階時乃異數往思𢡟勉以副恩光陳伯疆循資制具官某古者兵交而使在其間爾能奉命軍前用循文階以正賞典往思懋勉期稱所蒙宋藻循資制具官某唐劉晏固能吏也然其屬皆敏鋭故可促督倚辦以成厥功日者王師討閩冦飛挽餉軍爾預有力焉用循華階勉思副答孫誼緣有去失將四官作四資制具官某朕聞懋軍賞者曾不踰時立戰多者固將超級爾顯效雖著闕文莫稽宜錫寵以從權俾歷階而進秩得於已失思稱所蒙
