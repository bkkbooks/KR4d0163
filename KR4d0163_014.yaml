body:
  text: 東牟集卷十四宋王洋撰祭文祭程伯禹龍圖文嗚呼天生哲人為後學師公稟于天實允蹈之名冠多士位升進途三十六載道泰形朐眷惟前哲歐王蘇公六十六年咸以令終公之反真亦極如此豈其名儒先後同軌惟我於公實聨姻婭津亭一别音容永謝不能越境白馬素巾寓哀一奠有愧古人祭楊仁靖知縣文嗚呼天之生賢若將有為已而不然人胡不悲惟君所秉柔惠正順內施于家外施于政視人如傷誠意殫盡人有七情君去其六無好無惡孰樂孰欲喜不形於顔揚怒不存於心曲惟哀獨存化為畏懼卑恭謙和行必擇路上天之報意其必豐如何不淑官止一同顧惟飄零嘗托末㕓聞君之訃志奪氣捐遙致薄奠哀情莫宣魂而有靈監此誠悁祭弋陽祝宰文嗚呼淳德之茂天實相之中道而夭云誰喪之亷以厲已公以仁民明明上天云乎不聞勤勞下邑政成在邇方謂旌書敷榮故里如何不淑一旐翩翩白叟黃童泣涕漣漣昔我見公實佐富陽垂二十年有此䀌傷我病且庸公壯而豐病庸尚在豐壯俄空死生禍福孰能究之奠此一觴文以侑之墓志楊隱君墓志君諱潛字彥升其先華隂𢎞農人惟楊氏别姓以來數千載間世為盛族迹其逋遷裔胄所至皆有異人雖黃唐姚姒有不及者大抵重於叔向貴于赤泉侯極于漢太尉今散處郡國流分𣲖别有兜鍪而貂蟬者有儒冠而鼎食者有窮經論道為一世宗仰者有隱居間處身巖壑而名振天衢者皆華隂之族無它楊焉君世居將樂之瀚溪蓋别自浦城之族大王父某王父某考某皆隱德不仕而其德名著於鄉社者纍葉不同故直而和願而恭其言也訒大王父之德也剛而毅縱而度力兼數夫而毫視萬物者王父之量也纘二父之志通古今之學固窮厲節不求逹聞則皇考其人焉君昆弟四人在皇考為仲子天性警悟自知讀書初加辨服名譽赫然嘗自言為人後者非名爵相繼之謂顧不可墜者節也謂四知之可畏則故人之金可却矣辨三者之不惑則奕世之澤必厚矣今華隂之田果安在哉人田千阡陌吾田乎清白彼千阡陌者未百年而易族吾清白者在千載而不竭歸乎歸乎其蹈吾祖以食清白之田乎由是公於鄉黨則推其餘以施而人無飢者蓋其事親則就養無方而族黨之人無不令於父母者居喪結倚廬號泣孺慕而禽鳥之瑞至焉初宣和中方田法行鄉人盻盻未知所嚮君為廋詞語人曰五鄙之廬舂糧而趨隼旟之丘倍稱是求平衍而腴將困于租銖銖鈞之等分是圖會其法中止時無知者後三十年復舉經界邑人追思公言有識者解之曰五鄙之廬邑也舂糧而趨百里也隼旟之邱州也倍稱是求則百里者二焉以吾鄉去州邑逺其地衍沃將有泄惡氏者委重於此者當以等級逺近均之則當矣後果析為九等銖銖較之始得其平故鄉里推公明哲絶人非智所及初漢太尉凡四子長曰奉季曰牧二族為尤盛今秦吳諸族皆本於二祖惟浦城之族出于秉以禮經考之傳于奉者宜為大宗傳秉傳牧者宜為小宗而秉嘗為别族繼别者百世不遷故在楊氏世譜凡奉牧之後皆宜祖于太尉而繼秉者祖于家其敘乃正今以世譜考之自食我之禍子孫逃于華隂山谷永嘉之亂占籍上饒唐上元中劉展陷潤升吳會弗寧又避地于建安之吳興王氏據有閩粵與李氏為敵國吳人致討建安震恐十一世祖徙居將樂之光明後自光明復居瀚溪之族𣲖于浦城而浦城之族出於瀚溪境接長河其俗獷戾視法令為紙上語君家三世以善道化之其俗幾變向使如君者天假之年漸致四方長者以德為池澆濯其俗益古其俗可也重車出門中道折軸其為士者惜之君以建炎元年嵗在丁未終于里第享年四十有四越三年九月葬于將樂都嶺之原先一月有雙筍生塋前不日成竹物生之異時士夫歌詠者甚衆人以為清德之瑞且知子孫之慶云娶馬氏有二男子長曰傑歷任陽山尉前信州司户參軍次曰佐後君一年而卒孫四人如範如筠皆舉進士餘尚幼方民曹之官于信也豫寓處郡下與傑從遊相好一日語豫曰我先人棄諸孤二十餘年既克襄事大懼潛德不顯埋名地下願求令辭以表之豫謝不令恐無以彰令德者既歸踰年遣人具書幣走上饒求遂前請豫適有事于淮浦書不克報是秋又書來促曰碑已具幸終賜乃書以授使者君之善行甚衆而獨沈于鄉後之鄉人其爼豆之與銘曰闕文右朝奉郎王公墓志公諱彥隆字仲禮世為江州德安縣敷里人大王父世規纍贈太師妣陳氏贈江國太夫人王父韶故任觀文殿學士正義大夫贈太師燕國公諡襄敏妣楊氏燕國夫人劉氏燕國太夫人考某故任大理評事纍贈朝請郎妣李氏贈宜人公以季父厚任補假承務郎官七遷至朝奉郎錫五品服歷任陳州湖城尉汝州司刑曹掾熙河蘭會路安撫司幹當公事丁內艱不赴監無為軍酒稅不釐務河寧府永寧縣丞移知河南縣事建炎二年七月以疾終享年五十有一德安蓋敷淺原之地公之先有諱淺者當唐昭宗時仕至鎮南軍節度左廂兵馬使檢校右散騎常侍兼御史大夫其後當五季之際譜牒散落世家不明由公而上可考者七世曰諱果曰諱贇為七世六世祖曰諱明贈太子少保曰諱承夀贈太子少傅少傅子曰諱世規即太師公也自太師以上皆晦德不仕太師嘗一舉于有司不第遂隱于敷陽山時人師尊之作敷陽山記號敷陽先生嗣子曰韶即觀文燕國襄敏公也方熙寧初神宗臨御考數圖貢以為西戎自寶元以來虔劉邊陲非茵褥髮櫛無以示逺而一時將帥殆無可當一面者思得異人任以股肱於是襄敏公上書闕下以為夏人所恃雜羌餘種候托扞衛埋根藏穴故能跳踉使我邊鄙時竦今若招納大酋啖以嗜利不則以兵威之剪落爪牙孽種自息書上翌日召見詔乘傳詣邊不四年大功克立開熙河道後數年自樞府諸老連帥洪鄂擁旄仗節旌旗錦繡充塞故里由是德化之王為江左甲族衣冠之盛榮耀一時公自幼植立不羣善行表著季父竒之先任以官及拂纓就任果能保德振譽承似先世益崇其門君子稱焉其在湖城也當關輔咽喉地逋逃雜沓朝變夕易又關市所需非商旅通行者𣙜禁甚嚴銖稱兩計積笞倍黥一日有挾香盜行者公歎曰吾為尉吏求盜是任姦不可縱法不可弛然以銖兩之姦刑人之膚非仁聖意也顧吏曰投之火中真薰鬻邪既焚曰果非也縱遣之自是犯法者益少陜民嵗迎嶽神揭竿而趨曰神命取某物則雜然和之人莫敢較公適出見狀止車而招之使胥命于神曰神果有求無敢弗共久之報曰神無求也攝姦首笞而拲之其黨散走自是亦無繼者及在永寧留守以河南不治換公為河南令河南最部刺史交章薦之不果用秩滿南歸道由金陵江南使者一見喜甚曰公㩗河南之政來更為我施百里之惠即檄公領饒之浮梁浮梁固劇邑也公至條分𣲖别簡戢辨揵復以課聞時有大冦犯旁邑居人搶攘有姦人盜尉以逃將誘致亡命為亂公微伺得之召父老豪傑疏其惡謀乃斬以徇邑人德之繪公以祠焉公天性嚴重風度凝逺文詞蒨秀與人交終身無悔吝家居不見惰容然而降接裕大和氣薰然故家人忘貧而樂焉公之卒也諸孤皆幼故平生行事往往得之耆舊然存而在人有不可掩者焉夫人臨川晏氏朝奉大夫諱天常之女淑德懿行有聞於鄉子三人長曰萬章今為右從政郎房州廣陵縣令次曰萬夫次曰萬裕咸克修舉以世其家紹興辛未某託寓上饒公之葬已有年矣萬裕持潭郡丞雷公之狀求為銘以揭于墓某既考其行事敘次如此又繼以銘銘曰彭澤之西豫章之北百産之竒千尋之木鍾竒孕秀篤生異人異人維何燕公虎臣洗折戎醜宣我王靈丹青傳像廊廟垂紳慶流衍迤乃降厥世河南政尊浮梁像偉公身雖亡公德未已敷原之澤孫孫子子隱士何君墓志豐畜不施令聞不馳德昭而夷微塗其生而匱其死有人哉富春樵隱何君名薳字子楚本建安人博士正通中子也博士諱去非正通字也以儒業起家既中科選又好談古兵法為人亷徑踔悍書無所不讀自墳典傳訓繫史子記以至天文地理隂陽時數山川蟲魚草木詭異之説莫不誦曉眉山蘇公嘗薦之曰伏見何去非文章論議實有過人筆勢雄捷得楚漢間風力元豐中先帝覽去非廷䇿異之使教授武學不久遂為博士今出之徐州乃以左遷乞除一館職以彰先帝知人之明一經題目決無虛士由是士知正通者益衆嘗代侯公説項羽設辭雜眉山書中蘇公見之弗拒也卒於通判滄州世多惜之死葬富陽縣韓青谷以嘗令富陽而民懷之也君少嗜學盡得父書又自以父子世名蘇氏凡蘇公遺文刀筆題志小辨雜説巧發弄語無不收誦縱橫用之而不知本家貧不肯拘局以謀進取去來泛泊率無常棲晚乃卜築韓青以保先塋生所至必得名客勝士與之定交觴行辨發旁採捷出探度物象咀其英華吳中人士翕然好之先吳有遁叟和靖處士林逋自逃空曠詩窮工竒侵泄太巧司命者殆憫其生而除其祿俾以其飢鳴故士多病之鮮道其傳者獨幽慕之士或儀於丹青以配前哲亦不過酌寒泉以為爵實採秋菊以為加籩簿正具矣爼珍鼎肉葅臡栗脯不以分也及好事者慕君不蹈聲祿即又比貌繪畫而以君為似焉君以長身瘠色凍肩酸骨突顴曼顙星瞳霧竅且好為青麻短製時曳曲竹謦咳林莽中步登半峯以望江潮不知君者以君何營也人謂和靖既困宜傷其生而悔其始死自投於司命一為改圖以澤其臘乎今相去數十年以精神與君而君又安樂之吾知和靖不恨矣大抵君之德清而腴詩徑而和比之物倫松竹類也古今談者官松而君竹舉無異辭即君之名其可辭乎為是而稱隱君可不可也紹興乙丑十一月十三日以疾卒于樵居樵居在博士故塋之前生居其所而死瘞于園焉享年六十有九凡三娶二馬氏皆先君卒其後王氏收君而瘞之子二人曰承休曰承祖孫一人女孫一人尚幼將終謂其妻曰我既無以遺若環壁無可易錢充葬費者可録我平生玩意具畫若干卷硯二削格􅲕佩雜物若干種舉送吾所厚某人取其償以瘞我無與爭事絞襟衾冒斂手足形可也語畢卧瞑妻就視絶矣妻皆如言卜是年十二月某日瘞君于所定之冗焉初博士為徐州學官君尚少得黃預魏衍淵源同升陳先生無已堂透引句律其後學成所與以文雅相引重者甚衆今概舉數公世所共知者浚儀趙令畤德麟終安定王三衢毛滂澤民終部使者山陽李仲舒漢臣終應天少尹胥山沈晦元用今為西清學士吳興劉一止行簡為給事中陽羡蔣粲宣卿為本道安撫使東牟王伯淮景源為臨江守錢塘關注子東為太學博士此人皆知名當世其褒拔賞裁人用聼決咸欲挽君大之而終不能也他朐儒彥士城郭邑落之秀願交于君或拒或豫不可凡目每歎視君困借為清談而已其命也歟嗚呼君之生清集其身及其死恨結於友讀其詩芳傳於世人謂君此皆自得於我而天所與君不與也寒一握薪飢一溢米塵蛙魚釡僧殘客餘此天與君者也其理迷矣雖有知者不能識也而况如豫者乎君未卒數月嘗有書抵豫曰我見子某文銘某人而信可傳也我死亦求君銘而傳我焉豫讀之以為漫也逹命者不惡鬼事是相與為文酒戲爾投冗部中久不省録逮君之訃至錢塘吳咨周朋偶來過書庋翻故楮一取而得之噫豈魄兆邪或者純明亮直屛決昏翳而有以前識者邪是又豫所不能知也姑載其實而銘之以成其志云銘曰幹堅而折命舒而掣道柔而缺食寂而詩發噫來之人兮母傷其蔭樾吳周朋墓志君諱咨字周朋姓吳氏世為錢瑭人故建中諌官師禮之子廣陵王先生諱令嫡外孫今尚書郎信陽守名説之弟也幼踔厲挺拔漸濡父祖訓義文藝事多不學而能者不善為章句學一試有司不中遂棄去靖康初淵聖嗣位信陽方持節浙部遣君奉表闕下推恩入仕一詣曹未受事徑歸卧里中會叛卒弄兵奪囊稍無餘君既晚走浙東益自縱意讀書不悅為吏事知舊更強之不得已調長沙簿蓋受命九年矣秩滿至行在朝廷知其才留軍器所為幹官而領四方鍛工幾數千人改煎攻煉刮磨洗削鈞石出入縱手按之以十為一引手挽之以百為千又其間竄名趨走多右曹大官君以緑袍吏嶄嶄其間毫纎繩治率以亷約厲以勤察曹吏斂手久之武庫充牣器械精巧朝廷益欲用之薦君宜改秩者凡十餘章以法未用也始務學尤好字書以為東晉以來競貴婉媚殊失古意而六書之品有繆書蟲篆雖古意不給趣辦獨蔡中郎工為分𨽻髙不失本意下可兼習俗視顔魯公郭忠恕較量竒耦以救差舛而卒不大見力省工倍莫如是學乃潛心漢𨽻晝經夜畫用意至到神艷竒出大者徑數尺動蕩耳目小者錙銖方略粲然可悅會祕書閣成上幸視見君所書石渠二字一時從御冠冕內外貴人併目同説名聲赫然竦動一時皆意君顯用且不久會有論他事者因緣及君免所居官時嶺南使者求良吏自助君得漕司幹官紹興戊辰之冬君到官幾二年矣蠱者飭廢者舉自經略使諸司官交章薦之而君得疾以卒是嵗十一月也享年五十一娶王氏子二人長曰琢幼曰耆老始豫先君與司諫同遊學相慕用先君晚得一女愛甚因君委禽遂妻之君之卒也王氏自番禺扶旅柩㩗二兒將歸葬于臨安舟至九江信陽使人止之曰我已請于朝丐豫祠官歸瘞吾弟吾之孥幸留南康可相就分杯析勺以待無遽念他日也王氏遵命挽舟復上以需要不過嵗月卜良日以葬焉方豫自鄱陽郡吏失官寓上饒境中與君尤隔濶書三往不報竊歎曰豫之困亦使韋郎迹疏乎幾年收君寓書曰我自去冬得上氣病憒憒害作書縱強勉恐欹斜貽知舊憂今治疾良愈故相報後有人士自南方來云我觀見周朋於牀下病實憂人醫療亡狀曰良愈非情語寬逺憂耳又數月有來者袖銜一書豫意必非他人勞苦外就掣取之果周朋書封題印識無恙未暇問他事少焉其人蹙而進曰我得是書凡六月道滯留故不速逹行留嶺下有自嶺表來明言周朋死矣此蓋生前書也言未幾而妹以訃至矣妹之言曰前發鄉里時郎語妹我傍先塋得善地度捐財若干得之妹心知語類不祥不忍問亦不復言後病侵遣人私貨果得之又病中嘗語妹曰我死必求乃兄作刻石語以表吾志若其勿忘嗚呼豫與君為近親又先君之愛壻也乃揮涕而敘之銘曰才以奮志藝以厲氣若奮若厲終焉莫遂柱也摘齒馬也守閭三千之勞不捷于蒲以脫其輿其命也吁李夫人墓志夫人李氏諱珏海州朐山人曾祖某贈太子少保祖某尚書比部郎中贈太子少傅考某舒州淮寧縣尉自少傅徙籍楚州遂為楚州山陽人夫人堂昆諱棁位至尚書右丞祖以上皆贈宫傅亞保曾祖妣丁氏繼王氏祖妣喬氏皆郡夫人淮寧府君少有不羣之材年二十與兄仲將同中元祐三年進士第文章竒變辨論踔發識者期以華顯然竟不偶以卒人士傷之夫人生四年而孤妣程氏磁湖大族守志不奪故夫人不失鞠飬且有訓法世父官久寖為聞人出入踐歷持節數路其後右丞益貴一門羣從衣冠相望為淮上甲族夫人方年少不識艱苦世父為擇對以歸觀察公焉時觀察公方困殄倦匱旅食京國諸李老人或以為疑而夫人從之晏如撫字睦育族黨無二言人以為難其為京畿部從事也通議府君兩碩人殯尚未克葬獨居憂之夫人言曰吾觀君之憂未嘗為身謀方一出近部而坐常側席其有懷邪公歎曰吾之親委于地垂二十年今録吾槖未足以瘞坐是憂爾夫人曰其無為也吾羸吾服吾枵吾腹積而去之有贏于粟貞于陽卜必協豐祿期年乃遜于野當如君志始往視之果得郭氏之原郭人曰此吉祥也豫我百金之償以寧而親以利而孫子公曰劵安在曰亡之矣公知其偽而不可詰又歸謀之夫人曰吾固告矣廢吾之楮袍以適市無家于餘帶褊其止咸如其言事悉類舉於是二十年之寓殯一朝而復夫人之明識逹義聞者竒之噫向使隱然當男子事其自著見豈易既乎惟女子之德正於閫內故其可述者如此而已至其孝於親睦於黨以順從夫以義訓子人之所難夫人皆安行之必復次第比附而後成善則與夫假託浮行姑求窳名者殆無以異故略而不紀夫人享年六十有二終于會稽子傳之官實紹興庚午正月甲辰也初觀察公旁究異學間發語道未形事人不可測將終謂夫人曰今此吾其殆乎我歿後六七年君亦逝矣善自保與吾兒力持門户其後夫人之終相距蓋七年云傳以其年四月既望合祔于婺州城北至皮塢之兆銘曰有華于族有艷其祿乃脫其轂惟靖惟嗇惟勤惟德終贏其宅內戒斯飭古訓是式其詔罔極葉信臣墓志紹興丁卯豫寓信之貴溪取友二人其一曰鄭君字季洪其一曰葉君字信臣之兩人者皆倦于宦遊困辱憊沮藤書蠧簡賈用不售與人言拘畏恇怯惟恐傷人而鄉里後進咸畏憚之辨訟未決得二公語喻即解不幸有過惟恐二翁知之後數月季洪衰寒病甚竟死信臣亦先如江西後卒于官踰年盜發田野鼓行邑中一邑為墟豫聞而傷之竊求其故曰嗟乎向使一鄉長老皆如季洪信臣出入阡陌以不競之德化之慕而從者以十為百以百為千以千為萬以成順悌遜避之俗則兵無所投其刃雖有惡少年頑不可革亦無黨外之助其荼毒于衆必不如是酷也邑之羣士聞之咈然不受曰吾邑推二翁之賢固也吾曹豈皆豪誕縱肆以致憤疾者邪彼不吾憚非吾有以取之也奚獨以為吾罰豫笑而謂之曰非是之謂也凡士之里居與出而涖官者異孔子居鄉黨似不能言豈真不能言哉子之邑仕而賢羡而富者凡幾人其仕者入必奧出必佩色莊而體舒間從車馬過邑長吏則平揖而進與之抗衡如是故賤者日隔其羡而富則服都而貌澤囷食而從給嵗時酒肉歌勸鼓侑鶉衣之客毛褐不通如是故貧者自疏至於特逹之賢則又端重簡肅好惡絶俗道古今養名譽詩章嘯詠傳發光采如是故愚者不知其解非如二翁仕矣而態民也賢矣而志降也文章之美學問之富過人數等而不自有也行李道路遇農而農遇𨽻而𨽻故澤之入人如是其力也我無心兵彼其兵我乎凡豫之言非獨偉兩翁之誠也欲自是賢士大夫幸而里居無事表暴略是三病以保三美豈惟一鄉將天下是效聞者乃悅而以豫之言為然嗚呼父兄之教不先子弟之率不謹漢儒是以賦王命也可不勉哉信臣諱秉文大王父翰王父蔭考輔皆隱居不仕君童稚自知讀書年十三學為文從時先生蔣公遊又讀禮遂精奧義試有司為第一由是知名後受業國學為博士弟子老先生皆能知已而試於禮部連戰連屈乃退間山中十餘年紹興五年朝廷推恩受一命服歷吉州龍泉主簿攝決曹掾以憂去久之調虔州信豐尉紹興十九年九月丙申卒于信豐享年六十有七娶薛氏有賢操君遊學困而歸薛夫人事之益畏故君以謀道自信而賤謀食者子男二人可久汝舟孫男七人南一南強南圖南英南朋南仲南夀可久汝舟皆有學業可久明春秋學為郡貢舉首後又與汝舟同試春官人以君為有子至是諸孫皆亹亹服勤南強南圖甫十嵗攻大篆知用筆意人又謂君有孫女三人長嫁進士祝廷祐次尚幼孫女三人將以嵗在辛未九月某日瘞于仙源鄉招賓里小櫪原毋夫人毛氏墓之左薛夫人先君卒十二年至是遂合葬方君之卒有擒賊之勞州上其狀未報前期可久走上饒求銘于豫豫昔假守廬陵君為龍泉簿十年故人也乃為之銘銘曰衍其實含其輝于何而年數之竒仁吾櫓信吾甲彼趫而厲色則洽表斯阡兆斯里何以介之貽孫子處士諸葛君墓志君諱仲文字彥明信之上饒人實諸葛氏自君以上皆隱德不仕君少家貧無以為養懼親之憫焉乃自埋于賈區與時消息久之果致産百金日營甘脆以奉加豆大人樂之君曰子於為養事立矣利不可究怨不可府流志而行善無取焉於是更求字學習誦詩訓以洗易其業鄉里遂稱善人百年之俗習益不美以善進財為智君有弟弗事事人或謂君宜為無名錢别藏之無供諸子弟酒色費君曰不可也然此父母之愛吾將以志養志寧瘠我以肥彼豈瘠彼以肥我耶他日仲求異財君録其産無餘藏仲既得産破之君又以所益之財均焉仲亡婦幼又從而衣食之婦以是慚而鄉鄰服其長者噫今人植材自營懷利相視兄弟諸父私計潛謀叔姒伯姊激訐掉罄其不詈辱而相稽者幾何而君能化其族以及其黨以取信于鄉閭是亦難能也哉建炎初郡國戒嚴軍無見擔其輸粟餵軍者事聞往往報下命官然富人爭為蔽匿莫先應命君時尚未豐給獨懷牒詣郡曰某願以私財若干佐縣官費吏大驚問君所欲君對狀類卜式衆益異之其後盜發旁邑事起倉猝君為倡尤力君之知義樂施蓋此類也至於欵地以取甘成梁以利涉陶甓去塗以悅行旅修浮屠老子供而壯其宫不知其幾何也享年六十有九男二人長俊乂先君卒次仲方女一人適郡人徐晞顔孫三人曰良材良輔良弼曾孫男女二人皆幼初良材以其文過豫學有師法久之又知其行之不羣于庸流也於豫有奉摯之義故豫因良材之請龔子之狀而為君銘之君以紹興二十一年嵗在辛未十一月某日卒于寢以是年十二月壬午瘞于西禪梵慧院之側收君者亦良材也銘曰以智為時以飬為基以仁為寶以靜為師嗚呼後人尚克似之劉隱君墓志劉氏有事兄而盡弟者曰協事父而盡子者曰建兩人者皆有竒節既瘞其親矣又以河南馮預之狀求銘于豫豫曰子之志則毅矣然吾聞子之為葬具也易禪絅寢衣為絞襟衾冒今又不易其度而加費焉伐它山之石傭琢磨之工表而章之能具乎二人曰不然吾之親有志未遂有才弗試殆以默死是既隱其生矣吾不忍其死也使吾親託于金石使後世知有善名吾雖無田何以食為豫聞其言而悲之乃為銘焉君諱靖共字子直大王父某中儒科仕至太常博士王父某贈承事郎父某終通直郎君之始父名概者當元豐中名震一時所謂東明劉先生也一門羣從曰炳曰煥仕徽宗朝至宗伯列卿君挾門閥修名譽學問過人自遊府縣學至貢於郊學文譽日廣貴遊子弟皆出君下然至羣試往往不遂靖康中事多倉猝自大臣任事者皆思得竒材以濟國用故有徒步取侯印者相屬君素有物譽羣公爭取以為從事君亦感所遇為盡力如在敦宗院取鎮江舟濟宗子數十族崇安嗔噪卒振廪給之而戮首禍者士皆推服然仕不過初品推而進之則挽者屈抑而墮之則強者勝是亦命夫晚居于信之貴溪優遊忘年以其學訓行諸子故君之子建協之子延皆以少年連試于禮部貴溪冦火焚邑又蕩其區徙于弋陽汭口鎮踰年卒于寓舍實紹興二十一年十二月也享年六十有五急難之苦協實濟之子天長即建也次未名先娶張氏故殿中丞淑之孫再娶趙氏承宣使仲敔之女趙氏以二女纍君君擇對嫁遣之一適敦武郎趙不既一適建州進士哀濤君以紹興壬申三月丁酉葬于汭口鎮新開山之北銘曰闕文
