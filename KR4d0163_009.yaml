body:
  text: 東牟集卷九宋王洋撰表賀册皇太后禮成表慈恩逺被母道貴親至德增明天下自順恭惟皇太后陛下夙贊先皇弼成至化誕生明聖纘繼鴻庥華胥實贊於軒圗文母有光於周道恭惟皇帝陛下治道克成孝德聿盡爰歸功於慈訓遂推美於瓊章邁古今之上儀接祖宗之舊制孝恭交至家國慶安臣逖居下土遙仰闕廷雖濟濟蹌蹌莫預搢紳之列而雍雍肅肅同聽遐邇之歌到邵武軍任謝表分守無功宜收符竹引嫌自請尚領軍麾被寵若驚以榮為懼伏念臣伶俜末族朴􅈪小才持身本乏於寸長積毁難逃於衆口豈期僥幸頻辱使令右粥左餐坐享豐登之樂戴天履地難酬飽暖之恩此蓋伏遇皇帝陛下洪覆兼容大明旁燭憫一夫之失所致四海之歸心臣敢不上體薰陶益思砥礪觀民膏民脂之戒夙夜靡忘奉一心一德之規造次於是辭免兼侍講表聞命震驚罔知所措竊以帝王之學緝熙光明爻象之書廣大悉備非通儒之鴻博曷備問於清間伏念臣理昧鉤深識非知一徒以雕蟲之末技誤膺出綍之代言莫稱使令巳憂踰溢更玷露門之清選妄談太極之微文懼瀆聖聰必譁公議伏祈睿斷改授時髦庶俾小臣獲安愚分侍講謝表臣某言伏奉告命授臣兼侍講者詞掖代言方愧六員之選經筵勸講誤聨三侍之榮寵踰其涯悸不自定臣某誠惶誠懼頓首頓首伏念臣稟質淺窳逢辰休華屢叨洪恩驟置近列顧篆蟲之末技何取於致君以涉獵之謏聞豈精於談易况夫親法宫之事者其臣莫及遊聖人之門者於言為難故文王深逹於六爻獨演河圖之妙雖孔子猶勤於三絶敢陳黼座之前過被絲綸密承帷幄兹蓋伏遇皇帝陛下體堯稽古邁禹惜隂日月就將自得光明之學乾坤易簡發為久大之功樂取於人不求其備臣敢不研精十翼撮要九師如至治之宏綱見於觀象庶俯詢之清問可以據經臣無任代宰臣以下賀瑞木表臣某等言近據虔州守臣薛弼進上瑞木中有天下太平年五字者德格圓穹昭示一人之慶木呈嘉瑞中藏五字之文珍貺一聞歡聲四逹臣某等誠歡誠忭頓首頓首竊以物雖微於動植政實與之感通和氣致祥則天且弗違聖人在上則木皆得性衆枝內附示武王無外之休仆栁成文啓宣帝中興之兆同頴駢柯之秀扇厨指佞之生史不絶書地非愛寶曾未若木析斧斤之際文形節月之間匪刻匪雕示以三登之意非行非草宛具八法之工新逢甲子之上元得在章貢之南服當仁宗之慶厯嘗獻自於澧陽逮神祖之熙寧亦見諸於柚木崇和列瑞治平紀祥欣逢再造之期實繼前休之盛恭惟皇帝陛下升煙饗帝振鐸右文孝悌之德通神明忠厚之仁及草木魯史記九年之蓄巳聞輿議之共稱周詩備五福之章孰謂太平之無象惟夫萬物得由其道故有諸福可致之祥昭賁飾於人文闡坤珍於植性臣等叨陪宰路莫測聖功俯察仰觀合嵗星主文之象母修子應彰火德為孝之符臣等無任代謝幸太學表八表塵清仰屬右文之世六飛雷動一新視學之儀昭回咫尺之天顔鼓舞衆多之士類慶諧千載風動萬方中謝竊以聖代恢儒非止奉行於故事王畿首善蓋將樂育於英材治已格於偃修教必敦於帥勸振風俗於衣冠之舊息干戈為禮樂之華鋪張奕世之宏休紹復中興之盛典於今為最亘古未聞夙駕臨雍藹鬱鬱蔥蔥之瑞溫顔下士見洋洋濟濟之風既釋菜於杏壇重橫經於黼座臚傳趣召欣聨振鷺之班廡席回環分賜蒼龍之璧旋移天步親御書帷睿意非常不數漢唐之陋誦聲逺播悉還鄒魯之純恩下九天榮生一日恭惟皇帝陛下心遊六藝道冠百王論經何啻於夜分議政有踰於日昃手揮宸翰仰窺琬琰之光帶擁橋門咸聳雲霓之望綸言載布聖德昭孚臣敢不祇奉訓辭恪勤術業學如不及肯忘寸璧之隂樂且有儀不負百朋之錫代張帥謝除待制表承流京邑方懷瘝曠之虞次對禁塗遽被褒遷之寵自天拜命無地措躬伏念臣生稟庸資進蒙異眷馳星軺而轉漕未及終更任天府之劇繁遂叨試可屬神聖中興之運搜禮文久墜之儀百度肇新千齡希遇實臣子效勳猷之日雖盡勤勞然材能有分量之拘終難稱塞每憂夙夜無補事功况桴鼓未稀尤愧夫輦轂彈壓之政而荷囊忽佩奚取於侍從言語之臣避不獲辭得非所望兹蓋伏遇至仁博愛妙道曲成録善棄瑕急堯帝親賢之意兼收並蓄無商王求備之心雖甚拙踈亦加甄奬臣敢不坐以待旦益思父教之忠國爾忘家願報君恩之賜代謝轉官表郊祀配天創見修文之效考工率職遽叨增秩之榮拜命自天措躬無地中謝伏念臣猥從踈逺遭值聖明解京兆之守符持甘泉之從槖屬陽陛精禋之饗雷動屬車具勾陳法駕之嚴星羅周衛供無乏事幸免瘝官恩更俾之序遷得實逾於望外兹蓋伏遇道參化育德洽臣鄰稽古禮文炳同風於三代咸精技巧核稱職以中興乃如罔功亦誤優擢臣敢不勉思宜稱祇佩寵光益殫夙夜之勤庶有涓埃之報代謝賜對衣金帶表榮頒顯服襜如一襲之恩巧製精鏐燦若萬釘之寶寵非常而驟及德不稱以深慚中謝伏念臣稟質迂疏逢時熙洽考績王畿之治曾莫逮於中材躋身法從之聨恩實由於上力更蒙褒博增賁孱愚兹蓋伏遇命式九圍德承羣辟信賞既精於為治儀刑遂致於作孚雖器名不假於人欲昭國典然體貌以厲其節爰錫身章臣敢不衣被知榮糜捐誓報服之無斁闕必念於彌縫束可使言口不憂於衆鑠代王帥謝賜對衣金帶表行都延閣方懷曠職之虞顯服精鏐更被章身之寵人雖歆豔已實兢慚中謝伏念臣生稟庸資出逢興運躐從外職擢置近班未踰嵗月之間浸冒龍光之厚兹蓋伏遇皇帝陛下乾剛天德賁飾人文隆體貌以厲賢養威儀而致福垂裳底治懷手足視臣之心偃革躋時公爵祿磨鈍之具臣敢不書紳佩訓屬袂知榮束帶立朝執百錬益堅之節惟衣在笥存五紽退食之心狀乞擢用宗室狀臣伏讀十月二十五日詔書星變火災許內外臣寮實封言事文詞哀痛德意丁寧聞者感泣以為上天有悔禍之期而聖主有應天之實臣偶列官行在親覩變異且讀陛下求言之詔安敢默默以自後於黎庶故敢略陳其説伏惟陛下留意幸察臣聞天之警戒人君必依託象類以示訓誥人君之應天亦宜因其象類以求之則天意可得而災異可消茍或不然雖多方以求之皆未免於瞀説也臣聞之師曰昭明齊遫可以亨飪者火故古之聖人繢火於衣以明事宗廟之孝昔炎漢之興實紹火運故繼世稱孝以象其德臣嘗因其類而推之若火德順其序則宜昭明光大下臨幽隱旁燭無疆而禍故熄絶一或失此則災延於下變見於上亦其理然也春秋書火災者屢矣或毁一廟或焚一國聖人固已求其端而書之况如比年冦盜相煽焚滅生類自國門以東極於海濵南至豫章長沙延袤幾數千里等為瓦礫生靈之禍未有甚於此時也臣謂凶焰至是極矣而會稽之火復見行在上天威之熒惑天其或者欲重警陛下俾更新而振起之乎是誠聖上警懼修省轉禍為福之秋也且自曩者以至於今凡有號令莫匪順道天下之人皆知聖人之心欲以至德要道以治天下也積之有年宜享順應而乃悖繆如此豈夫播告之修或有其文而未盡其實乎群下承命咸體聖言而惻怛之誠或未能有加而無已乎將左右之臣以姑息愛君而失陛下惓惓念親之旨乎古之君子其從政也譬之農夫之有疆埸朝夕行之行無越思蓋彼效一官者時必先定其目而以思慮繼之方今天下之急而凡任天下之大當如何然則其目安在乎二聖鑾輅未還中原則生靈不得息兵革不得戢禍難不得弭而陛下與羣臣得高枕而卧哉臣願陛下審定其目固巳在此時而力行之無使須臾忘去方練甲兵以核其力勵政事以精其德因斯民之顒顒奮聖人之怒為先焉敢為逃遁之説者必誅無赦凡曰二聖在逺將求康復之功必自此以圖之至誠力行久而不息則上天之瑞應殆將緣類而降其符也豈憂變異之不去哉臣又聞之聖人以宗社為重故必固根本以消禍亂於冥冥此不可不急也伏願搜求宗室親近其賢者或外假其權使同姓常強異姓無得而踰之此又宗廟社稷萬世之長䇿不可不思者也臣無任繳駮郤漸除直祕閣狀臣聞爵祿者聖王所以勵世磨鈍之具不可以不戒也故重用之則名分重而人知勸輕用之則名分輕而民不服臣伏聞却漸前為無錫令及常州通判皆以善事權貴趨時附會以為進身之計近者遽得瞻望清光巳駭物論今者復俾進直中祕漸為何人乃與此選夫延閣之聨士林清要之地陛下猶不愛惜以為勵世之具乎况今來敇黃一道並不顯元犯事因臣乞令有司别行檢坐容臣看詳漸向所以得及落職之因必欲洗濯用之委以煩任俟果立勞效徐命進以階官可也榮名美職豈漸所宜得者哉與丞相論鄭武子狀伏覩本局關報刪定官鄭克坐言章所及别與差遣者某竊見鄭克溫恭足智簡儉自將問學有所師承孝友發乎天性某自得官敕局與克同事熟聞議論備見操藴方今行在招徠茂異多士駢集雖在微官亦多英畯敕局數人其間固有拔犀擢象見稱一時者然而析理精微旁通法意鮮如克亷靖有守不妄嬉笑鮮如克好惡不茍是非别白鮮如克克自入仕以來辛勤養母兄弟二人出處雍睦克身就吏祿弟奉母郊居克之所享不過脫粟蔬茹每營甘脆奉母身不敢嘗昔郭泰與茅容定交止此一節今克持身如此而不見稱於世豈獨郭泰為知人者哉時方艱虞朝廷用人固難以一槩取人才如克奈何以流品棄之某不敢逺引古人姑以近人比方克之素節則查道劉羲叟經術則陳賜龔原文章則唐庚馬存詩什則陳無己心計則薛向議法則劉賡今一官於敕局已蒙鐫貶則克之材能安得盡用伏承日者以新修敇令一代重典屈丞相為提舉官則刪定官亦丞相總屬之末某所以自忘微賤輒敢論述克之行事以為職分所當然者敢幸鈞慈俯加審録間暇之際加訪求焉有一言不符甘受欺罔之罪昔休徽江州之政宰相不知孔戣固巳為言江州之政既外且逺其未逹於朝廷亦宜今克近預末屬日在視聽之下而有所抑鬱某雖愚賤安敢獨自愛惜不為借鳴於丞相之前惟丞相俯加採擇還克故任新書之成允有藉賴干冒威嚴不勝戰恐之至劄強國本劄某嘗謂天下之病治則隱亂則見其隱者固非素隱惟當路者蚤夜以思務求去之而又有能言之士助成於下故小病之不積大病之所以去也其顯者固非驟顯惟當路者不蚤夜以思務求去之而又未有能言之士助成於下故小病之弗除大病之所以成也某不敢以久逺喻請以近事明之宣和以前大病有二靖康之世大病有一今日之勢大病有一病於往者弗治而顯矣復何言哉病於今者尚可治使隱也可不念乎所謂宣和之二病何也曰請謁也曰貪功也惟請謁之風行故刑政不修亷恥不立善者不勸惡者不懼而內亂成也惟貪功之説行故新政事作禮樂辟土地失盟好而外難起也所謂靖康之一病何也曰兩宫之間不能無間言也王黼之禍坐於蔡京師成之死急於童貫人皆以謂事之本原固有所在推是言之事多倒置此所以內外之勢離而弗合無強枝輔故逺夷再舉而京師為墟也所謂今日之一病何也曰國本單弱也明皇之世河北難起而靈武之師肅宗帥之至德之世兩京復陷而子儀之師廣平統之邇者逺夷近在江口命將出師則其勢輕六飛臨戎則其事危方此之時若選取近屬之賢為上出征撫我六師官以京尹之貴假以宿衛之重逺夷聞之知天子恢廓大度天威赫然庶幾其亦懾也况行伍之士乎若所以固根本強宗社重朝廷其為無疆之休有未易盡言者焉至於誓命之禮攬御之方事在朝廷了無可疑今執事當路而不務早夜以思指是為急恐傷上意置而弗言乃欲理當世之務使不失敘非愚者所能知也干冒威嚴不勝戰悚之至儻或可取願觀設施論楚州事劄某竊見今日朝廷所恃方鎮以江北為重在江北諸鎮中楚州承州最為緊急承州今聞已被敵人侵據獨楚州截然中居強立者兩年矣某謂楚人稍習山川形勢利便人材能否今試具數事恐可施用謹具畫一如後一自楚州來者詢問得趙立彈壓用人甚有次序中間執通判賈敦詩送於朝囚曹官賈連置於獄殺主簿查蒧責以大義明示於衆有祥輝觀女道士二人收金人帖上有金國年號便欲殺之所以一郡之人莫不知好惡所向承命不暇前此州都監王詢者専執兵柄郡將所不能制及趙立出師淮北令詢作先鋒回顧即斬致詢之兵不敢少却用能走金人之師所獲軍資甚衆此彈壓之效也至其用人則又有可稱者朱存中為土豪之最得郡人情以為幹辦官兼知山陽縣事朱鉞土豪薄有武勇以為州都監孔師錫老士人謹細能御吏計出入以為山陽縣丞張驥千士人之可稱者以為山陽簿顧伯起朱芑皆進士登科委伯起以縣事先任芑為本州糧料又任芑通判泗州是以一郡之士皆樂為用然此數人恐非經朝廷命令雖抱忠力未能自逹若朝廷降付劄子各令條具優與官爵使此數人皆見朝廷已知姓名必思自奮以報恩寵一除趙立所委用外士人有馮舜文馮舜詔翁招張師閔亷潔巳蔡仁張次仲土豪有吳襄馮周士周源謝圭皆有帥衆之略頗聞未肯遽自當事若劄下趙立有欲與官者不拘人數許以奏聞庶幾肯為用者衆昔漢髙祖曰吾不愛四千户以慰趙子弟今以是行之事似相類一楚州東有鹽城南有寶應西有淮隂北有漣水漣水限在淮北淮隂即當泗州之衝此兩處各為敵馬蹂踐不復更有征賦惟鹽城寶應兩邑今年曾下種處稍有稻麥趙立都兩邑稅賦凡得數萬可支半年軍食百姓所食不與也今寶應路與承州鄰勢必梗絶獨鹽城一路可通泰州興化今欲稍給楚州糧食必自通泰往乞以糧食轉至通州即令嶽飛據所交到數却自泰州撥還楚州令楚州之兵自從下河津般孤城久飢得通糧道必自向前縱有散失分數亦自歸恩朝廷矣若通泰不肯那移必得朝廷所降之粟自到楚州即成迂逺恐誤兵食一楚州至承州中間有兩湖一曰白田湖二曰新開湖有張敵萬者聚衆往來湖中與趙立為仇常梗楚州糧道前者承州薛慶頗得此人歡心故獨不梗承州糴買之路所以七月中楚州米一升四百五十承州一升二百粟價相去不啻一倍又承州城中足食皆緣張敵萬與薛慶無怨不於城外阻截之故今乞以一近上名目與張敵萬令取得承州即以承州鎮撫與之命趙立與張敵萬通和彼雖懷忿其力不能相制若承朝廷命令必便解仇以此助楚州之力其利不細一承州既為賊人占據必驅本土人當鋒今乞朝旨勸喻楚州人切勿殺害承州土人常務招誘告以朝廷傷痛赤子之意縱使兩州之人交鋒之際不暇承命此令既出承州之人感戴朝廷恩惠必有思自奮者或執賊自歸理亦有之一承州雖為賊人占據其間倉庾稍實又聞有敵人殘零輜重皆諸將所覬覦所以近日環冦之師稍衆若令諸將先入者主之則人人自奮又承州之地自江南視之則為危自宿泗視之則為安今聞宿州蘄縣尚有宿州官吏而泗守王宣贊者驍勇過人若令來取承州就食彼必聞命引兵又泗州劉氏統兵屯駐建康特以泗州乏食故不謀歸今若令取承州就與鎮撫則泗州失業之民皆可復歸承州漸近鄉里此亦因其鋒而用之之道也論防秋事劄一諸處起土豪民兵把隘乞令點集後即時放散直候警急方得追呼某竊見朝廷以謂近年敵人入冦諸路民兵以愛惜鄉閭悉力捍禦往往獲功去嵗兩浙民兵尤著勞效朝廷節次行下州縣保明推恩人人自奮甚大惠也今秋諸路往往勸誘土豪民兵一則各保鄉分二則為衆防守然聞諸路把隘官司多慮民兵生踈遂欲預行教閲有欲五日一習總一縣觀之計所起民户去把隘去處有去家十里者有二十里者若五日十日一習往來道路必致經宿是五日十日之間少者兩日多者四日方了一番教習豈不妨廢農務冦賊未來先自紛擾且鄉保之民使其不甘侵暴用命自奮雖瓦礫白梃可以擊賊若使了無鬭志雖使日日教習寧免生踈今乞鄉分土豪各已分定把隘去處即時拘集當官教閲使識旌旗金鼓坐作之節不過三日即時放散直候警急方許追喚如有不肅以軍法治之號令既行人人安便一諸縣添差縣尉一員令部新法弓手乞行寢罷某竊見朝廷以縣道弓手為不足用特置添尉一員使専出戰法意甚善然以某所見觀之徒為紛紛無益實事凡一縣之內鄉民肯為弓手者不過若干舊額往往不足又使添置新法新舊相爭各為區别尋常巳自異心緩急豈肯相援且張官置吏亦非細事每官一員少者史一人胥兩人廳司兩人多者史二人胥四人廳司四人是數十人中多者十人少者五人先已無用不執弓矢共糜廪稍無益有害莫甚於此今乞速罷添差每縣止於舊弓手額外各添百人以新法弓手補充如有不足更行召募尉或不才自當換易豈有文尉守律武尉出戰名分相敵不相為使縣縣敗事害遍天下且朝廷初立新法欲易招置遂使新法弓手役錢優於舊人此正與蔡京創立辟雍施行新法貢士進士分為兩岐不知天下人材本無新舊實同名異妄為紛爭伏乞速行併罷督責縣尉務使一心蠲逋欠劄子某竊謂朝廷有可以大慰民情事理甚明每屈於衆議欲行輒止者如拖欠積欠稅賦干係官錢是也已出省限而未納稅苖謂之拖欠經及纍年謂之積欠正犯人家財不足均攤合干人出備謂之干係官錢此三者前兩項在官未嘗有所得後一項所得甚微而破家賣業者相繼皆朝廷所不忍行而行之者奪於衆議以謂不可去也今衆議所以謂不可去者以其數至多一旦蠲之國用遂屈且催刷積欠逋負其名甚正若一旦蠲除却行斂取即傷民或甚此衆議所以不欲行而朝廷不能奪也某以為此事為州縣監司者皆已知之不敢不行耳且所謂拖欠積欠者何嘗得之皆以當年所入名為催到欠負而巳且以一年計之當年所入皆以數足於足數外催到米斛謂之欠負可也豈有當年之數未足却納欠負之理朝廷試取一州夏秋帳狀計之當年所入幾何催到欠負幾何當年已足有催到之數謂之催到欠負可也當年未足而别出催到欠負一項非以新為舊而何哉且州縣所以為此者蓋亦有説不惟欠負未蒙蠲除挂在簿歷正緣當年所入盡合起發催到欠負尚容兊那此所以不得不為蒙蔽之術也某竊觀江南東西湖南北數路以連年盜賊之餘或彌阡亘陌舉為丘墟而復業之人未嘗盡歸以至江西之田賤價與人人不敢售者以其欠負未盡故也每遇肆赦有除放之文德澤非不加也然於條稱放者止放三分餘七分尚存也某願朝廷徑下諸路凡九年以前拖欠積欠並行除免如十年拖欠許令催促如州縣敢以新苖補填舊欠移易簿書委監司覺察民户越訴如此則南畝之民悉被實惠太平之基豈不益固哉又干繫均備一項尤可矜憫謂如甲願充衙前借乙田宅抵當又召某人為保及當受重難欠折為甲者家業已盡或已身死或死獄中矣除抵當田産自合出賣均及保人又均及鄉鄰又均及主行文書之吏原其本情未必不相蒙蔽以規在官之利然其心豈謂場務便破壞綱運便失陷也根柢窮治無有已時賣妻鬻子不能充足豈不傷和氣哉某願朝廷遍下諸路如見今欠負除正犯人家業及見抵當財産並行出賣外其餘干繫一切除之某觀前世有因推恩減除租稅者國用若足租稅尚可減免况逋欠乎國家用度方之其它固不可行若此三項或有名而無實或害多而利少願朝廷斷之行之正詭名法劄子某謂當今之法有條約備具刑名甚嚴而決不可行者詭名之法是也今者州縣有十等五等之别一有均敷曰上户一有追呼曰上戶一有差徭曰上户為上户者不勝其勞而下户晏然熟視如此則是驅之使為詭名尚何以禁之哉近年以來朝廷因臣僚申請如均敷和買之類皆徹下等是詭名之弊已去矣尚何俟設禁以防之乎蓋其法之弊有甚害者行於貧而不行於富行於賤而不行於貴此乃不可不革者也且縣有一宰行法於一縣者也其家無田則己為縣令者家買田園有不為詭名者乎州有一守行法於一州者也其家無田即己為郡守者家買田園有不為詭名者乎推而言之蓋無不然乃徒設禁防形勢之家雖有訟者州縣不行是行於賤而不行於貴也兼并之家人不敢訴是行於貧而不行於富也獨貧民下户稍涉讐怨更相告訐若州縣受訴而不行即屬違戾若受而行之長告訐之風使細民無所措手足至使豪猾之人誅求鄉村仰以取結者豈不謂法之甚弊者乎某今以謂若盡去其法使詭名者無所忌憚則不可獨願除告賞之法凡詭名挾佃寄託官户規免等第減落稅錢之類並除許人告三字遇其事至官皆依法窮治如州縣隱蔽即委監司按劾而舉行之如此即法固存不害其為良法意固存不害其為美意去告訐之風長敦厚之俗豈不美哉嘗聞錢氏之有國也有一族子弟領郡民有訟盜種官田者錢氏子弟怒而杖之且曰有國者之富獨患地有遺利豈以官民為異道哉使地皆墾闢即稼穡之盛非有國者之利乎由是二浙之地鮮有曠土夫以偏方之佐尚知捐在官之利與民共之以為有國者之利又况詭名之弊若常均及下等即無損於官而實便於民今又不除其禁特寬告訐之俗何憚而不為乎此理甚明願朝廷斷以必行之初論修法之意劄某竊見朝廷重修敕令者其始本欲盡復嘉祐故事非有意於重修也故當日詔書大意以謂仁祖在位四十餘年最為久長故盡復嘉祐法度緣閲嵗既久政事更革詳略不同又自熙寧以來便分勑令格式四事嘉祐法度已不復見今之為有司者當上承朝廷復古之意先以嘉祐法為主其有改更政事前法所不載者以後來刑名附入則祖宗之大法復於今日既從刑部侍郎商守拙之請使嘉祐所不載者並依見行條法俗吏因之習耳目見聞之常一切以政和法令為主豈復有嘉祐哉今者雖行重修左右前後皆政和行法之人根蒂蟠結勢不可解區區一二士人安能勝彼之衆乎嗚呼熙寧以來變更法度以至於今踰六十年矣十甲十二子相配數窮六十豈天時人事因我國家創殘之餘大復祖宗之宏規乎美意始行俗吏掣肘而責之事者環聚士子十餘人法吏數十人怵以後禍誘以近利謂新書朝成暮推賞典若一開口必致敗事今試取巳修者觀之皆政和敕也群吏檢會凡政和所有而嘉祐所無則必修入而後已嘉祐所有而政和所無則不復條具蠧政之結人心也如此幸遇君相有恢復之大志而俗吏奪之了不得伸此有志之士所為憤嘆不平者也次論嘉祐政和法意不同劄嘉祐敕者不分四門具載於敕謂如創造一物在嘉祐敕則曰凡造某物光集人工材植計多寡限某日為之功成獲某賞工廢定某罪此嘉祐文意也政和敕者分敕令格式四門集人工材植令也計多寡限某日式也功成獲某賞格也功廢定某罪敕也故嘉祐敕一閲而盡在不習法者舉能知之此士人百姓之利也政和勑反覆尋閲有終日不盡一事者法吏侮文者之利也今立法者欲一舉盡見使人人曉然咸知而為百姓之利乎欲網羅詳悉繁文碎辭可以出入為侮文者之利乎今持良法以治天下使綱目咸舉不務求為百姓之利而使侮文者得以弄之愚意立法之意必不然也且法度之變何世而無髙祖初定關中約法三章天下既定命蕭何次律令民歌之曰蕭何為法較若畫一其洞然易曉之意可見其後天下多事而趙禹張湯之法出天下豈勝其弊哉賴昭帝繼之霍光知時務之變而當時根據之弊光能絶之摧燕王仆上官文學之士咸使盡其辭𢎞羊之流不得竄其説保而持之以遺宣帝中興之功始粲然耳向使昭帝承奢侈師旅之後守趙禹張湯之令不變則始元之詔真虛文也嗟乎昭帝去漢武之世相繼其間餘習往往具在張湯趙禹之黨必尚持法相顧而文學之士得以竭忠盡辭者丞相大將軍與百執事主其議者為是力耳使丞相不從大將軍不力主在庭百執事畏罪不議則招徠之士尚得開其喙乎更昭立宣為日久矣魏相猶以漢故事奉行為名相則欲恢復大業者於祖宗之法當何如耶前朝之臣蔽蒙聖明過誤國家殘賊百姓不勝其弊天下之人無問逺近言祖宗之法則釋然昭蘇如病者痊如痿者起如久憂者去如言蔡京之流凋弊之政則喪膽失氣魂亡魄絶如覩臭腐如視涕唾如久隂而沈結如痿痺而不起嗚呼今欲去姦諛更弊政大慰民心名聲稱號之順否亦當如何哉此區區之愚所以不量愚賤而欲極論其弊者也後論今日之法當然劄某嘗聞管子之相齊下令如流水之源者豈不計是非利害一切順從衆意務以愈快為事乎是亦因時乘理疏瀹其端導而行之使無留難故民之行之不約而順從也某竊觀嘉祐敕條目絶省政和敕條目甚繁嘉祐勑之文詳政和敕之文簡嘉祐勑立法多重政和敕立法多輕夫條目省則易行立文詳則易曉而法重則民不輕犯百餘年間致治之美得非由是乎政和敕則不然政和所載在嘉祐敕十無三四此條目所以為繁嘉祐丁寧訓誥之意政和一切去之此其文所以為簡徒流笞杖所以禁姦類多姑息謂之隂德此其法所以多輕徒不知條目繁則難行立文簡則難曉姑息從輕則易犯數十年間蠧國殄民得非由是乎但舉一二事言之水陸不得事道像道士不得動鐃鈸軍人不得養鷹犬將校不得從畋獵又如絶禁兵器則鈎刀博刀捋尖刀名號雖異而形相似者皆收坐之此嘉祐所不載而政和則有之此政和敕條目之所以為繁也如招軍經由人不得受軍人例物在嘉祐敕則凡招軍時先具法曉諭出榜旗下各令知委此仁民愛物之意欲民不輕犯也至政和則不然但斷受財之罪而已其意以謂既巳立法何必出榜既不出榜何取知委故至今俗吏多謂嘉祐為剩文不知光武一札十行丁寧訓誥之意幾何其不為剩文耶此政和敕立文所以為簡也嘉祐敕於同居親有所規求而或使為童行或不收養因而致死者論入十惡僧尼道士於本師亡歿還俗歸家回禮它人為師者加一等所以禁止姦弊可謂委曲政和敕則一切去之不知刑有當重豈可但使從輕設法之意將禁姦是務而獨務從輕姦可禁乎故政和敕所以為輕而易犯也以某觀之大抵嘉祐敕必出於士人之手故士人喜觀之前政和修敕時詳定官一時貴人漫不省事刪定官多貴遊子孫故政和敕皆出於文吏之手故文吏喜道之今其言曰法令詩書自為兩塗雖習翰墨豈能曉法故以文法出入為已任獨不知管夷吾便民之令以道揆為之乎亦拘制文墨之弊而為是諄諄者乎且近時風俗便文自營規避後悔牢不可破以謂改嘉祐之文孰謂理直改政和之文則政和之人具在不可不慮乎此所以上下袒徇務為文致必從政和而後止也嗟乎此可怵夫抱案吏耳士大夫奮身謀國死且不畏今欲導祖宗良法美意以便天下實千載一時之嘉會而蓄縮畏罪制於文法寧有是哉某又竊聞人士家多有藏元祐勑者若朝廷發德音下明詔求元祐書與嘉祐參合對修具為成書其有二敕所不載於見行條法者先具條目令刪定官各具所見與公朝通議之其不必用者去之其不可去者附入之則此書之成當粲然可觀而使一代之典出於此時顧不韙與蕪昧之説未知可否恭惟高明俯加裁擇而間取焉幸甚正得失劄前朝害政之方不一而止然總要而言不離於倒置而止耳以忠為佞以邪為正則人材倒置也女謁日盛宦官弄權則名分倒置也以諂諛為嚮上以愛民為附下則是非倒置也國力空竭邉陲召亂則強弱倒置也或唱於前或和於後併為一談牢不可破如是而行餘二十年故上天從之報以倒置之禍外夷天下之足足固在下而返處於上中國天下之首首固居上而返處於下連年之禍古今所無豈可謂強弱之運偶如是哉實倒置之禍積以召之也傳曰人之所欲天必從之端謂是耳然則今日之事所以為燮調之理者不在於它審其倒置者易之斯得矣今之所謂倒置者何耶曰前朝之倒置在諸法度譬諸人身殘其血氣之道也今日之倒置在於強弱征伐譬諸人身殘其形軀之道也殘其血氣者難見而其禍遲殘其形軀者易察而其禍速方今朝廷謂襲前日之弊紀綱法度一切失敘則厚誣矣若征伐之所出漸成倒置則鄙人雖愚實區區之心所甚恐也今執事其思返此禍乎施設注措之方必有默曉執事之意者若謂密勿之請固巳告猷獨行自然機不可泄則非愚所敢言也干冒威嚴退惟戰恐
